<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>PISCES MOON // COMPASS</title>
<style>
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel-border:#1a3a50;--accent:#00d4ff;--accent3:#00ff88;--accent4:#ff3366;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:.9rem;color:var(--accent);letter-spacing:3px;}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:16px;overflow:hidden;}
.compass-wrap{position:relative;width:280px;height:280px;flex-shrink:0;}
canvas#compass{width:280px;height:280px;}
.bearing-display{text-align:center;}
.bearing-deg{font-family:'Orbitron',monospace;font-size:3rem;color:var(--accent);letter-spacing:4px;line-height:1;}
.bearing-dir{font-family:'Orbitron',monospace;font-size:1.2rem;color:var(--gold);letter-spacing:6px;margin-top:4px;}
.info-row{display:flex;gap:24px;}
.info-box{background:var(--bg3);border:1px solid var(--panel-border);padding:10px 16px;text-align:center;min-width:80px;}
.info-val{font-family:'Orbitron',monospace;font-size:.9rem;color:var(--text-bright);}
.info-label{font-size:.52rem;color:var(--text-dim);letter-spacing:1px;margin-top:3px;}
.status-bar{font-size:.6rem;color:var(--text-dim);letter-spacing:1px;text-align:center;}
.status-bar.ok{color:var(--accent3);}
.status-bar.warn{color:var(--gold);}
.status-bar.err{color:var(--accent4);}
.decl-row{display:flex;align-items:center;gap:8px;}
.decl-input{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.68rem;padding:5px 8px;outline:none;width:70px;text-align:center;}
.decl-input:focus{border-color:var(--accent);}
.pm-btn{padding:6px 14px;background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);font-family:'Orbitron',monospace;font-size:.52rem;cursor:pointer;letter-spacing:1px;}
.pm-btn:hover{border-color:var(--accent);color:var(--accent);}
.waypoint-row{display:flex;gap:8px;align-items:center;}
</style>
</head><body>
<header>
  <div class="logo">🧭 COMPASS</div>
  <div id="statusBar" class="status-bar err">AWAITING SENSOR</div>
</header>
<div class="main">
  <canvas id="compass" width="280" height="280"></canvas>

  <div class="bearing-display">
    <div class="bearing-deg" id="bearingDeg">---°</div>
    <div class="bearing-dir" id="bearingDir">---</div>
  </div>

  <div class="info-row">
    <div class="info-box">
      <div class="info-val" id="pitchVal">0°</div>
      <div class="info-label">PITCH</div>
    </div>
    <div class="info-box">
      <div class="info-val" id="rollVal">0°</div>
      <div class="info-label">ROLL</div>
    </div>
    <div class="info-box">
      <div class="info-val" id="declVal">0°</div>
      <div class="info-label">DECLINATION</div>
    </div>
  </div>

  <div class="decl-row">
    <span style="font-size:.58rem;color:var(--text-dim);font-family:Orbitron,monospace;letter-spacing:1px">MAG DECL:</span>
    <input class="decl-input" id="declInput" type="number" step="0.1" value="0" placeholder="±°" oninput="setDecl(this.value)">
    <button class="pm-btn" onclick="autoDecl()">AUTO</button>
    <button class="pm-btn" onclick="lockBearing()">MARK</button>
  </div>

  <div id="markDisplay" style="font-size:.6rem;color:var(--gold);font-family:Orbitron,monospace;letter-spacing:2px;min-height:1.2em"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// COMPASS — DeviceOrientationEvent + canvas rose
// Uses absolute orientation (compassHeading) when available
// Falls back to gamma/beta/alpha with declination correction
// ═══════════════════════════════════════════════════════════════════

const canvas = document.getElementById('compass');
const ctx = canvas.getContext('2d');
const W = 280, H = 280, CX = W/2, CY = H/2, R = 128;

let heading = 0;       // magnetic heading degrees
let pitch = 0;
let roll = 0;
let decl = 0;          // magnetic declination
let markedBearing = null;
let smoothHeading = 0;
let hasReading = false;

// ── Sensor ────────────────────────────────────────────────────────
function requestSensor() {
  if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
    // iOS 13+
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') startListening();
      else setStatus('PERMISSION DENIED', 'err');
    }).catch(() => setStatus('PERMISSION ERROR', 'err'));
  } else if (typeof DeviceOrientationEvent !== 'undefined') {
    startListening();
  } else {
    setStatus('NO ORIENTATION SENSOR', 'err');
  }
}

function startListening() {
  window.addEventListener('deviceorientationabsolute', onOrient, true);
  window.addEventListener('deviceorientation', onOrient, true);
  setStatus('CALIBRATING...', 'warn');
}

function onOrient(e) {
  // webkitCompassHeading (iOS), or 360-alpha for absolute, or alpha for relative
  let h;
  if (e.webkitCompassHeading !== undefined) {
    h = e.webkitCompassHeading;
  } else if (e.absolute && e.alpha !== null) {
    h = (360 - e.alpha) % 360;
  } else if (e.alpha !== null) {
    h = (360 - e.alpha) % 360;
  } else {
    return;
  }

  heading = (h + decl + 360) % 360;
  pitch   = e.beta  ? Math.round(e.beta)  : 0;
  roll    = e.gamma ? Math.round(e.gamma) : 0;
  hasReading = true;
  setStatus('ACTIVE ●', 'ok');
}

// Smooth heading (circular average to avoid 0/360 wrap glitch)
function smoothAngle(current, target) {
  let diff = target - current;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  return (current + diff * 0.15 + 360) % 360;
}

// ── Draw ──────────────────────────────────────────────────────────
const CARDINALS = ['N','NE','E','SE','S','SW','W','NW'];
const COLORS = { bg:'#050a0e', ring:'#1a3a50', tick:'#2a5870', major:'#00d4ff', north:'#ff3366', needle:'#00d4ff', needleS:'#ff3366', mark:'#f4a820' };

function draw() {
  smoothHeading = smoothAngle(smoothHeading, heading);
  const h = smoothHeading;

  ctx.clearRect(0, 0, W, H);

  // Outer ring
  ctx.beginPath(); ctx.arc(CX, CY, R+2, 0, Math.PI*2);
  ctx.strokeStyle = COLORS.ring; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2);
  ctx.strokeStyle = '#0c1620'; ctx.lineWidth = 28; ctx.stroke();

  // Rose ticks
  ctx.save(); ctx.translate(CX, CY);
  for (let i = 0; i < 360; i += 5) {
    const a = (i - h) * Math.PI / 180;
    const isMajor = i % 45 === 0;
    const isMed = i % 15 === 0;
    const len = isMajor ? 20 : isMed ? 14 : 8;
    const r1 = R - 2, r2 = r1 - len;
    ctx.beginPath();
    ctx.moveTo(Math.sin(a)*r1, -Math.cos(a)*r1);
    ctx.lineTo(Math.sin(a)*r2, -Math.cos(a)*r2);
    ctx.strokeStyle = isMajor ? COLORS.major : COLORS.tick;
    ctx.lineWidth = isMajor ? 2 : 1;
    ctx.stroke();
    // Cardinal labels
    if (isMajor) {
      const label = CARDINALS[i/45];
      const lr = R - 30;
      ctx.font = `${i===0?'bold ':''}.72rem Orbitron, monospace`;
      ctx.fillStyle = i === 0 ? COLORS.north : COLORS.major;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(label, Math.sin(a)*lr, -Math.cos(a)*lr);
    }
  }

  // Marked bearing line
  if (markedBearing !== null) {
    const a = (markedBearing - h) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.sin(a)*(R-2), -Math.cos(a)*(R-2));
    ctx.strokeStyle = COLORS.mark; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
    ctx.stroke(); ctx.setLineDash([]);
  }

  ctx.restore();

  // Needle
  ctx.save(); ctx.translate(CX, CY);
  // North (red)
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-8, 12); ctx.lineTo(0, -(R-44)); ctx.lineTo(8, 12);
  ctx.closePath();
  ctx.fillStyle = COLORS.needleS; ctx.fill();
  // South (blue)
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-6, -8); ctx.lineTo(0, R-44); ctx.lineTo(6, -8);
  ctx.closePath();
  ctx.fillStyle = COLORS.needle; ctx.fill();
  // Center dot
  ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2);
  ctx.fillStyle = '#c8e8f5'; ctx.fill();
  ctx.restore();

  // Update text
  const deg = Math.round(heading);
  document.getElementById('bearingDeg').textContent = deg.toString().padStart(3,'0') + '°';
  document.getElementById('bearingDir').textContent = degToDir(deg);
  document.getElementById('pitchVal').textContent = pitch + '°';
  document.getElementById('rollVal').textContent = roll + '°';
  document.getElementById('declVal').textContent = (decl >= 0 ? '+' : '') + decl.toFixed(1) + '°';

  requestAnimationFrame(draw);
}

function degToDir(d) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(d/22.5) % 16];
}

function setDecl(v) { decl = parseFloat(v) || 0; }

// Auto-declination from GPS if available
function autoDecl() {
  if (!navigator.geolocation) { alert('No GPS available'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    // World Magnetic Model approximation (good to ~1° for most of N America)
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    // Simple IGRF approximation for continental US
    const d = -3.1 - 0.0518*lon - 0.0229*lat;
    decl = parseFloat(d.toFixed(1));
    document.getElementById('declInput').value = decl;
    setStatus(`DECLINATION: ${decl}° (AUTO)`, 'ok');
  }, () => alert('GPS not available for auto-declination'));
}

function lockBearing() {
  markedBearing = Math.round(heading);
  document.getElementById('markDisplay').textContent = `MARKED: ${markedBearing.toString().padStart(3,'0')}° ${degToDir(markedBearing)}`;
}

function setStatus(msg, cls) {
  const el = document.getElementById('statusBar');
  el.textContent = msg; el.className = 'status-bar ' + cls;
}

// iOS needs user gesture to request permission
document.addEventListener('click', function init() {
  document.removeEventListener('click', init);
  requestSensor();
}, { once: false });

requestSensor();
draw();
</script>
</body></html>
