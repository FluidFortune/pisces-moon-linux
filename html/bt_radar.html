<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.bt-layout { display:grid; grid-template-columns:300px 1fr 300px; height:calc(100vh - 52px); overflow:hidden; }
.bt-left  { border-right:1px solid var(--panel-border); overflow-y:auto; }
.bt-right { border-left:1px solid var(--panel-border); overflow-y:auto; }

/* Stats */
.bt-stats { display:flex; border-bottom:1px solid var(--panel-border); background:var(--bg2); }
.bt-stat  { flex:1; padding:10px 14px; border-right:1px solid var(--panel-border); text-align:center; }
.bt-stat:last-child { border-right:none; }
.bt-stat-label { font-family:Orbitron,monospace; font-size:.48rem; letter-spacing:2px; color:var(--text-dim); }
.bt-stat-value { font-family:Orbitron,monospace; font-size:1.2rem; color:var(--text-bright); font-weight:700; }

/* Device list */
.bt-device { padding:10px 12px; border-bottom:1px solid rgba(28,46,58,.4); cursor:pointer; transition:background .15s; }
.bt-device:hover { background:rgba(77,217,255,.04); }
.bt-device.selected { background:rgba(77,217,255,.08); border-left:2px solid var(--accent); }
.bt-device-name { font-size:.75rem; color:var(--text-bright); margin-bottom:3px; }
.bt-device-mac  { font-family:Share\ Tech\ Mono,monospace; font-size:.6rem; color:var(--text-dim); }
.bt-device-meta { font-size:.58rem; color:var(--text-dim); display:flex; gap:8px; margin-top:3px; }

/* Center: bubble scatter */
.bt-center { position:relative; background:var(--bg); }
#bt-scatter { width:100%; height:100%; }

/* Right charts */
.bt-chart-section { padding:8px; border-bottom:1px solid var(--panel-border); }
.bt-chart-title { font-family:Orbitron,monospace; font-size:.52rem; letter-spacing:2px; color:var(--gold); margin-bottom:6px; }

.bt-controls { position:absolute; top:8px; right:8px; z-index:10; display:flex; gap:6px; }
.bt-btn { padding:6px 12px; background:var(--bg2); border:1px solid var(--panel-border);
    color:var(--text-dim); font-family:Share\ Tech\ Mono,monospace; font-size:.6rem;
    cursor:pointer; letter-spacing:1px; transition:all .15s; }
.bt-btn:hover { border-color:var(--gold); color:var(--gold); }
.bt-btn.active { border-color:var(--accent); color:var(--accent); }

.rssi-bar { height:6px; border-radius:3px; margin-top:3px; background:var(--panel-border); overflow:hidden; }
.rssi-fill { height:100%; border-radius:3px; transition:width .3s; }
</style>

<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            this.ws.onopen = () => resolve();
            this.ws.onerror = () => reject(new Error(`WebSocket failed at ${this.wsUrl}`));

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed");
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
const devices = new Map(); // mac → device
let viewMode  = 'bubble';
let selectedMAC = null;
let scatter, vendorChart, rssiDistChart, rssiSpark;
let newDevicesThisMinute = 0;
let minuteTimer = null;

// OUI vendor lookup
const OUI = {
    '4C:8D:55':'Apple','AC:DE:48':'Apple','B8:27:EB':'Raspberry Pi',
    'DC:A6:32':'Raspberry Pi','00:0C:29':'VMware','18:31:BF':'Amazon',
    '94:65:2D':'Google','00:1A:79':'Unknown','E8:5B:5B':'Samsung',
    'F0:72:EA':'Samsung','34:13:E8':'Xiaomi','2C:F0:EE':'Xiaomi',
};

function vendorFromMAC(mac) {
    if (!mac) return 'Unknown';
    const prefix = mac.substring(0, 8).toUpperCase();
    return OUI[prefix] || 'Generic';
}

function initViz() {
    const canvas = document.getElementById('bt-scatter');
    canvas.width  = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;

    scatter      = new PMViz.BubbleScatter('bt-scatter');
    vendorChart  = new PMViz.DonutChart('bt-vendors');
    rssiDistChart= new PMViz.BarChart('bt-rssi-dist', {horizontal:false, colorFn:(d)=>PMViz.rssiColor(parseInt(d.label))});
    rssiSpark    = new PMViz.Sparkline('bt-sparkline', {color:PMViz.C.accent});
}

const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s) => {
        document.getElementById('liveBadge').style.opacity = s.state==='connected'?'1':'0.3';
        document.getElementById('lastUpdate').textContent = s.message;
    }
});

function handleData(msg) {
    // Accept bridge 'ble' events AND legacy 'BLE_OBS'
    if (msg.type !== 'BLE_OBS' && msg.type !== 'ble') return;
    if (msg.type === 'ble') {
        msg.src_mac = msg.mac;
        msg.proto = 'BLE';
    }

    const mac  = msg.mac;
    const name = msg.name || '';
    const rssi = msg.rssi || -99;
    const vendor = vendorFromMAC(mac);

    if (!devices.has(mac)) {
        newDevicesThisMinute++;
        devices.set(mac, {
            mac, name, rssi, vendor,
            mfr:       msg.mfr || '',
            firstSeen: Date.now(),
            lastSeen:  Date.now(),
            rssiHistory: [rssi],
            count: 1,
        });
    } else {
        const d = devices.get(mac);
        d.rssi    = rssi;
        d.lastSeen = Date.now();
        d.count++;
        if (name) d.name = name;
        d.rssiHistory.push(rssi);
        if (d.rssiHistory.length > 60) d.rssiHistory.shift();
    }

    scatter.upsert(mac, rssi, name || mac.substring(0,8));

    if (mac === selectedMAC) {
        rssiSpark.push(rssi);
    }

    updateStats();
    renderList();
    updateCharts();
}

function updateStats() {
    const devArr = Array.from(devices.values());
    const named  = devArr.filter(d => d.name).length;
    const best   = devArr.reduce((b,d) => d.rssi > b ? d.rssi : b, -120);

    document.getElementById('statDevices').textContent = devArr.length;
    document.getElementById('statNamed').textContent   = named;
    document.getElementById('statBest').textContent    = best > -120 ? `${best}dBm` : '—';
    document.getElementById('statRate').textContent    = newDevicesThisMinute;
    document.getElementById('devCount').textContent    = `${devArr.length} total`;
}

function renderList() {
    const devArr = Array.from(devices.values())
        .sort((a, b) => b.rssi - a.rssi);

    document.getElementById('deviceList').innerHTML = devArr.map(d => {
        const color = PMViz.rssiColor(d.rssi);
        const norm  = Math.max(0, Math.min(100, (d.rssi + 100)));
        const age   = Date.now() - d.lastSeen;
        const fresh = age < 5000;
        return `
        <div class="bt-device ${selectedMAC===d.mac?'selected':''}"
             onclick="selectDevice('${PM.esc(d.mac)}')">
            <div class="bt-device-name" style="color:${fresh?'var(--text-bright)':'var(--text-dim)'}">
                ${d.name ? PM.esc(d.name) : '<unnamed>'}
                ${fresh ? '<span style="color:var(--accent3);font-size:.55rem;margin-left:6px">●</span>' : ''}
            </div>
            <div class="bt-device-mac">${d.mac}</div>
            <div class="bt-device-meta">
                <span style="color:${color}">${d.rssi}dBm</span>
                <span>${d.vendor}</span>
                <span style="margin-left:auto">${d.count}x</span>
            </div>
            <div class="rssi-bar">
                <div class="rssi-fill" style="width:${norm}%;background:${color}"></div>
            </div>
        </div>`;
    }).join('');
}

function selectDevice(mac) {
    selectedMAC = mac;
    const d = devices.get(mac);
    if (!d) return;

    renderList();

    document.getElementById('selectedInfo').innerHTML = `
        <div style="color:var(--text-bright)">${d.name || '<unnamed>'}</div>
        <div style="color:var(--text-dim)">${d.mac}</div>
        <div>Vendor: ${d.vendor} | Count: ${d.count} | Best RSSI: ${Math.max(...d.rssiHistory)}dBm</div>
        ${d.mfr ? `<div>Mfr data: ${d.mfr.substring(0,24)}</div>` : ''}
    `;

    // Replay RSSI history
    rssiSpark.data = [];
    d.rssiHistory.forEach(r => rssiSpark.push(r));
}

function updateCharts() {
    const devArr = Array.from(devices.values());

    // Vendor donut
    const vCounts = {};
    devArr.forEach(d => { vCounts[d.vendor] = (vCounts[d.vendor]||0)+1; });
    vendorChart.update(Object.entries(vCounts).map(([label,value])=>({label,value})));

    // RSSI distribution
    const ranges = {'<-85':0,'-85/-70':0,'-70/-55':0,'>-55':0};
    devArr.forEach(d => {
        if      (d.rssi < -85) ranges['<-85']++;
        else if (d.rssi < -70) ranges['-85/-70']++;
        else if (d.rssi < -55) ranges['-70/-55']++;
        else                   ranges['>-55']++;
    });
    rssiDistChart.update(Object.entries(ranges).map(([label,value])=>({label,value})));
}

function setView(v) {
    viewMode = v;
    document.getElementById('btnBubble').className   = 'bt-btn' + (v==='bubble'   ?' active':'');
    document.getElementById('btnTimeline').className = 'bt-btn' + (v==='timeline' ?' active':'');
}

function startScan() {
    if (beam.connected) {
        beam.send({type:'CMD_BLE_SCAN', src:'app', cmd_id:'bt1', duration_sec:30, active:true});
    }
}

function saveNow() {
    PMViz.Storage.save('bt_radar', Array.from(devices.values()), 'json');
}

window.addEventListener('load', async () => {
    initViz();
    // Reset new-device counter every minute
    minuteTimer = setInterval(() => { newDevicesThisMinute = 0; }, 60000);
    try { await beam.connect(); }
    catch(e) { console.log('No hardware — demo mode'); }
});
</script>
