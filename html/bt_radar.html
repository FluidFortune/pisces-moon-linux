<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // BT RADAR</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
.bt-layout { display:grid; grid-template-columns:300px 1fr 300px; height:calc(100vh - 52px); overflow:hidden; }
.bt-left  { border-right:1px solid var(--panel-border); overflow-y:auto; }
.bt-right { border-left:1px solid var(--panel-border); overflow-y:auto; }

/* Stats */
.bt-stats { display:flex; border-bottom:1px solid var(--panel-border); background:var(--bg2); }
.bt-stat  { flex:1; padding:10px 14px; border-right:1px solid var(--panel-border); text-align:center; }
.bt-stat:last-child { border-right:none; }
.bt-stat-label { font-family:Orbitron,monospace; font-size:.48rem; letter-spacing:2px; color:var(--text-dim); }
.bt-stat-value { font-family:Orbitron,monospace; font-size:1.2rem; color:var(--text-bright); font-weight:700; }

/* Device list */
.bt-device { padding:10px 12px; border-bottom:1px solid rgba(28,46,58,.4); cursor:pointer; transition:background .15s; }
.bt-device:hover { background:rgba(0,212,255,.04); }
.bt-device.selected { background:rgba(0,212,255,.08); border-left:2px solid var(--accent); }
.bt-device-name { font-size:.75rem; color:var(--text-bright); margin-bottom:3px; }
.bt-device-mac  { font-family:Share\ Tech\ Mono,monospace; font-size:.6rem; color:var(--text-dim); }
.bt-device-meta { font-size:.58rem; color:var(--text-dim); display:flex; gap:8px; margin-top:3px; }

/* Center: bubble scatter */
.bt-center { position:relative; background:var(--bg); }
#bt-scatter { width:100%; height:100%; }

/* Right charts */
.bt-chart-section { padding:8px; border-bottom:1px solid var(--panel-border); }
.bt-chart-title { font-family:Orbitron,monospace; font-size:.52rem; letter-spacing:2px; color:var(--gold); margin-bottom:6px; }

.bt-controls { position:absolute; top:8px; right:8px; z-index:10; display:flex; gap:6px; }
.bt-btn { padding:6px 12px; background:var(--bg2); border:1px solid var(--panel-border);
    color:var(--text-dim); font-family:Share\ Tech\ Mono,monospace; font-size:.6rem;
    cursor:pointer; letter-spacing:1px; transition:all .15s; }
.bt-btn:hover { border-color:var(--gold); color:var(--gold); }
.bt-btn.active { border-color:var(--accent); color:var(--accent); }

.rssi-bar { height:6px; border-radius:3px; margin-top:3px; background:var(--panel-border); overflow:hidden; }
.rssi-fill { height:100%; border-radius:3px; transition:width .3s; }
</style>
</head><body>

<header class="pm-header">
    <div class="pm-logo">📶 <em>BT</em> RADAR</div>
    <div class="pm-hdr-right">
        <div class="pm-live-badge" id="liveBadge" style="opacity:.3">
            <div class="pm-live-dot"></div>LIVE
        </div>
        <span class="pm-last-update" id="lastUpdate"></span>
        <button class="pm-refresh" onclick="startScan()">⟳ SCAN</button>
    </div>
</header>

<div class="bt-stats">
    <div class="bt-stat"><div class="bt-stat-label">DEVICES</div><div class="bt-stat-value" id="statDevices">0</div></div>
    <div class="bt-stat"><div class="bt-stat-label">NAMED</div><div class="bt-stat-value" id="statNamed">0</div></div>
    <div class="bt-stat"><div class="bt-stat-label">STRONGEST</div><div class="bt-stat-value" id="statBest">—</div></div>
    <div class="bt-stat"><div class="bt-stat-label">NEW/MIN</div><div class="bt-stat-value" id="statRate">0</div></div>
</div>

<div class="bt-layout">
    <div class="bt-left">
        <div class="pm-sh" style="position:sticky;top:0;z-index:10">
            BLE DEVICES
            <span class="pm-sh-sub" id="devCount"></span>
        </div>
        <div id="deviceList"></div>
    </div>

    <div class="bt-center">
        <div class="bt-controls">
            <button class="bt-btn active" id="btnBubble" onclick="setView('bubble')">BUBBLE</button>
            <button class="bt-btn" id="btnTimeline" onclick="setView('timeline')">TIMELINE</button>
            <button class="bt-btn" onclick="saveNow()">💾</button>
        </div>
        <canvas id="bt-scatter"></canvas>
    </div>

    <div class="bt-right">
        <div class="bt-chart-section">
            <div class="bt-chart-title">VENDOR BREAKDOWN</div>
            <canvas id="bt-vendors" width="284" height="200"></canvas>
        </div>
        <div class="bt-chart-section">
            <div class="bt-chart-title">RSSI DISTRIBUTION</div>
            <canvas id="bt-rssi-dist" width="284" height="140"></canvas>
        </div>
        <div class="bt-chart-section">
            <div class="bt-chart-title">SELECTED DEVICE — RSSI HISTORY</div>
            <canvas id="bt-sparkline" width="284" height="60"></canvas>
            <div id="selectedInfo" style="padding:6px 0;font-size:.65rem;color:var(--text-dim)">Select a device</div>
        </div>
    </div>
</div>

<script src="pm_scraper.js"></script>
<script src="pm_viz.js"></script>
<script src="pm_transport.js"></script>
<script>
const devices = new Map(); // mac → device
let viewMode  = 'bubble';
let selectedMAC = null;
let scatter, vendorChart, rssiDistChart, rssiSpark;
let newDevicesThisMinute = 0;
let minuteTimer = null;

// OUI vendor lookup
const OUI = {
    '4C:8D:55':'Apple','AC:DE:48':'Apple','B8:27:EB':'Raspberry Pi',
    'DC:A6:32':'Raspberry Pi','00:0C:29':'VMware','18:31:BF':'Amazon',
    '94:65:2D':'Google','00:1A:79':'Unknown','E8:5B:5B':'Samsung',
    'F0:72:EA':'Samsung','34:13:E8':'Xiaomi','2C:F0:EE':'Xiaomi',
};

function vendorFromMAC(mac) {
    if (!mac) return 'Unknown';
    const prefix = mac.substring(0, 8).toUpperCase();
    return OUI[prefix] || 'Generic';
}

function initViz() {
    const canvas = document.getElementById('bt-scatter');
    canvas.width  = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;

    scatter      = new PMViz.BubbleScatter('bt-scatter');
    vendorChart  = new PMViz.DonutChart('bt-vendors');
    rssiDistChart= new PMViz.BarChart('bt-rssi-dist', {horizontal:false, colorFn:(d)=>PMViz.rssiColor(parseInt(d.label))});
    rssiSpark    = new PMViz.Sparkline('bt-sparkline', {color:PMViz.C.accent});
}

const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s) => {
        document.getElementById('liveBadge').style.opacity = s.state==='connected'?'1':'0.3';
        document.getElementById('lastUpdate').textContent = s.message;
    }
});

function handleData(msg) {
    if (msg.type !== 'BLE_OBS') return;

    const mac  = msg.mac;
    const name = msg.name || '';
    const rssi = msg.rssi || -99;
    const vendor = vendorFromMAC(mac);

    if (!devices.has(mac)) {
        newDevicesThisMinute++;
        devices.set(mac, {
            mac, name, rssi, vendor,
            mfr:       msg.mfr || '',
            firstSeen: Date.now(),
            lastSeen:  Date.now(),
            rssiHistory: [rssi],
            count: 1,
        });
    } else {
        const d = devices.get(mac);
        d.rssi    = rssi;
        d.lastSeen = Date.now();
        d.count++;
        if (name) d.name = name;
        d.rssiHistory.push(rssi);
        if (d.rssiHistory.length > 60) d.rssiHistory.shift();
    }

    scatter.upsert(mac, rssi, name || mac.substring(0,8));

    if (mac === selectedMAC) {
        rssiSpark.push(rssi);
    }

    updateStats();
    renderList();
    updateCharts();
}

function updateStats() {
    const devArr = Array.from(devices.values());
    const named  = devArr.filter(d => d.name).length;
    const best   = devArr.reduce((b,d) => d.rssi > b ? d.rssi : b, -120);

    document.getElementById('statDevices').textContent = devArr.length;
    document.getElementById('statNamed').textContent   = named;
    document.getElementById('statBest').textContent    = best > -120 ? `${best}dBm` : '—';
    document.getElementById('statRate').textContent    = newDevicesThisMinute;
    document.getElementById('devCount').textContent    = `${devArr.length} total`;
}

function renderList() {
    const devArr = Array.from(devices.values())
        .sort((a, b) => b.rssi - a.rssi);

    document.getElementById('deviceList').innerHTML = devArr.map(d => {
        const color = PMViz.rssiColor(d.rssi);
        const norm  = Math.max(0, Math.min(100, (d.rssi + 100)));
        const age   = Date.now() - d.lastSeen;
        const fresh = age < 5000;
        return `
        <div class="bt-device ${selectedMAC===d.mac?'selected':''}"
             onclick="selectDevice('${PM.esc(d.mac)}')">
            <div class="bt-device-name" style="color:${fresh?'var(--text-bright)':'var(--text-dim)'}">
                ${d.name ? PM.esc(d.name) : '<unnamed>'}
                ${fresh ? '<span style="color:var(--accent3);font-size:.55rem;margin-left:6px">●</span>' : ''}
            </div>
            <div class="bt-device-mac">${d.mac}</div>
            <div class="bt-device-meta">
                <span style="color:${color}">${d.rssi}dBm</span>
                <span>${d.vendor}</span>
                <span style="margin-left:auto">${d.count}x</span>
            </div>
            <div class="rssi-bar">
                <div class="rssi-fill" style="width:${norm}%;background:${color}"></div>
            </div>
        </div>`;
    }).join('');
}

function selectDevice(mac) {
    selectedMAC = mac;
    const d = devices.get(mac);
    if (!d) return;

    renderList();

    document.getElementById('selectedInfo').innerHTML = `
        <div style="color:var(--text-bright)">${d.name || '<unnamed>'}</div>
        <div style="color:var(--text-dim)">${d.mac}</div>
        <div>Vendor: ${d.vendor} | Count: ${d.count} | Best RSSI: ${Math.max(...d.rssiHistory)}dBm</div>
        ${d.mfr ? `<div>Mfr data: ${d.mfr.substring(0,24)}</div>` : ''}
    `;

    // Replay RSSI history
    rssiSpark.data = [];
    d.rssiHistory.forEach(r => rssiSpark.push(r));
}

function updateCharts() {
    const devArr = Array.from(devices.values());

    // Vendor donut
    const vCounts = {};
    devArr.forEach(d => { vCounts[d.vendor] = (vCounts[d.vendor]||0)+1; });
    vendorChart.update(Object.entries(vCounts).map(([label,value])=>({label,value})));

    // RSSI distribution
    const ranges = {'<-85':0,'-85/-70':0,'-70/-55':0,'>-55':0};
    devArr.forEach(d => {
        if      (d.rssi < -85) ranges['<-85']++;
        else if (d.rssi < -70) ranges['-85/-70']++;
        else if (d.rssi < -55) ranges['-70/-55']++;
        else                   ranges['>-55']++;
    });
    rssiDistChart.update(Object.entries(ranges).map(([label,value])=>({label,value})));
}

function setView(v) {
    viewMode = v;
    document.getElementById('btnBubble').className   = 'bt-btn' + (v==='bubble'   ?' active':'');
    document.getElementById('btnTimeline').className = 'bt-btn' + (v==='timeline' ?' active':'');
}

function startScan() {
    if (beam.connected) {
        beam.send({type:'CMD_BLE_SCAN', src:'app', cmd_id:'bt1', duration_sec:30, active:true});
    }
}

function saveNow() {
    PMViz.Storage.save('bt_radar', Array.from(devices.values()), 'json');
}

window.addEventListener('load', async () => {
    initViz();
    // Reset new-device counter every minute
    minuteTimer = setInterval(() => { newDevicesThisMinute = 0; }, 60000);
    try { await beam.connect(); }
    catch(e) { console.log('No hardware — demo mode'); }
});
</script>
</body></html>
