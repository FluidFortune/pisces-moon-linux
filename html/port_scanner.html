  On Android: uses PMTransport for T-Beam relay
  Browser security prevents raw TCP — must go through the bridge

<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>PISCES MOON // PORT SCAN</title>
<style>
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel-border:#1a3a50;--accent:#00d4ff;--accent3:#00ff88;--accent4:#ff3366;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:.9rem;color:var(--accent4);letter-spacing:3px;}
.toolbar{padding:8px 14px;border-bottom:1px solid var(--panel-border);background:var(--bg2);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.t-input{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.65rem;padding:6px 10px;outline:none;}
.t-input:focus{border-color:var(--accent4);}
.pm-btn{padding:6px 14px;background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);font-family:Orbitron,monospace;font-size:.52rem;cursor:pointer;letter-spacing:1px;}
.pm-btn:hover,.pm-btn.scan{border-color:var(--accent4);color:var(--accent4);}
.pm-btn.stop{border-color:var(--accent4);color:var(--accent4);background:rgba(255,51,102,.1);}
.pm-btn.preset{border-color:var(--panel-border);font-size:.48rem;}
.pm-btn.preset:hover{border-color:var(--gold);color:var(--gold);}
.main{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden;}
.left{border-right:1px solid var(--panel-border);display:flex;flex-direction:column;overflow:hidden;}
.right{display:flex;flex-direction:column;overflow:hidden;}
.ph{padding:9px 14px;border-bottom:1px solid var(--panel-border);background:var(--bg2);font-family:Orbitron,monospace;font-size:.58rem;letter-spacing:2px;color:var(--text-dim);}
.results{flex:1;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:.62rem;}
.port-row{padding:5px 14px;border-bottom:1px solid rgba(28,46,58,.2);display:flex;gap:10px;align-items:center;}
.port-row.open{background:rgba(0,255,136,.04);}
.port-row.closed{opacity:.4;}
.port-num{color:var(--accent);width:50px;flex-shrink:0;font-family:Orbitron,monospace;font-size:.68rem;}
.port-state{width:60px;flex-shrink:0;font-size:.55rem;font-family:Orbitron,monospace;letter-spacing:1px;}
.port-state.open{color:var(--accent3);}
.port-state.closed{color:var(--text-dim);}
.port-state.filtered{color:var(--gold);}
.port-service{color:var(--text-bright);flex:1;}
.port-banner{color:var(--text-dim);font-size:.55rem;word-break:break-all;}
.log{flex:1;overflow-y:auto;padding:10px 14px;font-size:.6rem;line-height:1.8;}
.log-line{color:var(--text-dim);}
.log-line.ok{color:var(--accent3);}
.log-line.err{color:var(--accent4);}
.log-line.info{color:var(--accent);}
.summary{padding:10px 14px;border-top:1px solid var(--panel-border);font-size:.6rem;display:flex;gap:16px;}
.sum-val{color:var(--accent3);font-family:Orbitron,monospace;}
.progress-bar{height:3px;background:var(--bg3);}
.progress-fill{height:100%;background:var(--accent4);transition:width .1s;}
.conn-status{font-size:.58rem;font-family:Orbitron,monospace;letter-spacing:1px;}
.conn-status.ok{color:var(--accent3);}
.conn-status.err{color:var(--accent4);}
</style>
</head><body>
<header>
  <div class="logo">⬡ PORT SCAN</div>
  <div class="conn-status" id="connStatus">DISCONNECTED</div>
</header>

<div class="toolbar">
  <input class="t-input" id="targetInput" placeholder="Target IP / hostname" value="192.168.1.1" style="width:160px">
  <input class="t-input" id="portRange" placeholder="Port range" value="1-1024" style="width:100px">
  <input class="t-input" id="timeoutMs" placeholder="Timeout ms" value="1000" style="width:80px">
  <button class="pm-btn scan" id="scanBtn" onclick="startScan()">▶ SCAN</button>
  <button class="pm-btn stop" id="stopBtn" onclick="stopScan()" style="display:none">■ STOP</button>
  <button class="pm-btn preset" onclick="setPreset('top20')">TOP 20</button>
  <button class="pm-btn preset" onclick="setPreset('top100')">TOP 100</button>
  <button class="pm-btn preset" onclick="setPreset('web')">WEB</button>
  <button class="pm-btn preset" onclick="setPreset('db')">DATABASES</button>
  <button class="pm-btn preset" onclick="setPreset('iot')">IOT</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>

<div class="main">
  <div class="left">
    <div class="ph">OPEN PORTS <span id="openCount" style="color:var(--accent3)">0</span></div>
    <div class="results" id="portResults"></div>
    <div class="summary" id="summary">
      <span>TOTAL: <span class="sum-val" id="sumTotal">0</span></span>
      <span>OPEN: <span class="sum-val" id="sumOpen">0</span></span>
      <span>TIME: <span class="sum-val" id="sumTime">--</span></span>
    </div>
  </div>
  <div class="right">
    <div class="ph">SCAN LOG</div>
    <div class="log" id="scanLog"><div class="log-line info">Connect edge_bridge.py to scan. Commands relayed via WebSocket.</div><div class="log-line info">On Linux: python3 /opt/pisces-moon/tools/edge_bridge.py</div></div>
  </div>
</div>

<script src="pm_transport.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// PORT SCANNER
// Architecture: Browser → PMTransport (WS) → edge_bridge.py → TCP
// Bridge handles actual TCP connections since browser JS can't do raw TCP
// Falls back to timing-based HTTP probe if bridge unavailable
// ═══════════════════════════════════════════════════════════════════

const SERVICES = {
  20:'FTP-DATA',21:'FTP',22:'SSH',23:'TELNET',25:'SMTP',53:'DNS',67:'DHCP',68:'DHCP',
  80:'HTTP',110:'POP3',111:'RPCBIND',119:'NNTP',123:'NTP',135:'MSRPC',137:'NETBIOS-NS',
  138:'NETBIOS-DGM',139:'NETBIOS-SSN',143:'IMAP',161:'SNMP',162:'SNMP-TRAP',
  179:'BGP',194:'IRC',389:'LDAP',443:'HTTPS',445:'SMB',465:'SMTPS',
  500:'ISAKMP',514:'SYSLOG',515:'LPD',587:'SMTP-SUB',631:'IPP',
  636:'LDAPS',993:'IMAPS',995:'POP3S',1080:'SOCKS',1194:'OPENVPN',1433:'MSSQL',
  1521:'ORACLE',1723:'PPTP',1883:'MQTT',2222:'SSH-ALT',3000:'NODE/DEV',3306:'MYSQL',
  3389:'RDP',4444:'METASPLOIT',4840:'OPCUA',5000:'FLASK/DEV',5432:'POSTGRESQL',
  5900:'VNC',6379:'REDIS',6667:'IRC',8080:'HTTP-PROXY',8443:'HTTPS-ALT',
  8883:'MQTT-TLS',9200:'ELASTICSEARCH',27017:'MONGODB',51820:'WIREGUARD'
};

const PRESETS = {
  top20: '21,22,23,25,53,80,110,111,135,139,143,443,445,993,995,1723,3306,3389,5900,8080',
  top100: '1,7,9,13,17,19,21-25,26,37,53,79-81,88,106,110-111,113,119,135,139,143,144,179,199,389,427,443,444-445,465,513-515,543-544,548,554,587,631,646,873,990,993,995,1025-1029,1110,1433,1720,1723,1755,1900,2000-2001,2049,2121,2717,3000,3128,3306,3389,3986,4899,5000,5009,5051,5060,5101,5190,5357,5432,5631,5666,5800,5900,6000,6001,6646,7070,8000,8008-8009,8080-8081,8443,8888,9100,9999-10000,32768,49152',
  web: '80,443,8080,8443,3000,4000,5000,8000,8008,8888,9000,9090',
  db: '1433,1521,3306,5432,6379,27017,28017,9200,9300',
  iot: '23,80,443,1883,4840,5683,8080,8443,8883,9999,49152'
};

let scanActive = false;
let scanQueue = [];
let results = {};
let startTime = 0;
let beam = null;
let bridgeAvailable = false;

// Transport
function initTransport() {
  if (typeof PMTransport === 'undefined') {
    log('PMTransport not found — bridge required for full scan', 'err');
    log('Falling back to HTTP timing probe (limited)', 'info');
    return;
  }
  beam = new PMTransport({
    onMessage: handleBridgeMsg,
    onStatus: s => {
      bridgeAvailable = s.state === 'connected';
      const el = document.getElementById('connStatus');
      el.textContent = s.state.toUpperCase();
      el.className = 'conn-status ' + (bridgeAvailable ? 'ok' : 'err');
    }
  });
  beam.connect().catch(()=>{});
}

function handleBridgeMsg(msg) {
  if (msg.type === 'PORT_RESULT') {
    updatePort(msg.port, msg.state, msg.banner || '');
  } else if (msg.type === 'SCAN_DONE') {
    finishScan();
  }
}

function setPreset(name) {
  const p = PRESETS[name];
  if (p) document.getElementById('portRange').value = p;
}

function parsePortRange(s) {
  const ports = new Set();
  for (const part of s.split(',')) {
    const trimmed = part.trim();
    if (trimmed.includes('-')) {
      const [a,b] = trimmed.split('-').map(Number);
      for (let p=Math.min(a,b); p<=Math.max(a,b); p++) ports.add(p);
    } else if (Number(trimmed)) {
      ports.add(Number(trimmed));
    }
  }
  return [...ports].filter(p => p > 0 && p < 65536).sort((a,b)=>a-b);
}

function startScan() {
  const target = document.getElementById('targetInput').value.trim();
  const range  = document.getElementById('portRange').value.trim();
  const timeout= parseInt(document.getElementById('timeoutMs').value) || 1000;
  if (!target) { alert('Enter a target IP or hostname'); return; }

  const ports = parsePortRange(range);
  if (!ports.length) { alert('No valid ports in range'); return; }

  results = {}; scanActive = true; startTime = Date.now();
  document.getElementById('portResults').innerHTML = '';
  document.getElementById('scanLog').innerHTML = '';
  document.getElementById('openCount').textContent = '0';
  document.getElementById('scanBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'inline-block';

  log(`Target: ${target}`, 'info');
  log(`Ports: ${ports.length} (${ports[0]}-${ports[ports.length-1]})`, 'info');
  log(`Timeout: ${timeout}ms`, 'info');
  log(`Method: ${bridgeAvailable?'TCP connect via bridge':'HTTP timing probe (limited)'}`, 'info');
  log('Starting scan...', 'ok');

  if (bridgeAvailable && beam) {
    // Full TCP scan via bridge
    beam.send({ cmd: 'port_scan', params: { target, ports, timeout } });
    log('Scan command sent to bridge.', 'ok');
    // Also simulate progress locally
    let done = 0;
    const interval = setInterval(() => {
      done = Math.min(done+5, ports.length);
      document.getElementById('progFill').style.width = (done/ports.length*100)+'%';
      if (!scanActive || done >= ports.length) clearInterval(interval);
    }, Math.max(100, (timeout * ports.length / 200)));
  } else {
    // Fallback: HTTP fetch timing probe (detects open web ports only)
    log('Bridge not connected. Using HTTP timing probe.', 'err');
    log('Only HTTP/HTTPS ports detectable without bridge.', 'err');
    runHTTPProbe(target, ports, timeout);
  }
}

async function runHTTPProbe(target, ports, timeout) {
  const httpPorts = ports.filter(p => [80,443,8080,8443,3000,4000,5000,8000,8008,8888,9000,9090,4443].includes(p));
  let done = 0;
  for (const port of ports) {
    if (!scanActive) break;
    done++;
    document.getElementById('progFill').style.width = (done/ports.length*100)+'%';
    if (httpPorts.includes(port)) {
      const scheme = [443,8443,4443].includes(port) ? 'https' : 'http';
      try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), timeout);
        await fetch(`${scheme}://${target}:${port}/`, { signal:ctrl.signal, mode:'no-cors' });
        updatePort(port, 'open', 'HTTP response');
      } catch(e) {
        if (e.name !== 'AbortError') updatePort(port, 'open', 'HTTP response (CORS blocked)');
        else updatePort(port, 'closed', '');
      }
    }
    if (done % 20 === 0) await new Promise(r=>setTimeout(r,0));
  }
  finishScan();
}

function updatePort(port, state, banner) {
  results[port] = { state, banner, service: SERVICES[port]||'' };
  if (state === 'open') {
    log(`Port ${port}/tcp OPEN  ${SERVICES[port]||''}  ${banner}`, 'ok');
    renderOpenPorts();
  }
  document.getElementById('openCount').textContent = Object.values(results).filter(r=>r.state==='open').length;
}

function renderOpenPorts() {
  const open = Object.entries(results).filter(([_,r])=>r.state==='open').sort(([a],[b])=>+a-+b);
  document.getElementById('portResults').innerHTML = open.map(([port, r]) =>
    `<div class="port-row open">
      <div class="port-num">${port}</div>
      <div class="port-state open">OPEN</div>
      <div class="port-service">${r.service||'unknown'}<br>${r.banner?`<span class="port-banner">${esc(r.banner.substr(0,60))}</span>`:''}</div>
    </div>`
  ).join('');
}

function finishScan() {
  scanActive = false;
  const elapsed = ((Date.now()-startTime)/1000).toFixed(1);
  const openPorts = Object.values(results).filter(r=>r.state==='open').length;
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('scanBtn').style.display = 'inline-block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('sumTotal').textContent = Object.keys(results).length;
  document.getElementById('sumOpen').textContent = openPorts;
  document.getElementById('sumTime').textContent = elapsed+'s';
  log(`Scan complete. ${openPorts} open port(s) found in ${elapsed}s`, 'ok');
  renderOpenPorts();
}

function stopScan() {
  scanActive = false;
  if (beam) beam.send({ cmd: 'port_scan_stop', params: {} });
  finishScan();
}

function log(msg, cls='') {
  const el = document.getElementById('scanLog');
  const div = document.createElement('div');
  div.className = 'log-line ' + cls;
  div.textContent = '> ' + msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

initTransport();
</script>
</body></html>
