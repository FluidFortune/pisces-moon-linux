<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            this.ws.onopen = () => resolve();
            this.ws.onerror = () => reject(new Error(`WebSocket failed at ${this.wsUrl}`));

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed");
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
// ═══════════════════════════════════════════════════════════════════
// PORT SCANNER
// Architecture: Browser → PMTransport (WS) → edge_bridge.py → TCP
// Bridge handles actual TCP connections since browser JS can't do raw TCP
// Falls back to timing-based HTTP probe if bridge unavailable
// ═══════════════════════════════════════════════════════════════════

const SERVICES = {
  20:'FTP-DATA',21:'FTP',22:'SSH',23:'TELNET',25:'SMTP',53:'DNS',67:'DHCP',68:'DHCP',
  80:'HTTP',110:'POP3',111:'RPCBIND',119:'NNTP',123:'NTP',135:'MSRPC',137:'NETBIOS-NS',
  138:'NETBIOS-DGM',139:'NETBIOS-SSN',143:'IMAP',161:'SNMP',162:'SNMP-TRAP',
  179:'BGP',194:'IRC',389:'LDAP',443:'HTTPS',445:'SMB',465:'SMTPS',
  500:'ISAKMP',514:'SYSLOG',515:'LPD',587:'SMTP-SUB',631:'IPP',
  636:'LDAPS',993:'IMAPS',995:'POP3S',1080:'SOCKS',1194:'OPENVPN',1433:'MSSQL',
  1521:'ORACLE',1723:'PPTP',1883:'MQTT',2222:'SSH-ALT',3000:'NODE/DEV',3306:'MYSQL',
  3389:'RDP',4444:'METASPLOIT',4840:'OPCUA',5000:'FLASK/DEV',5432:'POSTGRESQL',
  5900:'VNC',6379:'REDIS',6667:'IRC',8080:'HTTP-PROXY',8443:'HTTPS-ALT',
  8883:'MQTT-TLS',9200:'ELASTICSEARCH',27017:'MONGODB',51820:'WIREGUARD'
};

const PRESETS = {
  top20: '21,22,23,25,53,80,110,111,135,139,143,443,445,993,995,1723,3306,3389,5900,8080',
  top100: '1,7,9,13,17,19,21-25,26,37,53,79-81,88,106,110-111,113,119,135,139,143,144,179,199,389,427,443,444-445,465,513-515,543-544,548,554,587,631,646,873,990,993,995,1025-1029,1110,1433,1720,1723,1755,1900,2000-2001,2049,2121,2717,3000,3128,3306,3389,3986,4899,5000,5009,5051,5060,5101,5190,5357,5432,5631,5666,5800,5900,6000,6001,6646,7070,8000,8008-8009,8080-8081,8443,8888,9100,9999-10000,32768,49152',
  web: '80,443,8080,8443,3000,4000,5000,8000,8008,8888,9000,9090',
  db: '1433,1521,3306,5432,6379,27017,28017,9200,9300',
  iot: '23,80,443,1883,4840,5683,8080,8443,8883,9999,49152'
};

let scanActive = false;
let scanQueue = [];
let results = {};
let startTime = 0;
let beam = null;
let bridgeAvailable = false;

// Transport
function initTransport() {
  if (typeof PMTransport === 'undefined') {
    log('PMTransport not found — bridge required for full scan', 'err');
    log('Falling back to HTTP timing probe (limited)', 'info');
    return;
  }
  beam = new PMTransport({
    onMessage: handleBridgeMsg,
    onStatus: s => {
      bridgeAvailable = s.state === 'connected';
      const el = document.getElementById('connStatus');
      el.textContent = s.state.toUpperCase();
      el.className = 'conn-status ' + (bridgeAvailable ? 'ok' : 'err');
    }
  });
  beam.connect().catch(()=>{});
}

function handleBridgeMsg(msg) {
  if (msg.type === 'PORT_RESULT') {
    updatePort(msg.port, msg.state, msg.banner || '');
  } else if (msg.type === 'SCAN_DONE') {
    finishScan();
  }
}

function setPreset(name) {
  const p = PRESETS[name];
  if (p) document.getElementById('portRange').value = p;
}

function parsePortRange(s) {
  const ports = new Set();
  for (const part of s.split(',')) {
    const trimmed = part.trim();
    if (trimmed.includes('-')) {
      const [a,b] = trimmed.split('-').map(Number);
      for (let p=Math.min(a,b); p<=Math.max(a,b); p++) ports.add(p);
    } else if (Number(trimmed)) {
      ports.add(Number(trimmed));
    }
  }
  return [...ports].filter(p => p > 0 && p < 65536).sort((a,b)=>a-b);
}

function startScan() {
  const target = document.getElementById('targetInput').value.trim();
  const range  = document.getElementById('portRange').value.trim();
  const timeout= parseInt(document.getElementById('timeoutMs').value) || 1000;
  if (!target) { alert('Enter a target IP or hostname'); return; }

  const ports = parsePortRange(range);
  if (!ports.length) { alert('No valid ports in range'); return; }

  results = {}; scanActive = true; startTime = Date.now();
  document.getElementById('portResults').innerHTML = '';
  document.getElementById('scanLog').innerHTML = '';
  document.getElementById('openCount').textContent = '0';
  document.getElementById('scanBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'inline-block';

  log(`Target: ${target}`, 'info');
  log(`Ports: ${ports.length} (${ports[0]}-${ports[ports.length-1]})`, 'info');
  log(`Timeout: ${timeout}ms`, 'info');
  log(`Method: ${bridgeAvailable?'TCP connect via bridge':'HTTP timing probe (limited)'}`, 'info');
  log('Starting scan...', 'ok');

  if (bridgeAvailable && beam) {
    // Full TCP scan via bridge
    beam.send({ cmd: 'port_scan', params: { target, ports, timeout } });
    log('Scan command sent to bridge.', 'ok');
    // Also simulate progress locally
    let done = 0;
    const interval = setInterval(() => {
      done = Math.min(done+5, ports.length);
      document.getElementById('progFill').style.width = (done/ports.length*100)+'%';
      if (!scanActive || done >= ports.length) clearInterval(interval);
    }, Math.max(100, (timeout * ports.length / 200)));
  } else {
    // Fallback: HTTP fetch timing probe (detects open web ports only)
    log('Bridge not connected. Using HTTP timing probe.', 'err');
    log('Only HTTP/HTTPS ports detectable without bridge.', 'err');
    runHTTPProbe(target, ports, timeout);
  }
}

async function runHTTPProbe(target, ports, timeout) {
  const httpPorts = ports.filter(p => [80,443,8080,8443,3000,4000,5000,8000,8008,8888,9000,9090,4443].includes(p));
  let done = 0;
  for (const port of ports) {
    if (!scanActive) break;
    done++;
    document.getElementById('progFill').style.width = (done/ports.length*100)+'%';
    if (httpPorts.includes(port)) {
      const scheme = [443,8443,4443].includes(port) ? 'https' : 'http';
      try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), timeout);
        await fetch(`${scheme}://${target}:${port}/`, { signal:ctrl.signal, mode:'no-cors' });
        updatePort(port, 'open', 'HTTP response');
      } catch(e) {
        if (e.name !== 'AbortError') updatePort(port, 'open', 'HTTP response (CORS blocked)');
        else updatePort(port, 'closed', '');
      }
    }
    if (done % 20 === 0) await new Promise(r=>setTimeout(r,0));
  }
  finishScan();
}

function updatePort(port, state, banner) {
  results[port] = { state, banner, service: SERVICES[port]||'' };
  if (state === 'open') {
    log(`Port ${port}/tcp OPEN  ${SERVICES[port]||''}  ${banner}`, 'ok');
    renderOpenPorts();
  }
  document.getElementById('openCount').textContent = Object.values(results).filter(r=>r.state==='open').length;
}

function renderOpenPorts() {
  const open = Object.entries(results).filter(([_,r])=>r.state==='open').sort(([a],[b])=>+a-+b);
  document.getElementById('portResults').innerHTML = open.map(([port, r]) =>
    `<div class="port-row open">
      <div class="port-num">${port}</div>
      <div class="port-state open">OPEN</div>
      <div class="port-service">${r.service||'unknown'}<br>${r.banner?`<span class="port-banner">${esc(r.banner.substr(0,60))}</span>`:''}</div>
    </div>`
  ).join('');
}

function finishScan() {
  scanActive = false;
  const elapsed = ((Date.now()-startTime)/1000).toFixed(1);
  const openPorts = Object.values(results).filter(r=>r.state==='open').length;
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('scanBtn').style.display = 'inline-block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('sumTotal').textContent = Object.keys(results).length;
  document.getElementById('sumOpen').textContent = openPorts;
  document.getElementById('sumTime').textContent = elapsed+'s';
  log(`Scan complete. ${openPorts} open port(s) found in ${elapsed}s`, 'ok');
  renderOpenPorts();
}

function stopScan() {
  scanActive = false;
  if (beam) beam.send({ cmd: 'port_scan_stop', params: {} });
  finishScan();
}

function log(msg, cls='') {
  const el = document.getElementById('scanLog');
  const div = document.createElement('div');
  div.className = 'log-line ' + cls;
  div.textContent = '> ' + msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

initTransport();
</script>
</body></html>
