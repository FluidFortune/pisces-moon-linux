<!-- PISCES MOON OS // PIN SCREEN -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css"><link rel="stylesheet" href="pm_theme.css"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // PIN</title>
<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#4dd9ff;--accent2:#ff6b00;--accent3:#4dffa6;--accent4:#ff5577;--warn:#ffcc00;--gold:#ffd166;--text:#c8e6f5;--text-bright:#c8e8f5;--text-dim:#2a5870;--glow:0 0 20px rgba(77,217,255,.3);--glow-gold:0 0 20px rgba(255,209,102,.4);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);pointer-events:none;z-index:999;}
.pin-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;position:relative;z-index:1;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.8rem;color:var(--accent);text-shadow:var(--glow);letter-spacing:6px;text-align:center;}
.logo span{color:var(--gold);text-shadow:var(--glow-gold);}
.logo sub{display:block;font-size:.5rem;color:var(--text-dim);letter-spacing:4px;margin-top:4px;}
.time-display{font-family:'Orbitron',monospace;font-size:3rem;color:var(--text-bright);letter-spacing:6px;text-shadow:var(--glow);}
.date-display{font-size:.75rem;color:var(--gold);letter-spacing:4px;text-shadow:var(--glow-gold);}
.pin-dots{display:flex;gap:16px;margin:8px 0;}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--panel-border);transition:all .2s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:var(--glow);}
.pin-dot.error{background:var(--accent4);border-color:var(--accent4);animation:shake .4s;}
.pin-dot.success{background:var(--accent3);border-color:var(--accent3);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.keypad{display:grid;grid-template-columns:repeat(3,80px);gap:10px;}
.key{background:var(--bg2);border:1px solid var(--panel-border);width:80px;height:80px;font-family:'Orbitron',monospace;font-size:1.4rem;color:var(--text-bright);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .15s;user-select:none;}
.key:hover{background:var(--bg3);border-color:var(--accent);color:var(--accent);}
.key:active{background:rgba(77,217,255,.15);transform:scale(.95);}
.key.del{color:var(--accent4);font-size:.9rem;}
.key.del:hover{border-color:var(--accent4);color:var(--accent4);}
.key.empty{background:transparent;border-color:transparent;cursor:default;}
.key .letters{font-size:.45rem;color:var(--text-dim);letter-spacing:2px;margin-top:2px;font-family:'Share Tech Mono',monospace;}
.status-msg{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:3px;min-height:20px;color:var(--text-dim);}
.status-msg.error{color:var(--accent4);}
.status-msg.success{color:var(--accent3);}
.hint{font-size:.58rem;color:var(--text-dim);margin-top:4px;letter-spacing:1px;}
.hint a{color:var(--accent);cursor:pointer;text-decoration:none;}
.btn{display:inline-block;padding:8px 20px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.68rem;cursor:pointer;letter-spacing:2px;margin-top:8px;}
.btn:hover{background:var(--accent);color:var(--bg);}
.stars{position:fixed;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.2;animation:twinkle var(--dur,3s) infinite var(--del,0s);}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.5}}
</style></head><body>
<div class="stars" id="stars"></div>
<div class="pin-wrap">
  <div class="logo">PISCES <span>MOON</span><sub>OS v0.3 — Q508</sub></div>
  <div class="time-display" id="clock">--:--</div>
  <div class="date-display" id="date"></div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
    <div class="pin-dot" id="d4"></div>
    <div class="pin-dot" id="d5"></div>
  </div>
  <div class="status-msg" id="statusMsg">ENTER PIN TO UNLOCK</div>
  <div class="keypad" id="keypad"></div>
  <div class="hint">Default PIN: 0000 · <a onclick="showSetPin()">Change PIN</a> · <a onclick="showAbout()">About</a></div>
</div>
<script>
const PIN_KEY = 'pm_pin';
const DEFAULT_PIN = '0000';
const LETTERS = {'2':'ABC','3':'DEF','4':'GHI','5':'JKL','6':'MNO','7':'PQRS','8':'TUV','9':'WXYZ'};
let entered = '', attempts = 0;
let maxPinLen = 6;

// Stars
for (let i=0;i<80;i++) {
  const s = document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.setProperty('--dur',(2+Math.random()*4)+'s');
  s.style.setProperty('--del',(Math.random()*4)+'s');
  document.getElementById('stars').appendChild(s);
}

// Clock
function tick() {
  const n=new Date();
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent=p(n.getHours())+':'+p(n.getMinutes());
  document.getElementById('date').textContent=n.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
}
setInterval(tick,10000); tick();

// Keypad
const KEYS=[['1',''],['2','ABC'],['3','DEF'],['4','GHI'],['5','JKL'],['6','MNO'],['7','PQRS'],['8','TUV'],['9','WXYZ'],['',''],['0',''],['DEL','']];
document.getElementById('keypad').innerHTML=KEYS.map(([k,l])=>
  k?`<button class="key ${k==='DEL'?'del':''}" onclick="press('${k}')">${k}<span class="letters">${l}</span></button>`
   :`<button class="key empty"></button>`
).join('');

function press(k) {
  if (k==='DEL') { entered=entered.slice(0,-1); updateDots(); return; }
  if (entered.length>=maxPinLen) return;
  entered+=k;
  updateDots();
  if (entered.length===maxPinLen) setTimeout(checkPIN,300);
}

function updateDots() {
  for(let i=0;i<maxPinLen;i++) {
    const d=document.getElementById('d'+i);
    if(d) d.className='pin-dot'+(i<entered.length?' filled':'');
  }
}

function checkPIN() {
  const stored=localStorage.getItem(PIN_KEY)||DEFAULT_PIN;
  if(entered===stored) {
    document.querySelectorAll('.pin-dot').forEach(d=>d.className='pin-dot success');
    document.getElementById('statusMsg').textContent='UNLOCKING...';
    document.getElementById('statusMsg').className='status-msg success';
    setTimeout(()=>{
      // In Trojan Horse mode: hide lock screen / launch main app
      if(typeof window.spadra!=='undefined') window.spadra.system.unlock?.();
      else {
        // Browser mode: go to about page or show unlocked state
        document.getElementById('statusMsg').textContent='UNLOCKED — WELCOME';
        document.querySelectorAll('.key').forEach(k=>k.disabled=true);
      }
    },600);
  } else {
    attempts++;
    document.querySelectorAll('.pin-dot').forEach(d=>d.className='pin-dot error');
    document.getElementById('statusMsg').textContent=`INCORRECT PIN (${attempts} attempt${attempts>1?'s':''})`;
    document.getElementById('statusMsg').className='status-msg error';
    setTimeout(()=>{
      entered='';
      document.querySelectorAll('.pin-dot').forEach(d=>d.className='pin-dot');
      document.getElementById('statusMsg').textContent='ENTER PIN TO UNLOCK';
      document.getElementById('statusMsg').className='status-msg';
    },800);
  }
}

function showSetPin() {
  const newPin=prompt('Enter new PIN (4-6 digits):');
  if(!newPin||!/^\d{4,6}$/.test(newPin)){alert('PIN must be 4-6 digits.');return;}
  const confirm2=prompt('Confirm new PIN:');
  if(newPin!==confirm2){alert('PINs do not match.');return;}
  localStorage.setItem(PIN_KEY,newPin);
  maxPinLen=newPin.length;
  // Rebuild dots for new length
  document.getElementById('pinDots').innerHTML=Array.from({length:maxPinLen},(_,i)=>`<div class="pin-dot" id="d${i}"></div>`).join('');
  alert('PIN updated successfully.');
}

function showAbout() { window.location='about.html'; }

document.addEventListener('keydown',e=>{
  if(/^[0-9]$/.test(e.key)) press(e.key);
  else if(e.key==='Backspace') press('DEL');
});
</script></body></html>
