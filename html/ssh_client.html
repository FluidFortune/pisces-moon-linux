<!-- PISCES MOON OS // SSH CLIENT -->
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // SSH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#00d4ff;--accent2:#ff6b00;--accent3:#00ff88;--accent4:#ff3366;--warn:#ffcc00;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;--glow:0 0 20px rgba(0,212,255,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999;}
header{background:var(--bg2);border-bottom:2px solid var(--panel-border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.1rem;letter-spacing:3px;}
.content{padding:20px;max-width:1100px;margin:0 auto;}
.panel{background:var(--panel);border:1px solid var(--panel-border);margin-bottom:16px;}
.ph{padding:10px 16px;border-bottom:1px solid var(--panel-border);font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:3px;display:flex;justify-content:space-between;align-items:center;}
.pb{padding:14px 16px;}
.btn{display:inline-block;padding:7px 16px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.68rem;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{background:var(--accent);color:var(--bg);}
.btn.sm{padding:4px 10px;font-size:.6rem;}
.btn.gold{border-color:var(--gold);color:var(--gold);}.btn.gold:hover{background:var(--gold);color:var(--bg);}
.btn.green{border-color:var(--accent3);color:var(--accent3);}.btn.green:hover{background:var(--accent3);color:var(--bg);}
.btn.red{border-color:var(--accent4);color:var(--accent4);}.btn.red:hover{background:var(--accent4);color:var(--bg);}
.btn.orange{border-color:var(--accent2);color:var(--accent2);}.btn.orange:hover{background:var(--accent2);color:var(--bg);}
.pm-input{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.74rem;padding:8px 12px;outline:none;}
.pm-input:focus{border-color:var(--accent);}
.pm-input::placeholder{color:var(--text-dim);}
.dt{width:100%;border-collapse:collapse;font-size:.7rem;}
.dt th{text-align:left;padding:7px 10px;color:var(--text-dim);font-size:.58rem;letter-spacing:2px;border-bottom:1px solid var(--panel-border);font-family:'Orbitron',monospace;}
.dt td{padding:7px 10px;border-bottom:1px solid rgba(26,58,80,.3);}
.dt tr:hover td{background:rgba(0,212,255,.04);}
.ts{max-height:380px;overflow-y:auto;}
.badge{display:inline-block;padding:1px 6px;font-size:.57rem;border-radius:2px;}
.bc{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid var(--accent);}
.bo{background:rgba(255,107,0,.1);color:var(--accent2);border:1px solid var(--accent2);}
.bg{background:rgba(0,255,136,.1);color:var(--accent3);border:1px solid var(--accent3);}
.br{background:rgba(255,51,102,.1);color:var(--accent4);border:1px solid var(--accent4);}
.bw{background:rgba(255,204,0,.1);color:var(--warn);border:1px solid var(--warn);}
.bgo{background:rgba(244,168,32,.1);color:var(--gold);border:1px solid var(--gold);}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg3);} ::-webkit-scrollbar-thumb{background:var(--panel-border);}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--panel-border);display:flex;flex-direction:column;flex-shrink:0;}
.sh{padding:8px 12px;border-bottom:1px solid var(--panel-border);font-family:'Orbitron',monospace;font-size:.55rem;color:var(--accent);letter-spacing:2px;display:flex;justify-content:space-between;align-items:center;}
.slist{flex:1;overflow-y:auto;}
.hi{padding:8px 12px;cursor:pointer;border-bottom:1px solid rgba(26,58,80,.3);font-size:.67rem;transition:background .15s;}
.hi:hover{background:rgba(0,212,255,.05);}
.hi.active{background:rgba(0,212,255,.08);border-left:2px solid var(--accent);}
.hi-name{color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hi-host{font-size:.58rem;color:var(--text-dim);margin-top:1px;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.connect-bar{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:10px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.term{flex:1;background:#000;padding:12px;font-family:'Share Tech Mono',monospace;font-size:.76rem;overflow-y:auto;color:#0f0;line-height:1.6;}
.term .p{color:#0f0;}
.term .e{color:var(--accent4);}
.term .i{color:var(--accent);}
.term .s{color:var(--accent3);}
.cmd-bar{background:var(--bg2);border-top:1px solid var(--panel-border);padding:8px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.cmd-prompt{color:var(--accent3);font-size:.76rem;white-space:nowrap;}
.cmd-input{flex:1;background:transparent;border:none;color:#0f0;font-family:'Share Tech Mono',monospace;font-size:.76rem;outline:none;}
</style></head><body>
<header>
  <div class="logo" style="color:var(--accent)">PISCES MOON // <span style="color:var(--gold)">SSH</span></div>
  <div style="font-size:.65rem;color:var(--text-dim)">Secure Shell Client</div>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="sh">SAVED HOSTS <button class="btn sm" style="font-size:.52rem;padding:2px 6px" onclick="addHost()">+</button></div>
    <div class="slist" id="hostList"></div>
  </div>
  <div class="main">
    <div class="connect-bar">
      <input class="pm-input" id="hostInput" placeholder="user@hostname" style="width:200px">
      <input class="pm-input" id="portInput" placeholder="22" style="width:60px" value="22">
      <select class="pm-select" style="background:var(--bg3);border:1px solid var(--panel-border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:7px 8px">
        <option>Password</option>
        <option>Key file</option>
      </select>
      <button class="btn green" onclick="connect()">CONNECT</button>
      <button class="btn red sm" onclick="disconnect()">DISCONNECT</button>
    </div>
    <div class="term" id="term">
<span class="i">// PISCES MOON SSH CLIENT</span>
<span class="i">// Enter host above and click CONNECT</span>
<span class="i">// In Trojan Horse mode, opens a real SSH session via xfce4-terminal</span>
<span class="i">// In browser mode, simulates the connection interface</span>
<br>
    </div>
    <div class="cmd-bar">
      <span class="cmd-prompt" id="prompt">$</span>
      <input class="cmd-input" id="cmdInput" placeholder="command..." onkeydown="cmdKey(event)" disabled>
    </div>
  </div>
</div>
<script>
const isTH=typeof window.spadra!=='undefined';
const SK='pm_ssh_hosts';
let hosts=[],activeHost=null,connected=false,cmdHistory=[],histIdx=-1;

function init(){
  try{hosts=JSON.parse(localStorage.getItem(SK)||'[]');}catch{hosts=[];}
  if(!hosts.length) hosts=[
    {name:'Q508',host:'pisces@192.168.1.47',port:22},
    {name:'Pi 400',host:'pi@192.168.1.100',port:22},
  ];
  renderHosts();
}

function save(){localStorage.setItem(SK,JSON.stringify(hosts));}

function addHost(){
  const h=prompt('Host (user@hostname):'); if(!h)return;
  const name=prompt('Label:',h.split('@')[1]||h); if(!name)return;
  hosts.push({name,host:h,port:22});
  save(); renderHosts();
}

function renderHosts(){
  document.getElementById('hostList').innerHTML=hosts.map((h,i)=>`
    <div class="hi ${i===activeHost?'active':''}" onclick="selectHost(${i})">
      <div class="hi-name">${h.name}</div>
      <div class="hi-host">${h.host}:${h.port}</div>
    </div>`).join('');
}

function selectHost(i){
  activeHost=i;
  document.getElementById('hostInput').value=hosts[i].host;
  document.getElementById('portInput').value=hosts[i].port;
  renderHosts();
}

async function connect(){
  const host=document.getElementById('hostInput').value.trim();
  const port=document.getElementById('portInput').value||22;
  if(!host){log('ERROR: No host specified','e');return;}
  log(`Connecting to ${host}:${port}...`,'i');
  if(isTH){
    // Open real terminal with SSH
    try{
      await window.spadra.system.exec(`xfce4-terminal -e "ssh -p ${port} ${host}"`);
      log('Terminal launched.','s');
    }catch(e){log('Failed to open terminal: '+e.message,'e');}
  }else{
    // Simulate
    setTimeout(()=>{
      log(`Connected to ${host}`,'s');
      log('Welcome to Pisces Moon OS','p');
      log('pisces@'+host.split('@')[1]+'~$ ','p');
      connected=true;
      document.getElementById('prompt').textContent=host.split('@')[1]+'$';
      document.getElementById('cmdInput').disabled=false;
      document.getElementById('cmdInput').focus();
    },600);
  }
}

function disconnect(){
  connected=false;
  document.getElementById('cmdInput').disabled=true;
  document.getElementById('prompt').textContent='$';
  log('Connection closed.','i');
}

function cmdKey(e){
  if(e.key==='Enter'){
    const cmd=e.target.value.trim(); if(!cmd)return;
    cmdHistory.unshift(cmd); histIdx=-1;
    e.target.value='';
    log('$ '+cmd,'p');
    simulateCmd(cmd);
  }else if(e.key==='ArrowUp'){
    histIdx=Math.min(histIdx+1,cmdHistory.length-1);
    e.target.value=cmdHistory[histIdx]||'';
  }else if(e.key==='ArrowDown'){
    histIdx=Math.max(histIdx-1,-1);
    e.target.value=histIdx>=0?cmdHistory[histIdx]:'';
  }
}

function simulateCmd(cmd){
  const responses={
    'ls':['apps  data  deploy.sh  install.sh  README.md',''],
    'ls /opt/pisces-moon/apps':'37 Python apps installed',
    'pwd':'/home/pisces',
    'whoami':'pisces',
    'uname -a':'Linux piscesmoon 6.1.0 #1 SMP Debian x86_64',
    'date':new Date().toString(),
    'uptime':' 12:34:56 up 2:15,  1 user,  load average: 0.12, 0.08, 0.05',
    'df -h':'Filesystem      Size  Used Avail Use%
/dev/sda1        59G   14G   43G  25% /',
    'free -h':'              total  used  free
Mem:           3.7G  1.2G  2.1G
Swap:          2.0G  0.0G  2.0G',
    'ip addr':'2: wlan0: <BROADCAST> state UP
    inet 192.168.1.47/24',
    'systemctl status pisces-edge-bridge':'● pisces-edge-bridge.service - Pisces Moon Edge Bridge
   Active: active (running)',
  };
  const out=responses[cmd]||`bash: ${cmd}: command not found`;
  setTimeout(()=>log(typeof out==='string'?out:out.join('\n'),'p'),100);
}

function log(msg,cls='p'){
  const t=document.getElementById('term');
  t.innerHTML+=`<span class="${cls}">${esc(msg)}</span>\n`;
  t.scrollTop=t.scrollHeight;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
</body></html>
