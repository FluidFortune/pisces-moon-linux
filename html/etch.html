<!-- PISCES MOON OS // ETCH -->
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // ETCH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#00d4ff;--accent2:#ff6b00;--accent3:#00ff88;--accent4:#ff3366;--warn:#ffcc00;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999;}
header{background:var(--bg2);border-bottom:2px solid var(--panel-border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1rem;color:var(--accent3);letter-spacing:3px;}
.logo span{color:var(--gold);}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:8px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.tool-btn{padding:6px 12px;background:var(--panel);border:1px solid var(--panel-border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .2s;}
.tool-btn:hover{border-color:var(--accent3);color:var(--accent3);}
.tool-btn.active{border-color:var(--accent3);color:var(--accent3);background:rgba(0,255,136,.08);}
.color-swatch{width:24px;height:24px;border:2px solid var(--panel-border);cursor:pointer;transition:border-color .2s;}
.color-swatch:hover,.color-swatch.active{border-color:var(--text-bright);}
.sep{width:1px;height:24px;background:var(--panel-border);}
canvas{cursor:crosshair;display:block;background:#000;}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg3);overflow:hidden;}
input[type=range]{-webkit-appearance:none;height:4px;background:var(--panel-border);outline:none;width:80px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent3);cursor:pointer;border-radius:50%;}
</style></head><body>
<header>
  <div class="logo">PISCES MOON // <span>ETCH</span></div>
  <div style="font-size:.62rem;color:var(--text-dim)">Tactical Sketchpad</div>
</header>
<div class="toolbar">
  <button class="tool-btn active" id="tool-pen" onclick="setTool('pen')">✏ PEN</button>
  <button class="tool-btn" id="tool-line" onclick="setTool('line')">╱ LINE</button>
  <button class="tool-btn" id="tool-rect" onclick="setTool('rect')">□ RECT</button>
  <button class="tool-btn" id="tool-circle" onclick="setTool('circle')">○ CIRCLE</button>
  <button class="tool-btn" id="tool-fill" onclick="setTool('fill')">▣ FILL</button>
  <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">◻ ERASE</button>
  <button class="tool-btn" id="tool-text" onclick="setTool('text')">T TEXT</button>
  <div class="sep"></div>
  <!-- Colors -->
  <div class="color-swatch active" style="background:#00d4ff" onclick="setColor('#00d4ff',this)"></div>
  <div class="color-swatch" style="background:#00ff88" onclick="setColor('#00ff88',this)"></div>
  <div class="color-swatch" style="background:#ff6b00" onclick="setColor('#ff6b00',this)"></div>
  <div class="color-swatch" style="background:#ff3366" onclick="setColor('#ff3366',this)"></div>
  <div class="color-swatch" style="background:#ffcc00" onclick="setColor('#ffcc00',this)"></div>
  <div class="color-swatch" style="background:#f4a820" onclick="setColor('#f4a820',this)"></div>
  <div class="color-swatch" style="background:#ffffff" onclick="setColor('#ffffff',this)"></div>
  <div class="color-swatch" style="background:#7ab8d4" onclick="setColor('#7ab8d4',this)"></div>
  <input type="color" id="customColor" onchange="setColor(this.value)" style="width:24px;height:24px;border:none;background:none;cursor:pointer;padding:0">
  <div class="sep"></div>
  <label style="font-size:.6rem;color:var(--text-dim)">SIZE</label>
  <input type="range" id="brushSize" min="1" max="40" value="3">
  <span id="sizeLabel" style="font-size:.62rem;color:var(--text-dim);width:20px">3</span>
  <label style="font-size:.6rem;color:var(--text-dim)">OPACITY</label>
  <input type="range" id="opacitySlider" min="10" max="100" value="100">
  <div class="sep"></div>
  <button class="tool-btn" onclick="undo()">↩ UNDO</button>
  <button class="tool-btn" onclick="clearCanvas()">✕ CLEAR</button>
  <button class="tool-btn" onclick="saveCanvas()">⬇ SAVE</button>
  <button class="tool-btn" onclick="loadCanvas()">⬆ LOAD</button>
</div>
<div class="canvas-wrap" id="wrap">
  <canvas id="canvas"></canvas>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let tool = 'pen', color = '#00d4ff', brushSize = 3, opacity = 1;
let drawing = false, startX = 0, startY = 0;
let history = [], snapshot = null;

function resize() {
  const wrap = document.getElementById('wrap');
  const w = Math.min(wrap.clientWidth - 20, 1260);
  const h = Math.min(wrap.clientHeight - 20, 800);
  const saved = ctx.getImageData(0,0,canvas.width,canvas.height);
  canvas.width = w; canvas.height = h;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
  ctx.putImageData(saved,0,0);
}

function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tool-'+t)?.classList.add('active');
  canvas.style.cursor = t==='eraser'?'cell':t==='fill'?'crosshair':'crosshair';
}

function setColor(c, el) {
  color = c;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
  el?.classList.add('active');
}

document.getElementById('brushSize').oninput = e => {
  brushSize = parseInt(e.target.value);
  document.getElementById('sizeLabel').textContent = brushSize;
};
document.getElementById('opacitySlider').oninput = e => {
  opacity = parseInt(e.target.value)/100;
};

function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

canvas.addEventListener('mousedown', e => {
  drawing = true;
  const r = canvas.getBoundingClientRect();
  startX = e.clientX - r.left; startY = e.clientY - r.top;
  if (tool === 'fill') { floodFill(Math.round(startX), Math.round(startY), color); return; }
  if (tool === 'text') { const t=prompt('Text:'); if(t){ctx.font=brushSize*4+'px Orbitron,monospace';ctx.fillStyle=hexToRgba(color,opacity);ctx.fillText(t,startX,startY);} drawing=false; return; }
  saveHistory();
  snapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
  ctx.beginPath(); ctx.moveTo(startX, startY);
});

canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  const r = canvas.getBoundingClientRect();
  const x = e.clientX-r.left, y = e.clientY-r.top;
  if (tool==='pen'||tool==='eraser') {
    ctx.globalCompositeOperation = tool==='eraser'?'destination-out':'source-over';
    ctx.strokeStyle = hexToRgba(color,opacity);
    ctx.lineWidth = brushSize; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.lineTo(x,y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,y);
  } else if (snapshot) {
    ctx.putImageData(snapshot,0,0);
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=hexToRgba(color,opacity); ctx.fillStyle=hexToRgba(color,opacity*0.2);
    ctx.lineWidth=brushSize; ctx.lineCap='round';
    if (tool==='line'){ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();}
    else if (tool==='rect'){ctx.strokeRect(startX,startY,x-startX,y-startY);ctx.fillRect(startX,startY,x-startX,y-startY);}
    else if (tool==='circle'){const rx=(x-startX)/2,ry=(y-startY)/2;ctx.beginPath();ctx.ellipse(startX+rx,startY+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);ctx.stroke();ctx.fill();}
  }
});

canvas.addEventListener('mouseup', () => { drawing=false; ctx.globalCompositeOperation='source-over'; });
canvas.addEventListener('touchstart', e=>{e.preventDefault();canvas.dispatchEvent(new MouseEvent('mousedown',{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}));},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();canvas.dispatchEvent(new MouseEvent('mousemove',{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}));},{passive:false});
canvas.addEventListener('touchend', ()=>canvas.dispatchEvent(new MouseEvent('mouseup')));

function floodFill(x, y, fillColor) {
  const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const d = imgData.data;
  const idx = (y*canvas.width+x)*4;
  const [tr,tg,tb,ta] = [d[idx],d[idx+1],d[idx+2],d[idx+3]];
  const [fr,fg,fb] = [parseInt(fillColor.slice(1,3),16),parseInt(fillColor.slice(3,5),16),parseInt(fillColor.slice(5,7),16)];
  if(tr===fr&&tg===fg&&tb===fb)return;
  const stack=[{x,y}];
  while(stack.length){
    const {x:cx,y:cy}=stack.pop();
    const i=(cy*canvas.width+cx)*4;
    if(cx<0||cx>=canvas.width||cy<0||cy>=canvas.height)continue;
    if(d[i]!==tr||d[i+1]!==tg||d[i+2]!==tb)continue;
    d[i]=fr;d[i+1]=fg;d[i+2]=fb;d[i+3]=255;
    stack.push({x:cx+1,y:cy},{x:cx-1,y:cy},{x:cx,y:cy+1},{x:cx,y:cy-1});
  }
  ctx.putImageData(imgData,0,0);
}

function saveHistory(){history.push(ctx.getImageData(0,0,canvas.width,canvas.height));if(history.length>30)history.shift();}
function undo(){if(!history.length)return;ctx.putImageData(history.pop(),0,0);}
function clearCanvas(){saveHistory();ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);}
function saveCanvas(){const a=document.createElement('a');a.download='etch_'+Date.now()+'.png';a.href=canvas.toDataURL();a.click();}
function loadCanvas(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=e=>{const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0,canvas.width,canvas.height);};img.src=ev.target.result;};r.readAsDataURL(e.target.files[0]);};i.click();}

window.addEventListener('resize', resize);
resize();
ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
</script></body></html>
