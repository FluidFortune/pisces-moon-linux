<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>PISCES MOON // VIDEO</title>
<style>
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel-border:#1a3a50;--accent:#00d4ff;--accent3:#00ff88;--accent4:#ff3366;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;transition:opacity .3s;}
header.hidden{opacity:0;pointer-events:none;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:.9rem;color:var(--accent4);letter-spacing:3px;}
.video-area{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden;}
video{max-width:100%;max-height:100%;outline:none;}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text-dim);}
.placeholder-icon{font-size:5rem;opacity:.3;}
.placeholder-text{font-family:Orbitron,monospace;font-size:.65rem;letter-spacing:3px;opacity:.5;}
.controls{background:var(--bg2);border-top:1px solid var(--panel-border);padding:8px 14px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.progress-wrap{display:flex;align-items:center;gap:8px;font-size:.6rem;color:var(--text-dim);}
input[type=range].seek{flex:1;accent-color:var(--accent4);height:5px;cursor:pointer;}
.ctrl-row{display:flex;align-items:center;gap:10px;}
.vbtn{background:transparent;border:none;color:var(--text-dim);font-size:1.3rem;cursor:pointer;padding:4px 6px;transition:color .15s;}
.vbtn:hover{color:var(--text-bright);}
.vbtn.active{color:var(--accent4);}
.play-btn{background:transparent;border:2px solid var(--accent4);color:var(--accent4);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all .2s;}
.play-btn:hover{background:var(--accent4);color:#000;}
input[type=range].vol{width:80px;accent-color:var(--accent3);}
.speed-sel{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text);font-size:.6rem;padding:3px 6px;font-family:'Share Tech Mono',monospace;cursor:pointer;}
.title-bar{font-size:.65rem;color:var(--text-bright);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.playlist{position:absolute;right:0;top:0;bottom:0;width:260px;background:rgba(8,15,20,.95);border-left:1px solid var(--panel-border);overflow-y:auto;transform:translateX(100%);transition:transform .2s;z-index:10;}
.playlist.open{transform:translateX(0);}
.pl-item{padding:9px 12px;border-bottom:1px solid rgba(28,46,58,.3);cursor:pointer;font-size:.65rem;display:flex;gap:8px;align-items:center;}
.pl-item:hover{background:rgba(255,51,102,.05);}
.pl-item.active{background:rgba(255,51,102,.1);border-left:2px solid var(--accent4);}
.pl-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-bright);}
.gesture-overlay{position:absolute;inset:0;z-index:5;}
.seek-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);color:#fff;font-family:Orbitron,monospace;font-size:1.2rem;padding:12px 20px;pointer-events:none;opacity:0;transition:opacity .3s;}
</style>
</head><body>
<header id="header">
  <div class="logo">▶ VIDEO</div>
  <div class="ctrl-row" style="gap:6px">
    <input type="file" id="fileInput" accept="video/*" multiple style="display:none" onchange="loadFiles(this.files)">
    <input type="file" id="subInput" accept=".srt,.vtt,.ass" style="display:none" onchange="loadSub(this.files[0])">
    <button onclick="document.getElementById('fileInput').click()" style="padding:5px 12px;background:transparent;border:1px solid var(--accent4);color:var(--accent4);font-family:Orbitron,monospace;font-size:.52rem;cursor:pointer;letter-spacing:1px">+ VIDEO</button>
    <button onclick="document.getElementById('subInput').click()" style="padding:5px 12px;background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);font-family:Orbitron,monospace;font-size:.52rem;cursor:pointer">+ SUB</button>
    <button onclick="togglePlaylist()" style="padding:5px 12px;background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);font-family:Orbitron,monospace;font-size:.52rem;cursor:pointer">☰ LIST</button>
  </div>
</header>

<div class="video-area" id="videoArea">
  <div class="placeholder" id="placeholder">
    <div class="placeholder-icon">🎬</div>
    <div class="placeholder-text">LOAD A VIDEO FILE</div>
    <button onclick="document.getElementById('fileInput').click()" style="padding:10px 24px;background:transparent;border:1px solid var(--accent4);color:var(--accent4);font-family:Orbitron,monospace;font-size:.6rem;cursor:pointer;letter-spacing:2px">SELECT FILE</button>
    <div style="font-size:.58rem;color:var(--text-dim);text-align:center;max-width:240px;line-height:1.7">MP4, MKV, WEBM, AVI, MOV<br>Subtitles: SRT, VTT supported</div>
  </div>
  <video id="vid" style="display:none"></video>
  <track id="subTrack" kind="subtitles" srclang="en" label="Subtitles">
  <div class="gesture-overlay" id="gestureOverlay"
    onclick="gestureClick(event)"
    ondblclick="gestureDbl(event)"></div>
  <div class="seek-indicator" id="seekIndicator"></div>
  <div class="playlist" id="playlist"></div>
</div>

<div class="controls" id="controls">
  <div class="progress-wrap">
    <span id="curTime">0:00</span>
    <input type="range" class="seek" id="seekBar" min="0" max="100" value="0"
      oninput="seek(this.value)" onmousedown="seeking=true" onmouseup="seeking=false" ontouchstart="seeking=true" ontouchend="seeking=false">
    <span id="durTime">0:00</span>
  </div>
  <div class="ctrl-row">
    <button class="vbtn" onclick="prevVideo()">⏮</button>
    <button class="vbtn" onclick="skip(-10)">⏪</button>
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="vbtn" onclick="skip(10)">⏩</button>
    <button class="vbtn" onclick="nextVideo()">⏭</button>
    <div class="title-bar" id="titleBar">No file loaded</div>
    <input type="range" class="vol" id="volBar" min="0" max="100" value="100" oninput="setVol(this.value)">
    <span style="font-size:.8rem">🔊</span>
    <select class="speed-sel" onchange="setSpeed(this.value)">
      <option value="0.5">0.5×</option>
      <option value="0.75">0.75×</option>
      <option value="1" selected>1×</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
      <option value="2">2×</option>
    </select>
    <button class="vbtn" title="Picture in Picture" onclick="togglePiP()">⧉</button>
    <button class="vbtn" title="Fullscreen" onclick="toggleFS()">⛶</button>
    <button class="vbtn" id="subBtn" title="Toggle subtitles" onclick="toggleSub()" style="font-size:.75rem;font-family:Orbitron,monospace">SUB</button>
  </div>
</div>

<script>
const vid = document.getElementById('vid');
let playlist = [];
let currentIdx = -1;
let seeking = false;
let headerTimer = null;
let playlistOpen = false;

// ── File loading ──────────────────────────────────────────────────
function loadFiles(files) {
  const vids = Array.from(files).filter(f => f.type.startsWith('video/') || /\.(mp4|mkv|webm|avi|mov|m4v|ogv|3gp)$/i.test(f.name));
  if (!vids.length) return;
  vids.forEach(f => playlist.push({ name: f.name.replace(/\.[^.]+$/,''), url: URL.createObjectURL(f) }));
  renderPlaylist();
  if (currentIdx < 0) playVideo(0);
}

function loadSub(file) {
  if (!file) return;
  const url = URL.createObjectURL(file);
  const track = vid.querySelector('track') || document.createElement('track');
  track.src = url; track.kind = 'subtitles'; track.srclang = 'en'; track.label = 'Sub';
  if (!vid.contains(track)) vid.appendChild(track);
  if (vid.textTracks[0]) vid.textTracks[0].mode = 'showing';
  document.getElementById('subBtn').style.color = 'var(--accent3)';
}

function playVideo(i) {
  if (i < 0 || i >= playlist.length) return;
  currentIdx = i;
  vid.src = playlist[i].url;
  vid.play();
  document.getElementById('placeholder').style.display = 'none';
  vid.style.display = 'block';
  document.getElementById('titleBar').textContent = playlist[i].name;
  document.getElementById('playBtn').textContent = '⏸';
  renderPlaylist();
}

// ── Playback controls ─────────────────────────────────────────────
function togglePlay() {
  if (!playlist.length) { document.getElementById('fileInput').click(); return; }
  if (currentIdx < 0) { playVideo(0); return; }
  if (vid.paused) { vid.play(); document.getElementById('playBtn').textContent = '⏸'; }
  else { vid.pause(); document.getElementById('playBtn').textContent = '▶'; }
}

function skip(sec) { vid.currentTime = Math.max(0, Math.min(vid.duration, vid.currentTime + sec)); showIndicator((sec>0?'+':'')+sec+'s'); }
function seek(pct) { if (vid.duration) vid.currentTime = (pct/100) * vid.duration; }
function setVol(v) { vid.volume = v/100; }
function setSpeed(s) { vid.playbackRate = parseFloat(s); }
function prevVideo() { playVideo(Math.max(0, currentIdx-1)); }
function nextVideo() { playVideo(Math.min(playlist.length-1, currentIdx+1)); }

function togglePiP() {
  if (document.pictureInPictureElement) document.exitPictureInPicture();
  else if (vid.requestPictureInPicture) vid.requestPictureInPicture().catch(()=>{});
}

function toggleFS() {
  const el = document.getElementById('videoArea');
  if (document.fullscreenElement) document.exitFullscreen();
  else el.requestFullscreen?.();
}

function toggleSub() {
  const t = vid.textTracks[0];
  if (!t) return;
  t.mode = t.mode === 'showing' ? 'hidden' : 'showing';
  document.getElementById('subBtn').style.color = t.mode === 'showing' ? 'var(--accent3)' : 'var(--text-dim)';
}

// ── Progress update ───────────────────────────────────────────────
vid.addEventListener('timeupdate', () => {
  if (seeking || !vid.duration) return;
  const pct = (vid.currentTime / vid.duration) * 100;
  document.getElementById('seekBar').value = pct;
  document.getElementById('curTime').textContent = fmtTime(vid.currentTime);
  document.getElementById('durTime').textContent = fmtTime(vid.duration);
});
vid.addEventListener('ended', () => {
  if (currentIdx < playlist.length-1) nextVideo();
  else document.getElementById('playBtn').textContent = '▶';
});
vid.addEventListener('pause', () => document.getElementById('playBtn').textContent = '▶');
vid.addEventListener('play',  () => document.getElementById('playBtn').textContent = '⏸');

function fmtTime(s) {
  if (isNaN(s)) return '0:00';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = Math.floor(s%60);
  if (h) return `${h}:${m.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
  return `${m}:${ss.toString().padStart(2,'0')}`;
}

// ── Gesture controls ──────────────────────────────────────────────
function gestureClick(e) {
  if (!vid.src) return;
  const x = e.clientX / window.innerWidth;
  if (x < 0.25) skip(-10);
  else if (x > 0.75) skip(10);
  else togglePlay();
  showHUD();
}
function gestureDbl(e) { toggleFS(); }

function showHUD() {
  clearTimeout(headerTimer);
  document.getElementById('header').classList.remove('hidden');
  headerTimer = setTimeout(() => {
    if (!vid.paused) document.getElementById('header').classList.add('hidden');
  }, 3000);
}

function showIndicator(text) {
  const el = document.getElementById('seekIndicator');
  el.textContent = text; el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 800);
}

// ── Playlist ──────────────────────────────────────────────────────
function togglePlaylist() {
  playlistOpen = !playlistOpen;
  document.getElementById('playlist').classList.toggle('open', playlistOpen);
}

function renderPlaylist() {
  const el = document.getElementById('playlist');
  el.innerHTML = `<div style="padding:10px 14px;border-bottom:1px solid var(--panel-border);font-family:Orbitron,monospace;font-size:.58rem;color:var(--text-dim);display:flex;justify-content:space-between">
    PLAYLIST <span onclick="togglePlaylist()" style="cursor:pointer;color:var(--accent4)">✕</span>
  </div>` +
  (playlist.length ? playlist.map((v,i) =>
    `<div class="pl-item${i===currentIdx?' active':''}" onclick="playVideo(${i})">
      <span style="color:${i===currentIdx?'var(--accent4)':'var(--text-dim)'}">${i===currentIdx?'▶':String(i+1).padStart(2,'0')}</span>
      <div class="pl-name">${esc(v.name)}</div>
    </div>`
  ).join('') : '<div style="padding:16px;color:var(--text-dim);font-size:.62rem">No videos loaded</div>');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  else if (e.key === 'ArrowRight') skip(10);
  else if (e.key === 'ArrowLeft')  skip(-10);
  else if (e.key === 'ArrowUp')    { vid.volume = Math.min(1, vid.volume+0.1); }
  else if (e.key === 'ArrowDown')  { vid.volume = Math.max(0, vid.volume-0.1); }
  else if (e.key === 'f' || e.key === 'F') toggleFS();
});

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
renderPlaylist();
</script>
</body></html>
