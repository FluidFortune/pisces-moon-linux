.note-dot{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--gold);}

.content{overflow-y:auto;display:flex;flex-direction:column;}
.emergency-banner{background:rgba(255,51,102,.12);border-bottom:2px solid var(--accent4);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}

.pe-ta:focus{border-color:var(--accent);}
.btn-row{display:flex;gap:8px;}
.btn{padding:7px 16px;background:transparent;border:1px solid var(--panel-border);color:var(--text);font-family:'Orbitron',monospace;font-size:.52rem;cursor:pointer;letter-spacing:1px;transition:all .15s;}

.btn.green{border-color:var(--accent3);color:var(--accent3);}
.btn.green:hover{background:var(--accent3);color:var(--bg);}
.btn.red{border-color:var(--accent4);color:var(--accent4);}
.btn.red:hover{background:var(--accent4);color:var(--bg);}
.btn.gold{border-color:var(--gold);color:var(--gold);}
.btn.gold:hover{background:var(--gold);color:var(--bg);}
/* dosage calc */
.calc-input{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.78rem;padding:8px;outline:none;width:100%;}
.calc-input:focus{border-color:var(--accent);}
.calc-result{background:var(--bg2);border:1px solid var(--accent);padding:12px;margin-top:8px;}
</style>

<ul class="steps">
<li class="step"><div class="step-n">1</div><div><div class="step-body"><strong>CHECK SAFETY.</strong> Tap shoulders firmly: "Are you OK?" No response → shout for help → call 911.</div></div></li>
<li class="step"><div class="step-n">2</div><div><div class="step-body">Position flat on firm surface. Kneel beside chest. Remove clothing from chest area.</div></div></li>
<li class="step"><div class="step-n">3</div><div><div class="step-body"><strong>CHEST COMPRESSIONS:</strong> Heel of dominant hand on center of chest (lower half of sternum). Second hand on top, fingers interlaced. Arms locked straight, compress 2–2.4 inches. Allow full recoil.</div><div class="step-sub">Rate: 100–120/min. Count aloud: 1-and-2-and-3... Push hard, push fast.</div></div></li>
<li class="step"><div class="step-n">4</div><div><div class="step-body"><strong>RESCUE BREATHS (trained only):</strong> 30 compressions → 2 breaths. Tilt head, lift chin, pinch nose, seal mouth, breathe 1 second until chest rises. Compression-only CPR is acceptable.</div></div></li>
<li class="step"><div class="step-n">5</div><div><div class="step-body"><strong>AED:</strong> Power on, attach pads (right collarbone / left side below armpit), stand clear, deliver shock, IMMEDIATELY resume CPR. AED will prompt each step.</div></div></li>
<li class="step"><div class="step-n">6</div><div><div class="step-body">Continue until: AED available, trained responders arrive, obvious signs of life, or physically unable to continue.</div></div></li>
</ul>
<div class="tip"><strong>Infant CPR:</strong> 2 fingers on center of chest just below nipple line. 1.5" depth. 30 compressions : 2 gentle puffs (just enough to see chest rise).</div>
<div class="tip"><strong>Child (1–puberty):</strong> 1 or 2 hands depending on size. 2" depth. Same 30:2 ratio.</div>
<div class="warn">⚠ Rib fractures during CPR are expected and acceptable. Broken ribs are fixable. Death from cardiac arrest is not. Keep going.</div>`

<ul class="steps">
<li class="step"><div class="step-n">1</div><div><div class="step-body">Confirm choking — ask "Are you choking?" Thumbs-up/down signal if cannot speak. If they can cough forcefully: encourage coughing, do not intervene.</div></div></li>

<li class="step"><div class="step-n">4</div><div><div class="step-body"><strong>OBESE / PREGNANT:</strong> Chest thrusts instead of abdominal thrusts. Heel of hand on center of chest. Sharp backward thrusts.</div></div></li>

<ul class="steps">
<li class="step"><div class="step-n">M</div><div><div class="step-body"><strong>MASSIVE HEMORRHAGE first.</strong> Identify and stop life-threatening bleeding before anything else.</div></div></li>
<li class="step"><div class="step-n">1</div><div><div class="step-body"><strong>EXPOSE:</strong> Cut away clothing. You must see the wound. Do not just cover it.</div></div></li>

<div class="danger">🚫 Do NOT remove packed dressings to check wound. Do NOT use a tourniquet on the neck or torso. Do NOT give food or water.</div>`

<ul class="steps">
<li class="step"><div class="step-n">1</div><div><div class="step-body">Call 911. Note exact time of symptom onset — this determines tPA (clot-buster) eligibility (window: within 3–4.5 hours).</div></div></li>

<ul class="steps">
<li class="step"><div class="step-n">1</div><div><div class="step-body"><strong>EPINEPHRINE IMMEDIATELY:</strong> Auto-injector (EpiPen) to outer mid-thigh, through clothing if needed. Press firmly, hold 10 seconds. Note time.</div><div class="step-sub">Adult/child &gt;30kg: 0.3mg (0.3mL 1:1000) | Child &lt;30kg: 0.15mg | Infant &lt;15kg: 0.1mg</div></div></li>

  html: `<div class="sec-title">🦴 FRACTURES — ASSESSMENT AND FIELD MANAGEMENT</div>
<ul class="steps">
<li class="step"><div class="step-n">1</div><div><div class="step-body"><strong>SIGNS:</strong> Pain, swelling, deformity, crepitus (grinding), inability to bear weight, bruising. Open fracture: bone visible or wound near fracture site.</div></div></li>
<li class="step"><div class="step-n">2</div><div><div class="step-body"><strong>NEUROVASCULAR CHECK:</strong> Before and after splinting — pulse distal to fracture, capillary refill (&lt;2 sec), sensation (can they feel touch?), motor function (can they wiggle fingers/toes?). Document findings.</div></div></li>
<li class="step"><div class="step-n">3</div><div><div class="step-body"><strong>IMMOBILIZE IN POSITION FOUND:</strong> Splint above AND below the fracture. Do not attempt to straighten unless neurovascular compromise (absent pulse). Pad bony prominences.</div></div></li>
<li class="step"><div class="step-n">4</div><div><div class="step-body"><strong>OPEN FRACTURE:</strong> Cover wound with clean moist dressing. Do NOT push bone back. Do not probe wound. Antibiotic coverage needed urgently. Transport immediately.</div></div></li>
<li class="step"><div class="step-n">5</div><div><div class="step-body"><strong>SPINE INJURY SUSPECTED:</strong> Mechanism (fall from height, MVA, diving) + any of: neck/back pain, numbness/tingling in extremities, weakness, loss of bowel/bladder. Minimize ALL movement. Log-roll only. Cervical collar if available. Call 911.</div></div></li>
</ul>
<div class="tip"><strong>Field splint materials:</strong> Sleeping pad, trekking poles, branches, rolled clothing. Tie proximal and distal to fracture — not over it. Check neurovascular status every 15–30 minutes. If circulation compromised after splinting: loosen ties.</div>
<div class="warn">⚠ Femur fracture: thigh can hold 1–2L blood internally. Treat for shock. Traction splint (if available) reduces pain and blood loss. Transport urgently.</div>
<div class="warn">⚠ Pelvic fracture: massive internal hemorrhage possible. Do NOT compress pelvis to check — this can worsen bleeding. Sheet wrap or SAM pelvic sling. Transport immediately. Do not stand patient.</div>`
},

hypothermia: {
  icon:'🥶', label:'HYPOTHERMIA', sub:'Cold exposure',
  html: `<div class="sec-title">🥶 HYPOTHERMIA</div>
<div class="grid3" style="margin-bottom:12px">
  <div class="card" style="border-color:var(--accent)"><div class="card-title" style="color:var(--accent)">MILD 90–95°F / 32–35°C</div><div class="card-body">Shivering (protective), confusion, slurred speech, impaired coordination, skin pale/blue</div></div>
  <div class="card" style="border-color:var(--warn)"><div class="card-title" style="color:var(--warn)">MODERATE 82–90°F / 28–32°C</div><div class="card-body">Shivering stops (bad sign), muscle stiffness, drowsiness, paradoxical undressing, stupor</div></div>
  <div class="card" style="border-color:var(--accent4)"><div class="card-title" style="color:var(--accent4)">SEVERE &lt;82°F / &lt;28°C</div><div class="card-body">Unconscious, fixed/dilated pupils, weak/absent pulse, life-threatening arrhythmias</div></div>
</div>
<ul class="steps">
<li class="step"><div class="step-n">1</div><div><div class="step-body">Move to warm, dry shelter. Remove wet clothing — cut if necessary, minimize movement.</div></div></li>
<li class="step"><div class="step-n">2</div><div><div class="step-body"><strong>INSULATE FROM GROUND FIRST.</strong> The ground conducts heat away faster than air. Sleeping pad or thick debris layer under patient. Then blankets/sleeping bag over.</div></div></li>
<li class="step"><div class="step-n">3</div><div><div class="step-body"><strong>REWARM CORE FIRST:</strong> Warm packs to axillae, groin, and neck (major vessel areas). Warm sweet drinks if conscious and able to swallow. No alcohol.</div></div></li>
<li class="step"><div class="step-n">4</div><div><div class="step-body"><strong>HANDLE GENTLY.</strong> Hypothermic heart is prone to ventricular fibrillation with rough movement. No unnecessary jostling. Gradual position changes.</div></div></li>
<li class="step"><div class="step-n">5</div><div><div class="step-body">If no pulse: begin CPR. Continue until core temperature reaches 95°F or definitive care available. <strong>"Not dead until warm and dead."</strong> Successful resuscitation after prolonged hypothermic cardiac arrest is documented.</div></div></li>
</ul>
<div class="danger">🚫 Do NOT: rub extremities vigorously (drives cold blood to core), give alcohol, allow to stand/walk before fully rewarmed, apply direct heat sources to skin (frostbite and burns on numb skin).</div>`
},

let filteredDrugs = [...DRUGS];

function filterDrugs(q) {
  q = q.toLowerCase();
  filteredDrugs = DRUGS.filter(d =>
    d.name.toLowerCase().includes(q) ||
    d.cat.toLowerCase().includes(q) ||
    d.dose.toLowerCase().includes(q)
  );
  renderDrugs();
}

function renderDrugs() {
  const el = document.getElementById('drugList');
  if (!el) return;
  el.innerHTML = filteredDrugs.map(d => `
    <div class="drug-item">
      <div class="dname">${d.name} <span style="font-size:.58rem;color:var(--text-dim);font-weight:normal">${d.cat}</span></div>
      <div class="ddose">💊 ${d.dose}</div>
      ${d.warn ? `<div class="dwarn">⚠ ${d.warn}</div>` : ''}
      ${d.contra ? `<div class="dcontra">🚫 CI: ${d.contra}</div>` : ''}
    </div>`).join('');
}

function calcDose() {
  const wt = parseFloat(document.getElementById('ptWt')?.value) || 0;
  const unit = document.getElementById('wtUnit')?.value;
  const dpk = parseFloat(document.getElementById('dosePerKg')?.value) || 0;
  const conc = parseFloat(document.getElementById('conc')?.value) || 0;
  const max = parseFloat(document.getElementById('maxDose')?.value) || Infinity;
  const kg = unit === 'lb' ? wt * 0.453592 : wt;
  let totalMg = kg * dpk;
  const capped = totalMg > max;
  if (capped) totalMg = max;
  document.getElementById('doseResult').textContent = totalMg.toFixed(1) + ' mg';
  document.getElementById('volResult').textContent = conc > 0 ? `= ${(totalMg/conc).toFixed(2)} mL at ${conc} mg/mL` : '';
  document.getElementById('maxResult').textContent = capped ? `⚠ Capped at maximum dose of ${max}mg` : '';
}

// ── NAV structure ─────────────────────────────────────────────────
const NAV_SECTIONS = [
  { heading: 'EMERGENCY PROTOCOLS', keys: ['cpr','choking','bleeding','stroke','anaphylaxis','burns','fracture','hypothermia','heatstroke','poisoning','spinal','diabetic','altitude'] },
  { heading: 'REFERENCE', keys: ['vitals','drugs','triage','dosage'] },
];

// ── Custom pages ──────────────────────────────────────────────────
function getCustomPages() {
  return JSON.parse(localStorage.getItem('pm_med_custom_pages') || '[]');
}
function saveCustomPages(pages) {
  localStorage.setItem('pm_med_custom_pages', JSON.stringify(pages));
}

// ── Personal notes ────────────────────────────────────────────────
function getNotes(key) { return localStorage.getItem('pm_med_note_' + key) || ''; }
function saveNote(key, text) {
  localStorage.setItem('pm_med_note_' + key, text);
  renderNav();
  document.getElementById('noteStatus').textContent = 'saved ' + new Date().toLocaleTimeString();
}

// ── State ─────────────────────────────────────────────────────────
let currentKey = 'cpr';
let editingCustom = null; // null or index

// ── Render nav ────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('nav');
  let html = '';

  NAV_SECTIONS.forEach(sec => {
    html += `<div class="nav-section">${sec.heading}</div>`;
    sec.keys.forEach(k => {
      const def = BUILT_IN[k];
      const hasNote = getNotes(k).trim().length > 0;
      html += `<div class="nav-item ${currentKey===k?'active':''}" onclick="showBuiltin('${k}')">
        <span class="nav-icon">${def.icon}</span>
        <div><div class="nav-label">${def.label}</div><div class="nav-sub">${def.sub}</div></div>
        ${hasNote ? '<div class="note-dot" title="Has personal notes"></div>' : ''}
      </div>`;
    });
  });

  // Custom pages
  const customs = getCustomPages();
  if (customs.length > 0) {
    html += `<div class="nav-section">MY PAGES</div>`;
    customs.forEach((p, i) => {
      html += `<div class="nav-item ${currentKey==='custom_'+i?'active':''}" onclick="showCustom(${i})">
        <span class="nav-icon">${p.icon || '📄'}</span>
        <div><div class="nav-label">${esc(p.title)}</div><div class="nav-sub">Custom page</div></div>
        <div class="custom-dot" title="Custom page"></div>
      </div>`;
    });
  }

  html += `<div class="nav-section">ADD PAGE</div>
    <div class="nav-item ${currentKey==='__add__'?'active':''}" onclick="showAddPage()">
      <span class="nav-icon">➕</span>
      <div><div class="nav-label">NEW PAGE</div><div class="nav-sub">Add custom protocol</div></div>
    </div>
    <div class="nav-item" onclick="exportPages()">
      <span class="nav-icon">📤</span>
      <div><div class="nav-label">EXPORT MY PAGES</div><div class="nav-sub">Download as JSON</div></div>
    </div>
    <div class="nav-item" onclick="document.getElementById('importFile').click()">
      <span class="nav-icon">📥</span>
      <div><div class="nav-label">IMPORT PAGES</div><div class="nav-sub">Load from JSON</div></div>
    </div>`;

  nav.innerHTML = html;
}

// ── Show built-in section ─────────────────────────────────────────
function showBuiltin(key) {
  currentKey = key;
  const def = BUILT_IN[key];
  const notes = getNotes(key);

  let html = '';
  if (def.banner) {
    html += `<div class="emergency-banner"><span class="eb-icon">🚨</span><div><div class="eb-title">${def.banner.title}</div><div class="eb-sub">${def.banner.sub}</div></div></div>`;
  }
  html += `<div class="content-body">${def.html}</div>`;

  // Notes panel
  html += `<div class="notes-panel">
    <div class="notes-header">
      <div class="notes-title">📝 PERSONAL NOTES — ${def.label}</div>
      <span class="notes-saved" id="noteStatus">${notes ? 'saved' : 'no notes yet'}</span>
    </div>
    <textarea class="notes-ta" id="noteTa" placeholder="Add your personal notes, local protocols, team-specific procedures..."
      oninput="saveNote('${key}', this.value)">${esc(notes)}</textarea>
  </div>`;

  document.getElementById('content').innerHTML = html;
  if (key === 'drugs') { renderDrugs(); }
  if (key === 'dosage') { calcDose(); }
  renderNav();
}

// ── Show custom page ──────────────────────────────────────────────
function showCustom(i) {
  currentKey = 'custom_' + i;
  const pages = getCustomPages();
  const p = pages[i];
  const notes = getNotes('custom_' + i);

  let html = `<div class="content-body">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="sec-title" style="color:var(--accent);margin-bottom:0">${p.icon||'📄'} ${esc(p.title)}</div>
      <div style="display:flex;gap:6px">
        <button class="btn gold" onclick="editCustom(${i})">✏ EDIT</button>
        <button class="btn red" onclick="deleteCustom(${i})">🗑 DELETE</button>
      </div>
    </div>
    <div style="font-size:.72rem;color:var(--text);line-height:1.85;white-space:pre-wrap">${markdownToHtml(p.content||'')}</div>
  </div>
  <div class="notes-panel">
    <div class="notes-header">
      <div class="notes-title">📝 NOTES — ${esc(p.title)}</div>
      <span class="notes-saved" id="noteStatus">${notes ? 'saved' : ''}</span>
    </div>
    <textarea class="notes-ta" id="noteTa" placeholder="Add notes..."
      oninput="saveNote('custom_${i}', this.value)">${esc(notes)}</textarea>
  </div>`;

  document.getElementById('content').innerHTML = html;
  renderNav();
}

// ── Add/Edit custom page ──────────────────────────────────────────
function showAddPage(editIndex) {
  currentKey = '__add__';
  editingCustom = editIndex !== undefined ? editIndex : null;
  const pages = getCustomPages();
  const existing = editingCustom !== null ? pages[editingCustom] : null;

  const html = `<div class="page-editor">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="sec-title" style="color:var(--accent);margin-bottom:0">
        ${editingCustom !== null ? '✏ EDIT PAGE' : '➕ NEW CUSTOM PAGE'}
      </div>
    </div>
    <div style="font-size:.6rem;color:var(--text-dim);line-height:1.8">
      Write in plain text or markdown. Headers: # H1 ## H2. Bold: **text**. Lists: - item.
    </div>
    <div style="display:grid;grid-template-columns:60px 1fr;gap:8px;align-items:center">
      <input class="pe-input" id="peIcon" placeholder="🏥" value="${existing?.icon||''}" style="text-align:center;font-size:1.4rem">
      <input class="pe-input" id="peTitle" placeholder="Page title (e.g. CBRN Decontamination)" value="${esc(existing?.title||'')}">
    </div>
    <textarea class="pe-ta" id="peContent" placeholder="Write your protocol here...

# SECTION TITLE
Step 1: First action
Step 2: Second action

## Notes
Additional information here.">${esc(existing?.content||'')}</textarea>
    <div style="font-size:.58rem;color:var(--text-dim)">Or import from URL via Gemini:</div>
    <div style="display:flex;gap:6px">
      <input class="pe-input" id="peUrl" placeholder="https://..." style="flex:1">
      <button class="btn gold" onclick="importFromUrl()">IMPORT URL</button>
    </div>
    <div class="btn-row">
      <button class="btn green" onclick="savePage()">💾 SAVE PAGE</button>
      ${editingCustom !== null ? `<button class="btn red" onclick="deleteCustom(${editingCustom})">🗑 DELETE</button>` : ''}
      <button class="btn" onclick="showBuiltin('cpr')">CANCEL</button>
    </div>
  </div>`;

  document.getElementById('content').innerHTML = html;
  renderNav();
}

function editCustom(i) { showAddPage(i); }

function savePage() {
  const title = document.getElementById('peTitle').value.trim();
  const content = document.getElementById('peContent').value;
  const icon = document.getElementById('peIcon').value.trim() || '📄';
  if (!title) { alert('Title required'); return; }

  const pages = getCustomPages();
  const page = { title, content, icon, created: Date.now() };

  if (editingCustom !== null) {
    pages[editingCustom] = { ...pages[editingCustom], ...page };
  } else {
    pages.push(page);
  }
  saveCustomPages(pages);
  const idx = editingCustom !== null ? editingCustom : pages.length - 1;
  editingCustom = null;
  showCustom(idx);
}

function deleteCustom(i) {
  if (!confirm('Delete this page?')) return;
  const pages = getCustomPages();
  pages.splice(i, 1);
  saveCustomPages(pages);
  showBuiltin('cpr');
}

function exportPages() {
  const pages = getCustomPages();
  const blob = new Blob([JSON.stringify(pages, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pm_medical_pages_' + Date.now() + '.json';
  a.click();
}

function importPages(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Invalid format');
      const existing = getCustomPages();
      saveCustomPages([...existing, ...imported]);
      renderNav();
      alert(`Imported ${imported.length} pages.`);
    } catch { alert('Invalid file format'); }
  };
  reader.readAsText(file);
}

async function importFromUrl() {
  const url = document.getElementById('peUrl').value.trim();
  if (!url) return;
  document.getElementById('peContent').value = 'Fetching via Gemini...';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:2000,
        messages:[{role:'user',content:`Fetch this URL and extract the main medical/emergency protocol content, formatted as clean markdown suitable for an offline medical reference app. URL: ${url}\n\nReturn ONLY the formatted markdown content, no preamble.`}],
        tools:[{type:'web_search_20250305',name:'web_search'}]
      })
    });
    const data = await res.json();
    const text = data.content?.filter(c=>c.type==='text').map(c=>c.text).join('\n') || 'No content extracted';
    document.getElementById('peContent').value = text;
    if (!document.getElementById('peTitle').value) {
      document.getElementById('peTitle').value = new URL(url).hostname;
    }
  } catch(e) {
    document.getElementById('peContent').value = `Error fetching URL: ${e.message}\n\nYou can paste the content manually.`;
  }
}

// ── Simple markdown → HTML ────────────────────────────────────────
function markdownToHtml(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3 style="font-family:Orbitron,monospace;font-size:.75rem;color:var(--gold);margin:10px 0 5px;letter-spacing:2px">$1</h3>')
    .replace(/^## (.+)$/gm,'<h2 style="font-family:Orbitron,monospace;font-size:.85rem;color:var(--accent3);margin:12px 0 6px;letter-spacing:2px">$1</h2>')
    .replace(/^# (.+)$/gm,'<h1 style="font-family:Orbitron,monospace;font-size:1rem;color:var(--accent4);margin:14px 0 8px;letter-spacing:3px">$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--text-bright)">$1</strong>')
    .replace(/_(.+?)_/g,'<em style="color:var(--text-dim)">$1</em>')
    .replace(/`(.+?)`/g,'<code style="background:var(--bg3);padding:1px 5px;color:var(--accent3)">$1</code>')
    .replace(/^- (.+)$/gm,'<div style="padding:3px 0 3px 16px;border-left:2px solid var(--panel-border)">• $1</div>')
    .replace(/^(\d+)\. (.+)$/gm,'<div style="padding:3px 0 3px 16px"><span style="color:var(--accent4);font-family:Orbitron,monospace">$1</span> $2</div>')
    .replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--panel-border);margin:10px 0">')
    .replace(/\n\n/g,'</p><p style="margin-bottom:8px">')
    .replace(/\n/g,'<br>');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────
// Hidden file input for import
document.body.insertAdjacentHTML('beforeend', '<input type="file" id="importFile" accept=".json" style="display:none" onchange="importPages(this.files[0])">');

renderNav();
showBuiltin('cpr');
</script>
