<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css"><link rel="stylesheet" href="pm_theme.css"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // TRAILS INTEL</title>
<link rel="stylesheet" href="lib/leaflet.min.css">
<link rel="stylesheet" href="pm_shared.css">
<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.layout { display:grid; grid-template-columns:340px 1fr 320px; height:calc(100vh - 52px); overflow:hidden; }
.sidebar { overflow-y:auto; border-right:1px solid var(--panel-border); }
#map { height:100%; }
.map-col { position:relative; }
.ctrl-panel { padding:14px; background:var(--bg2); border-bottom:1px solid var(--panel-border); }
.trail-card {
    padding:14px; border-bottom:1px solid var(--panel-border); cursor:pointer;
    transition:background .15s;
}
.trail-card:hover { background:rgba(240,165,0,.04); }
.trail-card.active { background:rgba(240,165,0,.08); border-left:3px solid var(--gold); }
.trail-name { font-size:.78rem; color:var(--text-bright); margin-bottom:6px; font-weight:500; }
.trail-meta { font-size:.62rem; color:var(--text-dim); display:flex; gap:10px; flex-wrap:wrap; }
.trail-meta span { color:var(--text); }
.badge { display:inline-block; padding:2px 7px; font-size:.55rem; border-radius:2px;
    font-family:Orbitron,monospace; letter-spacing:1.5px; }
.be { background:rgba(0,232,122,.1); color:var(--accent3); border:1px solid var(--accent3); }
.bm { background:rgba(255,214,10,.1); color:var(--warn); border:1px solid var(--warn); }
.bh { background:rgba(255,45,85,.1); color:var(--accent4); border:1px solid var(--accent4); }
.detail-panel { padding:14px; font-size:.72rem; line-height:1.7; white-space:pre-wrap; color:var(--text); }
.mode-tabs { display:flex; border-bottom:1px solid var(--panel-border); }
.mode-tab {
    flex:1; padding:10px; text-align:center;
    font-family:Orbitron,monospace; font-size:.55rem; letter-spacing:2px;
    color:var(--text-dim); cursor:pointer; border-right:1px solid var(--panel-border);
}
.mode-tab:last-child { border-right:none; }
.mode-tab.active { color:var(--gold); background:var(--bg3); }
.mode-tab:hover { color:var(--text); }
.ai-btn-quick { padding:5px 10px; border:1px solid var(--panel-border);
    background:transparent; color:var(--text-dim);
    font-family:'Share Tech Mono',monospace; font-size:.58rem;
    cursor:pointer; margin:3px; }
.ai-btn-quick:hover { border-color:var(--gold); color:var(--gold); }
</style>
</head><body>

<header class="pm-header">
    <div class="pm-logo">⛰ <em>TRAILS</em> INTEL</div>
    <nav class="pm-nav">
        <div class="pm-nav-item active">ICONIC</div>
    </nav>
    <div class="pm-hdr-right">
        <span class="pm-last-update" id="trailCount">24 iconic</span>
    </div>
</header>

<div class="layout">
    <div class="sidebar">
        <div class="ctrl-panel">
            <div class="mode-tabs">
                <div class="mode-tab active" onclick="setMode('iconic')" id="tab-iconic">ICONIC</div>
                <div class="mode-tab" onclick="setMode('nearby')" id="tab-nearby">NEARBY</div>
                <div class="mode-tab" onclick="setMode('saved')" id="tab-saved">SAVED</div>
            </div>
            <div id="searchBox" style="margin-top:12px;display:none">
                <input class="pm-input" id="locationInput" placeholder="Location (city, park...)"
                    onkeydown="if(event.key==='Enter')findNearby()">
                <button class="pm-btn pm-btn-cy" onclick="findNearby()" style="margin-top:6px;width:100%">⛰ FIND NEARBY (AI)</button>
                <input class="pm-input" id="scrapeInput" placeholder="Or paste trail URL..." style="margin-top:8px"
                    onkeydown="if(event.key==='Enter')scrapeTrail()">
                <button class="pm-btn" onclick="scrapeTrail()" style="margin-top:6px;width:100%">SCRAPE &amp; SAVE</button>
            </div>
        </div>
        <div id="trailList"></div>
    </div>

    <div class="map-col">
        <div id="map"></div>
    </div>

    <div class="pm-col-right">
        <div class="pm-sh">TRAIL DETAIL</div>
        <div class="detail-panel" id="trailDetail">
            <div style="text-align:center;padding:24px;color:var(--text-dim)">
                <div style="font-family:Orbitron,monospace;font-size:.58rem;letter-spacing:3px;margin-bottom:10px;color:var(--gold)">SELECT A TRAIL</div>
                <div style="font-size:.62rem;line-height:2">Click any trail card to see full details, or use the tabs to find nearby trails or scrape from a URL.</div>
            </div>
        </div>
        <div class="pm-sh">AI GUIDE</div>
        <div style="padding:12px 14px">
            <textarea class="pm-input" id="aiQ" rows="2" placeholder="Ask about trail conditions, gear, safety..."
                style="resize:none;font-family:'Share Tech Mono',monospace"></textarea>
            <button class="pm-btn" onclick="askAI()" style="width:100%;margin-top:8px">ASK ▶</button>
            <div style="margin-top:10px">
                <button class="ai-btn-quick" onclick="quickAsk('What gear do I need for a multi-day backpacking trip?')">Gear list</button>
                <button class="ai-btn-quick" onclick="quickAsk('Bear safety basics')">Bear safety</button>
                <button class="ai-btn-quick" onclick="quickAsk('How to read topographic maps')">Map reading</button>
            </div>
            <div id="aiAnswer" style="margin-top:12px;font-size:.7rem;line-height:1.7;color:var(--text)"></div>
        </div>
    </div>
</div>

<script src="lib/leaflet.min.js"></script>
<script src="pm_lib.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// ICONIC TRAILS — famous, iconic, well-documented trails as defaults
// ═══════════════════════════════════════════════════════════════════
const ICONIC_TRAILS = [
    // CALIFORNIA
    {name:'Half Dome (Yosemite)', lat:37.7459, lon:-119.5332, difficulty:'Hard',
     distance_miles:16.5, elevation_gain_ft:4800,
     description:'The iconic Yosemite summit. Permit required. Cables on the final 400 feet make this a true adventure. 10–14 hour round trip. Start before sunrise. Features: waterfalls, granite domes, sequoias.',
     features:['permit required','cables','waterfalls','exposure'], region:'CA'},
    {name:'Mist Trail to Nevada Fall (Yosemite)', lat:37.7302, lon:-119.5568, difficulty:'Moderate',
     distance_miles:5.4, elevation_gain_ft:1900,
     description:'Yosemite\'s most popular trail. Stone steps alongside Vernal and Nevada Falls. Expect spray in spring. 3–5 hours. Iconic.',
     features:['waterfalls','stone steps','family-friendly'], region:'CA'},
    {name:'John Muir Trail', lat:36.5785, lon:-118.2923, difficulty:'Hard',
     distance_miles:211, elevation_gain_ft:47000,
     description:'The JMT: 211 miles from Yosemite Valley to Mt. Whitney. One of the great American thru-hikes. Typically 20–25 days. Permits required.',
     features:['thru-hike','permit required','high Sierra'], region:'CA'},
    {name:'Mount Whitney', lat:36.5786, lon:-118.2923, difficulty:'Hard',
     distance_miles:22, elevation_gain_ft:6100,
     description:'Highest peak in the lower 48 at 14,505 ft. Day hike or overnight from Whitney Portal. Lottery permit required. 12–16 hours single push.',
     features:['14er','permit lottery','altitude'], region:'CA'},

    // COLORADO / UTAH
    {name:'Angel\'s Landing (Zion)', lat:37.2590, lon:-112.9491, difficulty:'Hard',
     distance_miles:5.4, elevation_gain_ft:1488,
     description:'Famous chain-assisted ridge walk with 1000+ ft drops on both sides. Permit required as of 2022. Not for fear of heights. 3–5 hours.',
     features:['chains','exposure','permit required'], region:'UT'},
    {name:'The Narrows (Zion)', lat:37.2980, lon:-112.9475, difficulty:'Moderate',
     distance_miles:9.4, elevation_gain_ft:300,
     description:'Hike IN the Virgin River through slot canyons. Bottom-up route from Temple of Sinawava. Rent dry boots. Flash flood risk — check forecast.',
     features:['river hike','slot canyon','flash flood risk'], region:'UT'},
    {name:'Delicate Arch (Arches NP)', lat:38.7436, lon:-109.4993, difficulty:'Moderate',
     distance_miles:3.2, elevation_gain_ft:600,
     description:'Utah\'s signature arch. Exposed slickrock trail. Sunset is magical but crowded. No shade.',
     features:['arch','slickrock','photogenic'], region:'UT'},
    {name:'Longs Peak Keyhole Route', lat:40.2550, lon:-105.6160, difficulty:'Hard',
     distance_miles:15, elevation_gain_ft:5100,
     description:'Colorado\'s iconic 14er. Class 3 scramble above the Keyhole. Weather window critical — start by 3 AM. Fatal falls not rare.',
     features:['14er','class 3','weather critical'], region:'CO'},
    {name:'Maroon Bells Four Pass Loop', lat:39.0708, lon:-106.9890, difficulty:'Hard',
     distance_miles:27, elevation_gain_ft:7800,
     description:'Four 12,000+ ft passes circumnavigating the Maroon Bells. 3–4 day backpack. Lottery permits. Aspen groves, alpine lakes.',
     features:['backpacking','permits','high passes'], region:'CO'},

    // ARIZONA / NEW MEXICO
    {name:'Bright Angel Trail (Grand Canyon)', lat:36.0579, lon:-112.1429, difficulty:'Hard',
     distance_miles:19, elevation_gain_ft:4380,
     description:'Rim to Colorado River and back. Do NOT attempt in a day in summer — deaths occur. Mule traffic. Water at rest houses.',
     features:['canyon','inverse hike','desert'], region:'AZ'},
    {name:'Havasu Falls', lat:36.2552, lon:-112.6981, difficulty:'Moderate',
     distance_miles:20, elevation_gain_ft:2400,
     description:'Turquoise waterfalls in the Grand Canyon. Requires permit from Havasupai Tribe — books a year out. 3-day minimum stay.',
     features:['waterfall','permit required','backpacking'], region:'AZ'},

    // WASHINGTON / OREGON
    {name:'Mount Si (WA)', lat:47.4860, lon:-121.7230, difficulty:'Moderate',
     distance_miles:8, elevation_gain_ft:3150,
     description:'Seattle\'s iconic training hike. Steep and relentless. 3–5 hours. Used by mountaineers preparing for Rainier.',
     features:['training hike','steep','views of Seattle'], region:'WA'},
    {name:'Enchantments Core Zone (WA)', lat:47.5170, lon:-120.8180, difficulty:'Hard',
     distance_miles:19, elevation_gain_ft:5900,
     description:'Alpine wonderland. Granite, larches, turquoise lakes, goats. Permit lottery. Day-through is brutal but doable.',
     features:['alpine','larches','permit lottery'], region:'WA'},
    {name:'Multnomah Falls Loop (OR)', lat:45.5762, lon:-122.1158, difficulty:'Moderate',
     distance_miles:5, elevation_gain_ft:1500,
     description:'Iconic 620 ft waterfall. Loop connects Multnomah and Wahkeena Falls. Always crowded but worth it. Timed-entry permit in summer.',
     features:['waterfall','timed entry','columbia gorge'], region:'OR'},

    // EAST COAST
    {name:'Mount Washington via Tuckerman Ravine (NH)', lat:44.2705, lon:-71.3033, difficulty:'Hard',
     distance_miles:8.4, elevation_gain_ft:4250,
     description:'Most dangerous weather in the world at the summit. Killers in every month. 6000 ft of alpine exposure in bad weather.',
     features:['alpine','extreme weather','no bailout'], region:'NH'},
    {name:'Mount Katahdin (ME)', lat:45.9045, lon:-68.9212, difficulty:'Hard',
     distance_miles:11, elevation_gain_ft:4200,
     description:'Northern terminus of the Appalachian Trail. The Knife Edge is exactly what it sounds like. Reservation required in Baxter SP.',
     features:['AT terminus','knife edge','reservation'], region:'ME'},
    {name:'Franconia Ridge Loop (NH)', lat:44.1478, lon:-71.6444, difficulty:'Hard',
     distance_miles:8.9, elevation_gain_ft:3900,
     description:'Premier above-treeline ridgeline in the Northeast. Three 4000-footers. Exposed to sudden weather.',
     features:['ridge','4000 footers','above treeline'], region:'NH'},
    {name:'Old Rag Mountain (VA)', lat:38.5540, lon:-78.3160, difficulty:'Moderate',
     distance_miles:9.2, elevation_gain_ft:2415,
     description:'Shenandoah\'s famous rock scramble. Class 3 boulder sections — not for the unprepared. Day-use ticket required.',
     features:['scramble','ticket required','shenandoah'], region:'VA'},

    // NATIONAL / INTERNATIONAL ICONIC
    {name:'Pacific Crest Trail', lat:32.5908, lon:-116.4667, difficulty:'Hard',
     distance_miles:2650, elevation_gain_ft:489418,
     description:'Mexico to Canada. 5 months. PCTA permit. Desert, Sierra, Cascades. About 300 finishers per year.',
     features:['thru-hike','legendary','5 months'], region:'ALL'},
    {name:'Appalachian Trail', lat:34.6262, lon:-84.1932, difficulty:'Hard',
     distance_miles:2193, elevation_gain_ft:515000,
     description:'Springer Mountain GA to Mount Katahdin ME. 6 months. The original thru-hike. ~25% completion rate.',
     features:['thru-hike','legendary','AT'], region:'ALL'},
    {name:'Kalalau Trail (Kauai, HI)', lat:22.2150, lon:-159.5820, difficulty:'Hard',
     distance_miles:22, elevation_gain_ft:5000,
     description:'Na Pali Coast. Permit required for past mile 2. Beaches, cliffs, jungle, streams. Flash floods deadly.',
     features:['coastal','permit required','flash floods'], region:'HI'},

    // DESERT ICONIC
    {name:'Wave Permit Hike (Coyote Buttes)', lat:36.9958, lon:-112.0058, difficulty:'Moderate',
     distance_miles:6.4, elevation_gain_ft:350,
     description:'The famous sandstone wave. Lottery permit — 64 per day from 100,000+ applicants. No trail — GPS navigation.',
     features:['lottery permit','no trail','sandstone'], region:'AZ'},
    {name:'Bright Angel to Phantom Ranch', lat:36.0939, lon:-112.0939, difficulty:'Hard',
     distance_miles:19, elevation_gain_ft:4380,
     description:'Bottom of the Grand Canyon. Historic ranch. Reservations 15 months in advance. Mules carry your gear back up.',
     features:['canyon floor','reservations','mules'], region:'AZ'},
    {name:'South Kaibab Trail (Grand Canyon)', lat:36.0532, lon:-112.0839, difficulty:'Hard',
     distance_miles:14, elevation_gain_ft:4780,
     description:'Steepest trail into the Grand Canyon. Shortest route to the river. No water after Kaibab trailhead — carry all you need.',
     features:['steep','no water','canyon'], region:'AZ'},
];

let currentMode = 'iconic';
let currentTrails = [...ICONIC_TRAILS];
let savedTrails = [];
let selectedTrail = null;
let geminiKey = '';
let markers = [];

// Init map
const map = L.map('map', {attributionControl: false}).setView([39.8283, -98.5795], 4); // Center on US
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 19}).addTo(map);

function init() {
    // Load saved
    try {
        savedTrails = PM.load('trails_saved', []);
    } catch(e) {}

    
    render();
    addMarkers();
}

function setMode(mode) {
    currentMode = mode;
    ['iconic','nearby','saved'].forEach(m => {
        document.getElementById('tab-'+m).classList.toggle('active', m === mode);
    });
    document.getElementById('searchBox').style.display = mode === 'nearby' ? 'block' : 'none';

    if (mode === 'iconic') currentTrails = [...ICONIC_TRAILS];
    if (mode === 'saved') currentTrails = [...savedTrails];
    if (mode === 'nearby') currentTrails = [];

    document.getElementById('trailCount').textContent = `${currentTrails.length} trails`;
    render();
    addMarkers();
}

function render() {
    if (currentTrails.length === 0) {
        const msg = currentMode === 'nearby'
            ? 'Enter a location above and click FIND NEARBY to use AI, or paste a trail URL to scrape.'
            : currentMode === 'saved' ? 'No saved trails yet. Iconic trails can be saved from their detail view.' : '';
        document.getElementById('trailList').innerHTML = `
            <div style="padding:24px;color:var(--text-dim);font-size:.7rem;line-height:1.8;text-align:center">${msg}</div>`;
        return;
    }

    document.getElementById('trailList').innerHTML = currentTrails.map((t, i) => {
        const diffClass = (t.difficulty||'').toLowerCase().includes('easy') ? 'be'
                      : (t.difficulty||'').toLowerCase().includes('hard') ? 'bh' : 'bm';
        return `
        <div class="trail-card ${selectedTrail===i?'active':''}" onclick="selectTrail(${i})">
            <div class="trail-name">${PM.esc(t.name)}</div>
            <div style="margin:4px 0">
                <span class="badge ${diffClass}">${PM.esc(t.difficulty||'?')}</span>
            </div>
            <div class="trail-meta">
                <div>📏 <span>${t.distance_miles || '?'} mi</span></div>
                <div>⛰ <span>${t.elevation_gain_ft || '?'} ft</span></div>
                ${t.region ? `<div>📍 <span>${PM.esc(t.region)}</span></div>` : ''}
            </div>
        </div>`;
    }).join('');

    document.getElementById('trailCount').textContent = `${currentTrails.length} trails`;
}

function addMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    currentTrails.forEach((t, i) => {
        if (t.lat && t.lon) {
            const diffColor = (t.difficulty||'').toLowerCase().includes('easy') ? '#00e87a'
                          : (t.difficulty||'').toLowerCase().includes('hard') ? '#ff2d55' : '#ffd60a';
            const m = L.circleMarker([t.lat, t.lon], {
                radius: 7, fillColor: diffColor, color: '#fff',
                fillOpacity: .9, weight: 2
            }).addTo(map)
              .bindPopup(`<b>${PM.esc(t.name)}</b><br>${PM.esc(t.difficulty)} · ${t.distance_miles}mi`)
              .on('click', () => selectTrail(i));
            markers.push(m);
        }
    });

    // Fit to markers if we have them
    if (markers.length > 0 && currentMode !== 'iconic') {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
    }
}

function selectTrail(i) {
    const t = currentTrails[i];
    if (!t) return;
    selectedTrail = i;

    const el = document.getElementById('trailDetail');
    const isSaved = savedTrails.some(s => s.name === t.name);

    el.innerHTML = `
        <div style="font-family:Orbitron,monospace;font-size:.75rem;letter-spacing:2px;color:var(--gold);margin-bottom:14px">
            ${PM.esc(t.name)}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px 0;border-top:1px solid var(--panel-border);border-bottom:1px solid var(--panel-border);margin-bottom:14px">
            <div>
                <div style="font-family:Orbitron,monospace;font-size:.5rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:3px">DISTANCE</div>
                <div style="font-size:.9rem;color:var(--text-bright)">${t.distance_miles} mi</div>
            </div>
            <div>
                <div style="font-family:Orbitron,monospace;font-size:.5rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:3px">ELEVATION</div>
                <div style="font-size:.9rem;color:var(--text-bright)">${t.elevation_gain_ft} ft</div>
            </div>
            <div>
                <div style="font-family:Orbitron,monospace;font-size:.5rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:3px">DIFFICULTY</div>
                <div style="font-size:.9rem;color:var(--text-bright)">${PM.esc(t.difficulty)}</div>
            </div>
            <div>
                <div style="font-family:Orbitron,monospace;font-size:.5rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:3px">REGION</div>
                <div style="font-size:.9rem;color:var(--text-bright)">${PM.esc(t.region || '—')}</div>
            </div>
        </div>
        ${t.features?.length ? `
        <div style="margin-bottom:14px">
            ${t.features.map(f => `<span style="display:inline-block;padding:3px 8px;margin:3px 3px 3px 0;background:var(--bg3);border:1px solid var(--panel-border);font-size:.58rem;color:var(--accent);font-family:'Share Tech Mono',monospace;letter-spacing:1px">${PM.esc(f)}</span>`).join('')}
        </div>` : ''}
        <div style="font-size:.72rem;line-height:1.7;color:var(--text)">${PM.esc(t.description || '')}</div>
        ${t.sourceUrl ? `<div style="margin-top:14px"><a href="${PM.esc(t.sourceUrl)}" target="_blank" style="color:var(--accent);font-size:.65rem">View source →</a></div>` : ''}
        ${!isSaved && currentMode !== 'saved' ? `
            <button class="pm-btn" onclick="saveTrail(${i})" style="width:100%;margin-top:14px">SAVE TRAIL</button>
        ` : ''}
        ${isSaved && currentMode === 'saved' ? `
            <button class="pm-btn" onclick="removeTrail(${i})" style="width:100%;margin-top:14px;border-color:var(--accent4);color:var(--accent4)">REMOVE</button>
        ` : ''}
    `;

    render();

    if (t.lat && t.lon) {
        map.setView([t.lat, t.lon], 11);
        markers[i]?.openPopup();
    }
}

function saveTrail(i) {
    const t = currentTrails[i];
    if (savedTrails.some(s => s.name === t.name)) return;
    savedTrails.push(t);
    localStorage.setItem('pm_trails_saved', JSON.stringify(savedTrails));
    alert('Saved: ' + t.name);
    selectTrail(i);
}

function removeTrail(i) {
    const t = currentTrails[i];
    if (!confirm('Remove ' + t.name + '?')) return;
    savedTrails = savedTrails.filter(s => s.name !== t.name);
    localStorage.setItem('pm_trails_saved', JSON.stringify(savedTrails));
    setMode('saved');
}

async function findNearby() {
    const loc = document.getElementById('locationInput').value.trim();
    if (!loc) { alert('Enter a location first'); return; }

    document.getElementById('trailList').innerHTML = '<div class="pm-thinking" style="padding:20px"><span></span><span></span><span></span></div>';

    // Try NPS API first for national parks
    const npsResults = await fetchNPSTrails(loc);
    if (npsResults && npsResults.length > 0) {
        currentTrails = npsResults;
        document.getElementById('trailCount').textContent = `${currentTrails.length} trails`;
        render();
        addMarkers();
        return;
    }

    // Fall back to Gemini if available
    const geminiKey = PM.load('gemini_key') || PM.load('pm_gemini_key') || '';
    if (!geminiKey) {
        PM.renderError('trailList',
            'No trails found via NPS API.',
            'Set a Gemini API key to use AI-powered nearby trail search.');
        return;
    }

    try {
        const prompt = `List 8 notable hiking trails near ${loc}. Return ONLY a JSON array (no markdown), each object with these exact fields:
{name, distance_miles, elevation_gain_ft, difficulty, description, lat, lon, features, region}
description should be 2-3 sentences. features is a string array. difficulty is Easy/Moderate/Hard. Coordinates must be real GPS points.`;

        const text = await PM.gemini(prompt, { maxTokens: 2048 });
        const cleaned = text.replace(/```json|```/g, '').trim();
        currentTrails = JSON.parse(cleaned);
        document.getElementById('trailCount').textContent = `${currentTrails.length} trails`;
        render();
        addMarkers();
    } catch(e) {
        PM.renderError('trailList', 'AI error: ' + e.message);
    }
}

// ── NPS API — free, no key required for basic access ─────────────
async function fetchNPSTrails(query) {
    try {
        // Search NPS parks matching the query
        const url = `https://developer.nps.gov/api/v1/parks?q=${encodeURIComponent(query)}&limit=5&fields=addresses,entranceFees,operatingHours,activities`;
        const resp = await PM.fetchWithTimeout(url, {
            headers: { 'X-Api-Key': 'DEMO_KEY' }
        }, 10000);
        if (!resp.ok) return null;
        const data = await resp.json();
        if (!data.data || !data.data.length) return null;

        // Convert NPS park data to trail format
        return data.data.map(park => ({
            name: park.fullName,
            difficulty: 'Moderate',
            distance_miles: 0,
            elevation_gain_ft: 0,
            description: park.description || '',
            lat: parseFloat(park.latitude) || 0,
            lon: parseFloat(park.longitude) || 0,
            features: (park.activities || []).slice(0, 5).map(a => a.name),
            region: park.states || '',
            nps_code: park.parkCode,
            url: park.url,
            source: 'nps'
        })).filter(t => t.lat && t.lon);
    } catch(e) {
        return null;
    }
}

// ── ENRICHMENT PIPELINE ───────────────────────────────────────────
// AllTrails → Wikipedia → NPS conditions → optional Gemini synthesis
async function enrichTrail(i) {
    const t = currentTrails[i];
    if (!t) return;

    const el = document.getElementById('trailDetail');
    el.innerHTML = `
        <div style="font-family:Orbitron,monospace;font-size:.7rem;color:var(--gold);margin-bottom:14px">${PM.esc(t.name)}</div>
        <div class="pm-thinking"><span></span><span></span><span></span></div>
        <div id="enrichStatus" style="font-size:.6rem;color:var(--text-dim);margin-top:10px">Fetching AllTrails...</div>`;

    const status = id => document.getElementById('enrichStatus');
    const setStatus = s => { const el = status(); if (el) el.textContent = s; };

    let enriched = { ...t };

    // ── 1. AllTrails ─────────────────────────────────────────────
    try {
        setStatus('Fetching AllTrails...');
        const atQuery = encodeURIComponent(t.name + ' trail');
        const atUrl = `https://www.alltrails.com/explore?q=${atQuery}`;
        const atHtml = await PM.fetchWithTimeout(
            `https://corsproxy.io/?${encodeURIComponent(atUrl)}`, {}, 12000
        );
        if (atHtml.ok) {
            const html = await atHtml.text();
            // Extract JSON-LD structured data if present
            const ldMatch = html.match(/<script type="application\/ld\+json">([\s\S]*?)<\/script>/i);
            if (ldMatch) {
                try {
                    const ld = JSON.parse(ldMatch[1]);
                    if (ld.distance) enriched.distance_miles = parseFloat(ld.distance) || t.distance_miles;
                    if (ld.elevation) enriched.elevation_gain_ft = parseFloat(ld.elevation) || t.elevation_gain_ft;
                    if (ld.description) enriched.alltrails_desc = ld.description;
                } catch(e) {}
            }
            // Scrape visible text for description enrichment
            const bodyText = html
                .replace(/<script[\s\S]*?<\/script>/gi, '')
                .replace(/<style[\s\S]*?<\/style>/gi, '')
                .replace(/<[^>]+>/g, ' ')
                .replace(/\s+/g, ' ')
                .substring(0, 3000);
            enriched.alltrails_raw = bodyText;
        }
    } catch(e) { /* AllTrails fetch failed — continue */ }

    // ── 2. Wikipedia ─────────────────────────────────────────────
    try {
        setStatus('Checking Wikipedia...');
        const wikiTitle = encodeURIComponent(t.name.replace(/\s*\([^)]*\)/g, '').trim());
        const wikiUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${wikiTitle}`;
        const wResp = await PM.fetchWithTimeout(wikiUrl, {}, 10000);
        if (wResp.ok) {
            const wData = await wResp.json();
            if (wData.extract) {
                enriched.wiki_summary = wData.extract;
                enriched.wiki_url = wData.content_urls?.desktop?.page;
            }
        }
    } catch(e) { /* Wikipedia fetch failed — continue */ }

    // ── 3. NPS Conditions & Alerts ───────────────────────────────
    try {
        setStatus('Checking NPS conditions...');
        const parkCode = enriched.nps_code || await guessNPSCode(t.name);
        if (parkCode) {
            const alertsUrl = `https://developer.nps.gov/api/v1/alerts?parkCode=${parkCode}&limit=5`;
            const aResp = await PM.fetchWithTimeout(alertsUrl, {
                headers: { 'X-Api-Key': 'DEMO_KEY' }
            }, 8000);
            if (aResp.ok) {
                const aData = await aResp.json();
                enriched.nps_alerts = (aData.data || []).map(a => ({
                    title: a.title,
                    category: a.category,
                    description: a.description?.substring(0, 200)
                }));
            }
        }
    } catch(e) { /* NPS fetch failed — continue */ }

    // ── 4. Optional Gemini synthesis ─────────────────────────────
    const geminiKey = PM.load('gemini_key') || PM.load('pm_gemini_key') || '';
    if (geminiKey && (enriched.alltrails_raw || enriched.wiki_summary)) {
        try {
            setStatus('AI synthesizing...');
            const sources = [
                enriched.alltrails_raw ? `AllTrails: ${enriched.alltrails_raw.substring(0, 1500)}` : '',
                enriched.wiki_summary ? `Wikipedia: ${enriched.wiki_summary}` : '',
            ].filter(Boolean).join('\n\n');

            const prompt = `You are a trail guide. Based on this source data about "${t.name}", write a concise but rich trail description covering: overview, notable features, difficulty details, key waypoints or mile markers if mentioned, safety considerations, permit requirements, and best season. Keep it under 400 words. Be specific and practical.\n\n${sources}`;

            const synthesis = await PM.gemini(prompt, { maxTokens: 800 });
            enriched.ai_description = synthesis;
        } catch(e) { /* Gemini failed — use raw sources */ }
    }

    // Save enrichment to localStorage
    enriched.enriched = true;
    enriched.enriched_at = Date.now();
    try {
        const cache = JSON.parse(localStorage.getItem('pm_trail_enriched') || '{}');
        cache[t.name] = enriched;
        localStorage.setItem('pm_trail_enriched', JSON.stringify(cache));
    } catch(e) {}

    // Update trail in current list
    currentTrails[i] = enriched;

    // Re-render detail with enriched data
    renderTrailDetail(i);
}

// Guess NPS park code from trail name
async function guessNPSCode(trailName) {
    const known = {
        'yosemite': 'yose', 'grand canyon': 'grca', 'zion': 'zion',
        'yellowstone': 'yell', 'olympic': 'olym', 'rainier': 'mora',
        'rocky mountain': 'romo', 'glacier': 'glac', 'arches': 'arch',
        'canyonlands': 'cany', 'bryce': 'brca', 'shenandoah': 'shen',
        'acadia': 'acad', 'smoky': 'grsm', 'joshua tree': 'jotr',
        'sequoia': 'sequ', 'kings canyon': 'kica', 'death valley': 'deva',
        'grand teton': 'grte', 'capitol reef': 'care', 'mesa verde': 'meve',
        'hawaii volcanoes': 'havo', 'katmai': 'katm', 'denali': 'dena',
        'crater lake': 'crla', 'lassen': 'lavo', 'channel islands': 'chis',
        'badlands': 'badl', 'wind cave': 'wica', 'carlsbad': 'cave',
        'guadalupe': 'gumo', 'big bend': 'bibe', 'everglades': 'ever',
        'biscayne': 'bisc', 'virgin islands': 'viis', 'hot springs': 'hosp',
    };
    const lower = trailName.toLowerCase();
    for (const [key, code] of Object.entries(known)) {
        if (lower.includes(key)) return code;
    }
    return null;
}

async function scrapeTrail() {
    const url = document.getElementById('scrapeInput').value.trim();
    if (!url || !/^https?:\/\//.test(url)) {
        alert('Paste a valid trail URL (AllTrails, NPS, hiking blog, etc.)');
        return;
    }

    document.getElementById('trailList').innerHTML =
        '<div class="pm-thinking" style="padding:20px"><span></span><span></span><span></span></div>';

    try {
        let html = null;
        for (const proxy of PM.CORS_PROXIES) {
            try {
                const target = proxy ? proxy + encodeURIComponent(url) : url;
                const resp = await PM.fetchWithTimeout(target, {}, 15000);
                if (resp.ok) { html = await resp.text(); break; }
            } catch(e) {}
        }
        if (!html) throw new Error('Could not fetch page — try a different URL or proxy');

        const titleMatch = html.match(/<title[^>]*>([^<]+)<\/title>/i);
        const title = titleMatch ? titleMatch[1].replace(' - AllTrails', '').trim() : 'Trail';

        // Try JSON-LD first (AllTrails and many trail sites embed this)
        let structured = null;
        const ldMatches = [...html.matchAll(/<script type="application\/ld\+json">([\s\S]*?)<\/script>/gi)];
        for (const m of ldMatches) {
            try {
                const ld = JSON.parse(m[1]);
                if (ld['@type'] === 'ExerciseAction' || ld.distance || ld.name) {
                    structured = ld;
                    break;
                }
            } catch(e) {}
        }

        const bodyText = html
            .replace(/<script[\s\S]*?<\/script>/gi, '')
            .replace(/<style[\s\S]*?<\/style>/gi, '')
            .replace(/<[^>]+>/g, ' ')
            .replace(/\s+/g, ' ')
            .substring(0, 5000);

        const geminiKey = PM.load('gemini_key') || PM.load('pm_gemini_key') || '';

        let trail = {
            name: (structured?.name || title).substring(0, 80),
            difficulty: structured?.difficulty || 'Unknown',
            distance_miles: parseFloat(structured?.distance) || 0,
            elevation_gain_ft: parseFloat(structured?.elevation) || 0,
            description: structured?.description || bodyText.substring(0, 500),
            lat: parseFloat(structured?.geo?.latitude) || null,
            lon: parseFloat(structured?.geo?.longitude) || null,
            features: [],
            region: '',
            sourceUrl: url,
            source: url.includes('alltrails') ? 'alltrails' : 'web',
            enriched: false
        };

        if (geminiKey) {
            const prompt = `Extract structured trail data from this scraped page. Return ONLY JSON (no markdown):
{name, distance_miles, elevation_gain_ft, difficulty, description, lat, lon, features, region, waypoints}
difficulty: Easy/Moderate/Hard. features: string array. waypoints: array of {name, miles, description} if found. description: 2-3 rich sentences. Use null for unknown coords.

Page title: ${title}
${structured ? 'Structured data found: ' + JSON.stringify(structured).substring(0, 500) : ''}
Content: ${bodyText.substring(0, 3000)}`;

            const aiText = await PM.gemini(prompt, { maxTokens: 1500 });
            const cleaned = aiText.replace(/\`\`\`json|\`\`\`/g, '').trim();
            const parsed = JSON.parse(cleaned);
            trail = { ...trail, ...parsed, sourceUrl: url, enriched: true };
        }

        savedTrails.push(trail);
        PM.save('trails_saved', savedTrails);
        setMode('saved');

    } catch(e) {
        PM.renderError('trailList', 'Scrape error: ' + e.message,
            'Try pasting an AllTrails URL or any hiking trail page');
    }
}

function renderTrailDetail(i) {
    const t = currentTrails[i];
    if (!t) return;

    const isSaved = savedTrails.some(s => s.name === t.name);
    const el = document.getElementById('trailDetail');

    const diffClass = (t.difficulty||'').toLowerCase().includes('easy') ? 'be'
                    : (t.difficulty||'').toLowerCase().includes('hard') ? 'bh' : 'bm';

    // NPS alerts block
    const alertsHtml = t.nps_alerts?.length ? `
        <div style="margin:10px 0;padding:10px;background:rgba(255,85,119,.08);border:1px solid rgba(255,85,119,.3);border-radius:4px">
            <div style="font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:2px;color:var(--accent4);margin-bottom:6px">⚠ NPS ALERTS</div>
            ${t.nps_alerts.map(a =>
                `<div style="font-size:.62rem;color:var(--text);margin-bottom:4px"><strong>${PM.esc(a.title)}</strong><br>${PM.esc(a.description||'')}</div>`
            ).join('')}
        </div>` : '';

    // Waypoints block
    const waypointsHtml = t.waypoints?.length ? `
        <div style="margin:10px 0">
            <div style="font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:6px">WAYPOINTS</div>
            ${t.waypoints.map(w =>
                `<div style="font-size:.62rem;padding:4px 0;border-bottom:1px solid var(--panel-border);color:var(--text)">
                    <span style="color:var(--gold);margin-right:8px">${w.miles ? w.miles + 'mi' : '—'}</span>

    // Description — use best available source
    const description = t.ai_description || t.wiki_summary || t.alltrails_desc || t.description || '';

    // Sources tag
    const sourcesTags = [
        t.alltrails_raw ? '<span style="color:var(--accent3)">AllTrails</span>' : '',
        t.wiki_summary  ? '<span style="color:var(--accent)">Wikipedia</span>' : '',
        t.nps_alerts    ? '<span style="color:var(--accent2)">NPS</span>' : '',
        t.ai_description ? '<span style="color:var(--gold)">AI Synthesized</span>' : '',
    ].filter(Boolean).join(' · ');

    el.innerHTML = `
        <div style="font-family:Orbitron,monospace;font-size:.75rem;letter-spacing:2px;color:var(--gold);margin-bottom:10px">
            ${PM.esc(t.name)}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
            <span class="badge ${diffClass}">${PM.esc(t.difficulty||'?')}</span>
            ${t.distance_miles ? `<span class="badge" style="background:rgba(77,217,255,.1);color:var(--accent);border-color:var(--accent)">${t.distance_miles} mi</span>` : ''}
            ${t.elevation_gain_ft ? `<span class="badge" style="background:rgba(255,209,102,.1);color:var(--gold);border-color:var(--gold)">+${t.elevation_gain_ft.toLocaleString()} ft</span>` : ''}
            ${t.region ? `<span class="badge" style="background:transparent;color:var(--text-dim);border-color:var(--panel-border)">${PM.esc(t.region)}</span>` : ''}
        </div>
        ${alertsHtml}
        <div style="font-size:.7rem;line-height:1.8;color:var(--text);margin-bottom:12px;white-space:pre-wrap">${PM.esc(description)}</div>
        ${waypointsHtml}
        ${t.features?.length ? `
        <div style="margin:10px 0">
            <div style="font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:6px">FEATURES</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
                ${t.features.map(f => `<span style="background:var(--bg3);border:1px solid var(--panel-border);padding:2px 8px;font-size:.58rem;border-radius:2px;color:var(--text)">${PM.esc(f)}</span>`).join('')}
            </div>
        </div>` : ''}
        ${sourcesTags ? `<div style="font-size:.55rem;margin-top:10px;color:var(--text-dim)">Sources: ${sourcesTags}</div>` : ''}
        ${t.wiki_url ? `<div style="margin-top:6px"><a href="${PM.esc(t.wiki_url)}" target="_blank" style="font-size:.58rem;color:var(--accent)">→ Wikipedia</a></div>` : ''}
        ${t.sourceUrl ? `<div style="margin-top:4px"><a href="${PM.esc(t.sourceUrl)}" target="_blank" style="font-size:.58rem;color:var(--accent)">→ Source</a></div>` : ''}
        <div style="display:flex;gap:6px;margin-top:14px;flex-wrap:wrap">
            <button class="pm-btn pm-btn-cy" onclick="enrichTrail(${i})" style="flex:1">
                ${t.enriched ? '↻ RE-ENRICH' : '⬇ ENRICH'}
            </button>
            <button class="pm-btn" onclick="${isSaved ? `removeTrail(${i})` : `saveTrail(${i})`}"
                style="flex:1;${isSaved ? 'border-color:var(--accent4);color:var(--accent4)' : ''}">
                ${isSaved ? 'REMOVE' : 'SAVE'}
            </button>
        </div>`;
}

function selectTrail(i) {
    const t = currentTrails[i];
    if (!t) return;
    selectedTrail = i;

    // Check for cached enrichment
    try {
        const cache = JSON.parse(localStorage.getItem('pm_trail_enriched') || '{}');
        if (cache[t.name]) {
            currentTrails[i] = { ...t, ...cache[t.name] };
        }
    } catch(e) {}

    renderTrailDetail(i);
    render(); // Update selected state in list

    // Fly map to trail
    if (t.lat && t.lon) {
        map.flyTo([t.lat, t.lon], 11, { duration: 1.2 });
    }
}

function saveTrail(i) {
    const t = currentTrails[i];
    if (!t || savedTrails.some(s => s.name === t.name)) return;
    savedTrails.push(t);
    PM.save('trails_saved', savedTrails);
    renderTrailDetail(i);
}

function removeTrail(i) {
    const t = currentTrails[i];
    if (!t) return;
    savedTrails = savedTrails.filter(s => s.name !== t.name);
    PM.save('trails_saved', savedTrails);
    if (currentMode === 'saved') {
        currentTrails = [...savedTrails];
        selectedTrail = null;
        document.getElementById('trailDetail').innerHTML =
            '<div style="padding:24px;text-align:center;color:var(--text-dim);font-size:.7rem">Trail removed.</div>';
        render();
    } else {
        renderTrailDetail(i);
    }
}

async function askAI() {
    const q = document.getElementById('aiQ').value.trim();
    if (!q) return;
    await sendAI(q);
    document.getElementById('aiQ').value = '';
}

async function quickAsk(q) { await sendAI(q); }

async function sendAI(q) {
    const el = document.getElementById('aiAnswer');
    const geminiKey = PM.load('gemini_key') || PM.load('pm_gemini_key') || '';

    if (!geminiKey) {
        el.innerHTML = '<div style="color:var(--accent4);font-size:.65rem">No Gemini key set. Use Gemini Terminal to add one.</div>';
        return;
    }

    el.innerHTML = '<div class="pm-thinking"><span></span><span></span><span></span></div>';

    let context = '';
    if (selectedTrail !== null && currentTrails[selectedTrail]) {
        const t = currentTrails[selectedTrail];
        const desc = t.ai_description || t.wiki_summary || t.description || '';
        context = `User is viewing: ${t.name} (${t.difficulty}, ${t.distance_miles}mi, +${t.elevation_gain_ft}ft gain).
${desc.substring(0, 600)}

`;
    }

    try {
        const response = await PM.gemini(
            `${context}You are an experienced hiking and backcountry guide. Give practical, safety-focused advice.\n\nQuestion: ${q}`,
            { maxTokens: 1000 }
        );
        el.innerHTML = `<div style="font-size:.7rem;line-height:1.7">${PM.esc(response)
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>')}</div>`;
    } catch(e) {
        el.innerHTML = `<div style="color:var(--accent4);font-size:.65rem">AI error: ${PM.esc(e.message)}</div>`;
    }
}
