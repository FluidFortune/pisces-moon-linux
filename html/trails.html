<!-- PISCES MOON OS // TRAILS INTEL -->
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // TRAILS INTEL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#00d4ff;--accent2:#ff6b00;--accent3:#00ff88;--accent4:#ff3366;--warn:#ffcc00;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999;}
header{background:var(--bg2);border-bottom:2px solid var(--panel-border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1rem;color:var(--accent3);letter-spacing:3px;}
.logo span{color:var(--gold);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:320px;background:var(--bg2);border-right:1px solid var(--panel-border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
#map{flex:1;}
.search-box{padding:12px;border-bottom:1px solid var(--panel-border);}
.pm-input{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.72rem;padding:8px 12px;outline:none;width:100%;}
.pm-input:focus{border-color:var(--accent3);}
.btn{display:inline-block;padding:7px 16px;background:transparent;border:1px solid var(--accent3);color:var(--accent3);font-family:'Share Tech Mono',monospace;font-size:.68rem;cursor:pointer;letter-spacing:1px;transition:all .2s;width:100%;margin-top:6px;text-align:center;}
.btn:hover{background:var(--accent3);color:var(--bg);}
.btn.gold{border-color:var(--gold);color:var(--gold);}.btn.gold:hover{background:var(--gold);color:var(--bg);}
.trail-card{background:var(--bg3);border-bottom:1px solid var(--panel-border);padding:12px;cursor:pointer;transition:background .15s;}
.trail-card:hover{background:rgba(0,255,136,.05);}
.trail-card.active{border-left:3px solid var(--accent3);background:rgba(0,255,136,.06);}
.tc-name{font-size:.78rem;color:var(--text-bright);margin-bottom:4px;}
.tc-meta{font-size:.62rem;color:var(--text-dim);display:flex;gap:12px;flex-wrap:wrap;}
.tc-meta span{color:var(--text);}
.badge{display:inline-block;padding:1px 6px;font-size:.57rem;border-radius:2px;}
.be{background:rgba(0,255,136,.1);color:var(--accent3);border:1px solid var(--accent3);}
.bm{background:rgba(255,204,0,.1);color:var(--warn);border:1px solid var(--warn);}
.bh{background:rgba(255,51,102,.1);color:var(--accent4);border:1px solid var(--accent4);}
.detail-panel{padding:12px;border-bottom:1px solid var(--panel-border);}
.dp-title{font-family:'Orbitron',monospace;font-size:.7rem;color:var(--accent3);margin-bottom:10px;letter-spacing:2px;}
.dp-body{font-size:.7rem;line-height:1.7;color:var(--text);white-space:pre-wrap;}
.thinking{display:flex;gap:5px;padding:6px 0;}
.thinking span{width:6px;height:6px;background:var(--accent3);border-radius:50%;animation:th 1.2s infinite;}
.thinking span:nth-child(2){animation-delay:.2s;}.thinking span:nth-child(3){animation-delay:.4s;}
@keyframes th{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg3);} ::-webkit-scrollbar-thumb{background:var(--panel-border);}
</style></head><body>
<header>
  <div class="logo">TRAILS <span>INTEL</span></div>
  <div style="font-size:.65rem;color:var(--text-dim)">AI-Powered Trail Finder · Powered by Gemini</div>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="search-box">
      <input class="pm-input" id="locationInput" placeholder="Location: Las Vegas, NV...">
      <input class="pm-input" id="diffInput" placeholder="Difficulty: easy / moderate / hard" style="margin-top:6px">
      <input class="pm-input" id="distInput" placeholder="Max distance: 5 miles" style="margin-top:6px">
      <button class="btn" onclick="findTrails()">⛰ FIND TRAILS</button>
      <button class="btn gold" onclick="askTrailAI()">ASK GEMINI</button>
      <input class="pm-input" id="aiQ" placeholder="Ask about trails, safety, gear..." style="margin-top:6px">
    </div>
    <div id="trailList"><div style="padding:16px;color:var(--text-dim);font-size:.68rem">Enter a location to find trails.</div></div>
    <div class="detail-panel" id="trailDetail" style="display:none"></div>
  </div>
  <div id="map"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const map = L.map('map',{attributionControl:false}).setView([36.1,-115.2],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
let markers=[], selectedTrail=null;

async function findTrails(){
  const loc=document.getElementById('locationInput').value||'Las Vegas, NV';
  const diff=document.getElementById('diffInput').value||'any difficulty';
  const dist=document.getElementById('distInput').value||'any length';
  const key=localStorage.getItem('pm_gemini_key')||'';
  const el=document.getElementById('trailList');
  el.innerHTML='<div style="padding:12px"><div class="thinking"><span></span><span></span><span></span></div></div>';
  if(!key){el.innerHTML='<div style="padding:12px;color:var(--accent4);font-size:.68rem">⚠ No Gemini API key. Set one in Gemini Terminal.</div>';return;}
  try{
    const prompt=`List 6 hiking trails near ${loc} with ${diff} difficulty and max ${dist}. Return ONLY JSON array: [{name,distance_miles,elevation_gain_ft,difficulty,description,lat,lon,features}]. No markdown.`;
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1200}})
    });
    const data=await r.json();
    const text=(data.candidates?.[0]?.content?.parts?.[0]?.text||'[]').replace(/```json|```/g,'').trim();
    const trails=JSON.parse(text);
    renderTrails(trails,loc);
  }catch(e){el.innerHTML=`<div style="padding:12px;color:var(--accent4);font-size:.68rem">⚠ ${e.message}</div>`;}
}

async function askTrailAI(){
  const q=document.getElementById('aiQ').value.trim();
  if(!q)return;
  const key=localStorage.getItem('pm_gemini_key')||'';
  const el=document.getElementById('trailDetail');
  el.style.display='block';
  el.innerHTML='<div class="thinking"><span></span><span></span><span></span></div>';
  if(!key){el.innerHTML='<span style="color:var(--accent4)">No API key.</span>';return;}
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{role:'user',parts:[{text:'You are a hiking expert. '+q}]}],generationConfig:{maxOutputTokens:600}})
    });
    const data=await r.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'No response';
    el.innerHTML=`<div class="dp-title">// AI RESPONSE</div><div class="dp-body">${esc(text)}</div>`;
  }catch(e){el.innerHTML=`<span style="color:var(--accent4)">⚠ ${e.message}</span>`;}
}

function renderTrails(trails,loc){
  // Clear old markers
  markers.forEach(m=>map.removeLayer(m));markers=[];
  if(trails.length&&trails[0].lat){map.setView([trails[0].lat,trails[0].lon],13);}
  document.getElementById('trailList').innerHTML=trails.map((t,i)=>`
    <div class="trail-card" onclick="selectTrail(${i})" id="tc-${i}">
      <div class="tc-name">${esc(t.name)}</div>
      <div style="margin:4px 0">
        <span class="badge ${t.difficulty?.toLowerCase().includes('easy')?'be':t.difficulty?.toLowerCase().includes('hard')?'bh':'bm'}">${esc(t.difficulty||'?')}</span>
      </div>
      <div class="tc-meta">
        <div>📏 <span>${t.distance_miles||'?'} mi</span></div>
        <div>⛰ <span>${t.elevation_gain_ft||'?'} ft gain</span></div>
      </div>
    </div>`).join('');
  trails.forEach((t,i)=>{
    if(t.lat&&t.lon){
      const m=L.circleMarker([t.lat,t.lon],{radius:8,fillColor:'var(--accent3)',color:'#fff',fillOpacity:.9,weight:2})
        .addTo(map).bindPopup(`<b>${t.name}</b><br>${t.difficulty} · ${t.distance_miles}mi`);
      markers.push(m);
    }
  });
  window._trails=trails;
}

function selectTrail(i){
  const t=window._trails[i];if(!t)return;
  document.querySelectorAll('.trail-card').forEach(el=>el.classList.remove('active'));
  document.getElementById('tc-'+i).classList.add('active');
  const el=document.getElementById('trailDetail');el.style.display='block';
  el.innerHTML=`<div class="dp-title">${esc(t.name)}</div>
    <div class="dp-body">Distance: ${t.distance_miles} miles
Elevation: ${t.elevation_gain_ft} ft gain
Difficulty: ${t.difficulty}
Features: ${(t.features||[]).join(', ')||'N/A'}

${t.description||''}</div>`;
  if(t.lat&&t.lon){map.setView([t.lat,t.lon],15);markers[i]?.openPopup();}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body></html>
