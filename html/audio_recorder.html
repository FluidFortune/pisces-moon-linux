<!-- PISCES MOON OS // AUDIO RECORDER -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css"><link rel="stylesheet" href="pm_theme.css"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // RECORDER</title>
<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#4dd9ff;--accent2:#ff6b00;--accent3:#4dffa6;--accent4:#ff5577;--warn:#ffcc00;--gold:#ffd166;--text:#c8e6f5;--text-bright:#c8e8f5;--text-dim:#2a5870;--glow:0 0 20px rgba(77,217,255,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999;}
header{background:var(--bg2);border-bottom:2px solid var(--panel-border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.1rem;color:var(--accent4);text-shadow:0 0 20px rgba(255,85,119,.3);letter-spacing:3px;}
.logo span{color:var(--gold);}
.content{padding:20px;max-width:900px;margin:0 auto;flex:1;}
.panel{background:var(--panel);border:1px solid var(--panel-border);margin-bottom:16px;}
.ph{padding:10px 16px;border-bottom:1px solid var(--panel-border);font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:3px;display:flex;justify-content:space-between;align-items:center;}
.pb{padding:16px;}
.rec-center{display:flex;flex-direction:column;align-items:center;padding:30px;}
canvas{background:var(--bg3);border:1px solid var(--panel-border);display:block;margin-bottom:20px;}
.rec-btn{width:100px;height:100px;border-radius:50%;background:transparent;border:3px solid var(--accent4);color:var(--accent4);font-size:2.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;margin-bottom:16px;}
.rec-btn:hover{background:rgba(255,85,119,.1);box-shadow:0 0 20px rgba(255,85,119,.3);}
.rec-btn.recording{animation:recpulse 1s infinite;border-color:var(--accent4);background:rgba(255,85,119,.15);}
.rec-btn.paused{border-color:var(--warn);color:var(--warn);}
@keyframes recpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,85,119,.4)}50%{box-shadow:0 0 0 20px rgba(255,85,119,0)}}
.rec-timer{font-family:'Orbitron',monospace;font-size:2.5rem;color:var(--text-bright);letter-spacing:6px;margin-bottom:12px;}
.rec-timer.recording{color:var(--accent4);}
.rec-status{font-size:.72rem;color:var(--text-dim);letter-spacing:3px;font-family:'Orbitron',monospace;margin-bottom:20px;}
.ctrl-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{display:inline-block;padding:8px 20px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.68rem;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{background:var(--accent);color:var(--bg);}
.btn.red{border-color:var(--accent4);color:var(--accent4);}.btn.red:hover{background:var(--accent4);color:var(--bg);}
.btn.green{border-color:var(--accent3);color:var(--accent3);}.btn.green:hover{background:var(--accent3);color:var(--bg);}
.btn.gold{border-color:var(--gold);color:var(--gold);}.btn.gold:hover{background:var(--gold);color:var(--bg);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.rec-item{background:var(--bg2);border:1px solid var(--panel-border);padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.rec-item:hover{border-color:var(--accent4);}
.ri-name{flex:1;font-size:.75rem;color:var(--text-bright);}
.ri-meta{font-size:.62rem;color:var(--text-dim);}
.ri-controls{display:flex;gap:6px;}
.pm-input{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.72rem;padding:7px 12px;outline:none;}
.pm-input:focus{border-color:var(--accent4);}
.level-bar{width:300px;height:8px;background:var(--bg3);border:1px solid var(--panel-border);overflow:hidden;}
.level-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--warn),var(--accent4));transition:width .05s;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg3);} ::-webkit-scrollbar-thumb{background:var(--panel-border);}
</style></head><body>
<header>
  <div class="logo">PISCES MOON // <span>RECORDER</span></div>
  <div style="font-size:.65rem;color:var(--text-dim)">WebAudio API Recording</div>
</header>
<div class="content">
  <div class="panel">
    <div class="ph" style="color:var(--accent4)">RECORD</div>
    <div class="pb rec-center">
      <canvas id="waveCanvas" width="600" height="80"></canvas>
      <div class="level-bar" style="margin-bottom:12px"><div class="level-fill" id="levelFill" style="width:0%"></div></div>
      <div class="rec-timer" id="timer">00:00:00</div>
      <div class="rec-status" id="recStatus">READY</div>
      <button class="rec-btn" id="recBtn" onclick="toggleRecord()">⏺</button>
      <div class="ctrl-row">
        <button class="btn" id="pauseBtn" onclick="pauseRecord()" disabled>⏸ PAUSE</button>
        <button class="btn red" id="stopBtn" onclick="stopRecord()" disabled>⏹ STOP</button>
        <button class="btn green" id="saveBtn" onclick="saveRecording()" disabled>⬇ SAVE</button>
        <button class="btn" onclick="requestMic()">🎤 REQUEST MIC</button>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
        <input class="pm-input" id="recName" placeholder="recording name..." style="width:220px">
        <select style="background:var(--bg3);border:1px solid var(--panel-border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.65rem;padding:6px 8px;outline:none" id="fmtSel">
          <option value="audio/webm">WebM (default)</option>
          <option value="audio/ogg">OGG</option>
          <option value="audio/mp4">MP4</option>
        </select>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="ph" style="color:var(--accent4)">RECORDINGS <span id="recCount" style="color:var(--text-dim)">0</span></div>
    <div class="pb" id="recList">
      <div style="color:var(--text-dim);font-size:.7rem;text-align:center;padding:12px">No recordings yet.</div>
    </div>
  </div>
</div>
<script>
let mediaRecorder = null, stream = null, chunks = [];
let recording = false, paused = false;
let startTime, elapsedMs = 0, timerInterval = null;
let recordings = [];
let audioCtx = null, analyser = null, levelInterval = null;
const canvas = document.getElementById('waveCanvas');
const ctx = canvas.getContext('2d');

async function requestMic() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
    setupAnalyser();
    document.getElementById('recStatus').textContent = 'MIC READY';
    document.getElementById('recStatus').style.color = 'var(--accent3)';
  } catch(e) {
    document.getElementById('recStatus').textContent = 'MIC ERROR: '+e.message;
    document.getElementById('recStatus').style.color = 'var(--accent4)';
  }
}

function setupAnalyser() {
  audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  drawWave();
}

function drawWave() {
  if (!analyser) return;
  requestAnimationFrame(drawWave);
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(buf);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#0c1620';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = recording ? 'var(--accent4)' : 'var(--accent)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const sliceWidth = canvas.width/buf.length;
  let x=0;
  buf.forEach((v,i) => {
    const y = (v/128)*canvas.height/2;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    x += sliceWidth;
  });
  ctx.stroke();
  // Level meter
  let sum=0; buf.forEach(v=>sum+=Math.abs(v-128));
  const level=Math.min(100,(sum/buf.length/128)*200);
  document.getElementById('levelFill').style.width=level+'%';
}

async function toggleRecord() {
  if (!stream) { await requestMic(); if (!stream) return; }
  if (recording) { stopRecord(); return; }
  const fmt = document.getElementById('fmtSel').value;
  const mimeType = MediaRecorder.isTypeSupported(fmt) ? fmt : 'audio/webm';
  mediaRecorder = new MediaRecorder(stream, {mimeType});
  chunks = [];
  mediaRecorder.ondataavailable = e => { if(e.data.size>0)chunks.push(e.data); };
  mediaRecorder.start(100);
  recording = true; paused = false;
  startTime = Date.now() - elapsedMs;
  timerInterval = setInterval(tickTimer, 100);
  document.getElementById('recBtn').className = 'rec-btn recording';
  document.getElementById('recBtn').textContent = '⏹';
  document.getElementById('recStatus').textContent = 'RECORDING';
  document.getElementById('recStatus').style.color = 'var(--accent4)';
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('pauseBtn').disabled = false;
  document.getElementById('saveBtn').disabled = true;
}

function pauseRecord() {
  if (!recording) return;
  if (!paused) {
    mediaRecorder.pause();
    elapsedMs = Date.now() - startTime;
    clearInterval(timerInterval);
    paused = true;
    document.getElementById('pauseBtn').textContent = '▶ RESUME';
    document.getElementById('recStatus').textContent = 'PAUSED';
    document.getElementById('recStatus').style.color = 'var(--warn)';
  } else {
    mediaRecorder.resume();
    startTime = Date.now() - elapsedMs;
    timerInterval = setInterval(tickTimer, 100);
    paused = false;
    document.getElementById('pauseBtn').textContent = '⏸ PAUSE';
    document.getElementById('recStatus').textContent = 'RECORDING';
    document.getElementById('recStatus').style.color = 'var(--accent4)';
  }
}

function stopRecord() {
  if (!recording) return;
  mediaRecorder.stop();
  clearInterval(timerInterval);
  recording = false; paused = false;
  elapsedMs = Date.now() - startTime;
  document.getElementById('recBtn').className = 'rec-btn';
  document.getElementById('recBtn').textContent = '⏺';
  document.getElementById('recStatus').textContent = 'STOPPED — Ready to save';
  document.getElementById('recStatus').style.color = 'var(--accent3)';
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('saveBtn').disabled = false;
  // Wait for last ondataavailable
  setTimeout(() => {
    const blob = new Blob(chunks, {type: mediaRecorder.mimeType});
    window._lastBlob = blob;
    addRecording(blob);
  }, 300);
}

function addRecording(blob) {
  const name = document.getElementById('recName').value || 'rec_'+Date.now();
  const url = URL.createObjectURL(blob);
  const dur = elapsedMs;
  recordings.unshift({name, url, blob, size:blob.size, dur, ts:Date.now()});
  renderRecordings();
  document.getElementById('recName').value='';
  elapsedMs = 0;
  document.getElementById('timer').textContent='00:00:00';
}

function tickTimer() {
  const elapsed = Date.now() - startTime;
  const h = Math.floor(elapsed/3600000), m=Math.floor((elapsed%3600000)/60000), s=Math.floor((elapsed%60000)/1000);
  document.getElementById('timer').textContent=[h,m,s].map(n=>String(n).padStart(2,'0')).join(':');
  document.getElementById('timer').className='rec-timer '+(recording&&!paused?'recording':'');
}

function renderRecordings() {
  document.getElementById('recCount').textContent = recordings.length;
  if (!recordings.length) { document.getElementById('recList').innerHTML='<div style="color:var(--text-dim);font-size:.7rem;text-align:center;padding:12px">No recordings yet.</div>'; return; }
  document.getElementById('recList').innerHTML = recordings.map((r,i)=>`
    <div class="rec-item">
      <div>🎙</div>
      <div style="flex:1">
        <div class="ri-name">${esc(r.name)}</div>
        <div class="ri-meta">${fmtDur(r.dur)} · ${(r.size/1e6).toFixed(2)} MB · ${new Date(r.ts).toLocaleTimeString()}</div>
        <audio controls src="${r.url}" style="height:28px;margin-top:6px;width:100%;max-width:300px;filter:invert(.8)"></audio>
      </div>
      <div class="ri-controls">
        <button class="btn green" style="padding:4px 10px;font-size:.6rem" onclick="downloadRec(${i})">⬇</button>
        <button class="btn red" style="padding:4px 10px;font-size:.6rem" onclick="deleteRec(${i})">✕</button>
      </div>
    </div>`).join('');
}

function downloadRec(i) {
  const r=recordings[i];
  const ext=r.blob.type.includes('ogg')?'ogg':r.blob.type.includes('mp4')?'m4a':'webm';
  const a=document.createElement('a');a.href=r.url;a.download=r.name+'.'+ext;a.click();
}
function deleteRec(i) { if(confirm('Delete?')){URL.revokeObjectURL(recordings[i].url);recordings.splice(i,1);renderRecordings();} }
function saveRecording() { if(recordings.length)downloadRec(0); }
function fmtDur(ms){const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);return m+':'+String(s).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script></body></html>
