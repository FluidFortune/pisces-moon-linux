<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css"><link rel="stylesheet" href="pm_theme.css"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // HASH</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.ht-layout{max-width:800px;margin:0 auto;padding:20px;}
.ht-input{width:100%;background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:Share\ Tech\ Mono,monospace;font-size:.72rem;padding:12px;outline:none;margin-bottom:10px;min-height:100px;resize:vertical;}
.ht-input:focus{border-color:var(--accent);}
.hash-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:10px 12px;background:var(--bg2);border:1px solid var(--panel-border);}
.hash-algo{font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:2px;color:var(--gold);min-width:80px;}
.hash-value{flex:1;font-family:Share\ Tech\ Mono,monospace;font-size:.62rem;color:var(--accent3);word-break:break-all;}
.hash-copy{padding:4px 10px;background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);font-family:Share\ Tech\ Mono,monospace;font-size:.55rem;cursor:pointer;transition:all .15s;flex-shrink:0;}
.hash-copy:hover{border-color:var(--accent3);color:var(--accent3);}
.compare-result{padding:12px;margin-top:10px;border:1px solid;font-family:Orbitron,monospace;font-size:.65rem;letter-spacing:2px;text-align:center;}
.compare-result.match{border-color:var(--accent3);color:var(--accent3);background:rgba(77,255,166,.05);}
.compare-result.no-match{border-color:var(--accent4);color:var(--accent4);background:rgba(255,85,119,.05);}
.tab{display:inline-block;padding:7px 16px;background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);font-family:Orbitron,monospace;font-size:.55rem;cursor:pointer;letter-spacing:2px;transition:all .15s;margin-right:4px;}
.tab.active{border-color:var(--accent);color:var(--accent);}
</style>
</head><body>
<header class="pm-header">
  <div class="pm-logo">🔐 <em>HASH</em> TOOL</div>
  <div class="pm-hdr-right">
    <button class="pm-refresh" onclick="loadFile()">📂 FILE</button>
    <input type="file" id="fileIn" style="display:none" onchange="hashFile(this)">
  </div>
</header>
<div class="ht-layout">
  <div style="margin-bottom:12px">
    <div class="tab active" onclick="setMode('text')">TEXT</div>
    <div class="tab" onclick="setMode('compare')">COMPARE</div>
    <div class="tab" onclick="setMode('hmac')">HMAC</div>
  </div>
  <div id="modeText">
    <textarea class="ht-input" id="inputText" placeholder="Enter text to hash..." oninput="hashText()"></textarea>
    <div id="hashResults"></div>
  </div>
  <div id="modeCompare" style="display:none">
    <input class="ht-input" id="cmp1" placeholder="Hash value 1" style="min-height:auto;height:44px;margin-bottom:8px">
    <input class="ht-input" id="cmp2" placeholder="Hash value 2" style="min-height:auto;height:44px;margin-bottom:8px">
    <button class="pm-refresh" onclick="compareHashes()">COMPARE</button>
    <div id="cmpResult"></div>
  </div>
  <div id="modeHMAC" style="display:none">
    <textarea class="ht-input" id="hmacData" placeholder="Data..." oninput="hmacHash()"></textarea>
    <input class="ht-input" id="hmacKey" placeholder="HMAC Key" style="min-height:auto;height:44px;margin-bottom:8px" oninput="hmacHash()">
    <div id="hmacResults"></div>
  </div>
</div>
<script>
let mode="text";
function setMode(m){mode=m;["text","compare","hmac"].forEach(v=>{document.getElementById("mode"+v.charAt(0).toUpperCase()+v.slice(1)).style.display=m===v?"block":"none";document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["text","compare","hmac"][i]===m));});}

async function hashText(){
  const text=document.getElementById("inputText").value;
  if(!text){document.getElementById("hashResults").innerHTML="";return;}
  const algos=["SHA-1","SHA-256","SHA-384","SHA-512"];
  const encoder=new TextEncoder();
  const data=encoder.encode(text);
  const results=await Promise.all(algos.map(async a=>{const buf=await crypto.subtle.digest(a,data);return{algo:a,hash:Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("")};}));
  // Also MD5 (manual implementation — simplified)
  results.unshift({algo:"MD5",hash:md5(text)});
  document.getElementById("hashResults").innerHTML=results.map(r=>`
    <div class="hash-row">
      <div class="hash-algo">${r.algo}</div>
      <div class="hash-value">${r.hash}</div>
      <button class="hash-copy" onclick="navigator.clipboard.writeText('${r.hash}').then(()=>{this.textContent='COPIED';setTimeout(()=>this.textContent='COPY',1000)})">COPY</button>
    </div>`).join("");
}

async function hashFile(input){
  const file=input.files[0];if(!file)return;
  const buf=await file.arrayBuffer();
  const algos=["SHA-1","SHA-256","SHA-384","SHA-512"];
  const results=await Promise.all(algos.map(async a=>{const hash=await crypto.subtle.digest(a,buf);return{algo:a,hash:Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("")};}));
  document.getElementById("inputText").value=`[File: ${file.name} (${(file.size/1024).toFixed(1)}KB)]`;
  document.getElementById("hashResults").innerHTML=results.map(r=>`
    <div class="hash-row">
      <div class="hash-algo">${r.algo}</div>
      <div class="hash-value">${r.hash}</div>
      <button class="hash-copy" onclick="navigator.clipboard.writeText('${r.hash}').then(()=>{this.textContent='COPIED';setTimeout(()=>this.textContent='COPY',1000)})">COPY</button>
    </div>`).join("");
}

function compareHashes(){
  const a=document.getElementById("cmp1").value.trim().toLowerCase();
  const b=document.getElementById("cmp2").value.trim().toLowerCase();
  if(!a||!b){alert("Enter both hashes");return;}
  const match=a===b;
  document.getElementById("cmpResult").innerHTML=`<div class="compare-result ${match?"match":"no-match"}">${match?"✓ HASHES MATCH":"✗ HASHES DO NOT MATCH"}</div>`;
}

async function hmacHash(){
  const data=document.getElementById("hmacData").value;
  const key=document.getElementById("hmacKey").value;
  if(!data||!key){document.getElementById("hmacResults").innerHTML="";return;}
  const enc=new TextEncoder();
  const k=await crypto.subtle.importKey("raw",enc.encode(key),{name:"HMAC",hash:"SHA-256"},false,["sign"]);
  const sig=await crypto.subtle.sign("HMAC",k,enc.encode(data));
  const hash=Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,"0")).join("");
  document.getElementById("hmacResults").innerHTML=`<div class="hash-row"><div class="hash-algo">HMAC-SHA256</div><div class="hash-value">${hash}</div><button class="hash-copy" onclick="navigator.clipboard.writeText('${hash}')">COPY</button></div>`;
}

function loadFile(){document.getElementById("fileIn").click();}

// Simple MD5 implementation
function md5(s){function r(q,a,b,x,s,t){q=add(add(a,q),add(x,t));return add(q<<s|q>>>32-s,b);}function ff(a,b,c,d,x,s,t){return r(b&c|~b&d,a,b,x,s,t);}function gg(a,b,c,d,x,s,t){return r(b&d|c&~d,a,b,x,s,t);}function hh(a,b,c,d,x,s,t){return r(b^c^d,a,b,x,s,t);}function ii(a,b,c,d,x,s,t){return r(c^(b|~d),a,b,x,s,t);}function add(x,y){const l=(x&0xFFFF)+(y&0xFFFF);return((x>>16)+(y>>16)+(l>>16)<<16)|l&0xFFFF;}
const bytes=[];for(let i=0;i<s.length;i++){const c=s.charCodeAt(i);if(c<128)bytes.push(c);else if(c<2048){bytes.push(192|c>>6,128|c&63);}else{bytes.push(224|c>>12,128|c>>6&63,128|c&63);}}
const len=bytes.length*8;bytes.push(128);while(bytes.length%64!==56)bytes.push(0);bytes.push(len&0xFF,len>>8&0xFF,len>>16&0xFF,len>>24&0xFF,0,0,0,0);
let a=0x67452301,b=0xEFCDAB89,c=0x98BADCFE,d=0x10325476;
for(let i=0;i<bytes.length;i+=64){const M=[];for(let j=0;j<16;j++)M[j]=bytes[i+j*4]|bytes[i+j*4+1]<<8|bytes[i+j*4+2]<<16|bytes[i+j*4+3]<<24;let[A,B,C,D]=[a,b,c,d];
A=ff(A,B,C,D,M[0],7,-680876936);D=ff(D,A,B,C,M[1],12,-389564586);C=ff(C,D,A,B,M[2],17,606105819);B=ff(B,C,D,A,M[3],22,-1044525330);
a=add(A,a);b=add(B,b);c=add(C,c);d=add(D,d);}
return[a,b,c,d].map(v=>[v&0xFF,v>>8&0xFF,v>>16&0xFF,v>>24&0xFF].map(b=>b.toString(16).padStart(2,"0")).join("")).join("");}
</script></body></html>
