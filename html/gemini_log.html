<!-- PISCES MOON OS // GEMINI LOG -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // GEMINI LOG</title>
<style>
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#00d4ff;--accent2:#ff6b00;--accent3:#00ff88;--accent4:#ff3366;--warn:#ffcc00;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;--glow:0 0 20px rgba(0,212,255,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999;}
header{background:var(--bg2);border-bottom:2px solid var(--panel-border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1rem;color:var(--accent);text-shadow:var(--glow);letter-spacing:3px;}
.logo span{color:var(--gold);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--panel-border);display:flex;flex-direction:column;flex-shrink:0;}
.sh{padding:8px 14px;border-bottom:1px solid var(--panel-border);font-family:'Orbitron',monospace;font-size:.56rem;color:var(--accent);letter-spacing:2px;}
.search-box{padding:8px;border-bottom:1px solid var(--panel-border);}
.pm-input{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:7px 10px;outline:none;width:100%;}
.pm-input:focus{border-color:var(--accent);}
.slist{flex:1;overflow-y:auto;}
.si{padding:9px 14px;cursor:pointer;border-bottom:1px solid rgba(26,58,80,.3);transition:background .15s;}
.si:hover{background:rgba(0,212,255,.05);}
.si.active{background:rgba(0,212,255,.08);border-left:2px solid var(--accent);}
.si-title{font-size:.7rem;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-meta{font-size:.58rem;color:var(--text-dim);margin-top:2px;display:flex;gap:8px;}
.stats-bar{padding:10px 14px;border-top:1px solid var(--panel-border);display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:.6rem;}
.stat{color:var(--text-dim);}
.stat span{color:var(--text-bright);display:block;font-family:'Orbitron',monospace;font-size:.8rem;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:8px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.btn{display:inline-block;padding:5px 12px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.62rem;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{background:var(--accent);color:var(--bg);}
.btn.sm{padding:3px 8px;font-size:.58rem;}
.btn.gold{border-color:var(--gold);color:var(--gold);}.btn.gold:hover{background:var(--gold);color:var(--bg);}
.btn.red{border-color:var(--accent4);color:var(--accent4);}.btn.red:hover{background:var(--accent4);color:var(--bg);}
.session-view{flex:1;overflow-y:auto;padding:16px;}
.session-title{font-family:'Orbitron',monospace;font-size:.9rem;color:var(--gold);letter-spacing:2px;margin-bottom:4px;}
.session-meta{font-size:.62rem;color:var(--text-dim);margin-bottom:16px;display:flex;gap:12px;}
.msg{margin-bottom:14px;}
.msg-role{font-size:.58rem;color:var(--text-dim);letter-spacing:2px;font-family:'Orbitron',monospace;margin-bottom:3px;}
.msg.user .msg-role{color:var(--gold);}
.msg.assistant .msg-role{color:var(--accent);}
.msg-body{padding:10px 14px;font-size:.73rem;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
.msg.user .msg-body{background:rgba(244,168,32,.07);border:1px solid rgba(244,168,32,.2);}
.msg.assistant .msg-body{background:var(--panel);border:1px solid var(--panel-border);}
.empty{color:var(--text-dim);text-align:center;padding:48px;font-size:.72rem;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg3);} ::-webkit-scrollbar-thumb{background:var(--panel-border);}
</style></head><body>
<header>
  <div class="logo">PISCES MOON // <span>GEMINI LOG</span></div>
  <div style="font-size:.65rem;color:var(--text-dim)">Session Archive Browser</div>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="sh">SESSION ARCHIVE</div>
    <div class="search-box">
      <input class="pm-input" id="searchInput" placeholder="search sessions..." oninput="renderList()">
    </div>
    <div class="slist" id="sesslist"></div>
    <div class="stats-bar">
      <div class="stat">SESSIONS<span id="stSess">0</span></div>
      <div class="stat">MESSAGES<span id="stMsgs">0</span></div>
    </div>
  </div>
  <div class="main">
    <div class="toolbar">
      <button class="btn sm gold" onclick="exportCurrent()">EXPORT TXT</button>
      <button class="btn sm" onclick="exportAllJSON()">EXPORT ALL JSON</button>
      <button class="btn sm red" onclick="deleteCurrent()">DELETE</button>
      <span id="sessInfo" style="font-size:.6rem;color:var(--text-dim);margin-left:8px"></span>
    </div>
    <div class="session-view" id="sessionView">
      <div class="empty">
        <div style="font-family:'Orbitron',monospace;font-size:1.4rem;color:var(--accent);margin-bottom:12px">☽</div>
        <div style="font-family:'Orbitron',monospace;font-size:.7rem;color:var(--gold);letter-spacing:3px;margin-bottom:16px">GEMINI LOG</div>
        Select a session from the sidebar to view.<br>Sessions are loaded from Gemini Terminal localStorage.
      </div>
    </div>
  </div>
</div>
<script>
const SK = 'pm_sessions';
let sessions = {}, activeId = null;

function init() {
  try { sessions = JSON.parse(localStorage.getItem(SK)||'{}'); } catch { sessions = {}; }
  const total = Object.values(sessions).reduce((n,s)=>n+s.msgs.length,0);
  document.getElementById('stSess').textContent = Object.keys(sessions).length;
  document.getElementById('stMsgs').textContent = total;
  renderList();
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let all = Object.values(sessions).sort((a,b)=>b.updated-a.updated);
  if (q) all = all.filter(s => (s.title+s.msgs.map(m=>m.content).join(' ')).toLowerCase().includes(q));
  document.getElementById('sesslist').innerHTML = all.map(s => `
    <div class="si ${s.id===activeId?'active':''}" onclick="viewSession('${s.id}')">
      <div class="si-title">${esc(s.title)}</div>
      <div class="si-meta">
        <span>${s.msgs.length} msgs</span>
        <span>${new Date(s.updated).toLocaleDateString()}</span>
        <span>${s.model||''}</span>
      </div>
    </div>`).join('') || '<div style="padding:12px;color:var(--text-dim);font-size:.65rem">No sessions found.</div>';
}

function viewSession(id) {
  activeId = id;
  const s = sessions[id];
  if (!s) return;
  renderList();
  const chars = s.msgs.reduce((n,m)=>n+m.content.length,0);
  document.getElementById('sessInfo').textContent = `${s.msgs.length} msgs · ~${Math.round(chars/4)} tokens · ${s.model||'?'}`;
  document.getElementById('sessionView').innerHTML = `
    <div class="session-title">${esc(s.title)}</div>
    <div class="session-meta">
      <span>${new Date(s.created).toLocaleString()}</span>
      <span>Model: ${s.model||'?'}</span>
      <span>${s.msgs.length} messages</span>
    </div>
    ${s.msgs.map(m=>`
      <div class="msg ${m.role==='user'?'user':'assistant'}">
        <div class="msg-role">${m.role==='user'?'// YOU':'// GEMINI'}</div>
        <div class="msg-body">${esc(m.content)}</div>
      </div>`).join('')}`;
}

function exportCurrent() {
  const s = sessions[activeId]; if (!s) return;
  const txt = `PISCES MOON // GEMINI SESSION LOG
${s.title}
Model: ${s.model} | ${new Date(s.created).toLocaleString()}
${'='.repeat(60)}

` +
    s.msgs.map(m=>`[${m.role.toUpperCase()}]
${m.content}`).join('

---

');
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([txt]));
  a.download = `session_${s.id}.txt`; a.click();
}

function exportAllJSON() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(sessions,null,2)],{type:'application/json'}));
  a.download = 'gemini_all_sessions.json'; a.click();
}

function deleteCurrent() {
  if (!activeId || !confirm('Delete this session?')) return;
  delete sessions[activeId]; activeId = null;
  localStorage.setItem(SK, JSON.stringify(sessions));
  init();
  document.getElementById('sessionView').innerHTML = '<div class="empty">Session deleted.</div>';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script></body></html>
