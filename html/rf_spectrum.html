<html lang="en"><head><meta charset="UTF-8">

<title>PISCES MOON // RF SPECTRUM</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
.rf-layout { display:grid; grid-template-rows:auto 1fr auto; height:calc(100vh - 52px); overflow:hidden; }
.rf-stats { display:flex; border-bottom:1px solid var(--panel-border); background:var(--bg2); }
.rf-stat { flex:1; padding:10px 14px; border-right:1px solid var(--panel-border); text-align:center; }
.rf-stat:last-child { border-right:none; }
.rf-stat-label { font-family:Orbitron,monospace; font-size:.48rem; letter-spacing:2px; color:var(--text-dim); }
.rf-stat-value { font-family:Orbitron,monospace; font-size:1.1rem; color:var(--text-bright); font-weight:700; }
.rf-main { display:grid; grid-template-columns:1fr 280px; overflow:hidden; }
.rf-canvas-col { display:flex; flex-direction:column; overflow:hidden; position:relative; }
.rf-controls { padding:8px 12px; background:var(--bg2); border-bottom:1px solid var(--panel-border); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.rf-btn { padding:5px 12px; background:transparent; border:1px solid var(--panel-border); color:var(--text-dim); font-family:Share\ Tech\ Mono,monospace; font-size:.6rem; cursor:pointer; transition:all .15s; }
.rf-btn:hover { border-color:var(--accent); color:var(--accent); }
.rf-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,212,255,.1); }
.rf-btn.danger { border-color:var(--accent4); color:var(--accent4); }
.rf-label { font-family:Orbitron,monospace; font-size:.5rem; letter-spacing:2px; color:var(--gold); white-space:nowrap; }
select.rf-select { background:var(--bg3); border:1px solid var(--panel-border); color:var(--text); font-family:Share\ Tech\ Mono,monospace; font-size:.6rem; padding:4px 8px; }
.rf-waterfall-wrap { flex:1; position:relative; overflow:hidden; }
#rf-waterfall { position:absolute; inset:0; width:100%; height:100%; }
.rf-spectrum-wrap { height:160px; border-top:1px solid var(--panel-border); position:relative; }
#rf-spectrum { width:100%; height:100%; }
.rf-sidebar { border-left:1px solid var(--panel-border); overflow-y:auto; display:flex; flex-direction:column; }
.rf-anomaly { padding:10px 12px; border-bottom:1px solid rgba(28,46,58,.4); }
.rf-anomaly-type { font-family:Orbitron,monospace; font-size:.52rem; letter-spacing:1px; color:var(--accent4); }
.rf-anomaly-detail { font-size:.62rem; color:var(--text); margin-top:3px; }
.rf-channel-grid { padding:8px; display:grid; grid-template-columns:repeat(7, 1fr); gap:3px; }
.rf-ch { padding:4px 2px; text-align:center; font-family:Orbitron,monospace; font-size:.55rem; border:1px solid var(--panel-border); cursor:default; transition:all .2s; }
.rf-ch.active { border-color:var(--accent); color:var(--accent); background:rgba(0,212,255,.1); }
.rf-ch.congested { border-color:var(--accent4); color:var(--accent4); background:rgba(255,51,102,.1); }
.rf-bottom { border-top:1px solid var(--panel-border); background:var(--bg2); display:flex; align-items:center; gap:16px; padding:6px 14px; }
.rf-freq-label { font-family:Orbitron,monospace; font-size:.6rem; color:var(--gold); }
</style>
</head><body>

<header class="pm-header">
    <div class="pm-logo">📻 <em>RF</em> SPECTRUM</div>
    <div class="pm-hdr-right">
        <div class="pm-live-badge" id="liveBadge" style="opacity:.3">
            <div class="pm-live-dot"></div>SWEEPING
        </div>
        <span class="pm-last-update" id="lastUpdate"></span>
    </div>
</header>

<div class="rf-layout">
    <div class="rf-stats">
        <div class="rf-stat"><div class="rf-stat-label">PEAK FREQ</div><div class="rf-stat-value" id="statPeakFreq">—</div></div>
        <div class="rf-stat"><div class="rf-stat-label">PEAK RSSI</div><div class="rf-stat-value" id="statPeakRSSI">—</div></div>
        <div class="rf-stat"><div class="rf-stat-label">NOISE FLOOR</div><div class="rf-stat-value" id="statNoise">—</div></div>
        <div class="rf-stat"><div class="rf-stat-label">ANOMALIES</div><div class="rf-stat-value" style="color:var(--accent4)" id="statAnomalies">0</div></div>
        <div class="rf-stat"><div class="rf-stat-label">SWEEP RATE</div><div class="rf-stat-value" id="statSweep">—</div></div>
        <div class="rf-stat"><div class="rf-stat-label">BAND</div><div class="rf-stat-value" id="statBand">2.4GHz</div></div>
    </div>

    <div class="rf-main">
        <div class="rf-canvas-col">
            <div class="rf-controls">
                <span class="rf-label">BAND:</span>
                <select class="rf-select" id="bandSelect" onchange="setBand(this.value)">
                    <option value="2.4">2.4 GHz (WiFi)</option>
                    <option value="5">5 GHz (WiFi)</option>
                    <option value="915">915 MHz (LoRa)</option>
                    <option value="868">868 MHz (LoRa EU)</option>
                    <option value="433">433 MHz (ISM)</option>
                </select>
                <span class="rf-label">VIEW:</span>
                <button class="rf-btn active" id="btnWaterfall" onclick="setView('waterfall')">WATERFALL</button>
                <button class="rf-btn" id="btnSpectrum" onclick="setView('spectrum')">SPECTRUM</button>
                <button class="rf-btn" id="btnBoth" onclick="setView('both')">BOTH</button>
                <button class="rf-btn active" id="btnPeakHold" onclick="togglePeakHold()">PEAK HOLD</button>
                <button class="rf-btn" id="btnOverlay" onclick="toggleChannelOverlay()">CH OVERLAY</button>
                <button class="rf-btn" onclick="saveSnapshot()">💾 SNAP</button>
                <button class="rf-btn danger" onclick="clearPeakHold()">CLR PEAK</button>
            </div>
            <div class="rf-waterfall-wrap" id="waterfallWrap">
                <canvas id="rf-waterfall"></canvas>
            </div>
            <div class="rf-spectrum-wrap" id="spectrumWrap">
                <canvas id="rf-spectrum"></canvas>
            </div>
        </div>

        <div class="rf-sidebar">
            <div class="pm-sh">WIFI CHANNELS</div>
            <div class="rf-channel-grid" id="channelGrid"></div>

            <div class="pm-sh">ANOMALY LOG <span class="pm-sh-sub" id="anomalyCount"></span></div>
            <div id="anomalyList">
                <div style="padding:14px;text-align:center;color:var(--text-dim);font-size:.65rem">Monitoring...</div>
            </div>
        </div>
    </div>

    <div class="rf-bottom">
        <span class="rf-freq-label" id="freqStart">2400 MHz</span>
        <div style="flex:1;height:2px;background:linear-gradient(to right,var(--accent4),var(--gold),var(--accent3))"></div>
        <span class="rf-freq-label" id="freqEnd">2484 MHz</span>
        <span style="font-size:.6rem;color:var(--text-dim);margin-left:16px" id="cursorFreq"></span>
    </div>
</div>

<script src="pm_scraper.js"></script>
<script src="pm_viz.js"></script>
<script src="pm_transport.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// RF SPECTRUM ANALYZER
// High bandwidth — USB/WebSocket transport only.
// Receives RF_SWEEP messages from T-Beam SX1262 scan.
// ═══════════════════════════════════════════════════════════════════

// Band definitions
const BANDS = {
    '2.4':  { start: 2400, end: 2484, channels: 14, chStart: 2412, chStep: 5,  label: '2.4GHz WiFi' },
    '5':    { start: 5170, end: 5825, channels: 24, chStart: 5180, chStep: 20, label: '5GHz WiFi' },
    '915':  { start: 902,  end: 928,  channels: 0,  label: '915MHz ISM/LoRa' },
    '868':  { start: 863,  end: 870,  channels: 0,  label: '868MHz LoRa EU' },
    '433':  { start: 433,  end: 435,  channels: 0,  label: '433MHz ISM' },
};

let currentBand   = BANDS['2.4'];
let sweepData     = [];           // current sweep: array of {freq, rssi}
let peakHold      = [];           // peak RSSI per freq bin
let waterfallRows = [];           // history of sweeps
let viewMode      = 'both';
let peakHoldOn    = true;
let channelOverlay= false;
let anomalies     = [];
let sweepCount    = 0;
let lastSweepTime = Date.now();
let noiseFloor    = -100;

// Canvas contexts
let wfCanvas, wfCtx, spCanvas, spCtx;

function initCanvases() {
    wfCanvas = document.getElementById('rf-waterfall');
    spCanvas = document.getElementById('rf-spectrum');
    wfCtx    = wfCanvas.getContext('2d');
    spCtx    = spCanvas.getContext('2d');
    resizeCanvases();
    renderChannelGrid();
}

function resizeCanvases() {
    const wrap = document.getElementById('waterfallWrap');
    wfCanvas.width  = wrap.offsetWidth;
    wfCanvas.height = wrap.offsetHeight;
    spCanvas.width  = document.getElementById('spectrumWrap').offsetWidth;
    spCanvas.height = 160;
    // Init peak hold array to match sweep bins
    if (sweepData.length > 0) {
        peakHold = new Array(sweepData.length).fill(-120);
    }
}

// ── Transport ─────────────────────────────────────────────────────
const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s) => {
        document.getElementById('liveBadge').style.opacity = s.state==='connected'?'1':'0.3';
        document.getElementById('lastUpdate').textContent = s.message;
    }
});

function handleData(msg) {
    if (msg.type === 'RF_SWEEP') {
        processSweep(msg.data || []);
    } else if (msg.type === 'RF_SAMPLE') {
        // Single frequency sample
        processSample(msg.freq_mhz, msg.rssi);
    }
}

// ── Sweep processing ──────────────────────────────────────────────
function processSweep(data) {
    // data = [{freq, rssi}, ...] sorted by freq
    sweepData = data;
    sweepCount++;

    // Update peak hold
    if (peakHold.length !== data.length) {
        peakHold = new Array(data.length).fill(-120);
    }
    data.forEach((d, i) => {
        if (d.rssi > peakHold[i]) peakHold[i] = d.rssi;
    });

    // Calculate noise floor (median of bottom 20%)
    const sorted = [...data].sort((a,b)=>a.rssi-b.rssi);
    const n20    = Math.floor(sorted.length * 0.2);
    noiseFloor   = sorted.slice(0, n20).reduce((s,d) => s+d.rssi, 0) / (n20 || 1);

    // Update waterfall
    waterfallRows.push(data.map(d => d.rssi));
    const maxRows = Math.floor((wfCanvas.height || 300) / 2);
    if (waterfallRows.length > maxRows) waterfallRows.shift();

    // Detect anomalies
    detectAnomalies(data);

    // Update stats
    const peak = data.reduce((b,d) => d.rssi > b.rssi ? d : b, {freq:0, rssi:-120});
    const elapsed = (Date.now() - lastSweepTime) / 1000;
    lastSweepTime = Date.now();

    document.getElementById('statPeakFreq').textContent  = `${peak.freq}MHz`;
    document.getElementById('statPeakRSSI').textContent  = `${peak.rssi}dBm`;
    document.getElementById('statNoise').textContent     = `${Math.round(noiseFloor)}dBm`;
    document.getElementById('statAnomalies').textContent = anomalies.length;
    document.getElementById('statSweep').textContent     = `${(1/elapsed).toFixed(1)}/s`;

    drawWaterfall();
    drawSpectrum();
    updateChannelGrid();
}

function processSample(freq, rssi) {
    // Single sample — find bin and update
    const bin = sweepData.findIndex(d => Math.abs(d.freq - freq) < 0.5);
    if (bin >= 0) {
        sweepData[bin].rssi = rssi;
    } else {
        sweepData.push({freq, rssi});
        sweepData.sort((a,b) => a.freq - b.freq);
    }
    drawSpectrum();
}

// ── Waterfall ─────────────────────────────────────────────────────
function drawWaterfall() {
    const w   = wfCanvas.width;
    const h   = wfCanvas.height;
    const ctx = wfCtx;
    const n   = sweepData.length;
    if (n === 0) return;

    ctx.fillStyle = PMViz.C.bg;
    ctx.fillRect(0, 0, w, h);

    const rowH  = Math.max(1, h / Math.max(waterfallRows.length, 1));
    const binW  = w / n;

    waterfallRows.forEach((row, ri) => {
        row.forEach((rssi, bi) => {
            const norm = Math.max(0, Math.min(1, (rssi - noiseFloor) / 60));
            const hue  = 240 - norm * 240; // blue→red
            ctx.fillStyle = `hsl(${hue}, 100%, ${20 + norm * 50}%)`;
            ctx.fillRect(bi * binW, ri * rowH, binW + 0.5, rowH + 0.5);
        });
    });

    // Channel overlay
    if (channelOverlay && currentBand.channels > 0) {
        drawChannelOverlay(ctx, w, h);
    }
}

// ── Spectrum display ──────────────────────────────────────────────
function drawSpectrum() {
    const w   = spCanvas.width;
    const h   = spCanvas.height;
    const ctx = spCtx;
    const n   = sweepData.length;
    if (n === 0) return;

    ctx.fillStyle = PMViz.C.bg;
    ctx.fillRect(0, 0, w, h);

    const minRSSI = -110;
    const maxRSSI = -20;
    const range   = maxRSSI - minRSSI;
    const binW    = w / n;

    const freqToX  = (i) => i * binW;
    const rssiToY  = (r) => h - 20 - ((r - minRSSI) / range) * (h - 30);

    // Noise floor line
    ctx.strokeStyle = PMViz.C.textDim + '66';
    ctx.lineWidth   = 1;
    ctx.setLineDash([4, 4]);
    const nfY = rssiToY(noiseFloor);
    ctx.beginPath();
    ctx.moveTo(0, nfY);
    ctx.lineTo(w, nfY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = PMViz.C.textDim;
    ctx.font = '9px monospace';
    ctx.fillText(`NF ${Math.round(noiseFloor)}dBm`, 4, nfY - 3);

    // Peak hold
    if (peakHoldOn && peakHold.length === n) {
        ctx.beginPath();
        peakHold.forEach((r, i) => {
            const x = freqToX(i) + binW/2;
            const y = rssiToY(r);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = PMViz.C.accent4 + '88';
        ctx.lineWidth   = 1;
        ctx.stroke();
    }

    // Current spectrum fill
    ctx.beginPath();
    ctx.moveTo(0, h - 20);
    sweepData.forEach((d, i) => {
        ctx.lineTo(freqToX(i), rssiToY(d.rssi));
    });
    ctx.lineTo(w, h - 20);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0,   PMViz.C.accent + 'cc');
    grad.addColorStop(0.6, PMViz.C.accent + '44');
    grad.addColorStop(1,   PMViz.C.accent + '00');
    ctx.fillStyle = grad;
    ctx.fill();

    // Current spectrum line
    ctx.beginPath();
    sweepData.forEach((d, i) => {
        if (i === 0) ctx.moveTo(freqToX(i), rssiToY(d.rssi));
        else         ctx.lineTo(freqToX(i), rssiToY(d.rssi));
    });
    ctx.strokeStyle = PMViz.C.accent;
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    // Freq labels
    ctx.fillStyle  = PMViz.C.textDim;
    ctx.font       = '9px monospace';
    ctx.textAlign  = 'center';
    [0, 0.25, 0.5, 0.75, 1].forEach(t => {
        const freq = currentBand.start + t * (currentBand.end - currentBand.start);
        ctx.fillText(`${Math.round(freq)}`, t * w, h - 4);
    });

    // Channel overlay
    if (channelOverlay && currentBand.channels > 0) {
        drawChannelOverlay(ctx, w, h);
    }
}

function drawChannelOverlay(ctx, w, h) {
    const band = currentBand;
    const bw   = band.end - band.start;
    ctx.font   = '8px monospace';
    ctx.textAlign = 'center';

    for (let ch = 1; ch <= band.channels; ch++) {
        const freqMHz = band.chStart + (ch - 1) * band.chStep;
        const x       = ((freqMHz - band.start) / bw) * w;
        if (x < 0 || x > w) continue;

        ctx.strokeStyle = PMViz.C.gold + '44';
        ctx.lineWidth   = 1;
        ctx.setLineDash([2, 4]);
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h - 20);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = PMViz.C.gold + 'aa';
        ctx.fillText(`ch${ch}`, x, 10);
    }
}

// ── Channel grid ──────────────────────────────────────────────────
function renderChannelGrid() {
    const n    = currentBand.channels || 13;
    const band = currentBand;
    let html   = '';
    for (let ch = 1; ch <= n; ch++) {
        html += `<div class="rf-ch" id="ch${ch}">${ch}</div>`;
    }
    document.getElementById('channelGrid').innerHTML = html;
}

function updateChannelGrid() {
    if (sweepData.length === 0 || !currentBand.channels) return;
    const band = currentBand;
    const bw   = band.end - band.start;

    for (let ch = 1; ch <= band.channels; ch++) {
        const el = document.getElementById(`ch${ch}`);
        if (!el) continue;

        const freqMHz = band.chStart + (ch - 1) * band.chStep;
        // Find max RSSI within ±10MHz of this channel center
        const nearby  = sweepData.filter(d => Math.abs(d.freq - freqMHz) < 10);
        const maxRSSI = nearby.length ? Math.max(...nearby.map(d=>d.rssi)) : -120;

        el.className = 'rf-ch' +
            (maxRSSI > -70 ? ' congested' : maxRSSI > -85 ? ' active' : '');
        el.title = `${Math.round(maxRSSI)}dBm`;
    }
}

// ── Anomaly detection ─────────────────────────────────────────────
const prevSweep = [];
function detectAnomalies(data) {
    // Sudden spikes above noise floor + 30dB
    data.forEach((d, i) => {
        const threshold = noiseFloor + 30;
        if (d.rssi > threshold) {
            const existing = anomalies.find(a => Math.abs(a.freq - d.freq) < 2);
            if (!existing) {
                anomalies.unshift({
                    type: d.rssi > threshold + 20 ? 'JAMMING SUSPECTED' : 'STRONG SIGNAL',
                    freq: d.freq,
                    rssi: d.rssi,
                    ts:   Date.now(),
                    detail: `${d.freq}MHz @ ${d.rssi}dBm (${Math.round(d.rssi - noiseFloor)}dB above floor)`
                });
                if (anomalies.length > 20) anomalies.pop();
            }
        }
    });

    // Rapid change detection
    if (prevSweep.length === data.length) {
        data.forEach((d, i) => {
            const delta = d.rssi - prevSweep[i];
            if (Math.abs(delta) > 25) {
                anomalies.unshift({
                    type: delta > 0 ? 'BURST DETECTED' : 'SIGNAL DROPOUT',
                    freq: d.freq,
                    rssi: d.rssi,
                    ts:   Date.now(),
                    detail: `${d.freq}MHz ${delta > 0 ? '+' : ''}${delta}dB change`
                });
                if (anomalies.length > 20) anomalies.pop();
            }
        });
    }
    prevSweep.splice(0, prevSweep.length, ...data.map(d => d.rssi));

    // Render anomaly list
    document.getElementById('anomalyCount').textContent = `${anomalies.length}`;
    document.getElementById('anomalyList').innerHTML = anomalies.length === 0
        ? '<div style="padding:14px;text-align:center;color:var(--accent3);font-size:.65rem">✓ No anomalies</div>'
        : anomalies.map(a => `
            <div class="rf-anomaly">
                <div class="rf-anomaly-type">${a.type}</div>
                <div class="rf-anomaly-detail">${a.detail}</div>
                <div style="font-size:.55rem;color:var(--text-dim)">${new Date(a.ts).toLocaleTimeString()}</div>
            </div>`).join('');
}

// ── Controls ──────────────────────────────────────────────────────
function setBand(band) {
    currentBand = BANDS[band] || BANDS['2.4'];
    sweepData   = [];
    peakHold    = [];
    waterfallRows = [];
    anomalies   = [];
    document.getElementById('statBand').textContent = currentBand.label;
    document.getElementById('freqStart').textContent = `${currentBand.start} MHz`;
    document.getElementById('freqEnd').textContent   = `${currentBand.end} MHz`;
    renderChannelGrid();
    if (beam.connected) {
        beam.send({type:'CMD_RF_SWEEP', src:'app', cmd_id:'rf1',
            freq_start: currentBand.start, freq_end: currentBand.end});
    }
}

function setView(v) {
    viewMode = v;
    document.getElementById('btnWaterfall').className = 'rf-btn' + (v==='waterfall'||v==='both'?' active':'');
    document.getElementById('btnSpectrum').className  = 'rf-btn' + (v==='spectrum' ||v==='both'?' active':'');
    document.getElementById('btnBoth').className      = 'rf-btn' + (v==='both'?' active':'');
    document.getElementById('waterfallWrap').style.display = (v==='spectrum') ? 'none' : '';
    document.getElementById('spectrumWrap').style.display  = (v==='waterfall') ? 'none' : '';
}

function togglePeakHold() {
    peakHoldOn = !peakHoldOn;
    document.getElementById('btnPeakHold').className = 'rf-btn' + (peakHoldOn?' active':'');
}

function toggleChannelOverlay() {
    channelOverlay = !channelOverlay;
    document.getElementById('btnOverlay').className = 'rf-btn' + (channelOverlay?' active':'');
    drawWaterfall();
    drawSpectrum();
}

function clearPeakHold() {
    peakHold = new Array(sweepData.length).fill(-120);
}

function saveSnapshot() {
    PMViz.Storage.save('rf_spectrum', {
        band:      currentBand,
        sweep:     sweepData,
        peakHold:  peakHold,
        anomalies: anomalies,
        noiseFloor,
        timestamp: new Date().toISOString(),
    }, 'json');
}

// ── Canvas mouse tracking ─────────────────────────────────────────
spCanvas && spCanvas.addEventListener('mousemove', (e) => {
    const rect  = spCanvas.getBoundingClientRect();
    const x     = e.clientX - rect.left;
    const t     = x / spCanvas.width;
    const freq  = currentBand.start + t * (currentBand.end - currentBand.start);
    document.getElementById('cursorFreq').textContent = `${Math.round(freq)} MHz`;
});

window.addEventListener('load', async () => {
    initCanvases();
    window.addEventListener('resize', () => { resizeCanvases(); drawWaterfall(); drawSpectrum(); });

    try { await beam.connect(); }
    catch(e) { console.log('No hardware'); }

    // Request initial sweep
    if (beam.connected) {
        beam.send({type:'CMD_RF_SWEEP', src:'app', cmd_id:'rf0',
            freq_start: currentBand.start, freq_end: currentBand.end});
    }
});
</script>
</body></html>
