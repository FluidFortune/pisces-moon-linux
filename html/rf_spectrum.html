  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);

<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            this.ws.onopen = () => resolve();
            this.ws.onerror = () => reject(new Error(`WebSocket failed at ${this.wsUrl}`));

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed");
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
// ═══════════════════════════════════════════════════════════════════
// RF SPECTRUM ANALYZER
// High bandwidth — USB/WebSocket transport only.
// Receives RF_SWEEP messages from T-Beam SX1262 scan.
// ═══════════════════════════════════════════════════════════════════

// Band definitions
const BANDS = {
    '2.4':  { start: 2400, end: 2484, channels: 14, chStart: 2412, chStep: 5,  label: '2.4GHz WiFi' },
    '5':    { start: 5170, end: 5825, channels: 24, chStart: 5180, chStep: 20, label: '5GHz WiFi' },
    '915':  { start: 902,  end: 928,  channels: 0,  label: '915MHz ISM/LoRa' },
    '868':  { start: 863,  end: 870,  channels: 0,  label: '868MHz LoRa EU' },
    '433':  { start: 433,  end: 435,  channels: 0,  label: '433MHz ISM' },
};

let currentBand   = BANDS['2.4'];
let sweepData     = [];           // current sweep: array of {freq, rssi}
let peakHold      = [];           // peak RSSI per freq bin
let waterfallRows = [];           // history of sweeps
let viewMode      = 'both';
let peakHoldOn    = true;
let channelOverlay= false;
let anomalies     = [];
let sweepCount    = 0;
let lastSweepTime = Date.now();
let noiseFloor    = -100;

// Canvas contexts
let wfCanvas, wfCtx, spCanvas, spCtx;

function initCanvases() {
    wfCanvas = document.getElementById('rf-waterfall');
    spCanvas = document.getElementById('rf-spectrum');
    wfCtx    = wfCanvas.getContext('2d');
    spCtx    = spCanvas.getContext('2d');
    resizeCanvases();
    renderChannelGrid();
}

function resizeCanvases() {
    const wrap = document.getElementById('waterfallWrap');
    wfCanvas.width  = wrap.offsetWidth;
    wfCanvas.height = wrap.offsetHeight;
    spCanvas.width  = document.getElementById('spectrumWrap').offsetWidth;
    spCanvas.height = 160;
    // Init peak hold array to match sweep bins
    if (sweepData.length > 0) {
        peakHold = new Array(sweepData.length).fill(-120);
    }
}

// ── Transport ─────────────────────────────────────────────────────
const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s) => {
        document.getElementById('liveBadge').style.opacity = s.state==='connected'?'1':'0.3';
        document.getElementById('lastUpdate').textContent = s.message;
    }
});

function handleData(msg) {
    // Translate bridge wardrive/packet events into RF samples
    if (msg.type === 'wardrive' || msg.type === 'packet') {
        const ch = msg.ch || msg.channel || 0;
        const rssi = msg.rssi || -100;
        if (ch > 0) {
            msg = {
                type:    'RF_SAMPLE',
                channel: ch,
                rssi:    rssi,
                ssid:    msg.ssid || '',
                mac:     msg.bssid || msg.src || msg.mac || '',
            };
        }
    }
    if (msg.type === 'RF_SWEEP') {
        processSweep(msg.data || []);
    } else if (msg.type === 'RF_SAMPLE') {
        // Single frequency sample
        processSample(msg.freq_mhz, msg.rssi);
    }
}

// ── Sweep processing ──────────────────────────────────────────────
function processSweep(data) {
    // data = [{freq, rssi}, ...] sorted by freq
    sweepData = data;
    sweepCount++;

    // Update peak hold
    if (peakHold.length !== data.length) {
        peakHold = new Array(data.length).fill(-120);
    }
    data.forEach((d, i) => {
        if (d.rssi > peakHold[i]) peakHold[i] = d.rssi;
    });

    // Calculate noise floor (median of bottom 20%)
    const sorted = [...data].sort((a,b)=>a.rssi-b.rssi);
    const n20    = Math.floor(sorted.length * 0.2);
    noiseFloor   = sorted.slice(0, n20).reduce((s,d) => s+d.rssi, 0) / (n20 || 1);

    // Update waterfall
    waterfallRows.push(data.map(d => d.rssi));
    const maxRows = Math.floor((wfCanvas.height || 300) / 2);
    if (waterfallRows.length > maxRows) waterfallRows.shift();

    // Detect anomalies
    detectAnomalies(data);

    // Update stats
    const peak = data.reduce((b,d) => d.rssi > b.rssi ? d : b, {freq:0, rssi:-120});
    const elapsed = (Date.now() - lastSweepTime) / 1000;
    lastSweepTime = Date.now();

    document.getElementById('statPeakFreq').textContent  = `${peak.freq}MHz`;
    document.getElementById('statPeakRSSI').textContent  = `${peak.rssi}dBm`;
    document.getElementById('statNoise').textContent     = `${Math.round(noiseFloor)}dBm`;
    document.getElementById('statAnomalies').textContent = anomalies.length;
    document.getElementById('statSweep').textContent     = `${(1/elapsed).toFixed(1)}/s`;

    drawWaterfall();
    drawSpectrum();
    updateChannelGrid();
}

function processSample(freq, rssi) {
    // Single sample — find bin and update
    const bin = sweepData.findIndex(d => Math.abs(d.freq - freq) < 0.5);
    if (bin >= 0) {
        sweepData[bin].rssi = rssi;
    } else {
        sweepData.push({freq, rssi});
        sweepData.sort((a,b) => a.freq - b.freq);
    }
    drawSpectrum();
}

// ── Waterfall ─────────────────────────────────────────────────────
function drawWaterfall() {
    const w   = wfCanvas.width;
    const h   = wfCanvas.height;
    const ctx = wfCtx;
    const n   = sweepData.length;
    if (n === 0) return;

    ctx.fillStyle = PMViz.C.bg;
    ctx.fillRect(0, 0, w, h);

    const rowH  = Math.max(1, h / Math.max(waterfallRows.length, 1));
    const binW  = w / n;

    waterfallRows.forEach((row, ri) => {
        row.forEach((rssi, bi) => {
            const norm = Math.max(0, Math.min(1, (rssi - noiseFloor) / 60));
            const hue  = 240 - norm * 240; // blue→red
            ctx.fillStyle = `hsl(${hue}, 100%, ${20 + norm * 50}%)`;
            ctx.fillRect(bi * binW, ri * rowH, binW + 0.5, rowH + 0.5);
        });
    });

    // Channel overlay
    if (channelOverlay && currentBand.channels > 0) {
        drawChannelOverlay(ctx, w, h);
    }
}

// ── Spectrum display ──────────────────────────────────────────────
function drawSpectrum() {
    const w   = spCanvas.width;
    const h   = spCanvas.height;
    const ctx = spCtx;
    const n   = sweepData.length;
    if (n === 0) return;

    ctx.fillStyle = PMViz.C.bg;
    ctx.fillRect(0, 0, w, h);

    const minRSSI = -110;
    const maxRSSI = -20;
    const range   = maxRSSI - minRSSI;
    const binW    = w / n;

    const freqToX  = (i) => i * binW;
    const rssiToY  = (r) => h - 20 - ((r - minRSSI) / range) * (h - 30);

    // Noise floor line
    ctx.strokeStyle = PMViz.C.textDim + '66';
    ctx.lineWidth   = 1;
    ctx.setLineDash([4, 4]);
    const nfY = rssiToY(noiseFloor);
    ctx.beginPath();
    ctx.moveTo(0, nfY);
    ctx.lineTo(w, nfY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = PMViz.C.textDim;
    ctx.font = '9px monospace';
    ctx.fillText(`NF ${Math.round(noiseFloor)}dBm`, 4, nfY - 3);

    // Peak hold
    if (peakHoldOn && peakHold.length === n) {
        ctx.beginPath();
        peakHold.forEach((r, i) => {
            const x = freqToX(i) + binW/2;
            const y = rssiToY(r);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = PMViz.C.accent4 + '88';
        ctx.lineWidth   = 1;
        ctx.stroke();
    }

    // Current spectrum fill
    ctx.beginPath();
    ctx.moveTo(0, h - 20);
    sweepData.forEach((d, i) => {
        ctx.lineTo(freqToX(i), rssiToY(d.rssi));
    });
    ctx.lineTo(w, h - 20);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0,   PMViz.C.accent + 'cc');
    grad.addColorStop(0.6, PMViz.C.accent + '44');
    grad.addColorStop(1,   PMViz.C.accent + '00');
    ctx.fillStyle = grad;
    ctx.fill();

    // Current spectrum line
    ctx.beginPath();
    sweepData.forEach((d, i) => {
        if (i === 0) ctx.moveTo(freqToX(i), rssiToY(d.rssi));
        else         ctx.lineTo(freqToX(i), rssiToY(d.rssi));
    });
    ctx.strokeStyle = PMViz.C.accent;
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    // Freq labels
    ctx.fillStyle  = PMViz.C.textDim;
    ctx.font       = '9px monospace';
    ctx.textAlign  = 'center';
    [0, 0.25, 0.5, 0.75, 1].forEach(t => {
        const freq = currentBand.start + t * (currentBand.end - currentBand.start);
        ctx.fillText(`${Math.round(freq)}`, t * w, h - 4);
    });

    // Channel overlay
    if (channelOverlay && currentBand.channels > 0) {
        drawChannelOverlay(ctx, w, h);
    }
}

function drawChannelOverlay(ctx, w, h) {
    const band = currentBand;
    const bw   = band.end - band.start;
    ctx.font   = '8px monospace';
    ctx.textAlign = 'center';

    for (let ch = 1; ch <= band.channels; ch++) {
        const freqMHz = band.chStart + (ch - 1) * band.chStep;
        const x       = ((freqMHz - band.start) / bw) * w;
        if (x < 0 || x > w) continue;

        ctx.strokeStyle = PMViz.C.gold + '44';
        ctx.lineWidth   = 1;
        ctx.setLineDash([2, 4]);
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h - 20);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = PMViz.C.gold + 'aa';
        ctx.fillText(`ch${ch}`, x, 10);
    }
}

// ── Channel grid ──────────────────────────────────────────────────
function renderChannelGrid() {
    const n    = currentBand.channels || 13;
    const band = currentBand;
    let html   = '';
    for (let ch = 1; ch <= n; ch++) {
        html += `<div class="rf-ch" id="ch${ch}">${ch}</div>`;
    }
    document.getElementById('channelGrid').innerHTML = html;
}

function updateChannelGrid() {
    if (sweepData.length === 0 || !currentBand.channels) return;
    const band = currentBand;
    const bw   = band.end - band.start;

    for (let ch = 1; ch <= band.channels; ch++) {
        const el = document.getElementById(`ch${ch}`);
        if (!el) continue;

        const freqMHz = band.chStart + (ch - 1) * band.chStep;
        // Find max RSSI within ±10MHz of this channel center
        const nearby  = sweepData.filter(d => Math.abs(d.freq - freqMHz) < 10);
        const maxRSSI = nearby.length ? Math.max(...nearby.map(d=>d.rssi)) : -120;

        el.className = 'rf-ch' +
            (maxRSSI > -70 ? ' congested' : maxRSSI > -85 ? ' active' : '');
        el.title = `${Math.round(maxRSSI)}dBm`;
    }
}

// ── Anomaly detection ─────────────────────────────────────────────
const prevSweep = [];
function detectAnomalies(data) {
    // Sudden spikes above noise floor + 30dB
    data.forEach((d, i) => {
        const threshold = noiseFloor + 30;
        if (d.rssi > threshold) {
            const existing = anomalies.find(a => Math.abs(a.freq - d.freq) < 2);
            if (!existing) {
                anomalies.unshift({
                    type: d.rssi > threshold + 20 ? 'JAMMING SUSPECTED' : 'STRONG SIGNAL',
                    freq: d.freq,
                    rssi: d.rssi,
                    ts:   Date.now(),
                    detail: `${d.freq}MHz @ ${d.rssi}dBm (${Math.round(d.rssi - noiseFloor)}dB above floor)`
                });
                if (anomalies.length > 20) anomalies.pop();
            }
        }
    });

    // Rapid change detection
    if (prevSweep.length === data.length) {
        data.forEach((d, i) => {
            const delta = d.rssi - prevSweep[i];
            if (Math.abs(delta) > 25) {
                anomalies.unshift({
                    type: delta > 0 ? 'BURST DETECTED' : 'SIGNAL DROPOUT',
                    freq: d.freq,
                    rssi: d.rssi,
                    ts:   Date.now(),
                    detail: `${d.freq}MHz ${delta > 0 ? '+' : ''}${delta}dB change`
                });
                if (anomalies.length > 20) anomalies.pop();
            }
        });
    }
    prevSweep.splice(0, prevSweep.length, ...data.map(d => d.rssi));

    // Render anomaly list
    document.getElementById('anomalyCount').textContent = `${anomalies.length}`;
    document.getElementById('anomalyList').innerHTML = anomalies.length === 0
        ? '<div style="padding:14px;text-align:center;color:var(--accent3);font-size:.65rem">✓ No anomalies</div>'
        : anomalies.map(a => `
            <div class="rf-anomaly">
                <div class="rf-anomaly-type">${a.type}</div>
                <div class="rf-anomaly-detail">${a.detail}</div>
                <div style="font-size:.55rem;color:var(--text-dim)">${new Date(a.ts).toLocaleTimeString()}</div>
            </div>`).join('');
}

// ── Controls ──────────────────────────────────────────────────────
function setBand(band) {
    currentBand = BANDS[band] || BANDS['2.4'];
    sweepData   = [];
    peakHold    = [];
    waterfallRows = [];
    anomalies   = [];
    document.getElementById('statBand').textContent = currentBand.label;
    document.getElementById('freqStart').textContent = `${currentBand.start} MHz`;
    document.getElementById('freqEnd').textContent   = `${currentBand.end} MHz`;
    renderChannelGrid();
    if (beam.connected) {
        beam.send({type:'CMD_RF_SWEEP', src:'app', cmd_id:'rf1',
            freq_start: currentBand.start, freq_end: currentBand.end});
    }
}

function setView(v) {
    viewMode = v;
    document.getElementById('btnWaterfall').className = 'rf-btn' + (v==='waterfall'||v==='both'?' active':'');
    document.getElementById('btnSpectrum').className  = 'rf-btn' + (v==='spectrum' ||v==='both'?' active':'');
    document.getElementById('btnBoth').className      = 'rf-btn' + (v==='both'?' active':'');
    document.getElementById('waterfallWrap').style.display = (v==='spectrum') ? 'none' : '';
    document.getElementById('spectrumWrap').style.display  = (v==='waterfall') ? 'none' : '';
}

function togglePeakHold() {
    peakHoldOn = !peakHoldOn;
    document.getElementById('btnPeakHold').className = 'rf-btn' + (peakHoldOn?' active':'');
}

function toggleChannelOverlay() {
    channelOverlay = !channelOverlay;
    document.getElementById('btnOverlay').className = 'rf-btn' + (channelOverlay?' active':'');
    drawWaterfall();
    drawSpectrum();
}

function clearPeakHold() {
    peakHold = new Array(sweepData.length).fill(-120);
}

function saveSnapshot() {
    PMViz.Storage.save('rf_spectrum', {
        band:      currentBand,
        sweep:     sweepData,
        peakHold:  peakHold,
        anomalies: anomalies,
        noiseFloor,
        timestamp: new Date().toISOString(),
    }, 'json');
}

// ── Canvas mouse tracking ─────────────────────────────────────────
spCanvas && spCanvas.addEventListener('mousemove', (e) => {
    const rect  = spCanvas.getBoundingClientRect();
    const x     = e.clientX - rect.left;
    const t     = x / spCanvas.width;
    const freq  = currentBand.start + t * (currentBand.end - currentBand.start);
    document.getElementById('cursorFreq').textContent = `${Math.round(freq)} MHz`;
});

window.addEventListener('load', async () => {
    initCanvases();
    window.addEventListener('resize', () => { resizeCanvases(); drawWaterfall(); drawSpectrum(); });

    try { await beam.connect(); }
    catch(e) { console.log('No hardware'); }

    // Request initial sweep
    if (beam.connected) {
        beam.send({type:'CMD_RF_SWEEP', src:'app', cmd_id:'rf0',
            freq_start: currentBand.start, freq_end: currentBand.end});
    }
});
</script>
