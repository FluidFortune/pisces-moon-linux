<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // WARDRIVE</title>
<link rel="stylesheet" href="lib/leaflet.min.css">
<link rel="stylesheet" href="pm_shared.css">
<style>
.wd-layout {
    display: grid;
    grid-template-columns: 320px 1fr 320px;
    grid-template-rows: auto 1fr auto;
    height: calc(100vh - 52px);
    overflow: hidden;
}
.wd-stats {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    border-bottom: 1px solid var(--panel-border);
    background: var(--bg2);
}
.wd-stat {
    padding: 10px 14px;
    border-right: 1px solid var(--panel-border);
}
.wd-stat:last-child { border-right: none; }
.wd-stat-label {
    font-family: Orbitron, monospace;
    font-size: .5rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 3px;
}
.wd-stat-value {
    font-family: Orbitron, monospace;
    font-size: 1.4rem;
    color: var(--text-bright);
    font-weight: 700;
}
.wd-stat-value.green { color: var(--accent3); }
.wd-stat-value.gold  { color: var(--gold); }
.wd-stat-value.red   { color: var(--accent4); }

/* Left: network list */
.wd-list {
    border-right: 1px solid var(--panel-border);
    overflow-y: auto;
    grid-row: 2 / 4;
}
.wd-net {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(28,46,58,.4);
    cursor: pointer;
    transition: background .15s;
}
.wd-net:hover { background: rgba(240,165,0,.04); }
.wd-net.selected { background: rgba(240,165,0,.08); border-left: 2px solid var(--gold); }
.wd-net-ssid { font-size: .72rem; color: var(--text-bright); margin-bottom: 3px; }
.wd-net-meta { font-size: .58rem; color: var(--text-dim); display: flex; gap: 8px; }
.wd-net-rssi { font-family: Orbitron, monospace; font-size: .65rem; }

/* Center: map */
#wd-map { width: 100%; height: 100%; }
.wd-map-col { grid-row: 2 / 3; position: relative; }

/* Bottom center: waterfall */
.wd-waterfall-col {
    grid-row: 3 / 4;
    border-top: 1px solid var(--panel-border);
    background: var(--bg2);
    padding: 4px;
}
#wd-waterfall { width: 100%; height: 80px; }

/* Right: charts */
.wd-charts {
    border-left: 1px solid var(--panel-border);
    overflow-y: auto;
    grid-row: 2 / 4;
}
.wd-chart-section {
    padding: 8px;
    border-bottom: 1px solid var(--panel-border);
}
.wd-chart-title {
    font-family: Orbitron, monospace;
    font-size: .52rem;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 6px;
}
canvas { display: block; }

.wd-controls {
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--panel-border);
    background: var(--bg2);
}
.wd-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: Share\ Tech\ Mono, monospace;
    font-size: .62rem;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all .15s;
}
.wd-btn:hover { background: var(--gold); color: var(--bg); }
.wd-btn.active { background: var(--gold); color: var(--bg); }
.wd-btn.danger { border-color: var(--accent4); color: var(--accent4); }
.wd-btn.danger:hover { background: var(--accent4); color: var(--bg); }

.save-indicator {
    font-size: .55rem;
    color: var(--accent3);
    font-family: Orbitron, monospace;
    letter-spacing: 1px;
    padding: 6px 0;
    opacity: 0;
    transition: opacity .3s;
}
.save-indicator.show { opacity: 1; }
</style>
</head><body>

<header class="pm-header">
    <div class="pm-logo">📡 <em>WARDRIVE</em></div>
    <div class="pm-hdr-right">
        <div class="pm-live-badge" id="liveBadge" style="opacity:.3">
            <div class="pm-live-dot"></div>LIVE
        </div>
        <span class="save-indicator" id="saveIndicator">✓ SAVED</span>
        <span class="pm-last-update" id="lastUpdate"></span>
    </div>
</header>

<div class="wd-layout">
    <!-- Stats row -->
    <div class="wd-stats">
        <div class="wd-stat">
            <div class="wd-stat-label">NETWORKS</div>
            <div class="wd-stat-value green" id="statNets">0</div>
        </div>
        <div class="wd-stat">
            <div class="wd-stat-label">OPEN</div>
            <div class="wd-stat-value red" id="statOpen">0</div>
        </div>
        <div class="wd-stat">
            <div class="wd-stat-label">STRONGEST</div>
            <div class="wd-stat-value gold" id="statBest">—</div>
        </div>
        <div class="wd-stat">
            <div class="wd-stat-label">GPS</div>
            <div class="wd-stat-value" id="statGPS">NO FIX</div>
        </div>
        <div class="wd-stat">
            <div class="wd-stat-label">SESSION</div>
            <div class="wd-stat-value" id="statTime">00:00</div>
        </div>
        <div class="wd-stat">
            <div class="wd-stat-label">SAVED</div>
            <div class="wd-stat-value" id="statSaved">0</div>
        </div>
    </div>

    <!-- Left: network list -->
    <div class="wd-list">
        <div class="pm-sh" style="position:sticky;top:0;z-index:10">
            NETWORKS
            <div style="display:flex;gap:6px">
                <button class="wd-btn" onclick="sortBy('rssi')" id="sortRSSI">RSSI</button>
                <button class="wd-btn" onclick="sortBy('first')" id="sortFirst">NEW</button>
            </div>
        </div>
        <div id="netList"></div>
    </div>

    <!-- Center: map -->
    <div class="wd-map-col">
        <div class="wd-controls">
            <button class="wd-btn active" id="btnScan" onclick="toggleScan()">⬤ SCANNING</button>
            <button class="wd-btn" onclick="saveNow()">💾 SAVE</button>
            <button class="wd-btn" onclick="clearSession()" class="danger">CLEAR</button>
            <button class="wd-btn" onclick="toggleFollow()" id="btnFollow">📍 FOLLOW GPS</button>
        </div>
        <div id="wd-map"></div>
    </div>

    <!-- Bottom center: channel waterfall -->
    <div class="wd-waterfall-col">
        <div style="font-family:Orbitron,monospace;font-size:.5rem;letter-spacing:2px;color:var(--gold);margin-bottom:2px">CHANNEL WATERFALL</div>
        <canvas id="wd-waterfall"></canvas>
    </div>

    <!-- Right: charts -->
    <div class="wd-charts">
        <div class="wd-chart-section">
            <div class="wd-chart-title">SECURITY TYPES</div>
            <canvas id="chartSecurity" width="304" height="180"></canvas>
        </div>
        <div class="wd-chart-section">
            <div class="wd-chart-title">SIGNAL STRENGTH</div>
            <canvas id="chartRSSI" width="304" height="160"></canvas>
        </div>
        <div class="wd-chart-section">
            <div class="wd-chart-title">TOP CHANNELS</div>
            <canvas id="chartChannels" width="304" height="140"></canvas>
        </div>
    </div>
</div>

<script src="lib/leaflet.min.js"></script>
<script src="pm_scraper.js"></script>
<script src="pm_viz.js"></script>
<script src="pm_transport.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// WARDRIVE — Live WiFi intelligence with map, charts, auto-save
// ═══════════════════════════════════════════════════════════════════

const networks = new Map();  // bssid → network object
let gpsLat = null, gpsLon = null, gpsAlt = null;
let scanning    = true;
let sessionStart = Date.now();
let sortMode    = 'rssi';
let followGPS   = true;
let savedCount  = 0;
let autoSaveId  = null;
let selectedNet = null;

// ── Viz components ───────────────────────────────────────────────
let liveMap, waterfall, securityChart, rssiChart, channelChart;

function initViz() {
    // Size waterfall canvas to its container
    const wfCanvas = document.getElementById('wd-waterfall');
    wfCanvas.width  = wfCanvas.parentElement.offsetWidth - 16;
    wfCanvas.height = 80;

    waterfall     = new PMViz.RSSIWaterfall('wd-waterfall', {
        rows: 40, cols: 14, labels: Array.from({length:14}, (_,i) => i+1)
    });
    securityChart = new PMViz.DonutChart('chartSecurity');
    rssiChart     = new PMViz.BarChart('chartRSSI', {
        horizontal: true,
        colorFn: (d) => PMViz.rssiColor(parseInt(d.label))
    });
    channelChart  = new PMViz.BarChart('chartChannels', {
        horizontal: false,
        colorFn: () => PMViz.C.accent
    });
    liveMap = new PMViz.LiveMap('wd-map', {
        center: [34.0617, -118.2380],
        zoom: 14,
        track: true,
    });
}

// ── Transport ────────────────────────────────────────────────────
const beam = new PMTransport({
    onMessage: handleData,
    onStatus:  handleStatus,
});

function handleStatus(s) {
    const badge = document.getElementById('liveBadge');
    badge.style.opacity = s.state === 'connected' ? '1' : '0.3';
    document.getElementById('lastUpdate').textContent = s.message;
    if (s.state === 'connected') startAutoSave();
}

async function connect() {
    try { await beam.connect(); }
    catch (e) { console.log('No hardware connected — demo mode'); }
}

// ── Data handler ─────────────────────────────────────────────────
function handleData(msg) {
    if (msg.type === 'WIFI_SCAN_RESULT') handleNetwork(msg);
    else if (msg.type === 'GPS_FIX')     handleGPS(msg);
    else if (msg.type === 'WIFI_SCAN_DONE') handleScanDone(msg);
}

function handleNetwork(n) {
    const key = n.bssid;
    const existing = networks.get(key);

    if (existing) {
        existing.rssi     = n.rssi;
        existing.lastSeen = Date.now();
        existing.count    = (existing.count || 1) + 1;
        // Keep best RSSI
        if (n.rssi > existing.bestRSSI) existing.bestRSSI = n.rssi;
    } else {
        networks.set(key, {
            bssid:     n.bssid,
            ssid:      n.ssid || '<hidden>',
            security:  n.sec  || n.security || 'UNKNOWN',
            channel:   n.channel || 0,
            rssi:      n.rssi,
            bestRSSI:  n.rssi,
            lat:       gpsLat,
            lon:       gpsLon,
            alt:       gpsAlt,
            firstSeen: Date.now(),
            lastSeen:  Date.now(),
            count:     1,
        });
    }

    updateStats();
    renderList();
    updateCharts();

    // Map marker
    if (gpsLat && gpsLon) {
        liveMap.upsert(key, gpsLat, gpsLon, n.rssi, n.ssid || n.bssid, 'wifi');
    }

    // Waterfall — push channel data
    pushWaterfall();
}

function handleGPS(g) {
    gpsLat = g.lat;
    gpsLon = g.lon;
    gpsAlt = g.alt_m;

    const el = document.getElementById('statGPS');
    el.textContent = `${parseFloat(g.lat).toFixed(4)},${parseFloat(g.lon).toFixed(4)}`;
    el.className   = 'wd-stat-value green';

    liveMap.updateGPS(parseFloat(g.lat), parseFloat(g.lon));
}

function handleScanDone(d) {
    document.getElementById('lastUpdate').textContent =
        `Scan: ${d.count} nets in ${d.duration_ms || '?'}ms`;
}

// ── Stats ────────────────────────────────────────────────────────
function updateStats() {
    const nets   = Array.from(networks.values());
    const open   = nets.filter(n => n.security === 'OPEN').length;
    const best   = nets.reduce((b, n) => n.rssi > b ? n.rssi : b, -120);

    document.getElementById('statNets').textContent = nets.length;
    document.getElementById('statOpen').textContent = open;
    document.getElementById('statBest').textContent = best > -120 ? `${best}dBm` : '—';
    document.getElementById('statSaved').textContent = savedCount;

    // Session timer
    const sec  = Math.floor((Date.now() - sessionStart) / 1000);
    const mm   = String(Math.floor(sec / 60)).padStart(2, '0');
    const ss   = String(sec % 60).padStart(2, '0');
    document.getElementById('statTime').textContent = `${mm}:${ss}`;
}

// ── List ─────────────────────────────────────────────────────────
function renderList() {
    let nets = Array.from(networks.values());

    if (sortMode === 'rssi') {
        nets.sort((a, b) => b.rssi - a.rssi);
    } else {
        nets.sort((a, b) => b.firstSeen - a.firstSeen);
    }

    document.getElementById('netList').innerHTML = nets.map(n => {
        const color = PMViz.rssiColor(n.rssi);
        const secColor = n.security === 'OPEN' ? 'var(--accent4)' : 'var(--accent3)';
        return `
        <div class="wd-net ${selectedNet===n.bssid?'selected':''}"
             onclick="selectNet('${PM.esc(n.bssid)}')">
            <div class="wd-net-ssid">${PM.esc(n.ssid)}</div>
            <div class="wd-net-meta">
                <span class="wd-net-rssi" style="color:${color}">${n.rssi}dBm</span>
                <span>ch${n.channel}</span>
                <span style="color:${secColor}">${PM.esc(n.security)}</span>
                <span style="margin-left:auto;color:var(--text-dim)">${n.count}x</span>
            </div>
        </div>`;
    }).join('');
}

function selectNet(bssid) {
    selectedNet = bssid;
    renderList();
    const n = networks.get(bssid);
    if (n?.lat && n?.lon) {
        liveMap.map.setView([n.lat, n.lon], 16);
    }
}

function sortBy(mode) {
    sortMode = mode;
    document.getElementById('sortRSSI').className  = 'wd-btn' + (mode==='rssi'?' active':'');
    document.getElementById('sortFirst').className = 'wd-btn' + (mode==='first'?' active':'');
    renderList();
}

// ── Charts ───────────────────────────────────────────────────────
function updateCharts() {
    const nets = Array.from(networks.values());

    // Security donut
    const secCounts = {};
    nets.forEach(n => { secCounts[n.security] = (secCounts[n.security]||0) + 1; });
    securityChart.update(Object.entries(secCounts).map(([label,value]) => ({label,value})));

    // RSSI distribution bar
    const rssiRanges = {'< -85':0, '-85..-70':0, '-70..-55':0, '> -55':0};
    nets.forEach(n => {
        if      (n.rssi < -85)              rssiRanges['< -85']++;
        else if (n.rssi < -70)              rssiRanges['-85..-70']++;
        else if (n.rssi < -55)              rssiRanges['-70..-55']++;
        else                                rssiRanges['> -55']++;
    });
    rssiChart.update(Object.entries(rssiRanges).map(([label,value]) => ({label,value})));

    // Channel bar
    const chCounts = {};
    nets.forEach(n => { chCounts[n.channel] = (chCounts[n.channel]||0) + 1; });
    channelChart.update(
        Array.from({length:14}, (_,i) => ({
            label: String(i+1),
            value: chCounts[i+1] || 0
        }))
    );
}

// ── Waterfall ────────────────────────────────────────────────────
function pushWaterfall() {
    const nets = Array.from(networks.values());
    const data = nets.map(n => ({
        col:  Math.max(0, Math.min(13, (n.channel || 1) - 1)),
        rssi: n.rssi
    }));
    waterfall.push(data);
}

// ── Controls ─────────────────────────────────────────────────────
function toggleScan() {
    scanning = !scanning;
    const btn = document.getElementById('btnScan');
    if (scanning) {
        btn.className = 'wd-btn active';
        btn.textContent = '⬤ SCANNING';
        beam.send({type: 'CMD_WIFI_SCAN', src: 'app', cmd_id: 'wd1', duration_sec: 30});
    } else {
        btn.className = 'wd-btn';
        btn.textContent = '◯ PAUSED';
        beam.send({type: 'CMD_STOP_ALL', src: 'app', cmd_id: 'wd2'});
    }
}

function toggleFollow() {
    followGPS = !followGPS;
    liveMap.track = followGPS;
    document.getElementById('btnFollow').className = 'wd-btn' + (followGPS?' active':'');
}

function saveNow() {
    const nets = Array.from(networks.values());
    if (nets.length === 0) return;

    // Save as WiGLE CSV (Smelter-compatible)
    const csv = PMViz.Storage.toWigleCSV(nets);
    PMViz.Storage.save('wardrive', csv, 'csv');
    savedCount++;
    document.getElementById('statSaved').textContent = savedCount;

    // Flash save indicator
    const ind = document.getElementById('saveIndicator');
    ind.classList.add('show');
    setTimeout(() => ind.classList.remove('show'), 2000);
}

function clearSession() {
    if (!confirm('Clear all session data?')) return;
    networks.clear();
    liveMap.clear();
    updateStats();
    renderList();
    updateCharts();
}

function startAutoSave() {
    if (autoSaveId) return;
    autoSaveId = PMViz.Storage.autoSave(
        'wardrive',
        () => PMViz.Storage.toWigleCSV(Array.from(networks.values())),
        60,
        'csv'
    );
}

// ── Session timer ────────────────────────────────────────────────
setInterval(updateStats, 1000);

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('load', () => {
    initViz();
    connect();

    // Start a scan if connected
    setTimeout(() => {
        if (beam.connected) {
            beam.send({type:'CMD_WIFI_SCAN', src:'app', cmd_id:'wd0', duration_sec:30});
        }
    }, 2000);
});
</script>
</body></html>
