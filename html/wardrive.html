<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.wd-layout {
    display: grid;
    grid-template-columns: 320px 1fr 320px;
    grid-template-rows: auto 1fr auto;
    height: calc(100vh - 52px);
    overflow: hidden;
}
.wd-stats {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    border-bottom: 1px solid var(--panel-border);
    background: var(--bg2);
}
.wd-stat {
    padding: 10px 14px;
    border-right: 1px solid var(--panel-border);
}
.wd-stat:last-child { border-right: none; }
.wd-stat-label {
    font-family: Orbitron, monospace;
    font-size: .5rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 3px;
}

    font-size: 1.4rem;

    border-right: 1px solid var(--panel-border);
    overflow-y: auto;
    grid-row: 2 / 4;
}

    border-bottom: 1px solid rgba(28,46,58,.4);

<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            // Hard timeout — never hang forever waiting for connect
            const connectTimeout = setTimeout(() => {
                try { this.ws.close(); } catch {}
                reject(new Error(`WebSocket timeout connecting to ${this.wsUrl} - is pm_bridge.py running?`));
            }, 3000);

            this.ws.onopen = () => {
                clearTimeout(connectTimeout);
                resolve();
            };
            this.ws.onerror = () => {
                clearTimeout(connectTimeout);
                reject(new Error(`WebSocket failed at ${this.wsUrl}`));
            };

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed - retrying...");
                    // Auto-retry after 2s if we were previously connected
                    setTimeout(() => {
                        this._connectWebSocket().then(() => {
                            this.connected = true;
                            this._status("connected", "Reconnected");
                        }).catch(() => {
                            this._status("error", "Reconnect failed - check pm_bridge.py");
                        });
                    }, 2000);
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
// ═══════════════════════════════════════════════════════════════════
// WARDRIVE — Live WiFi intelligence with map, charts, auto-save
// ═══════════════════════════════════════════════════════════════════

const networks = new Map();  // bssid → network object
let gpsLat = null, gpsLon = null, gpsAlt = null;
let scanning    = true;
let sessionStart = Date.now();
let sortMode    = 'rssi';
let followGPS   = true;
let savedCount  = 0;
let autoSaveId  = null;
let selectedNet = null;

// ── Viz components ───────────────────────────────────────────────
let liveMap, waterfall, securityChart, rssiChart, channelChart;

function initViz() {
    // Size waterfall canvas to its container
    const wfCanvas = document.getElementById('wd-waterfall');
    wfCanvas.width  = wfCanvas.parentElement.offsetWidth - 16;
    wfCanvas.height = 80;

    waterfall     = new PMViz.RSSIWaterfall('wd-waterfall', {
        rows: 40, cols: 14, labels: Array.from({length:14}, (_,i) => i+1)
    });
    securityChart = new PMViz.DonutChart('chartSecurity');
    rssiChart     = new PMViz.BarChart('chartRSSI', {
        horizontal: true,
        colorFn: (d) => PMViz.rssiColor(parseInt(d.label))
    });
    channelChart  = new PMViz.BarChart('chartChannels', {
        horizontal: false,
        colorFn: () => PMViz.C.accent
    });
    // Default center — overridden immediately by GPS_FIX or browser geolocation
    const mapDefaultCenter = [34.0617, -118.2380];
    liveMap = new PMViz.LiveMap('wd-map', {
        center: mapDefaultCenter,
        zoom: 14,
        track: true,
    });
    // Try browser geolocation for immediate centering before GPS fix arrives
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            if (liveMap && liveMap.map && !gpsLat) {
                liveMap.map.setView([pos.coords.latitude, pos.coords.longitude], 14);
            }
        }, () => {/* denied or unavailable — GPS fix will center it */});
    }
}

// ── Transport ────────────────────────────────────────────────────
const beam = new PMTransport({
    onMessage: handleData,
    onStatus:  handleStatus,
});

function handleStatus(s) {
    const badge = document.getElementById('liveBadge');
    badge.style.opacity = s.state === 'connected' ? '1' : '0.3';
    document.getElementById('lastUpdate').textContent = s.message;
    if (typeof updateBridgeLogUI === 'function') updateBridgeLogUI();
}

function updateSourceIndicator(source) {
    const el = document.getElementById('sourceIndicator');
    if (!el) return;
    if (source === 'tdeck') {
        el.textContent = '📡 T-DECK';
        el.style.borderColor = 'var(--accent3)';
        el.style.color = 'var(--accent3)';
    } else if (source === 'native') {
        el.textContent = '💻 MAC NATIVE';
        el.style.borderColor = 'var(--warn)';
        el.style.color = 'var(--warn)';
    } else {
        el.textContent = 'SRC: —';
        el.style.borderColor = 'var(--panel-border)';
        el.style.color = 'var(--text-dim)';
    }
}

async function connect() {
    try { await beam.connect(); }
    catch (e) { console.log('No hardware connected — demo mode'); }
}

// ── Data handler ─────────────────────────────────────────────────
function handleData(msg) {
    // Bridge log status events
    if (msg.type === 'wardrive_log_status') {
        bridgeLogOpen    = !!msg.open;
        bridgeLogSession = msg.session_id || null;
        bridgeLogRows    = msg.rows || 0;
        updateBridgeLogUI();
        return;
    }
    if (msg.type === 'wardrive_log_error') {
        alert('Bridge log error: ' + (msg.error || 'unknown'));
        return;
    }
    // Accept bridge events (wardrive type) AND legacy (WIFI_SCAN_RESULT)
    if (msg.type === 'wardrive' || msg.type === 'WIFI_SCAN_RESULT') {
        // Show data source in header
        updateSourceIndicator(msg.source || (msg.bssid && msg.bssid.startsWith('SYN:') ? 'native' : msg.source === 'tdeck' ? 'tdeck' : 'native'));
        // Normalize field names from bridge format -> wardrive format
        handleNetwork({
            bssid:    msg.bssid || msg.mac || '',
            ssid:     msg.ssid || '',
            sec:      typeof msg.enc === 'boolean' ? (msg.enc ? 'WPA' : 'OPEN') : (msg.sec || msg.security || 'UNKNOWN'),
            channel:  msg.ch || msg.channel || 0,
            rssi:     msg.rssi || -80,
            vendor:   msg.vendor || '',
        });
    } else if (msg.type === 'GPS_FIX' || msg.type === 'gps') {
        // Normalize lon/lng field
        if (msg.lng && !msg.lon) msg.lon = msg.lng;
        if (msg.lat && msg.lon) {
            updateSourceIndicator('tdeck'); // GPS only ever comes from T-Deck
            handleGPS(msg);
        }
    }
    else if (msg.type === 'WIFI_SCAN_DONE') handleScanDone(msg);
}

function handleNetwork(n) {
    const key = n.bssid;
    const existing = networks.get(key);

    if (existing) {
        existing.rssi     = n.rssi;
        existing.lastSeen = Date.now();
        existing.count    = (existing.count || 1) + 1;
        // Keep best RSSI
        if (n.rssi > existing.bestRSSI) existing.bestRSSI = n.rssi;
    } else {
        networks.set(key, {
            bssid:     n.bssid,
            ssid:      n.ssid || '<hidden>',
            security:  n.sec  || n.security || 'UNKNOWN',
            channel:   n.channel || 0,
            rssi:      n.rssi,
            bestRSSI:  n.rssi,
            lat:       gpsLat,
            lon:       gpsLon,
            alt:       gpsAlt,
            firstSeen: Date.now(),
            lastSeen:  Date.now(),
            count:     1,
        });
    }

    updateStats();
    renderList();
    updateCharts();

    // Map marker
    if (gpsLat && gpsLon) {
        if (liveMap && liveMap.upsert) liveMap.upsert(key, gpsLat, gpsLon, n.rssi, n.ssid || n.bssid, 'wifi');
    }

    // Waterfall — push channel data
    if (typeof pushWaterfall === 'function') try { pushWaterfall(); } catch(e) {}
}

function handleGPS(g) {
    gpsLat = g.lat;
    gpsLon = g.lon;
    gpsAlt = g.alt_m;

    const el = document.getElementById('statGPS');
    el.textContent = `${parseFloat(g.lat).toFixed(4)},${parseFloat(g.lon).toFixed(4)}`;
    el.className   = 'wd-stat-value green';

    liveMap.updateGPS(parseFloat(g.lat), parseFloat(g.lon));
}

function handleScanDone(d) {
    document.getElementById('lastUpdate').textContent =
        `Scan: ${d.count} nets in ${d.duration_ms || '?'}ms`;
}

// ── Stats ────────────────────────────────────────────────────────
function updateStats() {
    const nets   = Array.from(networks.values());
    const open   = nets.filter(n => n.security === 'OPEN').length;
    const best   = nets.reduce((b, n) => n.rssi > b ? n.rssi : b, -120);

    document.getElementById('statNets').textContent = nets.length;
    document.getElementById('statOpen').textContent = open;
    document.getElementById('statBest').textContent = best > -120 ? `${best}dBm` : '—';
    document.getElementById('statSaved').textContent = savedCount;

    // Session timer
    const sec  = Math.floor((Date.now() - sessionStart) / 1000);
    const mm   = String(Math.floor(sec / 60)).padStart(2, '0');
    const ss   = String(sec % 60).padStart(2, '0');
    document.getElementById('statTime').textContent = `${mm}:${ss}`;
}

// ── List ─────────────────────────────────────────────────────────
function renderList() {
    let nets = Array.from(networks.values());

    if (sortMode === 'rssi') {
        nets.sort((a, b) => b.rssi - a.rssi);
    } else {
        nets.sort((a, b) => b.firstSeen - a.firstSeen);
    }

    document.getElementById('netList').innerHTML = nets.map(n => {
        const color = PMViz.rssiColor(n.rssi);
        const secColor = n.security === 'OPEN' ? 'var(--accent4)' : 'var(--accent3)';
        return `
        <div class="wd-net ${selectedNet===n.bssid?'selected':''}"
             onclick="selectNet('${PM.esc(n.bssid)}')">
            <div class="wd-net-ssid">${PM.esc(n.ssid)}</div>
            <div class="wd-net-meta">
                <span class="wd-net-rssi" style="color:${color}">${n.rssi}dBm</span>
                <span>ch${n.channel}</span>
                <span style="color:${secColor}">${PM.esc(n.security)}</span>
                <span style="margin-left:auto;color:var(--text-dim)">${n.count}x</span>
            </div>
        </div>`;
    }).join('');
}

function selectNet(bssid) {
    selectedNet = bssid;
    renderList();
    const n = networks.get(bssid);
    if (n?.lat && n?.lon) {
        liveMap.map.setView([n.lat, n.lon], 16);
    }
}

function sortBy(mode) {
    sortMode = mode;
    document.getElementById('sortRSSI').className  = 'wd-btn' + (mode==='rssi'?' active':'');
    document.getElementById('sortFirst').className = 'wd-btn' + (mode==='first'?' active':'');
    renderList();
}

// ── Charts ───────────────────────────────────────────────────────
function updateCharts() {
    const nets = Array.from(networks.values());

    // Security donut
    const secCounts = {};
    nets.forEach(n => { secCounts[n.security] = (secCounts[n.security]||0) + 1; });
    securityChart.update(Object.entries(secCounts).map(([label,value]) => ({label,value})));

    // RSSI distribution bar
    const rssiRanges = {'< -85':0, '-85..-70':0, '-70..-55':0, '> -55':0};
    nets.forEach(n => {
        if      (n.rssi < -85)              rssiRanges['< -85']++;
        else if (n.rssi < -70)              rssiRanges['-85..-70']++;
        else if (n.rssi < -55)              rssiRanges['-70..-55']++;
        else                                rssiRanges['> -55']++;
    });
    rssiChart.update(Object.entries(rssiRanges).map(([label,value]) => ({label,value})));

    // Channel bar
    const chCounts = {};
    nets.forEach(n => { chCounts[n.channel] = (chCounts[n.channel]||0) + 1; });
    channelChart.update(
        Array.from({length:14}, (_,i) => ({
            label: String(i+1),
            value: chCounts[i+1] || 0
        }))
    );
}

// ── Waterfall ────────────────────────────────────────────────────
function pushWaterfall() {
    const nets = Array.from(networks.values());
    const data = nets.map(n => ({
        col:  Math.max(0, Math.min(13, (n.channel || 1) - 1)),
        rssi: n.rssi
    }));
    waterfall.push(data);
}

// ── Controls ─────────────────────────────────────────────────────
function toggleScan() {
    scanning = !scanning;
    const btn = document.getElementById('btnScan');
    if (scanning) {
        btn.className = 'wd-btn active';
        btn.textContent = '⬤ SCANNING';
        beam.send({type: 'CMD_WIFI_SCAN', src: 'app', cmd_id: 'wd1', duration_sec: 30});
    } else {
        btn.className = 'wd-btn';
        btn.textContent = '◯ PAUSED';
        beam.send({type: 'CMD_STOP_ALL', src: 'app', cmd_id: 'wd2'});
    }
}

function toggleFollow() {
    followGPS = !followGPS;
    liveMap.track = followGPS;
    document.getElementById('btnFollow').className = 'wd-btn' + (followGPS?' active':'');
}

function buildWigleCSV(nets) {
    // WiGLE 1.4 standard format - the same Smelter expects to parse.
    const header1 = 'WigleWifi-1.4,appRelease=PiscesMoon-WarDrive,model=Bridge,'
                  + 'release=v0.5,device=PMOS,display=PMOS,board=PMOS,brand=FluidFortune,star=Sol,'
                  + 'body=Earth,subBody=0';
    const header2 = 'MAC,SSID,AuthMode,FirstSeen,Channel,RSSI,'
                  + 'CurrentLatitude,CurrentLongitude,AltitudeMeters,AccuracyMeters,Type';
    const rows = nets.map(n => {
        const ts = new Date(n.firstSeen || Date.now()).toISOString().replace('T',' ').slice(0,19);
        const ssid = (n.ssid || '').replace(/,/g, '_').replace(/\n/g, ' ');
        return [
            n.bssid || '',
            ssid,
            '[' + (n.security || 'UNKNOWN') + ']',
            ts,
            n.channel || 0,
            n.bestRSSI || n.rssi || -100,
            (n.lat || 0).toFixed(6),
            (n.lon || 0).toFixed(6),
            (n.alt || 0).toFixed(1),
            5,
            'WIFI'
        ].join(',');
    });
    return [header1, header2, ...rows].join('\n');
}

function downloadFile(name, content, mime) {
    const blob = new Blob([content], { type: mime || 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// Bridge-side log state
let bridgeLogOpen = false;
let bridgeLogSession = null;
let bridgeLogRows = 0;

function saveNow() {
    const nets = Array.from(networks.values());
    if (nets.length === 0) {
        alert('No networks captured yet. Wait for the bridge to stream data.');
        return;
    }

    // Always download a Mac-side copy
    const csv = buildWigleCSV(nets);
    const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    downloadFile('wardrive_' + stamp + '.csv', csv, 'text/csv');

    savedCount++;
    const sav = document.getElementById('statSaved');
    if (sav) sav.textContent = savedCount;

    const ind = document.getElementById('saveIndicator');
    if (ind) {
        ind.classList.add('show');
        setTimeout(() => ind.classList.remove('show'), 2000);
    }
}

function startBridgeLog() {
    if (!beam || !beam.connected) {
        alert('Bridge not connected. Cannot start host-side logging.');
        return;
    }
    beam.send({cmd: 'wardrive_log_open'});
}

function stopBridgeLog() {
    if (!beam || !beam.connected) return;
    beam.send({cmd: 'wardrive_log_close'});
}

function refreshBridgeLogStatus() {
    if (!beam || !beam.connected) return;
    beam.send({cmd: 'wardrive_log_status'});
}

function updateBridgeLogUI() {
    const btn = document.getElementById('bridgeLogBtn');
    const lbl = document.getElementById('bridgeLogLabel');
    if (!btn || !lbl) return;
    if (bridgeLogOpen) {
        btn.textContent = 'STOP HOST LOG';
        btn.style.borderColor = 'var(--accent4)';
        btn.style.color = 'var(--accent4)';
        lbl.textContent = 'LOGGING TO HOST: ' + (bridgeLogSession || '...') + ' (' + bridgeLogRows + ' rows)';
        lbl.style.color = 'var(--accent3)';
    } else {
        btn.textContent = 'START HOST LOG';
        btn.style.borderColor = 'var(--accent3)';
        btn.style.color = 'var(--accent3)';
        lbl.textContent = beam && beam.connected
            ? 'Bridge ready - click START HOST LOG to write CSV on host'
            : 'Bridge offline - host logging unavailable';
        lbl.style.color = 'var(--text-dim)';
    }
}

function clearSession() {
    if (!confirm('Clear all session data?')) return;
    networks.clear();
    if (liveMap && liveMap.clear) liveMap.clear();
    updateStats();
    renderList();
    updateCharts();
}

function startAutoSave() {
    // Auto-save disabled — data accumulates in memory, save on request only
    // Use the SAVE NOW button to export WiGLE CSV when you want it
}

// ── Session timer ────────────────────────────────────────────────
setInterval(updateStats, 1000);

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('load', () => {
    initViz();
    connect();

    // Start a scan if connected
    setTimeout(() => {
        if (beam.connected) {
            beam.send({type:'CMD_WIFI_SCAN', src:'app', cmd_id:'wd0', duration_sec:30});
        }
    }, 2000);
});
