<html lang="en"><head><meta charset="UTF-8">

<title>PISCES MOON // FIELD NOTES</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.fn-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 52px);overflow:hidden;}
.fn-left{border-right:1px solid var(--panel-border);display:flex;flex-direction:column;overflow:hidden;}
.fn-right{display:flex;flex-direction:column;overflow:hidden;}
.note-list{flex:1;overflow-y:auto;}
.note-item{padding:10px 12px;border-bottom:1px solid rgba(28,46,58,.4);cursor:pointer;transition:background .15s;}
.note-item:hover{background:rgba(255,209,102,.04);}
.note-item.selected{background:rgba(255,209,102,.08);border-left:2px solid var(--gold);}
.note-title{font-size:.72rem;color:var(--text-bright);margin-bottom:3px;display:flex;gap:6px;align-items:center;}
.note-meta{font-size:.55rem;color:var(--text-dim);display:flex;gap:8px;flex-wrap:wrap;}
.cat-badge{display:inline-block;padding:1px 6px;font-family:Orbitron,monospace;font-size:.45rem;letter-spacing:1px;border-radius:2px;}
.note-form{padding:14px;flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.fn-input{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:Share\ Tech\ Mono,monospace;font-size:.68rem;padding:8px 10px;outline:none;width:100%;}
.fn-input:focus{border-color:var(--gold);}
textarea.fn-input{min-height:120px;resize:vertical;line-height:1.6;}
.fn-row{display:flex;gap:8px;}
.fn-label{font-family:Orbitron,monospace;font-size:.52rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:3px;}
.cat-selector{display:flex;gap:6px;flex-wrap:wrap;}
.cat-btn{padding:5px 10px;background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-dim);font-family:Orbitron,monospace;font-size:.5rem;cursor:pointer;letter-spacing:1px;transition:all .15s;}
.cat-btn:hover{border-color:var(--gold);color:var(--gold);}
.cat-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(255,209,102,.1);}
.fn-toolbar{padding:10px 12px;border-bottom:1px solid var(--panel-border);background:var(--bg2);display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.fn-btn{padding:5px 12px;background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);font-family:Share\ Tech\ Mono,monospace;font-size:.58rem;cursor:pointer;transition:all .15s;}
.fn-btn:hover{border-color:var(--gold);color:var(--gold);}
.gps-display{padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--panel-border);font-size:.6rem;color:var(--text-dim);font-family:Share\ Tech\ Mono,monospace;flex-shrink:0;}
.note-view{padding:14px;flex:1;overflow-y:auto;}
.nv-title{font-family:Orbitron,monospace;font-size:1rem;color:var(--gold);margin-bottom:10px;}
.nv-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(28,46,58,.3);font-size:.65rem;}
.nv-label{color:var(--text-dim);}
.nv-val{color:var(--text-bright);font-family:Share\ Tech\ Mono,monospace;text-align:right;}
.nv-body{margin-top:12px;font-size:.72rem;color:var(--text-bright);line-height:1.8;white-space:pre-wrap;}
.filter-bar{padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--panel-border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;}
.filter-btn{padding:3px 8px;background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-dim);font-family:Orbitron,monospace;font-size:.48rem;cursor:pointer;transition:all .15s;}
.filter-btn.active{border-color:var(--accent);color:var(--accent);}

      <div class="filter-btn active" onclick="setFilter('all')">ALL</div>

    </div>

<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            this.ws.onopen = () => resolve();
            this.ws.onerror = () => reject(new Error(`WebSocket failed at ${this.wsUrl}`));

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed");
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
const CATEGORIES = [
  {id:'security', label:'SECURITY', color:'#ff5577'},
  {id:'terrain',  label:'TERRAIN',  color:'#4dd9ff'},
  {id:'contact',  label:'CONTACT',  color:'#ffd166'},
  {id:'intel',    label:'INTEL',    color:'#9b59b6'},
  {id:'hazard',   label:'HAZARD',   color:'#ff6b00'},
  {id:'nature',   label:'NATURE',   color:'#4dffa6'},
  {id:'general',  label:'GENERAL',  color:'#c8e6f5'},
];

let notes = JSON.parse(localStorage.getItem('pm_field_notes') || '[]');
let selectedId = null;
let filterCat  = 'all';
let editMode   = false;
let currentGPS = {lat: null, lon: null, alt: null};

function save() { localStorage.setItem('pm_field_notes', JSON.stringify(notes)); }
function cat(id) { return CATEGORIES.find(c=>c.id===id) || CATEGORIES[6]; }

// Transport — get GPS from bridge / T-Deck
const beam = new PMTransport({
  onMessage: msg => {
    // GPS_FIX from T-Deck via bridge (both old T-Beam and new T-Deck format)
    if (msg.type === 'GPS_FIX' || msg.type === 'gps') {
      const lat = msg.lat || msg.latitude;
      const lon = msg.lon || msg.lng || msg.longitude;
      const alt = msg.alt_m || msg.altitude || 0;
      if (lat && lon) {
        currentGPS = {lat, lon, alt};
        updateGPSDisplay();
      }
    }
    // Also accept wardrive events with GPS coords attached
    if ((msg.type === 'wardrive') && msg.lat && msg.lng && !currentGPS.lat) {
      currentGPS = {lat: msg.lat, lon: msg.lng, alt: 0};
      updateGPSDisplay();
    }
  },
  onStatus: status => {
    // When bridge connects, immediately request GPS
    if (status.state === 'connected') {
      setTimeout(() => {
        try { beam.send({cmd: 'gps'}); } catch(e) {}
      }, 500);
    }
  }
});

function updateGPSDisplay() {
  // Updates GPS display in note form if visible
  const el = document.getElementById('formGPS');
  if (el && currentGPS.lat) {
    el.textContent = `📍 ${parseFloat(currentGPS.lat).toFixed(5)}, ${parseFloat(currentGPS.lon).toFixed(5)} ${currentGPS.alt?`· ${Math.round(currentGPS.alt)}m`:''}`;
    el.style.color = 'var(--accent3)';
  }
}

function newNote() {
  selectedId = null;
  showNoteForm({});
}

function showNoteForm(note) {
  editMode = true;
  const isNew = !note.id;
  const activeCat = note.category || 'general';

  document.getElementById('rightPanel').innerHTML = `
    <div class="fn-toolbar">
      <button class="fn-btn" style="border-color:var(--gold);color:var(--gold)" onclick="saveNote()">💾 SAVE</button>
      <button class="fn-btn" onclick="cancelEdit()">CANCEL</button>
      ${!isNew ? `<button class="fn-btn" style="border-color:var(--accent4);color:var(--accent4)" onclick="deleteNote('${note.id}')">DELETE</button>` : ''}
    </div>
    <div class="gps-display">
      <span id="formGPS" style="color:${currentGPS.lat?'var(--accent3)':'var(--text-dim)'}">
        ${currentGPS.lat ? `📍 ${parseFloat(currentGPS.lat).toFixed(5)}, ${parseFloat(currentGPS.lon).toFixed(5)}` : '📍 No GPS fix — connect T-Beam'}
      </span>
      <button style="float:right;background:none;border:none;color:var(--accent);cursor:pointer;font-size:.58rem;font-family:Orbitron,monospace" onclick="stampGPS()">STAMP GPS</button>
    </div>
    <div class="note-form">
      <div>
        <div class="fn-label">TITLE</div>
        <input class="fn-input" id="formTitle" placeholder="Note title" value="${note.title||''}">
      </div>
      <div>
        <div class="fn-label">CATEGORY</div>
        <div class="cat-selector">
          ${CATEGORIES.map(c=>`<div class="cat-btn ${c.id===activeCat?'active':''}" onclick="selectCat('${c.id}',this)" style="${c.id===activeCat?`border-color:${c.color};color:${c.color};background:${c.color}22`:''}">${c.label}</div>`).join('')}
        </div>
        <input type="hidden" id="formCat" value="${activeCat}">
      </div>
      <div>
        <div class="fn-label">OBSERVATION</div>
        <textarea class="fn-input" id="formBody" placeholder="Record your observation...">${note.body||''}</textarea>
      </div>
      <div class="fn-row">
        <div style="flex:1">
          <div class="fn-label">GPS LAT</div>
          <input class="fn-input" id="formLat" placeholder="Latitude" value="${note.lat||currentGPS.lat||''}">
        </div>
        <div style="flex:1">
          <div class="fn-label">GPS LON</div>
          <input class="fn-input" id="formLon" placeholder="Longitude" value="${note.lon||currentGPS.lon||''}">
        </div>
      </div>
      <div class="fn-row">
        <div style="flex:1">
          <div class="fn-label">ALTITUDE (m)</div>
          <input class="fn-input" id="formAlt" placeholder="Alt" value="${note.alt||currentGPS.alt||''}">
        </div>
        <div style="flex:1">
          <div class="fn-label">PRIORITY</div>
          <select class="fn-input" id="formPriority">
            <option value="low"    ${note.priority==='low'   ?'selected':''}>LOW</option>
            <option value="medium" ${(!note.priority||note.priority==='medium')?'selected':''}>MEDIUM</option>
            <option value="high"   ${note.priority==='high'  ?'selected':''}>HIGH</option>
            <option value="urgent" ${note.priority==='urgent'?'selected':''}>URGENT</option>
          </select>
        </div>
      </div>
      <div>
        <div class="fn-label">TAGS (comma separated)</div>
        <input class="fn-input" id="formTags" placeholder="tag1, tag2, ..." value="${(note.tags||[]).join(', ')}">
      </div>
    </div>`;

  document.getElementById('formTitle').focus();
}

function selectCat(id, el) {
  document.getElementById('formCat').value = id;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('active');
    b.style.borderColor=''; b.style.color=''; b.style.background='';
  });
  const c = cat(id);
  el.classList.add('active');
  el.style.borderColor = c.color;
  el.style.color = c.color;
  el.style.background = c.color + '22';
}

function stampGPS() {
  if (currentGPS.lat) {
    document.getElementById('formLat').value = parseFloat(currentGPS.lat).toFixed(6);
    document.getElementById('formLon').value = parseFloat(currentGPS.lon).toFixed(6);
    if (currentGPS.alt) document.getElementById('formAlt').value = Math.round(currentGPS.alt);
  } else {
    navigator.geolocation?.getCurrentPosition(pos => {
      document.getElementById('formLat').value = pos.coords.latitude.toFixed(6);
      document.getElementById('formLon').value = pos.coords.longitude.toFixed(6);
      if (pos.coords.altitude) document.getElementById('formAlt').value = Math.round(pos.coords.altitude);
    });
  }
}

function saveNote() {
  const title = document.getElementById('formTitle').value.trim();
  if (!title) { alert('Enter a title'); return; }

  const note = {
    id:        selectedId || PM.uid(),
    title,
    category:  document.getElementById('formCat').value,
    body:      document.getElementById('formBody').value,
    lat:       document.getElementById('formLat').value,
    lon:       document.getElementById('formLon').value,
    alt:       document.getElementById('formAlt').value,
    priority:  document.getElementById('formPriority').value,
    tags:      document.getElementById('formTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    created:   selectedId ? (notes.find(n=>n.id===selectedId)?.created || Date.now()) : Date.now(),
    modified:  Date.now(),
  };

  if (selectedId) {
    const idx = notes.findIndex(n=>n.id===selectedId);
    if (idx >= 0) notes[idx] = note;
  } else {
    notes.unshift(note);
  }

  save();
  selectedId = note.id;
  editMode = false;
  renderList();
  viewNote(note);
}

function viewNote(note) {
  const c = cat(note.category);
  const priorityColors = {low:'var(--text-dim)',medium:'var(--gold)',high:'var(--accent2)',urgent:'var(--accent4)'};
  document.getElementById('rightPanel').innerHTML = `
    <div class="fn-toolbar">
      <button class="fn-btn" style="border-color:var(--gold);color:var(--gold)" onclick="editNote('${note.id}')">✏ EDIT</button>
      <button class="fn-btn" style="border-color:var(--accent4);color:var(--accent4)" onclick="deleteNote('${note.id}')">DELETE</button>
      ${note.lat&&note.lon?`<button class="fn-btn" onclick="openInMaps('${note.lat}','${note.lon}')">🗺 MAP</button>`:''}
    </div>
    <div class="note-view">
      <div class="nv-title">${PM.esc(note.title)}</div>
      <div class="nv-row"><span class="nv-label">Category</span><span class="nv-val"><span style="color:${c.color}">${c.label}</span></span></div>
      <div class="nv-row"><span class="nv-label">Priority</span><span class="nv-val" style="color:${priorityColors[note.priority]}">${note.priority?.toUpperCase()||'MEDIUM'}</span></div>
      <div class="nv-row"><span class="nv-label">Created</span><span class="nv-val">${new Date(note.created).toLocaleString()}</span></div>
      ${note.lat?`<div class="nv-row"><span class="nv-label">GPS</span><span class="nv-val">${parseFloat(note.lat).toFixed(5)}, ${parseFloat(note.lon).toFixed(5)}</span></div>`:''}
      ${note.alt?`<div class="nv-row"><span class="nv-label">Altitude</span><span class="nv-val">${note.alt}m</span></div>`:''}
      ${note.tags?.length?`<div class="nv-row"><span class="nv-label">Tags</span><span class="nv-val">${note.tags.join(', ')}</span></div>`:''}
      <div class="nv-body">${PM.esc(note.body||'')}</div>
    </div>`;
}

function openInMaps(lat, lon) {
  window.open(`https://maps.google.com/?q=${lat},${lon}`, '_blank');
}

function editNote(id) {
  selectedId = id;
  const note = notes.find(n=>n.id===id);
  if (note) showNoteForm(note);
}

function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  notes = notes.filter(n=>n.id!==id);
  save();
  selectedId = null;
  renderList();
  document.getElementById('rightPanel').innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:.65rem">Note deleted</div>';
}

function cancelEdit() {
  if (selectedId) {
    const note = notes.find(n=>n.id===selectedId);
    if (note) viewNote(note);
  } else {
    document.getElementById('rightPanel').innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim)">Click + NOTE to create a new entry</div>';
  }
}

function setFilter(f) {
  filterCat = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
}

function renderList() {
  const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
  let filtered = notes;
  if (filterCat !== 'all') filtered = filtered.filter(n=>n.category===filterCat);
  if (search) filtered = filtered.filter(n=>
    (n.title+n.body+(n.tags||[]).join('')).toLowerCase().includes(search));

  filtered.sort((a,b) => {
    const pri = {urgent:0,high:1,medium:2,low:3};
    return (pri[a.priority]||2) - (pri[b.priority]||2) || b.modified - a.modified;
  });

  document.getElementById('noteCount').textContent = `${filtered.length}/${notes.length}`;
  const priorityColors = {low:'var(--text-dim)',medium:'var(--gold)',high:'var(--accent2)',urgent:'var(--accent4)'};

  document.getElementById('noteList').innerHTML = filtered.map(n => {
    const c = cat(n.category);
    return `<div class="note-item ${selectedId===n.id?'selected':''}" onclick="selectNote('${n.id}')">
      <div class="note-title">
        <span class="cat-badge" style="background:${c.color}22;color:${c.color};border:1px solid ${c.color}">${c.label}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${PM.esc(n.title)}</span>
        <span style="color:${priorityColors[n.priority]||'var(--gold)'};font-size:.55rem">●</span>
      </div>
      <div class="note-meta">
        <span>${new Date(n.created).toLocaleDateString()}</span>
        ${n.lat?`<span>📍 ${parseFloat(n.lat).toFixed(3)}</span>`:''}
        ${n.tags?.length?`<span>${n.tags.slice(0,2).join(', ')}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function selectNote(id) {
  selectedId = id;
  editMode = false;
  renderList();
  const note = notes.find(n=>n.id===id);
  if (note) viewNote(note);
}

function exportCSV() {
  const headers = 'ID,Title,Category,Priority,Created,Lat,Lon,Alt,Tags,Body';
  const rows = notes.map(n =>
    [n.id,`"${n.title}"`,n.category,n.priority,new Date(n.created).toISOString(),
     n.lat,n.lon,n.alt,`"${(n.tags||[]).join(';')}"`,`"${(n.body||'').replace(/"/g,'""')}"`].join(',')
  );
  const blob = new Blob([[headers,...rows].join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.download='field_notes.csv'; a.href=URL.createObjectURL(blob); a.click();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(notes,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.download='field_notes.json'; a.href=URL.createObjectURL(blob); a.click();
}

// Init
window.addEventListener('load', async () => {
  renderList();
  try { await beam.connect(); } catch {}
  // Fallback GPS
  navigator.geolocation?.watchPosition(pos => {
    if (!currentGPS.lat) {
      currentGPS = {lat:pos.coords.latitude, lon:pos.coords.longitude, alt:pos.coords.altitude};
      updateGPSDisplay();
    }
  });
});
</script>
</body></html>
