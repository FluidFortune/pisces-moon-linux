<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css"><link rel="stylesheet" href="pm_theme.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STATIC // FLUID FORTUNE</title>
<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--pb:#1a3a50;--ac:#4dd9ff;--g:#4dffa6;--r:#ff5577;--w:#ffcc00;--go:#ffd166;--tx:#c8e6f5;--tb:#c8e8f5;--td:#2a5870;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:"Share Tech Mono",monospace;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#splash{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;max-width:420px;}
.app-icon{font-size:4rem;filter:drop-shadow(0 0 20px rgba(255,85,119,0.4));}
.app-name{font-family:"Orbitron",monospace;font-weight:900;font-size:2rem;color:var(--r);letter-spacing:6px;}
.app-tagline{font-size:.7rem;color:var(--td);letter-spacing:3px;text-align:center;}
.app-desc{font-size:.68rem;color:var(--tx);text-align:center;line-height:1.8;max-width:320px;border:1px solid var(--pb);padding:14px;background:var(--bg2);}
.launch-btn{width:100%;padding:16px;background:transparent;border:2px solid var(--r);color:var(--r);font-family:"Orbitron",monospace;font-size:.8rem;letter-spacing:4px;cursor:pointer;transition:all .2s;margin-top:8px;}
.launch-btn:hover{background:rgba(255,85,119,0.08);box-shadow:0 0 20px rgba(255,85,119,0.4);}
.launch-btn:active{transform:scale(.98);}
.meta-row{display:flex;gap:20px;font-size:.58rem;color:var(--td);}
.meta-item{display:flex;align-items:center;gap:5px;}
.meta-dot{width:6px;height:6px;border-radius:50%;}
.divider{width:100%;height:1px;background:var(--pb);margin:4px 0;}
.alt-row{display:flex;gap:10px;width:100%;}
.alt-btn{flex:1;padding:9px;background:transparent;border:1px solid var(--pb);color:var(--td);font-family:"Orbitron",monospace;font-size:.48rem;letter-spacing:2px;cursor:pointer;transition:all .15s;text-align:center;}
.alt-btn:hover{border-color:var(--ac);color:var(--ac);}
#frame-mode{display:none;flex-direction:column;height:100vh;width:100%;}
#frame-bar{background:var(--bg2);border-bottom:1px solid var(--pb);padding:6px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#frame-bar .app-label{font-family:"Orbitron",monospace;font-size:.6rem;color:var(--r);letter-spacing:3px;flex:1;}
#frame-bar .bar-btn{padding:5px 12px;background:transparent;border:1px solid var(--pb);color:var(--td);font-family:"Orbitron",monospace;font-size:.48rem;letter-spacing:1px;cursor:pointer;transition:all .15s;}
#frame-bar .bar-btn:hover{border-color:var(--r);color:var(--r);}
#app-frame{flex:1;border:none;width:100%;background:var(--bg);}
</style>
</head><body>
<div id="splash">
  <div class="app-icon">🎙</div>
  <div class="app-name">STATIC</div>
  <div class="app-tagline">PODCAST PUBLISHER // FLUID FORTUNE</div>
  <div class="divider"></div>
  <div class="app-desc">Podcast episode manager and RSS publisher. Archive.org audio hosting, GitHub Pages distribution, show settings, episode metadata. No subscription required.</div>
  <div class="meta-row">
    <div class="meta-item"><div class="meta-dot" style="background:var(--g)"></div>LIVE APP</div>
    <div class="meta-item"><div class="meta-dot" style="background:var(--ac)"></div>REQUIRES NETWORK</div>
    <div class="meta-item"><div class="meta-dot" style="background:var(--r)"></div>v0.1.0-alpha</div>
  </div>
  <button class="launch-btn" onclick="launchInline()">&#9654; LAUNCH STATIC</button>
  <div class="alt-row">
    <button class="alt-btn" onclick="launchExternal()">&#8859; OPEN IN BROWSER</button>
    <button class="alt-btn" onclick="launchGitHub()">&#8997; VIEW SOURCE</button>
  </div>
</div>
<div id="frame-mode">
  <div id="frame-bar">
    <span class="app-label">🎙 STATIC</span>
    <button class="bar-btn" onclick="reloadFrame()">&#8634; RELOAD</button>
    <button class="bar-btn" onclick="exitFrame()">&#10005; CLOSE</button>
  </div>
  <iframe id="app-frame" src="" allow="clipboard-read; clipboard-write"></iframe>
</div>
<script>
const APP_URL = 'http://static.fluidfortune.com';
const SRC_URL = 'https://github.com/FluidFortune/static';
function launchInline(){
  document.getElementById('splash').style.display='none';
  const fm=document.getElementById('frame-mode');
  fm.style.display='flex';
  document.getElementById('app-frame').src=APP_URL;
  document.body.style.padding='0';
  document.body.style.justifyContent='flex-start';
}
function launchExternal(){window.open(APP_URL,'_blank');}
function launchGitHub(){window.open(SRC_URL,'_blank');}
function reloadFrame(){document.getElementById('app-frame').src=APP_URL;}
function exitFrame(){
  document.getElementById('frame-mode').style.display='none';
  document.getElementById('splash').style.display='flex';
  document.getElementById('app-frame').src='';
  document.body.style.padding='24px';
  document.body.style.justifyContent='center';
}
</script>
</body></html>
