/* Bottom: charts + talkers */

.pa-bottom-section:last-child { border-right:none; }

canvas { display:block; }

            <canvas id="chart-sizes" width="100%" height="130"></canvas>

<script src="pm_scraper.js"></script>
<script src="pm_viz.js"></script>
<script src="pm_transport.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// PACKET ANALYSIS — Full protocol decoder, conversations, anomalies
// ═══════════════════════════════════════════════════════════════════

const PROTO_COLORS = {
    TCP:  '#00ff88', UDP:  '#ff6b00', DNS:  '#f4a820',
    HTTP: '#00d4ff', HTTPS:'#9b59b6', ARP:  '#e74c3c',
    ICMP: '#1abc9c', DHCP: '#e67e22', MQTT: '#ff3366',
    MDNS: '#f39c12', NTP:  '#3498db', OTHER:'#7ab8d4',
};

const packets      = [];          // all captured
let filtered       = [];          // after filter
let selectedIdx    = null;
let capturing      = true;
let filterStr      = '';
let viewMode       = 'list';
let protoChart, rateChart, sizeChart;
let rateSpark;
let conversations  = new Map();   // src:dst → {bytes, packets}
let anomalies      = [];
let talkers        = new Map();   // ip → bytes
let pktRate        = 0;
let lastRateCheck  = Date.now();
let pktsSinceCheck = 0;

// Known ports → protocol names
const WELL_KNOWN = {
    53:'DNS', 80:'HTTP', 443:'HTTPS', 22:'SSH', 23:'TELNET',
    25:'SMTP', 110:'POP3', 143:'IMAP', 67:'DHCP', 68:'DHCP',
    1883:'MQTT', 5353:'mDNS', 123:'NTP', 161:'SNMP',
    21:'FTP', 3389:'RDP', 5900:'VNC', 8080:'HTTP-ALT',
};

function protoFromPorts(sport, dport) {
    return WELL_KNOWN[dport] || WELL_KNOWN[sport] || null;
}

// ── Transport ─────────────────────────────────────────────────────
const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s) => {
        document.getElementById('liveBadge').style.opacity = s.state==='connected'?'1':'0.3';
        document.getElementById('lastUpdate').textContent = s.message;
    }
});

function handleData(msg) {
    if (!capturing) return;
    if (msg.type === 'PKT_CAPTURE' || msg.type === 'PKT') {
        ingestPacket(msg);
    }
}

// ── Packet ingestion ──────────────────────────────────────────────
let pktNum = 0;
function ingestPacket(raw) {
    pktNum++;
    pktsSinceCheck++;

    const pkt = {
        num:       pktNum,
        ts:        raw.ts || Date.now() / 1000,
        src_mac:   raw.src_mac || '',
        dst_mac:   raw.dst_mac || '',
        src_ip:    raw.src_ip  || '',
        dst_ip:    raw.dst_ip  || '',
        src_port:  raw.src_port || 0,
        dst_port:  raw.dst_port || 0,
        proto:     raw.proto   || 'OTHER',
        app_proto: raw.app_proto || protoFromPorts(raw.src_port, raw.dst_port) || raw.proto || 'OTHER',
        length:    raw.length  || raw.len || 0,
        flags:     raw.flags   || '',
        payload:   raw.payload || raw.payload_hex || '',
        info:      raw.info    || buildInfo(raw),
    };

    packets.push(pkt);
    if (packets.length > 5000) packets.shift(); // Rolling 5000 packet buffer

    // Track conversations
    const convKey = `${pkt.src_ip}:${pkt.src_port}↔${pkt.dst_ip}:${pkt.dst_port}`;
    const conv    = conversations.get(convKey) || {
        src: pkt.src_ip, dst: pkt.dst_ip,
        sport: pkt.src_port, dport: pkt.dst_port,
        proto: pkt.app_proto, bytes: 0, packets: 0, start: Date.now()
    };
    conv.bytes   += pkt.length;
    conv.packets++;
    conversations.set(convKey, conv);

    // Track talkers
    if (pkt.src_ip) talkers.set(pkt.src_ip, (talkers.get(pkt.src_ip)||0) + pkt.length);
    if (pkt.dst_ip) talkers.set(pkt.dst_ip, (talkers.get(pkt.dst_ip)||0) + pkt.length);

    // Anomaly detection
    detectAnomaly(pkt);

    // Update stats
    updateStats(pkt);
    applyFilter();

    // Charts update every 20 packets
    if (pktNum % 20 === 0) updateCharts();
}

function buildInfo(raw) {
    if (raw.proto === 'DNS')   return `Query: ${raw.domain||'?'}`;
    if (raw.proto === 'HTTP')  return `${raw.method||'GET'} ${raw.url||'/'}`;
    if (raw.proto === 'ARP')   return `Who has ${raw.target_ip||'?'}?`;
    if (raw.proto === 'ICMP')  return `${raw.icmp_type||'Echo'} id=${raw.icmp_id||0}`;
    if (raw.proto === 'DHCP')  return `${raw.dhcp_type||'Request'} ${raw.requested_ip||''}`;
    return raw.flags ? `Flags: ${raw.flags}` : '';
}

// ── Anomaly detection ─────────────────────────────────────────────
const portScanTracker = new Map(); // src_ip → Set of dst_ports
function detectAnomaly(pkt) {
    // Port scan detection — many different ports from one source
    if (pkt.src_ip) {
        const ports = portScanTracker.get(pkt.src_ip) || new Set();
        ports.add(pkt.dst_port);
        portScanTracker.set(pkt.src_ip, ports);
        if (ports.size > 20 && ports.size % 10 === 0) {
            anomalies.unshift({
                type: 'PORT SCAN',
                src: pkt.src_ip,
                detail: `${pkt.src_ip} probing ${ports.size} ports`,
                ts: Date.now(),
            });
        }
    }

    // ARP storm
    const recentArp = packets.slice(-50).filter(p => p.proto === 'ARP').length;
    if (recentArp > 20) {
        anomalies.unshift({
            type: 'ARP STORM', src: pkt.src_ip,
            detail: `${recentArp} ARP packets in last 50`, ts: Date.now()
        });
    }

    // Telnet / unencrypted services
    if ([23, 21, 80].includes(pkt.dst_port) || [23, 21, 80].includes(pkt.src_port)) {
        const name = WELL_KNOWN[pkt.dst_port] || WELL_KNOWN[pkt.src_port];
        if (!anomalies.find(a => a.detail.includes(name))) {
            anomalies.unshift({
                type: 'INSECURE PROTO',
                src: pkt.src_ip,
                detail: `${name} traffic detected (unencrypted)`,
                ts: Date.now(),
            });
        }
    }

    if (anomalies.length > 50) anomalies.length = 50;
    document.getElementById('statAnom').textContent = anomalies.length;
}

// ── Stats ─────────────────────────────────────────────────────────
const protoCounts = {TCP:0, UDP:0, DNS:0, HTTP:0, HTTPS:0, OTHER:0};
let totalBytes = 0;
function updateStats(pkt) {
    const proto = pkt.app_proto;
    if (protoCounts[proto] !== undefined) protoCounts[proto]++;
    else protoCounts.OTHER++;
    totalBytes += pkt.length;

    // Packet rate
    const now = Date.now();
    if (now - lastRateCheck > 1000) {
        pktRate        = pktsSinceCheck;
        pktsSinceCheck = 0;
        lastRateCheck  = now;
        document.getElementById('statRate').textContent = pktRate;
    }

    document.getElementById('statTotal').textContent = packets.length;
    document.getElementById('statTCP').textContent   = protoCounts.TCP;
    document.getElementById('statUDP').textContent   = protoCounts.UDP;
    document.getElementById('statDNS').textContent   = protoCounts.DNS;
    document.getElementById('statHTTP').textContent  = protoCounts.HTTP;
    document.getElementById('statBytes').textContent = formatBytes(totalBytes);
}

function formatBytes(b) {
    if (b < 1024)       return `${b}B`;
    if (b < 1048576)    return `${(b/1024).toFixed(1)}K`;
    return `${(b/1048576).toFixed(1)}M`;
}

// ── Filter ────────────────────────────────────────────────────────
function applyFilter() {
    const f = filterStr.toLowerCase().trim();

    if (!f) {
        filtered = packets;
    } else {
        filtered = packets.filter(p => {
            if (f === 'tcp')   return p.proto === 'TCP';
            if (f === 'udp')   return p.proto === 'UDP';
            if (f === 'dns')   return p.app_proto === 'DNS';
            if (f === 'http')  return p.app_proto === 'HTTP' || p.app_proto === 'HTTPS';
            if (f === 'arp')   return p.proto === 'ARP';
            if (f === 'icmp')  return p.proto === 'ICMP';
            if (f.startsWith('ip=')) {
                const ip = f.split('=')[1];
                return p.src_ip.includes(ip) || p.dst_ip.includes(ip);
            }
            if (f.startsWith('port=')) {
                const port = parseInt(f.split('=')[1]);
                return p.src_port === port || p.dst_port === port;
            }
            // General text search
            return JSON.stringify(p).toLowerCase().includes(f);
        });
    }

    document.getElementById('filterStatus').textContent =
        f ? `${filtered.length}/${packets.length} shown` : '';

    renderPacketList();
}

function clearFilter() {
    filterStr = '';
    document.getElementById('filterInput').value = '';
    applyFilter();
}

// ── Packet list ───────────────────────────────────────────────────
function renderPacketList() {
    const pane = document.getElementById('packetPane');
    const list = document.getElementById('packetList');

    if (viewMode === 'conversations') {
        renderConversations();
        return;
    }
    if (viewMode === 'anomalies') {
        renderAnomalies();
        return;
    }

    // Show last 200 filtered packets (performance)
    const visible = filtered.slice(-200);
    list.innerHTML = visible.map(p => {
        const color = PROTO_COLORS[p.app_proto] || PROTO_COLORS.OTHER;
        return `
        <div class="pa-pkt ${selectedIdx===p.num?'selected':''}"
             onclick="selectPacket(${p.num})">
            <span class="num">${p.num}</span>
            <span class="time">${formatTime(p.ts)}</span>
            <span class="src">${PM.esc(p.src_ip||p.src_mac||'').substring(0,15)}</span>
            <span class="dst">${PM.esc(p.dst_ip||p.dst_mac||'').substring(0,15)}</span>
            <span class="proto" style="color:${color}">${PM.esc(p.app_proto)}</span>
            <span class="len">${p.length}</span>
            <span class="info">${PM.esc(p.info||'')}</span>
        </div>`;
    }).join('');

    // Auto-scroll if at bottom
    if (pane.scrollTop + pane.clientHeight >= pane.scrollHeight - 50) {
        list.scrollTop = list.scrollHeight;
    }
}

function formatTime(ts) {
    const d = new Date(ts * 1000);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}.${String(d.getMilliseconds()).padStart(3,'0')}`;
}

function selectPacket(num) {
    selectedIdx = num;
    const pkt   = packets.find(p => p.num === num);
    if (!pkt) return;

    renderPacketList();
    renderPacketDetail(pkt);
}

// ── Packet detail ─────────────────────────────────────────────────
function renderPacketDetail(pkt) {
    const detail = document.getElementById('detailPane');

    const layer = (cls, title, fields) => `
        <div class="pa-detail-section">
            <div class="pa-detail-section-header ${cls}">
                <span>▼ ${title}</span>
                <span style="color:var(--text-dim);font-size:.5rem">${pkt.length} bytes</span>
            </div>
            ${fields.map(([k,v]) => v ? `
                <div class="pa-detail-field">
                    <span class="field-name">${k}</span>
                    <span class="field-value">${PM.esc(String(v))}</span>
                </div>` : '').join('')}
        </div>`;

    let html = '';

    // Ethernet
    if (pkt.src_mac || pkt.dst_mac) {
        html += layer('eth', 'ETHERNET', [
            ['Source MAC',       pkt.src_mac],
            ['Destination MAC',  pkt.dst_mac],
        ]);
    }

    // IP
    if (pkt.src_ip) {
        html += layer('ip', 'INTERNET PROTOCOL', [
            ['Source IP',      pkt.src_ip],
            ['Destination IP', pkt.dst_ip],
            ['Protocol',       pkt.proto],
            ['Length',         pkt.length],
        ]);
    }

    // Transport
    if (pkt.src_port) {
        html += layer(pkt.proto==='TCP'?'tcp':'udp',
            `${pkt.proto} (${pkt.src_port} → ${pkt.dst_port})`, [
            ['Source Port',       pkt.src_port + (WELL_KNOWN[pkt.src_port]?' ('+WELL_KNOWN[pkt.src_port]+')':'')],
            ['Destination Port',  pkt.dst_port + (WELL_KNOWN[pkt.dst_port]?' ('+WELL_KNOWN[pkt.dst_port]+')':'')],
            ['Flags',             pkt.flags],
        ]);
    }

    // Application layer
    if (pkt.app_proto !== pkt.proto) {
        const appFields = [];
        if (pkt.app_proto === 'DNS')   appFields.push(['Domain', pkt.domain], ['Query Type', pkt.query_type]);
        if (pkt.app_proto === 'HTTP')  appFields.push(['Method', pkt.method], ['URL', pkt.url], ['Host', pkt.host]);
        if (pkt.app_proto === 'DHCP')  appFields.push(['Type', pkt.dhcp_type], ['Requested IP', pkt.requested_ip]);
        if (pkt.app_proto === 'MQTT')  appFields.push(['Topic', pkt.topic], ['QoS', pkt.qos]);
        if (appFields.length > 0) {
            html += layer('app', pkt.app_proto, appFields);
        }
    }

    // Payload hex
    if (pkt.payload) {
        const hex  = pkt.payload;
        const bytes = hex.match(/.{1,2}/g) || [];
        const hexStr  = bytes.map(b => `<span class="hex-byte">${b} </span>`).join('');
        const asciiStr = bytes.map(b => {
            const code = parseInt(b, 16);
            return `<span class="hex-ascii">${code >= 32 && code < 127 ? String.fromCharCode(code) : '.'}</span>`;
        }).join('');
        html += `<div class="pa-detail-section">
            <div class="pa-detail-section-header app">▼ PAYLOAD (${bytes.length} bytes)</div>
            <div class="pa-hex">${hexStr}<br><br>${asciiStr}</div>
        </div>`;
    }

    detail.innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:.65rem">No decoded fields available</div>';
}

// ── Conversations view ────────────────────────────────────────────
function renderConversations() {
    const list = document.getElementById('packetList');
    const convArr = Array.from(conversations.values())
        .sort((a,b) => b.bytes - a.bytes).slice(0, 50);

    list.innerHTML = `
        <div style="display:grid;grid-template-columns:120px 120px 70px 70px 70px 1fr;padding:4px 8px;background:var(--bg2);font-size:.58rem;color:var(--text-dim);border-bottom:2px solid var(--panel-border)">
            <span>SOURCE</span><span>DESTINATION</span><span>PROTO</span><span>PKTS</span><span>BYTES</span><span>DURATION</span>
        </div>
        ${convArr.map(c => `
        <div style="display:grid;grid-template-columns:120px 120px 70px 70px 70px 1fr;padding:4px 8px;font-size:.6rem;border-bottom:1px solid rgba(28,46,58,.3)">
            <span style="color:var(--text-bright);font-family:monospace">${c.src}:${c.sport}</span>
            <span style="color:var(--text-bright);font-family:monospace">${c.dst}:${c.dport}</span>
            <span style="color:${PROTO_COLORS[c.proto]||PMViz.C.text}">${c.proto}</span>
            <span style="color:var(--text-dim)">${c.packets}</span>
            <span style="color:var(--accent)">${formatBytes(c.bytes)}</span>
            <span style="color:var(--text-dim)">${((Date.now()-c.start)/1000).toFixed(1)}s</span>
        </div>`).join('')}`;
}

// ── Anomaly view ──────────────────────────────────────────────────
function renderAnomalies() {
    const list = document.getElementById('packetList');
    list.innerHTML = anomalies.length === 0
        ? '<div style="padding:30px;text-align:center;color:var(--accent3)">✓ No anomalies detected</div>'
        : anomalies.map(a => `
            <div style="padding:10px 12px;border-bottom:1px solid rgba(255,51,102,.15)">
                <div style="font-family:Orbitron,monospace;font-size:.52rem;letter-spacing:1px;color:var(--accent4)">${a.type}</div>
                <div style="font-size:.65rem;color:var(--text);margin:4px 0">${a.detail}</div>
                <div style="font-size:.55rem;color:var(--text-dim)">${new Date(a.ts).toLocaleTimeString()}</div>
            </div>`).join('');
}

// ── Charts ────────────────────────────────────────────────────────
function initCharts() {
    const pw = document.querySelector('.pa-bottom-section').offsetWidth - 16;
    ['chart-proto','chart-rate','chart-sizes'].forEach(id => {
        const c = document.getElementById(id);
        c.width = pw;
        c.height = 130;
    });

    protoChart = new PMViz.DonutChart('chart-proto');
    rateChart  = new PMViz.Sparkline('chart-rate', {color:PMViz.C.accent, maxPts:60});
    sizeChart  = new PMViz.BarChart('chart-sizes', {horizontal:false, colorFn:()=>PMViz.C.gold});
}

function updateCharts() {
    // Protocol donut
    protoChart.update(
        Object.entries(protoCounts)
            .filter(([,v])=>v>0)
            .map(([label,value])=>({label,value,color:PROTO_COLORS[label]}))
    );

    // Rate sparkline
    rateChart.push(pktRate);

    // Packet size distribution
    const sizeRanges = {'<64':0,'64-256':0,'256-512':0,'512-1024':0,'>1024':0};
    packets.slice(-200).forEach(p => {
        if      (p.length < 64)   sizeRanges['<64']++;
        else if (p.length < 256)  sizeRanges['64-256']++;
        else if (p.length < 512)  sizeRanges['256-512']++;
        else if (p.length < 1024) sizeRanges['512-1024']++;
        else                      sizeRanges['>1024']++;
    });
    sizeChart.update(Object.entries(sizeRanges).map(([label,value])=>({label,value})));

    // Top talkers
    const top = Array.from(talkers.entries())
        .sort((a,b)=>b[1]-a[1]).slice(0,6);
    document.getElementById('topTalkers').innerHTML = top.map(([ip,bytes]) => `
        <div class="pa-talker">
            <span class="ip">${ip}</span>
            <span class="bytes">${formatBytes(bytes)}</span>
        </div>`).join('');
}

// ── Controls ──────────────────────────────────────────────────────
function toggleCapture() {
    capturing = !capturing;
    const btn = document.getElementById('btnCapture');
    btn.className  = 'pa-btn' + (capturing?' active':'');
    btn.textContent= capturing ? '⬤ CAPTURE' : '◯ PAUSED';
    document.getElementById('liveBadge').style.opacity = capturing?'1':'0.3';
    if (beam.connected) {
        beam.send({type: capturing?'CMD_PKT_SNIFF':'CMD_STOP_ALL', src:'app', cmd_id:'pa1'});
    }
}

function clearPackets() {
    packets.length = 0;
    filtered.length = 0;
    pktNum = 0;
    conversations.clear();
    talkers.clear();
    anomalies.length = 0;
    Object.keys(protoCounts).forEach(k => protoCounts[k] = 0);
    totalBytes = 0;
    renderPacketList();
    updateCharts();
}

function setView(v) {
    viewMode = v;
    document.getElementById('btnList').className  = 'pa-btn' + (v==='list'?' active':'');
    document.getElementById('btnConv').className  = 'pa-btn' + (v==='conversations'?' active':'');
    document.getElementById('btnAnomaly').className = 'pa-btn' + (v==='anomalies'?' active':'');
    renderPacketList();
}

function saveNow() {
    PMViz.Storage.save('pkt_analysis', packets.slice(-1000), 'json');
}

window.addEventListener('load', async () => {
    initCharts();
    applyFilter();
    document.getElementById('filterInput').addEventListener('input', (e) => {
        filterStr = e.target.value;
        applyFilter();
    });
    try { await beam.connect(); }
    catch(e) { console.log('No hardware — demo mode'); }
    if (beam.connected) {
        beam.send({type:'CMD_PKT_SNIFF', src:'app', cmd_id:'pa0'});
    }
    setInterval(updateCharts, 2000);
});
</script>
</body></html>
