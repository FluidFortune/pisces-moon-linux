<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.layout { display:grid; grid-template-columns:300px 1fr 300px; height:calc(100vh - 52px); overflow:hidden; }
.left-col { border-right:1px solid var(--panel-border); overflow-y:auto; }
.right-col { border-left:1px solid var(--panel-border); overflow-y:auto; }
.center-col { position:relative; background:var(--bg); display:flex; flex-direction:column; }
.stats { display:flex; border-bottom:1px solid var(--panel-border); background:var(--bg2); }
.stat { flex:1; padding:10px 14px; border-right:1px solid var(--panel-border); text-align:center; }
.stat:last-child { border-right:none; }
.stat-label { font-family:Orbitron,monospace; font-size:.48rem; letter-spacing:2px; color:var(--text-dim); }
.stat-value { font-family:Orbitron,monospace; font-size:1.2rem; color:var(--text-bright); font-weight:700; }
.item { padding:10px 12px; border-bottom:1px solid rgba(28,46,58,.4); cursor:pointer; font-size:.7rem; transition:background .15s; }
.item:hover { background:rgba(77,217,255,.04); }
.item.selected { background:rgba(77,217,255,.08); border-left:2px solid var(--accent); }
.item-primary { color:var(--text-bright); margin-bottom:3px; }
.item-meta { font-size:.58rem; color:var(--text-dim); display:flex; gap:8px; }
.chart-section { padding:8px; border-bottom:1px solid var(--panel-border); }
.chart-title { font-family:Orbitron,monospace; font-size:.52rem; letter-spacing:2px; color:var(--gold); margin-bottom:6px; }
.center-canvas-wrap { flex:1; position:relative; }
#center-canvas { width:100%; height:100%; }
.controls { padding:8px 12px; border-bottom:1px solid var(--panel-border); background:var(--bg2); display:flex; gap:8px; }
.btn { padding:6px 14px; background:transparent; border:1px solid var(--accent); color:var(--accent);
    font-family:Share\ Tech\ Mono,monospace; font-size:.62rem; cursor:pointer; letter-spacing:2px; transition:all .15s; }
.btn:hover { background:var(--accent); color:var(--bg); }
</style>
</head><body>

<header class="pm-header">
    <div class="pm-logo">📍 <em>SPOTTER</em></div>
    <div class="pm-hdr-right">
        <div class="pm-live-badge" id="liveBadge" style="opacity:.3">
            <div class="pm-live-dot"></div>LIVE
        </div>

    </div>
</header>

<div class="stats">
    <div class="stat"><div class="stat-label">BEACONS</div><div class="stat-value" id="statBeacons">0</div></div>
    <div class="stat"><div class="stat-label">IBEACON</div><div class="stat-value" id="statIB">0</div></div>
    <div class="stat"><div class="stat-label">EDDYSTONE</div><div class="stat-value" id="statEB">0</div></div>
    <div class="stat"><div class="stat-label">ALTBEACON</div><div class="stat-value" id="statAB">0</div></div>

</div>

<div class="layout">
    <div class="left-col">
        <div class="pm-sh" style="position:sticky;top:0;z-index:10">BEACONS</div>
        <div id="itemList"></div>
    </div>

    <div class="center-col">
        <div class="controls">
            <button class="btn" onclick="startCapture()">⬤ CAPTURE</button>
            <button class="btn" onclick="stopCapture()">◯ STOP</button>
            <button class="btn" onclick="saveNow()">💾 SAVE</button>
            <button class="btn" onclick="clearData()">CLEAR</button>
        </div>
        <div class="center-canvas-wrap">
            <canvas id="center-canvas"></canvas>
        </div>
        <div class="chart-section" style="padding:6px 8px">
            <div class="chart-title">SIGNAL WATERFALL</div>
        </div>
    </div>

    <div class="right-col">
        <div class="chart-section">
            <div class="chart-title">BEACON TYPES</div>
            <canvas id="chart1" width="284" height="200"></canvas>
        </div>
        <div class="chart-section">
            <div class="chart-title">RSSI TIMELINE — SELECTED</div>
            <canvas id="chart2" width="284" height="120"></canvas>
        </div>
    </div>
</div>

<script src="pm_lib.js"></script>
<script src="pm_viz.js"></script>
<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            this.ws.onopen = () => resolve();
            this.ws.onerror = () => reject(new Error(`WebSocket failed at ${this.wsUrl}`));

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed");
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
// BEACON SPOTTER — BLE beacon detection — iBeacon, Eddystone, AltBeacon
const items  = new Map();
let chart1, chart2, waterfall;
let capturing = false;
let selected  = null;

function initViz() {
    const cc = document.getElementById('center-canvas');
    // Defer sizing until after flex layout renders so offsetHeight is non-zero
    requestAnimationFrame(() => {
        cc.width  = cc.parentElement.offsetWidth  || 600;
        cc.height = cc.parentElement.offsetHeight || 400;
        waterfall = new PMViz.RSSIWaterfall('center-canvas', {rows:50, cols:20});
    });
    chart1 = new PMViz.DonutChart('chart1');
    chart2 = new PMViz.Sparkline('chart2', {color:PMViz.C.accent, maxPts:60});
}

const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s) => {
        document.getElementById('liveBadge').style.opacity = s.state==='connected'?'1':'0.3';
        document.getElementById('lastUpdate').textContent = s.message;
    }
});

function handleData(msg) {
    // Accept bridge events ('ble', 'wardrive') AND legacy ('BLE_OBS')
    if (msg.type !== 'BLE_OBS' && msg.type !== 'ble' && msg.type !== 'wardrive') return;
    // Normalize fields from bridge -> app format
    if (msg.type === 'ble') {
        msg.src_mac = msg.mac;
        msg.proto = 'BLE';
        msg.type_name = 'BLE';
    } else if (msg.type === 'wardrive') {
        msg.src_mac = msg.bssid;
        msg.proto = 'WiFi';
        msg.type_name = 'WiFi-' + (msg.enc ? 'encrypted' : 'open');
        msg.channel = msg.ch;
    }
    const key = msg.mac || msg.src_mac || msg.id || Date.now().toString();
    items.set(key, { ...msg, ts: Date.now() });
    updateStats();
    renderList();
    updateCharts();
}

function updateStats() {
    const arr = Array.from(items.values());
    const el0 = document.getElementById('statBeacons');
    if (el0) el0.textContent = arr.length;
}

function renderList() {
    const arr = Array.from(items.values()).sort((a,b) => b.ts - a.ts).slice(0,100);
    document.getElementById('itemList').innerHTML = arr.map(d => `
        <div class="item ${selected===d.mac?'selected':''}" onclick="selectItem('${PM.esc(d.mac||d.src_mac||'')}')">
            <div class="item-primary">${PM.esc(d.ssid||d.name||d.src_mac||d.mac||'unknown')}</div>
            <div class="item-meta">
                ${d.rssi ? `<span style="color:${PMViz.rssiColor(d.rssi)}">${d.rssi}dBm</span>` : ''}
                ${d.channel ? `<span>ch${d.channel}</span>` : ''}
                ${d.proto  ? `<span>${PM.esc(d.proto)}</span>` : ''}
                <span style="margin-left:auto;color:var(--text-dim)">${new Date(d.ts).toLocaleTimeString()}</span>
            </div>
        </div>`).join('');
}

function selectItem(id) { selected = id; renderList(); }

function updateCharts() {
    const arr = Array.from(items.values());
    // Type/protocol distribution
    const typeCounts = {};
    arr.forEach(d => { const k = d.type_name||d.proto||d.beacon_type||'other'; typeCounts[k]=(typeCounts[k]||0)+1; });
    chart1.update(Object.entries(typeCounts).map(([label,value])=>{return {label,value}}));
    // Latest RSSI for sparkline
    if (arr.length > 0 && arr[arr.length-1].rssi) chart2.push(arr[arr.length-1].rssi);
    // Waterfall
    const wfData = arr.slice(-20).map((d,i) => ({col:i, rssi:d.rssi||-80}));
    waterfall.push(wfData);
}

function startCapture() {
    capturing = true;
    if (beam.connected) beam.send({type:'CMD_BLE_SCAN', src:'app', cmd_id:'cap1'});
}

function stopCapture() {
    capturing = false;
    if (beam.connected) beam.send({type:'CMD_STOP_ALL', src:'app', cmd_id:'cap2'});
}

function saveNow() {
    PMViz.Storage.save('beacon_spotter', Array.from(items.values()), 'json');
}

function clearData() {
    items.clear();
    renderList();
    updateStats();
}

window.addEventListener('load', async () => {
    initViz();
    try { await beam.connect(); } catch(e) { console.log('No hardware — demo mode'); }
});
</script>
