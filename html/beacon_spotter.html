<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // BEACON SPOTTER</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
.layout { display:grid; grid-template-columns:300px 1fr 300px; height:calc(100vh - 52px); overflow:hidden; }
.left-col { border-right:1px solid var(--panel-border); overflow-y:auto; }
.right-col { border-left:1px solid var(--panel-border); overflow-y:auto; }
.center-col { position:relative; background:var(--bg); display:flex; flex-direction:column; }
.stats { display:flex; border-bottom:1px solid var(--panel-border); background:var(--bg2); }
.stat { flex:1; padding:10px 14px; border-right:1px solid var(--panel-border); text-align:center; }
.stat:last-child { border-right:none; }
.stat-label { font-family:Orbitron,monospace; font-size:.48rem; letter-spacing:2px; color:var(--text-dim); }
.stat-value { font-family:Orbitron,monospace; font-size:1.2rem; color:var(--text-bright); font-weight:700; }
.item { padding:10px 12px; border-bottom:1px solid rgba(28,46,58,.4); cursor:pointer; font-size:.7rem; transition:background .15s; }
.item:hover { background:rgba(0,212,255,.04); }
.item.selected { background:rgba(0,212,255,.08); border-left:2px solid var(--accent); }
.item-primary { color:var(--text-bright); margin-bottom:3px; }
.item-meta { font-size:.58rem; color:var(--text-dim); display:flex; gap:8px; }
.chart-section { padding:8px; border-bottom:1px solid var(--panel-border); }
.chart-title { font-family:Orbitron,monospace; font-size:.52rem; letter-spacing:2px; color:var(--gold); margin-bottom:6px; }
.center-canvas-wrap { flex:1; position:relative; }
#center-canvas { width:100%; height:100%; }
.controls { padding:8px 12px; border-bottom:1px solid var(--panel-border); background:var(--bg2); display:flex; gap:8px; }
.btn { padding:6px 14px; background:transparent; border:1px solid var(--accent); color:var(--accent);
    font-family:Share\ Tech\ Mono,monospace; font-size:.62rem; cursor:pointer; letter-spacing:2px; transition:all .15s; }
.btn:hover { background:var(--accent); color:var(--bg); }
</style>
</head><body>

<header class="pm-header">
    <div class="pm-logo">📍 <em>SPOTTER</em></div>
    <div class="pm-hdr-right">
        <div class="pm-live-badge" id="liveBadge" style="opacity:.3">
            <div class="pm-live-dot"></div>LIVE
        </div>
        <span class="pm-last-update" id="lastUpdate"></span>
        <button class="pm-refresh" onclick="startCapture()">⟳ START</button>
    </div>
</header>

<div class="stats">
    <div class="stat"><div class="stat-label">BEACONS</div><div class="stat-value" id="statBeacons">0</div></div>
    <div class="stat"><div class="stat-label">IBEACON</div><div class="stat-value" id="statIB">0</div></div>
    <div class="stat"><div class="stat-label">EDDYSTONE</div><div class="stat-value" id="statEB">0</div></div>
    <div class="stat"><div class="stat-label">ALTBEACON</div><div class="stat-value" id="statAB">0</div></div>

</div>

<div class="layout">
    <div class="left-col">
        <div class="pm-sh" style="position:sticky;top:0;z-index:10">BEACONS</div>
        <div id="itemList"></div>
    </div>

    <div class="center-col">
        <div class="controls">
            <button class="btn" onclick="startCapture()">⬤ CAPTURE</button>
            <button class="btn" onclick="stopCapture()">◯ STOP</button>
            <button class="btn" onclick="saveNow()">💾 SAVE</button>
            <button class="btn" onclick="clearData()">CLEAR</button>
        </div>
        <div class="center-canvas-wrap">
            <canvas id="center-canvas"></canvas>
        </div>
        <div class="chart-section" style="padding:6px 8px">
            <div class="chart-title">SIGNAL WATERFALL</div>
        </div>
    </div>

    <div class="right-col">
        <div class="chart-section">
            <div class="chart-title">BEACON TYPES</div>
            <canvas id="chart1" width="284" height="200"></canvas>
        </div>
        <div class="chart-section">
            <div class="chart-title">RSSI TIMELINE — SELECTED</div>
            <canvas id="chart2" width="284" height="120"></canvas>
        </div>
    </div>
</div>

<script src="pm_scraper.js"></script>
<script src="pm_viz.js"></script>
<script src="pm_transport.js"></script>
<script>
// BEACON SPOTTER — BLE beacon detection — iBeacon, Eddystone, AltBeacon
const items  = new Map();
let chart1, chart2, waterfall;
let capturing = false;
let selected  = null;

function initViz() {
    const cc = document.getElementById('center-canvas');
    cc.width  = cc.parentElement.offsetWidth;
    cc.height = cc.parentElement.offsetHeight;
    waterfall = new PMViz.RSSIWaterfall('center-canvas', {rows:50, cols:20});
    chart1    = new PMViz.DonutChart('chart1');
    chart2    = new PMViz.Sparkline('chart2', {color:PMViz.C.accent, maxPts:60});
}

const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s) => {
        document.getElementById('liveBadge').style.opacity = s.state==='connected'?'1':'0.3';
        document.getElementById('lastUpdate').textContent = s.message;
    }
});

function handleData(msg) {
    if (msg.type !== 'BLE_OBS') return;
    const key = msg.mac || msg.src_mac || msg.id || Date.now().toString();
    items.set(key, { ...msg, ts: Date.now() });
    updateStats();
    renderList();
    updateCharts();
}

function updateStats() {
    const arr = Array.from(items.values());
    const el0 = document.getElementById('statBeacons');
    if (el0) el0.textContent = arr.length;
}

function renderList() {
    const arr = Array.from(items.values()).sort((a,b) => b.ts - a.ts).slice(0,100);
    document.getElementById('itemList').innerHTML = arr.map(d => `
        <div class="item ${selected===d.mac?'selected':''}" onclick="selectItem('${PM.esc(d.mac||d.src_mac||'')}')">
            <div class="item-primary">${PM.esc(d.ssid||d.name||d.src_mac||d.mac||'unknown')}</div>
            <div class="item-meta">
                ${d.rssi ? `<span style="color:${PMViz.rssiColor(d.rssi)}">${d.rssi}dBm</span>` : ''}
                ${d.channel ? `<span>ch${d.channel}</span>` : ''}
                ${d.proto  ? `<span>${PM.esc(d.proto)}</span>` : ''}
                <span style="margin-left:auto;color:var(--text-dim)">${new Date(d.ts).toLocaleTimeString()}</span>
            </div>
        </div>`).join('');
}

function selectItem(id) { selected = id; renderList(); }

function updateCharts() {
    const arr = Array.from(items.values());
    // Type/protocol distribution
    const typeCounts = {};
    arr.forEach(d => { const k = d.type_name||d.proto||d.beacon_type||'other'; typeCounts[k]=(typeCounts[k]||0)+1; });
    chart1.update(Object.entries(typeCounts).map(([label,value])=>{return {label,value}}));
    // Latest RSSI for sparkline
    if (arr.length > 0 && arr[arr.length-1].rssi) chart2.push(arr[arr.length-1].rssi);
    // Waterfall
    const wfData = arr.slice(-20).map((d,i) => ({col:i, rssi:d.rssi||-80}));
    waterfall.push(wfData);
}

function startCapture() {
    capturing = true;
    if (beam.connected) beam.send({type:'CMD_BLE_SCAN', src:'app', cmd_id:'cap1'});
}

function stopCapture() {
    capturing = false;
    if (beam.connected) beam.send({type:'CMD_STOP_ALL', src:'app', cmd_id:'cap2'});
}

function saveNow() {
    PMViz.Storage.save('beacon_spotter', Array.from(items.values()), 'json');
}

function clearData() {
    items.clear();
    renderList();
    updateStats();
}

window.addEventListener('load', async () => {
    initViz();
    try { await beam.connect(); } catch(e) { console.log('No hardware — demo mode'); }
});
</script>
</body></html>
