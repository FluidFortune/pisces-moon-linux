<!-- PISCES MOON OS // CLOCK -->
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // CLOCK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#00d4ff;--accent2:#ff6b00;--accent3:#00ff88;--accent4:#ff3366;--warn:#ffcc00;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;--glow:0 0 20px rgba(0,212,255,.3);--glow-gold:0 0 20px rgba(244,168,32,.4);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999;}
.tabs{display:flex;background:var(--bg2);border-bottom:2px solid var(--panel-border);}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-family:'Orbitron',monospace;font-size:.62rem;color:var(--text-dim);letter-spacing:2px;border-bottom:2px solid transparent;transition:all .2s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.page{display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;padding:20px;}
.page.active{display:flex;}

/* Clock */
.time-big{font-family:'Orbitron',monospace;font-size:clamp(3rem,12vw,7rem);font-weight:900;color:var(--text-bright);text-shadow:var(--glow);letter-spacing:4px;line-height:1;}
.time-sep{color:var(--accent);animation:blink 1s infinite;}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.2}}
.date-line{font-size:.85rem;color:var(--gold);text-shadow:var(--glow-gold);letter-spacing:4px;margin-top:12px;font-family:'Orbitron',monospace;}
.tz-line{font-size:.65rem;color:var(--text-dim);letter-spacing:3px;margin-top:8px;}

/* Stopwatch */
.sw-display{font-family:'Orbitron',monospace;font-size:clamp(2.5rem,10vw,5.5rem);font-weight:900;color:var(--accent);text-shadow:var(--glow);letter-spacing:4px;margin-bottom:20px;}
.sw-ms{font-size:.4em;color:var(--text-dim);}
.btn-row{display:flex;gap:14px;margin-top:10px;}
.btn{padding:12px 28px;background:transparent;border:2px solid var(--accent);color:var(--accent);font-family:'Orbitron',monospace;font-size:.72rem;cursor:pointer;letter-spacing:2px;transition:all .2s;}
.btn:hover{background:var(--accent);color:var(--bg);box-shadow:var(--glow);}
.btn.orange{border-color:var(--accent2);color:var(--accent2);}
.btn.orange:hover{background:var(--accent2);color:var(--bg);}
.btn.red{border-color:var(--accent4);color:var(--accent4);}
.btn.red:hover{background:var(--accent4);color:var(--bg);}
.btn.green{border-color:var(--accent3);color:var(--accent3);}
.btn.green:hover{background:var(--accent3);color:var(--bg);}
.splits{margin-top:16px;max-height:200px;overflow-y:auto;width:100%;max-width:400px;}
.split{display:flex;justify-content:space-between;padding:6px 12px;border-bottom:1px solid rgba(26,58,80,.3);font-size:.7rem;}
.split-n{color:var(--text-dim);}
.split-t{color:var(--text-bright);}
.split-d{color:var(--accent2);}

/* Timer */
.timer-setup{display:flex;gap:10px;align-items:center;margin-bottom:20px;}
.timer-input{background:var(--bg3);border:2px solid var(--panel-border);color:var(--text-bright);font-family:'Orbitron',monospace;font-size:1.5rem;width:70px;text-align:center;padding:10px;outline:none;}
.timer-input:focus{border-color:var(--accent);}
.timer-lbl{font-size:.6rem;color:var(--text-dim);letter-spacing:2px;display:block;text-align:center;margin-top:2px;}
.timer-display{font-family:'Orbitron',monospace;font-size:clamp(3rem,11vw,6rem);font-weight:900;letter-spacing:4px;margin-bottom:16px;transition:color .3s;}
.timer-display.running{color:var(--accent3);text-shadow:0 0 20px rgba(0,255,136,.4);}
.timer-display.done{color:var(--accent4);animation:flash 0.5s infinite;}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.3}}

::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg3);} ::-webkit-scrollbar-thumb{background:var(--panel-border);}
</style></head><body>
<div class="tabs">
  <div class="tab active" onclick="setTab('clock')">CLOCK</div>
  <div class="tab" onclick="setTab('stopwatch')">STOPWATCH</div>
  <div class="tab" onclick="setTab('timer')">TIMER</div>
</div>

<!-- CLOCK -->
<div class="page active" id="pg-clock">
  <div class="time-big" id="clockDisplay">00<span class="time-sep">:</span>00<span class="time-sep">:</span>00</div>
  <div class="date-line" id="dateDisplay"></div>
  <div class="tz-line" id="tzDisplay"></div>
</div>

<!-- STOPWATCH -->
<div class="page" id="pg-stopwatch">
  <div class="sw-display" id="swDisplay">00:00<span class="sw-ms">.00</span></div>
  <div class="btn-row">
    <button class="btn green" id="swStart" onclick="swToggle()">START</button>
    <button class="btn orange" onclick="swLap()">LAP</button>
    <button class="btn red" onclick="swReset()">RESET</button>
  </div>
  <div class="splits" id="swSplits"></div>
</div>

<!-- TIMER -->
<div class="page" id="pg-timer">
  <div class="timer-setup" id="timerSetup">
    <div><input class="timer-input" id="tH" type="number" min="0" max="99" value="0" placeholder="HH"><span class="timer-lbl">HOURS</span></div>
    <div style="font-family:'Orbitron',monospace;font-size:2rem;color:var(--text-dim);padding-top:4px">:</div>
    <div><input class="timer-input" id="tM" type="number" min="0" max="59" value="0" placeholder="MM"><span class="timer-lbl">MIN</span></div>
    <div style="font-family:'Orbitron',monospace;font-size:2rem;color:var(--text-dim);padding-top:4px">:</div>
    <div><input class="timer-input" id="tS" type="number" min="0" max="59" value="0" placeholder="SS"><span class="timer-lbl">SEC</span></div>
  </div>
  <div class="timer-display" id="timerDisplay">00:00:00</div>
  <div class="btn-row">
    <button class="btn green" id="timerStart" onclick="timerToggle()">START</button>
    <button class="btn red" onclick="timerReset()">RESET</button>
  </div>
</div>

<script>
// ── Tab ────────────────────────────────────────────────
function setTab(t){
  document.querySelectorAll('.tab,.page').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${t==='clock'?1:t==='stopwatch'?2:3})`).classList.add('active');
  document.getElementById('pg-'+t).classList.add('active');
}

// ── Clock ──────────────────────────────────────────────
function tickClock(){
  const n=new Date();
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clockDisplay').innerHTML=
    `${p(n.getHours())}<span class="time-sep">:</span>${p(n.getMinutes())}<span class="time-sep">:</span>${p(n.getSeconds())}`;
  document.getElementById('dateDisplay').textContent=
    n.toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
  document.getElementById('tzDisplay').textContent=
    Intl.DateTimeFormat().resolvedOptions().timeZone+' · UTC'+
    (n.getTimezoneOffset()<=0?'+':'-')+String(Math.abs(n.getTimezoneOffset()/60)).padStart(2,'0')+':00';
}
setInterval(tickClock,1000); tickClock();

// ── Stopwatch ──────────────────────────────────────────
let swRunning=false, swStart=0, swElapsed=0, swInterval=null, swLaps=[], swLapStart=0;

function swToggle(){
  if(swRunning){
    clearInterval(swInterval); swElapsed+=Date.now()-swStart; swRunning=false;
    document.getElementById('swStart').textContent='RESUME';
    document.getElementById('swStart').className='btn orange';
  }else{
    swStart=Date.now(); swRunning=true;
    document.getElementById('swStart').textContent='STOP';
    document.getElementById('swStart').className='btn red';
    swInterval=setInterval(swTick,50);
    if(!swLapStart)swLapStart=swStart;
  }
}

function swTick(){
  const total=swElapsed+(Date.now()-swStart);
  document.getElementById('swDisplay').innerHTML=formatSW(total)+'<span class="sw-ms">.'+String(Math.floor((total%1000)/10)).padStart(2,'0')+'</span>';
}

function swLap(){
  if(!swRunning)return;
  const total=swElapsed+(Date.now()-swStart);
  const lapTime=total-(swLaps.reduce((a,l)=>a+l.t,0));
  swLaps.unshift({n:swLaps.length+1,total,t:lapTime});
  renderLaps();
}

function swReset(){
  clearInterval(swInterval); swRunning=false; swElapsed=0; swLaps=[];swLapStart=0;
  document.getElementById('swDisplay').innerHTML='00:00<span class="sw-ms">.00</span>';
  document.getElementById('swStart').textContent='START';
  document.getElementById('swStart').className='btn green';
  document.getElementById('swSplits').innerHTML='';
}

function renderLaps(){
  document.getElementById('swSplits').innerHTML=swLaps.map((l,i)=>`
    <div class="split">
      <span class="split-n">LAP ${l.n}</span>
      <span class="split-d">${formatSW(l.t)}</span>
      <span class="split-t">${formatSW(l.total)}</span>
    </div>`).join('');
}

function formatSW(ms){
  const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

// ── Timer ──────────────────────────────────────────────
let timerRunning=false, timerRemain=0, timerTotal=0, timerInterval=null;

function timerToggle(){
  if(timerRunning){
    clearInterval(timerInterval); timerRunning=false;
    document.getElementById('timerStart').textContent='RESUME';
    document.getElementById('timerStart').className='btn orange';
  }else{
    if(timerRemain===0){
      const h=parseInt(document.getElementById('tH').value)||0;
      const m=parseInt(document.getElementById('tM').value)||0;
      const s=parseInt(document.getElementById('tS').value)||0;
      timerTotal=timerRemain=(h*3600+m*60+s)*1000;
      if(!timerRemain)return;
    }
    timerRunning=true;
    document.getElementById('timerStart').textContent='PAUSE';
    document.getElementById('timerStart').className='btn red';
    const target=Date.now()+timerRemain;
    timerInterval=setInterval(()=>{
      timerRemain=Math.max(0,target-Date.now());
      const d=document.getElementById('timerDisplay');
      d.textContent=formatTimer(timerRemain);
      d.className='timer-display running';
      if(timerRemain===0){
        clearInterval(timerInterval); timerRunning=false;
        d.className='timer-display done';
        document.getElementById('timerStart').textContent='START';
        document.getElementById('timerStart').className='btn green';
        if('Notification' in window && Notification.permission==='granted')
          new Notification('Pisces Moon Timer','Timer finished!');
      }
    },100);
  }
}

function timerReset(){
  clearInterval(timerInterval); timerRunning=false; timerRemain=0;
  document.getElementById('timerDisplay').textContent='00:00:00';
  document.getElementById('timerDisplay').className='timer-display';
  document.getElementById('timerStart').textContent='START';
  document.getElementById('timerStart').className='btn green';
}

function formatTimer(ms){
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  return [h,m,s].map(n=>String(n).padStart(2,'0')).join(':');
}

if('Notification' in window) Notification.requestPermission();
</script>
</body></html>
