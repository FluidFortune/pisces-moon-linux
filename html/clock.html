<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>PISCES MOON // CLOCK v3</title>
<style>
:root{
  --bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;
  --panel-border:#1a3a50;--accent:#00d4ff;--accent3:#00ff88;
  --accent4:#ff3366;--gold:#f4a820;
  --text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:.9rem;color:var(--accent3);letter-spacing:3px;}
.tabs{display:flex;gap:0;}
.tab{padding:5px 16px;font-size:.55rem;font-family:'Orbitron',monospace;letter-spacing:1px;cursor:pointer;border:1px solid var(--panel-border);background:transparent;color:var(--text-dim);transition:all .15s;margin-left:-1px;}
.tab:hover{color:var(--accent3);}
.tab.active{background:var(--bg3);color:var(--accent3);border-color:var(--accent3);}
.content{flex:1;display:flex;align-items:center;justify-content:center;overflow-y:auto;}
/* CLOCK */
.clock-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px;}
canvas#clockCanvas{border-radius:50%;}
.digital{font-family:'Orbitron',monospace;font-size:2.8rem;color:var(--accent3);letter-spacing:6px;text-align:center;}
.digital-sub{font-family:'Orbitron',monospace;font-size:.75rem;color:var(--text-dim);letter-spacing:4px;text-align:center;margin-top:4px;}
.date-str{font-size:.7rem;color:var(--text-dim);letter-spacing:2px;text-align:center;margin-top:2px;}
/* STOPWATCH */
.sw-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;width:100%;max-width:480px;}
.sw-display{font-family:'Orbitron',monospace;font-size:3.4rem;color:var(--accent3);letter-spacing:4px;text-align:center;}
.sw-ms{font-family:'Orbitron',monospace;font-size:1.6rem;color:var(--text-dim);text-align:center;margin-top:-8px;}
.btn-row{display:flex;gap:10px;}
.ctrl-btn{padding:12px 28px;background:var(--bg2);border:1px solid var(--panel-border);color:var(--text);font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:2px;cursor:pointer;transition:all .15s;}
.ctrl-btn:hover{border-color:var(--accent3);color:var(--accent3);}
.ctrl-btn.start{border-color:var(--accent3);color:var(--accent3);}
.ctrl-btn.stop{border-color:var(--accent4);color:var(--accent4);}
.ctrl-btn.reset{border-color:var(--text-dim);}
.laps{width:100%;max-height:240px;overflow-y:auto;border:1px solid var(--panel-border);}
.lap{display:flex;gap:8px;padding:6px 12px;border-bottom:1px solid rgba(28,46,58,.3);font-size:.65rem;}
.lap:first-child{border-left:3px solid var(--accent3);}
.lap-n{color:var(--text-dim);width:40px;}
.lap-time{flex:1;color:var(--text-bright);font-family:'Orbitron',monospace;}
.lap-delta{color:var(--text-dim);}
/* COUNTDOWN */
.cd-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;width:100%;max-width:400px;}
.cd-display{font-family:'Orbitron',monospace;font-size:3.2rem;color:var(--gold);letter-spacing:6px;text-align:center;}
.cd-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}
.cd-field{display:flex;flex-direction:column;align-items:center;gap:3px;}
.cd-label{font-size:.52rem;color:var(--text-dim);font-family:'Orbitron',monospace;letter-spacing:2px;}
.cd-spin{display:flex;align-items:center;gap:4px;}
.cd-num{font-family:'Orbitron',monospace;font-size:1.4rem;color:var(--text-bright);width:48px;text-align:center;background:var(--bg3);border:1px solid var(--panel-border);padding:5px;}
.cd-arrow{background:none;border:1px solid var(--panel-border);color:var(--text-dim);cursor:pointer;font-size:.7rem;padding:4px 7px;transition:all .15s;}
.cd-arrow:hover{border-color:var(--gold);color:var(--gold);}
/* WORLD CLOCK */
.wc-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:16px;width:100%;}
.wc-card{background:var(--bg2);border:1px solid var(--panel-border);padding:12px;}
.wc-city{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:2px;color:var(--text-dim);}
.wc-time{font-family:'Orbitron',monospace;font-size:1.5rem;color:var(--accent3);margin:5px 0 2px;letter-spacing:2px;}
.wc-date{font-size:.58rem;color:var(--text-dim);}
.wc-tz{font-size:.55rem;color:var(--accent);margin-top:3px;}
.wc-daynight{font-size:.8rem;}
</style>
</head><body>

<header>
  <div class="logo">🕐 CLOCK <span style="color:var(--text-dim);font-size:.6rem">v3</span></div>
  <div class="tabs">
    <button class="tab active" id="tClock" onclick="setTab('clock')">CLOCK</button>
    <button class="tab" id="tSW" onclick="setTab('stopwatch')">STOPWATCH</button>
    <button class="tab" id="tCD" onclick="setTab('countdown')">COUNTDOWN</button>
    <button class="tab" id="tWC" onclick="setTab('worldclock')">WORLD</button>
  </div>
</header>
<div class="content" id="content"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// PISCES MOON CLOCK v3
// ═══════════════════════════════════════════════════════════════════

let activeTab = 'clock';
let rafId = null;

// Stopwatch state
let swRunning = false, swStart = 0, swElapsed = 0, swLaps = [], swLapStart = 0;
let swInterval = null;

// Countdown state
let cdH = 0, cdM = 5, cdS = 0;
let cdRemaining = 0, cdRunning = false, cdInterval = null;

const CITIES = [
  {name:'LOS ANGELES',   tz:'America/Los_Angeles'},
  {name:'NEW YORK',      tz:'America/New_York'},
  {name:'LONDON',        tz:'Europe/London'},
  {name:'PARIS',         tz:'Europe/Paris'},
  {name:'DUBAI',         tz:'Asia/Dubai'},
  {name:'MUMBAI',        tz:'Asia/Kolkata'},
  {name:'SINGAPORE',     tz:'Asia/Singapore'},
  {name:'TOKYO',         tz:'Asia/Tokyo'},
  {name:'SYDNEY',        tz:'Australia/Sydney'},
  {name:'SÃO PAULO',    tz:'America/Sao_Paulo'},
  {name:'TORONTO',       tz:'America/Toronto'},
  {name:'REYKJAVIK',     tz:'Atlantic/Reykjavik'},
];

// ── Tab switch ────────────────────────────────────────────────────
function setTab(t) {
  activeTab = t;
  ['tClock','tSW','tCD','tWC'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById({clock:'tClock',stopwatch:'tSW',countdown:'tCD',worldclock:'tWC'}[t]).classList.add('active');
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  renderTab();
}

function renderTab() {
  const c = document.getElementById('content');
  if (activeTab === 'clock') {
    c.innerHTML = `<div class="clock-wrap">
      <canvas id="clockCanvas" width="280" height="280"></canvas>
      <div>
        <div class="digital" id="digitalTime">00:00:00</div>
        <div class="digital-sub" id="digitalAmPm">AM</div>
        <div class="date-str" id="dateStr"></div>
      </div>
    </div>`;
    tickClock();
  } else if (activeTab === 'stopwatch') {
    c.innerHTML = `<div class="sw-wrap">
      <div class="sw-display" id="swDisplay">00:00:00</div>
      <div class="sw-ms" id="swMs">.000</div>
      <div class="btn-row">
        <button class="ctrl-btn start" id="swBtn" onclick="swToggle()">START</button>
        <button class="ctrl-btn" onclick="swLap()">LAP</button>
        <button class="ctrl-btn reset" onclick="swReset()">RESET</button>
      </div>
      <div class="laps" id="lapList"></div>
    </div>`;
    updateSwDisplay();
  } else if (activeTab === 'countdown') {
    c.innerHTML = `<div class="cd-wrap">
      <div class="cd-display" id="cdDisplay">00:05:00</div>
      <div class="cd-inputs">
        ${['H','M','S'].map((u,i) => `
          <div class="cd-field">
            <div class="cd-label">${u==='H'?'HOURS':u==='M'?'MINUTES':'SECONDS'}</div>
            <div class="cd-spin">
              <button class="cd-arrow" onclick="adjCd('${u}',-1)">▼</button>
              <div class="cd-num" id="cd${u}">${String(u==='H'?cdH:u==='M'?cdM:cdS).padStart(2,'0')}</div>
              <button class="cd-arrow" onclick="adjCd('${u}',1)">▲</button>
            </div>
          </div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="ctrl-btn start" id="cdBtn" onclick="cdToggle()">START</button>
        <button class="ctrl-btn reset" onclick="cdReset()">RESET</button>
      </div>
    </div>`;
    updateCdDisplay();
  } else if (activeTab === 'worldclock') {
    c.innerHTML = `<div class="wc-wrap" id="wcWrap"></div>`;
    tickWorldClock();
  }
}

// ── ANALOG CLOCK ──────────────────────────────────────────────────
function tickClock() {
  if (activeTab !== 'clock') return;
  const canvas = document.getElementById('clockCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const now = new Date();
  const W = 280, R = 128, cx = W/2, cy = W/2;

  ctx.clearRect(0,0,W,W);

  // Background
  ctx.fillStyle = '#080f14';
  ctx.beginPath(); ctx.arc(cx,cy,R+4,0,Math.PI*2); ctx.fill();

  // Outer ring
  ctx.strokeStyle = '#1a3a50'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();

  // Accent ring
  ctx.strokeStyle = '#00ff8822'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx,cy,R-8,0,Math.PI*2); ctx.stroke();

  // Hour markers
  for (let i=0;i<12;i++) {
    const a = (i/12)*Math.PI*2 - Math.PI/2;
    const r1 = R-6, r2 = i%3===0 ? R-18 : R-13;
    ctx.strokeStyle = i%3===0 ? '#00d4ff' : '#2a5870';
    ctx.lineWidth = i%3===0 ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*r1, cy+Math.sin(a)*r1);
    ctx.lineTo(cx+Math.cos(a)*r2, cy+Math.sin(a)*r2);
    ctx.stroke();
  }

  // Minute markers
  for (let i=0;i<60;i++) {
    if (i%5===0) continue;
    const a=(i/60)*Math.PI*2-Math.PI/2;
    ctx.strokeStyle='#1a3a50'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*(R-6),cy+Math.sin(a)*(R-6));
    ctx.lineTo(cx+Math.cos(a)*(R-10),cy+Math.sin(a)*(R-10));
    ctx.stroke();
  }

  const s = now.getSeconds()+now.getMilliseconds()/1000;
  const m = now.getMinutes()+s/60;
  const h = (now.getHours()%12)+m/60;

  // Hour hand
  drawHand(ctx,cx,cy,(h/12)*Math.PI*2-Math.PI/2,R*0.52,'#c8e8f5',5,8);
  // Minute hand
  drawHand(ctx,cx,cy,(m/60)*Math.PI*2-Math.PI/2,R*0.75,'#00d4ff',3,6);
  // Second hand
  drawHand(ctx,cx,cy,(s/60)*Math.PI*2-Math.PI/2,R*0.88,'#ff3366',1.5,4);

  // Center dot
  ctx.fillStyle='#c8e8f5';
  ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff3366';
  ctx.beginPath(); ctx.arc(cx,cy,2.5,0,Math.PI*2); ctx.fill();

  // Digital readout
  const h12 = now.getHours()%12||12;
  const pad2 = n=>String(n).padStart(2,'0');
  document.getElementById('digitalTime').textContent = `${pad2(h12)}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
  document.getElementById('digitalAmPm').textContent = now.getHours()>=12?'PM':'AM';
  document.getElementById('dateStr').textContent = now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  rafId = requestAnimationFrame(tickClock);
}

function drawHand(ctx,cx,cy,angle,len,color,width,backLen) {
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0,-backLen);
  ctx.lineTo(0,len);
  ctx.stroke();
  ctx.restore();
}

// ── STOPWATCH ─────────────────────────────────────────────────────
function swToggle() {
  swRunning = !swRunning;
  const btn = document.getElementById('swBtn');
  if (swRunning) {
    swStart = Date.now() - swElapsed;
    swLapStart = swLapStart || swStart;
    swInterval = setInterval(updateSwDisplay, 33);
    btn.textContent = 'PAUSE';
    btn.className = 'ctrl-btn stop';
  } else {
    clearInterval(swInterval);
    swElapsed = Date.now() - swStart;
    btn.textContent = 'RESUME';
    btn.className = 'ctrl-btn start';
  }
}

function swLap() {
  if (!swRunning) return;
  const total = Date.now() - swStart;
  const lapTime = total - (swLaps.length ? swLaps[swLaps.length-1].total : 0);
  swLaps.push({total, lapTime, n: swLaps.length+1});
  renderLaps();
}

function swReset() {
  swRunning = false; clearInterval(swInterval);
  swStart = 0; swElapsed = 0; swLaps = []; swLapStart = 0;
  document.getElementById('swBtn').textContent = 'START';
  document.getElementById('swBtn').className = 'ctrl-btn start';
  updateSwDisplay(); renderLaps();
}

function updateSwDisplay() {
  const t = swRunning ? Date.now() - swStart : swElapsed;
  document.getElementById('swDisplay').textContent = fmtTime(t);
  document.getElementById('swMs').textContent = '.' + String(Math.floor((t%1000))).padStart(3,'0');
}

function renderLaps() {
  const el = document.getElementById('lapList');
  if (!el) return;
  el.innerHTML = [...swLaps].reverse().map(l => `
    <div class="lap">
      <span class="lap-n">LAP ${l.n}</span>
      <span class="lap-time">${fmtTime(l.total)}</span>
      <span class="lap-delta">+${fmtTime(l.lapTime)}</span>
    </div>`).join('');
}

function fmtTime(ms) {
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── COUNTDOWN ────────────────────────────────────────────────────
function adjCd(unit, delta) {
  if (cdRunning) return;
  if (unit === 'H') cdH = Math.max(0, Math.min(23, cdH+delta));
  if (unit === 'M') cdM = Math.max(0, Math.min(59, cdM+delta));
  if (unit === 'S') cdS = Math.max(0, Math.min(59, cdS+delta));
  document.getElementById('cdH').textContent = String(cdH).padStart(2,'0');
  document.getElementById('cdM').textContent = String(cdM).padStart(2,'0');
  document.getElementById('cdS').textContent = String(cdS).padStart(2,'0');
  cdRemaining = (cdH*3600 + cdM*60 + cdS) * 1000;
  updateCdDisplay();
}

function cdToggle() {
  cdRunning = !cdRunning;
  const btn = document.getElementById('cdBtn');
  if (cdRunning) {
    if (!cdRemaining) cdRemaining = (cdH*3600+cdM*60+cdS)*1000;
    const endTime = Date.now() + cdRemaining;
    cdInterval = setInterval(() => {
      cdRemaining = Math.max(0, endTime - Date.now());
      updateCdDisplay();
      if (cdRemaining <= 0) {
        clearInterval(cdInterval); cdRunning = false;
        document.getElementById('cdBtn').textContent = 'START';
        document.getElementById('cdBtn').className = 'ctrl-btn start';
        cdDone();
      }
    }, 100);
    btn.textContent = 'PAUSE';
    btn.className = 'ctrl-btn stop';
  } else {
    clearInterval(cdInterval);
    btn.textContent = 'RESUME';
    btn.className = 'ctrl-btn start';
  }
}

function cdReset() {
  cdRunning = false; clearInterval(cdInterval);
  cdRemaining = (cdH*3600+cdM*60+cdS)*1000;
  document.getElementById('cdBtn').textContent = 'START';
  document.getElementById('cdBtn').className = 'ctrl-btn start';
  updateCdDisplay();
}

function updateCdDisplay() {
  const t = cdRemaining;
  const h = Math.floor(t/3600000);
  const m = Math.floor((t%3600000)/60000);
  const s = Math.floor((t%60000)/1000);
  const el = document.getElementById('cdDisplay');
  if (el) el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function cdDone() {
  if ('vibrate' in navigator) navigator.vibrate([500,200,500,200,500]);
  const el = document.getElementById('cdDisplay');
  if (el) {
    el.style.color = 'var(--accent4)';
    el.textContent = 'TIME UP!';
    setTimeout(()=>{ el.style.color='var(--gold)'; updateCdDisplay(); }, 3000);
  }
}

// ── WORLD CLOCK ───────────────────────────────────────────────────
function tickWorldClock() {
  if (activeTab !== 'worldclock') return;
  const wrap = document.getElementById('wcWrap');
  if (!wrap) return;
  const now = new Date();
  wrap.innerHTML = CITIES.map(city => {
    try {
      const t = new Date(now.toLocaleString('en-US',{timeZone:city.tz}));
      const h24 = t.getHours();
      const h12 = h24%12||12;
      const m = String(t.getMinutes()).padStart(2,'0');
      const s = String(t.getSeconds()).padStart(2,'0');
      const ampm = h24>=12?'PM':'AM';
      const isDay = h24>=6&&h24<20;
      const date = t.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      const diff = Math.round((t-new Date(now.toLocaleString('en-US',{timeZone:'America/Los_Angeles'})))/3600000);
      const diffStr = diff===0?'local':diff>0?`+${diff}h`:`${diff}h`;
      return `<div class="wc-card">
        <div class="wc-city">${city.name} <span class="wc-daynight">${isDay?'☀':'🌙'}</span></div>
        <div class="wc-time">${String(h12).padStart(2,'0')}:${m}:${s} <span style="font-size:.7rem;color:var(--text-dim)">${ampm}</span></div>
        <div class="wc-date">${date}</div>
        <div class="wc-tz">${diffStr} vs LA</div>
      </div>`;
    } catch { return ''; }
  }).join('');
  setTimeout(tickWorldClock, 1000);
}

// ── Init ──────────────────────────────────────────────────────────
renderTab();
</script>
</body></html>
