<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // WIFI</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
.wifi-layout{display:grid;grid-template-columns:320px 1fr 280px;height:calc(100vh - 52px);overflow:hidden}
.wifi-left{border-right:1px solid var(--panel-border);overflow-y:auto}
.wifi-right{border-left:1px solid var(--panel-border);overflow-y:auto}
.wifi-center{overflow-y:auto;padding:14px}
.net-item{padding:12px;border-bottom:1px solid rgba(28,46,58,.4);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px}
.net-item:hover{background:rgba(0,212,255,.04)}
.net-item.selected{background:rgba(0,212,255,.08);border-left:2px solid var(--accent)}
.net-item.connected{border-left:3px solid var(--accent3)}
.net-signal{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.signal-bars{display:flex;align-items:flex-end;gap:2px;height:20px}
.bar{width:4px;background:var(--panel-border);border-radius:1px}
.bar.lit{background:var(--accent3)}
.net-info{flex:1;min-width:0}
.net-ssid{font-size:.78rem;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.net-meta{font-size:.58rem;color:var(--text-dim);display:flex;gap:8px;margin-top:3px;flex-wrap:wrap}
.sec-badge{display:inline-block;padding:1px 5px;font-family:Orbitron,monospace;font-size:.45rem;border:1px solid;letter-spacing:1px}
.sec-open{border-color:var(--accent4);color:var(--accent4)}
.sec-wpa2{border-color:var(--accent3);color:var(--accent3)}
.sec-wpa3{border-color:var(--accent);color:var(--accent)}
.sec-wpa{border-color:var(--warn);color:var(--warn)}
.sec-wep{border-color:var(--accent4);color:var(--accent4)}
.conn-status{padding:14px;background:var(--bg2);border-bottom:1px solid var(--panel-border);margin-bottom:14px}
.conn-ssid{font-family:Orbitron,monospace;font-size:.9rem;color:var(--accent3);margin-bottom:8px}
.conn-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.65rem;border-bottom:1px solid rgba(28,46,58,.3)}
.conn-row .lbl{color:var(--text-dim)}
.conn-row .val{color:var(--text-bright);font-family:Share\ Tech\ Mono,monospace}
</style>
</head><body>
<header class="pm-header">
    <div class="pm-logo">📶 <em>WIFI</em> MANAGER</div>
    <div class="pm-hdr-right">
        <div class="pm-live-badge" id="liveBadge" style="opacity:.3"><div class="pm-live-dot"></div>SCANNING</div>
        <span class="pm-last-update" id="lastUpdate"></span>
        <button class="pm-refresh" onclick="startScan()">⟳ SCAN</button>
    </div>
</header>
<div class="wifi-layout">
    <div class="wifi-left">
        <div class="pm-sh" style="position:sticky;top:0;z-index:10">NETWORKS <span class="pm-sh-sub" id="netCount"></span></div>
        <div id="netList"></div>
    </div>
    <div class="wifi-center">
        <div class="conn-status" id="connStatus">
            <div class="conn-ssid" id="connSSID">NOT CONNECTED</div>
            <div id="connDetails" style="color:var(--text-dim);font-size:.65rem">Connect to a network to see details</div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
            <button class="pm-refresh" onclick="connectSelected()">CONNECT</button>
            <button class="pm-refresh" onclick="disconnectCurrent()">DISCONNECT</button>
            <button class="pm-refresh" onclick="forgetSelected()">FORGET</button>
            <button class="pm-refresh" onclick="startScan()">⟳ RESCAN</button>
        </div>
        <div class="pm-sh">SIGNAL HISTORY — SELECTED</div>
        <canvas id="rssi-spark" width="100%" height="80" style="width:100%;padding:8px"></canvas>
        <div class="pm-sh" style="margin-top:8px">CHANNEL UTILIZATION</div>
        <canvas id="chan-chart" width="100%" height="120" style="width:100%;padding:8px"></canvas>
        <div class="pm-sh" style="margin-top:8px">SECURITY DISTRIBUTION</div>
        <canvas id="sec-chart" width="100%" height="180" style="width:100%;padding:8px"></canvas>
    </div>
    <div class="wifi-right">
        <div class="pm-sh">NETWORK DETAIL</div>
        <div id="netDetail" style="padding:14px;font-size:.65rem;color:var(--text-dim)">Select a network</div>
        <div class="pm-sh">SAVED NETWORKS</div>
        <div id="savedList" style="padding:8px;font-size:.65rem;color:var(--text-dim)">No saved networks</div>
        <div class="pm-sh">CONNECT</div>
        <div style="padding:12px">
            <div style="font-size:.6rem;color:var(--text-dim);margin-bottom:6px">Password for selected network:</div>
            <input type="password" id="wifiPass" placeholder="Network password"
                style="width:100%;background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:Share\ Tech\ Mono,monospace;font-size:.65rem;padding:8px;margin-bottom:8px;outline:none">
            <button class="pm-refresh" style="width:100%;padding:8px" onclick="connectWithPass()">CONNECT</button>
        </div>
    </div>
</div>
<script src="pm_scraper.js"></script>
<script src="pm_viz.js"></script>
<script src="pm_utils.js"></script>
<script src="pm_transport.js"></script>
<script>
const networks=new Map();
let selectedNet=null, connectedNet=null;
let rssiSpark, chanChart, secChart;

function initViz(){
    rssiSpark=new PMViz.Sparkline("rssi-spark",{color:PMViz.C.accent3,maxPts:60});
    document.getElementById("rssi-spark").width=document.querySelector(".wifi-center").offsetWidth-28;
    document.getElementById("rssi-spark").height=80;
    chanChart=new PMViz.BarChart("chan-chart",{horizontal:false,colorFn:()=>PMViz.C.accent});
    document.getElementById("chan-chart").width=document.querySelector(".wifi-center").offsetWidth-28;
    document.getElementById("chan-chart").height=120;
    secChart=new PMViz.DonutChart("sec-chart");
    document.getElementById("sec-chart").width=document.querySelector(".wifi-center").offsetWidth-28;
    document.getElementById("sec-chart").height=180;
}

const beam=new PMTransport({
    onMessage:handleData,
    onStatus:(s)=>{document.getElementById("liveBadge").style.opacity=s.state==="connected"?"1":"0.3";document.getElementById("lastUpdate").textContent=s.message;}
});

function handleData(msg){
    if(msg.type==="WIFI_SCAN_RESULT") addNetwork(msg);
    else if(msg.type==="WIFI_SCAN_DONE") onScanDone(msg);
    else if(msg.type==="WIFI_CONNECTED") onConnected(msg);
    else if(msg.type==="WIFI_DISCONNECTED") onDisconnected();
    else if(msg.type==="WIFI_STATUS") updateStatus(msg);
}

function addNetwork(n){
    const key=n.bssid;
    const existing=networks.get(key)||{bssid:n.bssid,ssid:n.ssid||"<hidden>",security:n.sec||n.security||"UNKNOWN",channel:n.channel||0,rssi:n.rssi,firstSeen:Date.now(),count:0};
    existing.rssi=n.rssi; existing.channel=n.channel||existing.channel; existing.count++;
    networks.set(key,existing);
    if(key===selectedNet) rssiSpark.push(n.rssi);
    renderNetList(); updateCharts();
}

function onScanDone(msg){document.getElementById("lastUpdate").textContent=`Scan: ${msg.count||networks.size} networks`;}

function onConnected(msg){
    connectedNet=msg.bssid||msg.ssid;
    document.getElementById("connSSID").textContent=msg.ssid||"Connected";
    document.getElementById("connSSID").style.color="var(--accent3)";
    document.getElementById("connDetails").innerHTML=`
        <div class="conn-row"><span class="lbl">IP Address</span><span class="val">${msg.ip||"—"}</span></div>
        <div class="conn-row"><span class="lbl">Gateway</span><span class="val">${msg.gateway||"—"}</span></div>
        <div class="conn-row"><span class="lbl">DNS</span><span class="val">${msg.dns||"—"}</span></div>
        <div class="conn-row"><span class="lbl">Signal</span><span class="val" style="color:${PMViz.rssiColor(msg.rssi||0)}">${msg.rssi||"—"}dBm</span></div>
        <div class="conn-row"><span class="lbl">Channel</span><span class="val">${msg.channel||"—"}</span></div>`;
}

function onDisconnected(){
    connectedNet=null;
    document.getElementById("connSSID").textContent="NOT CONNECTED";
    document.getElementById("connSSID").style.color="var(--text-dim)";
    document.getElementById("connDetails").textContent="Disconnected";
}

function updateStatus(msg){if(msg.connected) onConnected(msg); else onDisconnected();}

function renderNetList(){
    const arr=Array.from(networks.values()).sort((a,b)=>b.rssi-a.rssi);
    document.getElementById("netCount").textContent=`${arr.length}`;
    document.getElementById("netList").innerHTML=arr.map(n=>{
        const norm=Math.max(0,Math.min(4,Math.floor((n.rssi+100)/25)));
        const secClass=n.security==="OPEN"?"sec-open":n.security.includes("3")?"sec-wpa3":n.security.includes("2")?"sec-wpa2":n.security==="WEP"?"sec-wep":"sec-wpa";
        const bars=Array.from({length:4},(_,i)=>`<div class="bar${i<norm?" lit":""}" style="height:${(i+1)*4+4}px"></div>`).join("");
        return `<div class="net-item ${selectedNet===n.bssid?"selected":""} ${connectedNet===n.bssid?"connected":""}"
                     onclick="selectNet('${PM.esc(n.bssid)}')">
            <div class="net-signal">
                <div class="signal-bars">${bars}</div>
                <div style="font-size:.55rem;color:${PMViz.rssiColor(n.rssi)}">${n.rssi}dBm</div>
            </div>
            <div class="net-info">
                <div class="net-ssid">${PM.esc(n.ssid)} ${connectedNet===n.bssid?'<span style="color:var(--accent3);font-size:.55rem">● CONNECTED</span>':''}</div>
                <div class="net-meta">
                    <span class="sec-badge ${secClass}">${PM.esc(n.security)}</span>
                    <span>ch${n.channel}</span>
                    <span style="color:var(--text-dim)">${n.count}x</span>
                </div>
            </div>
        </div>`;
    }).join("");
}

function selectNet(bssid){
    selectedNet=bssid; renderNetList();
    const n=networks.get(bssid); if(!n) return;
    document.getElementById("netDetail").innerHTML=`
        <div style="font-family:Orbitron,monospace;color:var(--accent);margin-bottom:10px">${PM.esc(n.ssid)}</div>
        <div class="conn-row"><span class="lbl">BSSID</span><span class="val">${PM.esc(n.bssid)}</span></div>
        <div class="conn-row"><span class="lbl">Security</span><span class="val">${PM.esc(n.security)}</span></div>
        <div class="conn-row"><span class="lbl">Channel</span><span class="val">${n.channel}</span></div>
        <div class="conn-row"><span class="lbl">Signal</span><span class="val" style="color:${PMViz.rssiColor(n.rssi)}">${n.rssi}dBm · ${PM.rssiQuality(n.rssi)}</span></div>
        <div class="conn-row"><span class="lbl">Seen</span><span class="val">${n.count}x</span></div>`;
}

function updateCharts(){
    const arr=Array.from(networks.values());
    const chCounts={};
    arr.forEach(n=>{chCounts[n.channel]=(chCounts[n.channel]||0)+1;});
    chanChart.update(Array.from({length:13},(_,i)=>({label:String(i+1),value:chCounts[i+1]||0})));
    const secCounts={};
    arr.forEach(n=>{secCounts[n.security]=(secCounts[n.security]||0)+1;});
    secChart.update(Object.entries(secCounts).map(([label,value])=>({label,value})));
}

function startScan(){if(beam.connected) beam.send({type:"CMD_WIFI_SCAN",src:"app",cmd_id:"wf1",duration_sec:15});}
function connectSelected(){if(!selectedNet){alert("Select a network");return;} const n=networks.get(selectedNet); if(n?.security!=="OPEN") return; if(beam.connected) beam.send({type:"CMD_WIFI_CONNECT",src:"app",cmd_id:"wf2",bssid:selectedNet,ssid:n.ssid});}
function connectWithPass(){if(!selectedNet){alert("Select a network");return;} const n=networks.get(selectedNet); const pass=document.getElementById("wifiPass").value; if(beam.connected) beam.send({type:"CMD_WIFI_CONNECT",src:"app",cmd_id:"wf3",bssid:selectedNet,ssid:n.ssid,password:pass});}
function disconnectCurrent(){if(beam.connected) beam.send({type:"CMD_WIFI_DISCONNECT",src:"app",cmd_id:"wf4"});}
function forgetSelected(){if(beam.connected&&selectedNet) beam.send({type:"CMD_WIFI_FORGET",src:"app",cmd_id:"wf5",bssid:selectedNet});}

window.addEventListener("load",async()=>{initViz(); try{await beam.connect();}catch(e){} if(beam.connected) startScan();});
</script></body></html>
