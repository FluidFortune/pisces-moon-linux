<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */

  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */

  --radius-sm:    4px;
}

<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            this.ws.onopen = () => resolve();
            this.ws.onerror = () => reject(new Error(`WebSocket failed at ${this.wsUrl}`));

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed");
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
// Known GATT service UUIDs
const KNOWN_SERVICES={
    "1800":"Generic Access","1801":"Generic Attribute","180a":"Device Information",
    "180f":"Battery Service","1810":"Blood Pressure","1812":"HID",
    "180d":"Heart Rate","181a":"Environmental Sensing","1814":"Running Speed",
    "1816":"Cycling Speed","fe9a":"Estimote","fee7":"MIDI",
    "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a":"Pisces Moon",
};
const KNOWN_CHARS={
    "2a00":"Device Name","2a01":"Appearance","2a29":"Manufacturer",
    "2a24":"Model Number","2a25":"Serial Number","2a27":"Hardware Rev",
    "2a28":"Software Rev","2a19":"Battery Level","2a37":"Heart Rate Measurement",
    "2a6e":"Temperature","2a6f":"Humidity","2a6d":"Pressure",
};

const devices=new Map();
let selectedDev=null, connectedDev=null;
let rssiSpark, svcChart;
let notifyLog=[];
let activeCharacteristic=null;

function initViz(){
    rssiSpark=new PMViz.Sparkline("rssi-spark",{color:PMViz.C.accent});
    svcChart=new PMViz.BarChart("svc-chart",{horizontal:true,colorFn:()=>PMViz.C.accent});
}

const beam=new PMTransport({
    onMessage:handleData,
    onStatus:(s)=>{
        document.getElementById("liveBadge").style.opacity=s.state==="connected"?"1":"0.3";
        document.getElementById("lastUpdate").textContent=s.message;
    }
});

function handleData(msg){
    if(msg.type==="BLE_OBS" || msg.type==="ble") {
        // Normalize bridge fields → legacy format
        if (msg.type === 'ble') {
            msg.src_mac = msg.mac;
            msg.proto = 'BLE';
        }
        addDevice(msg);
    }
    else if(msg.type==="GATT_SERVICES") renderServices(msg.services||[]);
    else if(msg.type==="GATT_NOTIFY") handleNotify(msg);
    else if(msg.type==="GATT_READ_RESPONSE") handleReadResponse(msg);
    else if(msg.type==="BLE_CONNECTED") onConnected(msg);
    else if(msg.type==="BLE_DISCONNECTED") onDisconnected(msg);
}

function addDevice(d){
    devices.set(d.mac,{...d,name:d.name||"",rssi:d.rssi,services:[],lastSeen:Date.now()});
    if(d.mac===selectedDev) rssiSpark.push(d.rssi);
    renderDevList(); updateSvcChart();
}

function renderDevList(){
    const arr=Array.from(devices.values()).sort((a,b)=>b.rssi-a.rssi);
    document.getElementById("devCount").textContent=`${arr.length}`;
    document.getElementById("devList").innerHTML=arr.map(d=>`
        <div class="dev-item ${selectedDev===d.mac?"selected":""} ${connectedDev===d.mac?"connected":""}"
             onclick="selectDevice('${PM.esc(d.mac)}')">
            <div class="dev-name">${d.name?PM.esc(d.name):"<unnamed>"} ${connectedDev===d.mac?'<span style="color:var(--accent3);font-size:.55rem">● CONNECTED</span>':''}</div>
            <div class="dev-mac">${d.mac}</div>
            <div class="dev-rssi" style="color:${PMViz.rssiColor(d.rssi)}">${d.rssi}dBm</div>
        </div>`).join("");
}

function selectDevice(mac){
    selectedDev=mac; renderDevList();
    const d=devices.get(mac); if(!d) return;
    document.getElementById("connStatus").textContent=`Selected: ${d.name||d.mac.substring(0,8)}`;
}

function connectSelected(){
    if(!selectedDev){alert("Select a device first");return;}
    if(beam.connected) beam.send({type:"CMD_BLE_CONNECT",src:"app",cmd_id:"gatt1",mac:selectedDev});
    document.getElementById("connStatus").textContent="Connecting...";
}

function onConnected(msg){
    connectedDev=msg.mac; renderDevList();
    document.getElementById("connStatus").textContent="Connected ✓";
    document.getElementById("connStatus").style.color="var(--accent3)";
    document.getElementById("securityPanel").innerHTML=`
        <div style="color:var(--text-bright)">Connected to ${msg.mac}</div>
        <div style="color:var(--text-dim);margin-top:4px">Security: ${msg.security||"Unknown"}</div>
        <div style="color:var(--text-dim)">Bonded: ${msg.bonded?"Yes":"No"}</div>
        <div style="color:var(--text-dim)">MTU: ${msg.mtu||23} bytes</div>`;
}

function onDisconnected(msg){
    if(connectedDev===msg.mac) connectedDev=null; renderDevList();
    document.getElementById("connStatus").textContent="Disconnected";
    document.getElementById("connStatus").style.color="var(--text-dim)";
}

function discoverServices(){
    if(!connectedDev){alert("Connect to a device first");return;}
    if(beam.connected) beam.send({type:"CMD_GATT_DISCOVER",src:"app",cmd_id:"gatt2",mac:connectedDev});
    document.getElementById("serviceTree").innerHTML='<div style="padding:20px;text-align:center;color:var(--text-dim)">Discovering services...</div>';
}

function renderServices(services){
    const d=devices.get(connectedDev); if(d) d.services=services;
    document.getElementById("serviceTree").innerHTML=services.map(svc=>{
        const svcName=KNOWN_SERVICES[svc.uuid.toLowerCase()]||KNOWN_SERVICES[svc.uuid.substring(4,8).toLowerCase()]||"Unknown Service";
        return `<div class="service">
            <div class="service-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">
                <div>
                    <div class="service-name">${svcName}</div>
                    <div class="service-uuid">${svc.uuid}</div>
                </div>
                <span style="color:var(--text-dim)">${svc.characteristics?.length||0} chars</span>
            </div>
            <div style="display:block">
                ${(svc.characteristics||[]).map(char=>{
                    const charName=KNOWN_CHARS[char.uuid.toLowerCase()]||KNOWN_CHARS[char.uuid.substring(4,8).toLowerCase()]||"Unknown";
                    const props=char.properties||[];
                    return `<div class="characteristic" id="char-${char.uuid.replace(/-/g,"")}">
                        <div class="char-name">${charName}</div>
                        <div class="char-uuid">${char.uuid}</div>
                        <div class="char-props">
                            ${["READ","WRITE","NOTIFY","INDICATE","WRITE_NR"].map(p=>`<span class="char-prop ${props.includes(p)?"active":""}">${p}</span>`).join("")}
                        </div>
                        <div class="char-value" id="val-${char.uuid.replace(/-/g,"")}">—</div>
                        <div class="char-controls">
                            ${props.includes("READ")?`<button class="char-btn" onclick="readChar('${char.uuid}')">READ</button>`:""}
                            ${props.includes("NOTIFY")||props.includes("INDICATE")?`<button class="char-btn notify" id="notify-${char.uuid.replace(/-/g,"")}" onclick="toggleNotify('${char.uuid}')">NOTIFY</button>`:""}
                            ${props.includes("WRITE")||props.includes("WRITE_NR")?`<button class="char-btn" onclick="selectForWrite('${char.uuid}')">WRITE</button>`:""}
                        </div>
                    </div>`;
                }).join("")}
            </div>
        </div>`;
    }).join("");
    updateSvcChart();
}

function handleNotify(msg){
    const el=document.getElementById(`val-${msg.char_uuid.replace(/-/g,"")}`);
    if(el) el.textContent=`0x${msg.hex||""} | ${msg.ascii||""} | ${msg.decimal||""}`;
    notifyLog.unshift(`<div class="notify-entry"><span style="color:var(--accent)">${msg.char_uuid.substring(0,8)}</span> → <span style="color:var(--accent3)">0x${msg.hex||""}</span> ${msg.ascii?`"${PM.esc(msg.ascii)}"`:""}</div>`);
    if(notifyLog.length>50) notifyLog.pop();
    document.getElementById("notifyLog").innerHTML=notifyLog.join("");
}

function handleReadResponse(msg){
    const el=document.getElementById(`val-${msg.char_uuid.replace(/-/g,"")}`);
    if(el) el.textContent=`0x${msg.hex||""} | ${msg.ascii||""} | ${msg.decimal||""}`;
}

function readChar(uuid){
    if(!connectedDev||!beam.connected) return;
    beam.send({type:"CMD_GATT_READ",src:"app",cmd_id:"gatt3",mac:connectedDev,char_uuid:uuid});
}

function toggleNotify(uuid){
    if(!connectedDev||!beam.connected) return;
    const btn=document.getElementById(`notify-${uuid.replace(/-/g,"")}`);
    const active=btn&&btn.classList.contains("active");
    beam.send({type:active?"CMD_GATT_UNSUBSCRIBE":"CMD_GATT_SUBSCRIBE",src:"app",cmd_id:"gatt4",mac:connectedDev,char_uuid:uuid});
    if(btn) btn.classList.toggle("active");
}

function selectForWrite(uuid){
    activeCharacteristic=uuid;
    document.getElementById("writeHex").placeholder=`Write to ${uuid.substring(0,8)}...`;
}

function writeHex(){
    if(!activeCharacteristic||!connectedDev||!beam.connected) return;
    const hex=document.getElementById("writeHex").value.trim().replace(/\s/g,"");
    beam.send({type:"CMD_GATT_WRITE",src:"app",cmd_id:"gatt5",mac:connectedDev,char_uuid:activeCharacteristic,hex});
}

function writeAscii(){
    if(!activeCharacteristic||!connectedDev||!beam.connected) return;
    const ascii=document.getElementById("writeAscii").value;
    const hex=Array.from(ascii).map(c=>c.charCodeAt(0).toString(16).padStart(2,"0")).join("");
    beam.send({type:"CMD_GATT_WRITE",src:"app",cmd_id:"gatt6",mac:connectedDev,char_uuid:activeCharacteristic,hex});
}

function disconnectAll(){
    if(beam.connected) beam.send({type:"CMD_BLE_DISCONNECT_ALL",src:"app",cmd_id:"gatt7"});
}

function saveProfile(){
    const d=connectedDev?devices.get(connectedDev):null;
    if(!d){alert("No connected device");return;}
    PMViz.Storage.save(`ble_gatt_${d.mac.replace(/:/g,"")}`,d,"json");
}

function updateSvcChart(){
    const counts={};
    devices.forEach(d=>{
        (d.services||[]).forEach(s=>{
            const n=KNOWN_SERVICES[s.uuid?.toLowerCase()]||"Unknown";
            counts[n]=(counts[n]||0)+1;
        });
    });
    svcChart.update(Object.entries(counts).map(([label,value])=>({label,value})));
}

function startScan(){
    if(beam.connected) beam.send({type:"CMD_BLE_SCAN",src:"app",cmd_id:"gatt0",active:true,duration_sec:30});
}

window.addEventListener("load",async()=>{
    initViz();
    try{await beam.connect();}catch(e){console.log("No hardware");}
    if(beam.connected) startScan();
});
</script>
</body></html>
