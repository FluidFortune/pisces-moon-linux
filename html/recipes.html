<html lang="en"><head><meta charset="UTF-8">

<title>PISCES MOON // RECIPE BOOK</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.recipe-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; }
.recipe-card { border-bottom:1px solid var(--panel-border); cursor:pointer; overflow:hidden;
    transition:background .2s; }
.recipe-card:nth-child(odd) { border-right:1px solid var(--panel-border); }
.recipe-card:hover { background:rgba(240,165,0,.04); }
.recipe-img { width:100%; height:200px; object-fit:cover; filter:brightness(.85); }
.recipe-img-wrap { position:relative; overflow:hidden; }
.recipe-img-wrap::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%);
}
.recipe-source-tag {
    position:absolute; top:10px; left:10px; z-index:1;
    background:var(--bg); padding:3px 10px;
    font-family:Orbitron,monospace; font-size:.52rem;
    letter-spacing:2px; color:var(--gold);
    border:1px solid var(--gold-dim);
}
.recipe-saved-badge {
    position:absolute; top:10px; right:10px; z-index:1;
    background:var(--accent3); padding:3px 10px;
    font-family:Orbitron,monospace; font-size:.5rem;
    letter-spacing:2px; color:var(--bg);
}
.recipe-body { padding:14px 16px; }
.recipe-title { font-size:.82rem; color:var(--text-bright); line-height:1.4;
    margin-bottom:6px; font-weight:500; }
.recipe-desc { font-size:.65rem; color:var(--text-dim); line-height:1.7;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.recipe-meta { font-size:.58rem; color:var(--text-dim); display:flex; gap:12px; margin-top:8px; }

.search-panel { padding:14px; border-bottom:1px solid var(--panel-border); background:var(--bg2); }
.search-panel input { margin-bottom:8px; }
.search-panel button { width:100%; }

.cat-list { padding:0; }
.cat-item { padding:10px 14px; cursor:pointer; font-size:.68rem;
    color:var(--text); border-bottom:1px solid rgba(28,46,58,.4);
    display:flex; justify-content:space-between; align-items:center; }
.cat-item:hover { background:rgba(240,165,0,.04); color:var(--text-bright); }
.cat-item.active { background:rgba(240,165,0,.08); color:var(--gold); border-left:2px solid var(--gold); }
.cat-count { font-family:Orbitron,monospace; font-size:.55rem;
    color:var(--gold); background:rgba(240,165,0,.1); padding:2px 8px; }

.modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.85); z-index:1000;
    align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto;
}
.modal-overlay.show { display:flex; }
.modal-content {
    background:var(--bg2); border:1px solid var(--gold-dim);
    max-width:800px; width:100%; color:var(--text);
}
.modal-header {
    padding:20px 24px; border-bottom:1px solid var(--panel-border);
    display:flex; justify-content:space-between; align-items:center;
}
.modal-title { font-family:Orbitron,monospace; color:var(--gold);
    font-size:1rem; letter-spacing:2px; }
.modal-close { color:var(--text-dim); cursor:pointer; font-size:1.2rem; }
.modal-close:hover { color:var(--gold); }
.modal-body { padding:24px; }
.recipe-detail-meta {
    display:grid; grid-template-columns:repeat(4,1fr); gap:14px;
    padding:14px 0; border-bottom:1px solid var(--panel-border); margin-bottom:20px;
}
.meta-item { text-align:center; }
.meta-label { font-family:Orbitron,monospace; font-size:.5rem;
    letter-spacing:2px; color:var(--text-dim); margin-bottom:4px; }
.meta-value { font-size:.9rem; color:var(--text-bright); font-weight:500; }
.recipe-section-title {
    font-family:Orbitron,monospace; font-size:.6rem;
    letter-spacing:3px; color:var(--gold); margin:20px 0 12px;
}
.ingredient-list { list-style:none; padding:0; }
.ingredient-list li {
    padding:8px 12px; border-bottom:1px solid rgba(28,46,58,.4);
    font-size:.72rem; display:flex; gap:10px;
}
.ingredient-list li::before {
    content:'▸'; color:var(--gold);
}
.step-list { list-style:none; padding:0; counter-reset:step; }
.step-list li {
    padding:12px 12px 12px 42px; border-bottom:1px solid rgba(28,46,58,.4);
    font-size:.72rem; line-height:1.7; position:relative; counter-increment:step;
}
.step-list li::before {
    content:counter(step);
    position:absolute; left:10px; top:12px;
    width:22px; height:22px; background:var(--gold); color:var(--bg);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:Orbitron,monospace; font-size:.65rem; font-weight:700;
}
.ai-btn-quick { padding:5px 10px; border:1px solid var(--panel-border);
    background:transparent; color:var(--text-dim);
    font-family:'Share Tech Mono',monospace; font-size:.58rem;
    cursor:pointer; transition:all .15s; margin:3px; }
.ai-btn-quick:hover { border-color:var(--gold); color:var(--gold); }
</style>
</head><body>

<header class="pm-header">
    <div class="pm-logo">🍳 <em>RECIPE</em> BOOK</div>
    <nav class="pm-nav">
        <div class="pm-nav-item active" onclick="showTab('all')" id="tab-all">ALL</div>
        <div class="pm-nav-item" onclick="showTab('saved')" id="tab-saved">SAVED</div>
    </nav>
    <div class="pm-hdr-right">
        <span class="pm-last-update" id="savedCount">0 saved</span>
    </div>
</header>

<div class="pm-app">
    <!-- LEFT: Search + categories -->
    <div class="pm-col-left">
        <div class="search-panel">
            <div style="font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:2px;color:var(--gold);margin-bottom:8px">ADD RECIPE</div>
            <input class="pm-input" id="urlInput" placeholder="Paste recipe URL..."
                onkeydown="if(event.key==='Enter')scrapeRecipe()">
            <button class="pm-btn" onclick="scrapeRecipe()" style="margin-top:8px">SCRAPE &amp; SAVE</button>
            <div style="font-size:.55rem;color:var(--text-dim);margin-top:8px;line-height:1.5">
                Works with Allrecipes, NYT Cooking, Serious Eats, Bon Appétit, Food Network, and most recipe sites.
            </div>
        </div>

        <div class="pm-sh">CATEGORIES</div>
        <div class="cat-list" id="catList"></div>
    </div>

    <!-- MAIN: Recipe grid -->
    <div class="pm-col-main">
        <div class="recipe-grid" id="recipeGrid"></div>
    </div>

    <!-- RIGHT: AI Chef -->
    <div class="pm-col-right">
        <div class="pm-sh">AI CHEF <span class="pm-sh-sub">Gemini</span></div>
        <div style="padding:12px 14px;border-bottom:1px solid var(--panel-border)">
            <textarea class="pm-input" id="aiInput" rows="3"
                placeholder="Ask about cooking, substitutions, pairings..."
                style="resize:none;font-family:'Share Tech Mono',monospace"></textarea>
            <button class="pm-btn" onclick="askAI()" style="width:100%;margin-top:8px">ASK ▶</button>
            <div style="margin-top:10px">
                <button class="ai-btn-quick" onclick="quickAsk('Suggest 3 weeknight dinners')">Weeknight ideas</button>
                <button class="ai-btn-quick" onclick="quickAsk('What can I make with chicken, rice, and vegetables?')">Pantry cook</button>
                <button class="ai-btn-quick" onclick="quickAsk('Classic substitutions list for common ingredients')">Substitutions</button>
                <button class="ai-btn-quick" onclick="quickAsk('Wine pairing basics')">Pairings</button>
            </div>
        </div>
        <div class="pm-ai-response" id="aiResponse">
            <div style="text-align:center;padding:24px;color:var(--text-dim)">
                <div style="font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:3px;margin-bottom:8px;color:var(--gold)">CHEF READY</div>
                <div style="font-size:.62rem;line-height:2">Ask about recipes, techniques,<br>substitutions, or pairings.</div>
            </div>
        </div>
    </div>
</div>

<!-- Recipe detail modal -->
<div class="modal-overlay" id="recipeModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Recipe</div>
            <div class="modal-close" onclick="document.getElementById('recipeModal').classList.remove('show')">✕</div>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script src="pm_lib.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// RECIPE BOOK — Scrape, save, organize recipes
// ═══════════════════════════════════════════════════════════════════

// Default recipes — popular, well-tested classics
const DEFAULT_RECIPES = [
    {
        id: 'default_carbonara',

            'Working quickly, add the hot pasta to the skillet with the guanciale. Toss to coat in the rendered fat off the heat.',
            'Pour the egg mixture over the pasta, tossing vigorously. Add pasta water a splash at a time until the sauce is silky — never lumpy. The residual heat cooks the egg; do not put the pan back on heat.',

        id: 'default_chili',

        img: 'https://images.unsplash.com/photo-1582196016295-f8c8bd4b3a99?w=800&q=80',
        category: 'stews',
        source: 'Pisces Moon',
        prepTime: '20 min', cookTime: '3 hr', servings: '8', difficulty: 'Easy',
        ingredients: [
            '3 lbs beef chuck, cut into 1/2 inch cubes',
            '4 dried ancho chiles, stemmed and seeded',
            '3 dried guajillo chiles, stemmed and seeded',
            '2 dried chipotle chiles, stemmed and seeded',
            '1 large onion, diced',
            '6 garlic cloves, minced',
            '2 tbsp tomato paste',
            '1 cup strong brewed coffee or espresso',
            '2 cups beef broth',

            'Deglaze with coffee, scraping up browned bits. Add chile purée, broth, tomatoes, cumin, paprika, and oregano.',
            'Return beef and any juices. Bring to a simmer, cover partially, and cook on low for 2.5–3 hours until meat is fork-tender and sauce has thickened.',
            'Season to taste with salt. Serve with sour cream, cheddar, cilantro, and lime.'
        ]
    },
    {
        id: 'default_sourdough',
        title: 'Artisan Sourdough Bread',
        description: 'Open-crumb country loaf with crackling crust. 24-hour cold ferment.',
        img: 'https://images.unsplash.com/photo-1585478259715-876a6a81fc08?w=800&q=80',
        category: 'bread',
        source: 'Pisces Moon',
        prepTime: '30 min active', cookTime: '24 hr total', servings: '1 loaf', difficulty: 'Hard',
        ingredients: [
            '500g bread flour (or 450g bread + 50g whole wheat)',

        ingredients: [

        id: 'default_beef_bourguignon',

        ingredients: [
            '3 lbs beef chuck, cut into 2 inch chunks',

            '2 carrots, diced',

    {

        category: 'desserts',
        source: 'Pisces Moon',
        prepTime: '15 min + chill', cookTime: '12 min', servings: '24 cookies', difficulty: 'Easy',
        ingredients: [
            '1 cup (2 sticks) unsalted butter',
            '1 cup dark brown sugar, packed',
            '1/2 cup granulated sugar',
            '2 large eggs + 1 yolk',
            '2 tsp vanilla extract',
            '2 1/4 cups all-purpose flour',
            '1 tsp baking soda',

            '10 oz dark chocolate, roughly chopped (not chips)'
        ],
        steps: [
            'Brown the butter: Cook butter in a light-colored saucepan over medium heat, swirling, until deeply amber and smells nutty, 6–8 minutes. Pour into a heatproof bowl and cool to room temp.',
            'Whisk browned butter with both sugars until glossy. Add eggs and yolk, one at a time, then vanilla. Whisk until thick and shiny.',

            'Fold dry ingredients into wet until just combined. Fold in chopped chocolate.',

    },
];

const CATEGORIES = ['all', 'pasta', 'stews', 'bread', 'asian', 'desserts', 'custom'];

let allRecipes = [...DEFAULT_RECIPES];
let currentCategory = 'all';
let currentTab = 'all'; // 'all' or 'saved'
let geminiKey = '';

function init() {
    // Load saved
    const saved = localStorage.getItem('pm_recipes_custom');
    if (saved) {
        try {
            const customRecipes = JSON.parse(saved);
            allRecipes = [...DEFAULT_RECIPES, ...customRecipes];
        } catch(e) {}
    }

    geminiKey = localStorage.getItem('gemini_key') || '';

    updateSavedCount();
    renderCategories();
    render();
}

function updateSavedCount() {
    const saved = allRecipes.filter(r => !r.id.startsWith('default_')).length;
    document.getElementById('savedCount').textContent = `${saved} saved`;
}

function renderCategories() {
    const counts = {};
    allRecipes.forEach(r => { counts[r.category] = (counts[r.category] || 0) + 1; });

    document.getElementById('catList').innerHTML = CATEGORIES.map(cat => {
        const count = cat === 'all' ? allRecipes.length : (counts[cat] || 0);
        if (count === 0 && cat !== 'all') return '';
        return `
            <div class="cat-item ${currentCategory===cat?'active':''}" onclick="setCategory('${cat}')">
                <span>${cat.toUpperCase()}</span>
                <span class="cat-count">${count}</span>
            </div>`;
    }).join('');
}

function setCategory(cat) {
    currentCategory = cat;
    renderCategories();
    render();
}

function showTab(tab) {
    currentTab = tab;
    document.getElementById('tab-all').classList.toggle('active', tab === 'all');
    document.getElementById('tab-saved').classList.toggle('active', tab === 'saved');
    render();
}

function render() {
    let recipes = allRecipes;

    if (currentTab === 'saved') {
        recipes = recipes.filter(r => !r.id.startsWith('default_'));
    }

    if (currentCategory !== 'all') {
        recipes = recipes.filter(r => r.category === currentCategory);
    }

    if (recipes.length === 0) {
        const msg = currentTab === 'saved'
            ? 'No saved recipes yet. Paste a recipe URL on the left to start your collection.'
            : 'No recipes in this category.';
        document.getElementById('recipeGrid').innerHTML = `
            <div style="grid-column:1/-1;padding:60px 40px;text-align:center;color:var(--text-dim);font-size:.75rem;line-height:1.8">
                ${msg}
            </div>`;
        return;
    }

    document.getElementById('recipeGrid').innerHTML = recipes.map(r => {
        const isSaved = !r.id.startsWith('default_');
        return `
        <div class="recipe-card" onclick="openRecipe('${r.id}')">
            <div class="recipe-img-wrap">
                ${r.img ? `<img class="recipe-img" src="${PM.esc(r.img)}" alt="" loading="lazy"
                    onerror="this.style.display='none'">` : ''}
                <span class="recipe-source-tag">${PM.esc(r.source || 'Custom')}</span>
                ${isSaved ? '<span class="recipe-saved-badge">SAVED</span>' : ''}
            </div>
            <div class="recipe-body">
                <div class="recipe-title">${PM.esc(r.title)}</div>
                <div class="recipe-desc">${PM.esc(r.description || '')}</div>
                <div class="recipe-meta">
                    ${r.prepTime ? `<span>⏱ ${PM.esc(r.prepTime)}</span>` : ''}
                    ${r.servings ? `<span>🍽 ${PM.esc(r.servings)}</span>` : ''}
                    ${r.difficulty ? `<span style="color:${
                        r.difficulty==='Easy' ? 'var(--accent3)' :
                        r.difficulty==='Hard' ? 'var(--accent4)' : 'var(--warn)'
                    }">${PM.esc(r.difficulty)}</span>` : ''}
                </div>
            </div>
        </div>`;
    }).join('');
}

function openRecipe(id) {

        <div style="font-size:.78rem;color:var(--text);line-height:1.7;margin-bottom:14px">
            ${PM.esc(r.description || '')}
        </div>

        <div class="recipe-detail-meta">
            <div class="meta-item">
                <div class="meta-label">PREP</div>
                <div class="meta-value">${PM.esc(r.prepTime || '—')}</div>
            </div>
            <div class="meta-item">
                <div class="meta-label">COOK</div>
                <div class="meta-value">${PM.esc(r.cookTime || '—')}</div>
            </div>
            <div class="meta-item">
                <div class="meta-label">SERVES</div>
                <div class="meta-value">${PM.esc(r.servings || '—')}</div>
            </div>
            <div class="meta-item">

                <div class="meta-value">${PM.esc(r.difficulty || '—')}</div>
            </div>
        </div>

        <div class="recipe-section-title">INGREDIENTS</div>
        <ul class="ingredient-list">

        </ul>

        <div class="recipe-section-title">METHOD</div>

                ${r.sourceUrl ? `Source: <a href="${PM.esc(r.sourceUrl)}" target="_blank" style="color:var(--accent)">${PM.esc(r.source)}</a>` : `Source: ${PM.esc(r.source || 'Custom')}`}
            </div>
            ${isSaved ? `<button class="pm-btn" onclick="deleteRecipe('${r.id}')" style="border-color:var(--accent4);color:var(--accent4)">DELETE</button>` : ''}

    document.getElementById('recipeModal').classList.add('show');
}

function closeModal(e) {
    if (e && e.target.id !== 'recipeModal') return;
    document.getElementById('recipeModal').classList.remove('show');
}

function deleteRecipe(id) {
    if (!confirm('Delete this recipe?')) return;
    allRecipes = allRecipes.filter(r => r.id !== id);
    saveCustom();
    closeModal();
    render();
    renderCategories();
    updateSavedCount();
}

function saveCustom() {
    const custom = allRecipes.filter(r => !r.id.startsWith('default_'));
    localStorage.setItem('pm_recipes_custom', JSON.stringify(custom));
}

// ── SCRAPE A RECIPE FROM A URL ───────────────────────────────────
async function scrapeRecipe() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url || !/^https?:\/\//.test(url)) {
        alert('Paste a valid URL starting with http:// or https://');
        return;
    }

    const input = document.getElementById('urlInput');
    const origPlaceholder = input.placeholder;
    input.placeholder = 'Scraping...';
    input.value = '';
    input.disabled = true;

    try {
        // Try to fetch the page via CORS proxy
        let html = null;
        for (const makeUrl of PM.CORS_PROXIES) {
            try {
                const resp = await PM.fetchWithTimeout(makeUrl(url), {}, 15000);
                if (resp.ok) {
                    html = await resp.text();
                    break;
                }
            } catch(e) {}
        }

        if (!html) throw new Error('Could not fetch recipe page — try a different URL');

        // Parse for JSON-LD structured data (most recipe sites use this)
        const recipe = parseRecipeJsonLd(html, url);
        if (!recipe) throw new Error('No structured recipe data found on this page. Try a major recipe site.');

        // Save
        recipe.id = 'custom_' + Date.now();
        recipe.category = recipe.category || 'custom';
        allRecipes.push(recipe);
        saveCustom();

        render();
        renderCategories();
        updateSavedCount();

        // Open it
        openRecipe(recipe.id);

        input.placeholder = origPlaceholder;
        input.disabled = false;
    } catch (e) {
        alert('Scrape failed: ' + e.message);
        input.placeholder = origPlaceholder;
        input.disabled = false;
    }
}

function parseRecipeJsonLd(html, sourceUrl) {
    // Find all JSON-LD script tags
    const matches = html.matchAll(/<script[^>]*type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi);

    for (const m of matches) {
        try {
            let data = JSON.parse(m[1]);

            // Unwrap graphs
            if (data['@graph']) data = data['@graph'];
            if (!Array.isArray(data)) data = [data];

            for (const item of data) {
                // Unwrap further nested graphs
                const candidates = item['@graph'] ? item['@graph'] : [item];
                for (const c of candidates) {
                    const type = c['@type'];
                    const isRecipe = type === 'Recipe' ||
                                    (Array.isArray(type) && type.includes('Recipe'));
                    if (isRecipe) {
                        return extractRecipe(c, sourceUrl);
                    }
                }
            }
        } catch (e) {}
    }

    return null;
}

function extractRecipe(data, sourceUrl) {
    const title = data.name || 'Untitled Recipe';

    let img = data.image;
    if (Array.isArray(img)) img = img[0];
    if (img && typeof img === 'object') img = img.url || img['@id'] || null;

    const description = (data.description || '').replace(/<[^>]*>/g, '').substring(0, 280);

    // Ingredients
    let ingredients = data.recipeIngredient || data.ingredients || [];
    if (!Array.isArray(ingredients)) ingredients = [];

    // Instructions
    let steps = [];
    const instr = data.recipeInstructions;
    if (Array.isArray(instr)) {
        instr.forEach(s => {
            if (typeof s === 'string') steps.push(s);
            else if (s.text) steps.push(s.text);
            else if (s['@type'] === 'HowToSection' && Array.isArray(s.itemListElement)) {
                s.itemListElement.forEach(sub => {
                    if (sub.text) steps.push(sub.text);
                });
            }
        });
    } else if (typeof instr === 'string') {
        steps = instr.split(/\n+|(?<=\.\s)(?=[A-Z])/).map(s => s.trim()).filter(Boolean);
    }

    // Times
    const prepTime = parseDuration(data.prepTime);
    const cookTime = parseDuration(data.cookTime);
    const totalTime = parseDuration(data.totalTime);

    // Servings
    let servings = data.recipeYield || '—';
    if (Array.isArray(servings)) servings = servings[0];
    servings = String(servings).replace(/^\D+/, '').split(' ')[0] || String(servings);

    // Source
    const domain = new URL(sourceUrl).hostname.replace('www.', '');

    // Guess category from title
    const tLower = title.toLowerCase();
    let category = 'custom';
    if (/pasta|noodle|lasagna|ravioli|spaghetti/.test(tLower)) category = 'pasta';
    else if (/bread|loaf|focaccia|sourdough|biscuit|roll/.test(tLower)) category = 'bread';
    else if (/stew|chili|braise|pot roast|soup/.test(tLower)) category = 'stews';
    else if (/pad|stir.fry|curry|ramen|pho|sushi|asian|chinese|thai|korean|japanese/.test(tLower)) category = 'asian';
    else if (/cookie|cake|pie|tart|brownie|dessert|ice cream|chocolate/.test(tLower)) category = 'desserts';

    return {
        title,
        description,
        img,
        ingredients: ingredients.map(i => typeof i === 'string' ? i : (i.text || '')),
        steps: steps.filter(Boolean),
        prepTime: prepTime || '—',
        cookTime: cookTime || totalTime || '—',
        servings,
        difficulty: '—',
        category,
        source: domain,
        sourceUrl
    };
}

function parseDuration(iso) {
    if (!iso) return null;
    // PT30M, PT1H30M format
    const m = String(iso).match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
    if (!m) return iso; // If not ISO format, return as-is
    const hours = parseInt(m[1] || 0);
    const mins = parseInt(m[2] || 0);
    if (hours && mins) return `${hours} hr ${mins} min`;
    if (hours) return `${hours} hr`;
    if (mins) return `${mins} min`;
    return null;
}

// ── AI CHEF ──────────────────────────────────────────────────────
async function askAI() {
    const input = document.getElementById('aiInput');
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    await sendToAI(q);
}

async function quickAsk(q) { await sendToAI(q); }

async function sendToAI(prompt) {
    const el = document.getElementById('aiResponse');

    if (!geminiKey) {
        el.innerHTML = `
            <div style="padding:24px;text-align:center;color:var(--text-dim)">
                <div style="color:var(--accent4);font-family:Orbitron,monospace;font-size:.58rem;margin-bottom:10px;letter-spacing:2px">NO API KEY</div>
                <input type="password" class="pm-input" id="quickKey" placeholder="Gemini API key..." style="margin-top:10px">
                <button class="pm-btn" onclick="saveKey()" style="margin-top:8px">SAVE</button>
            </div>`;
        return;
    }

    el.innerHTML = '<div class="pm-thinking"><span></span><span></span><span></span></div>';

    const context = allRecipes.slice(0, 10).map(r => `- ${r.title} (${r.category})`).join('\n');

    const fullPrompt = `You are a professional chef assistant for Pisces Moon OS.
The user's recipe book contains:
${context}

USER: ${prompt}

Give practical, concise culinary advice. Include specific techniques, ratios, and timing when relevant. Reference recipes from their book when applicable.`;

    try {
        const response = await PM.gemini(fullPrompt, {apiKey: geminiKey, temperature: 0.7});
        el.innerHTML = `<div>${PM.esc(response)
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/\n\n/g, '</p><p style="margin-top:10px">')
            .replace(/^/, '<p>') + '</p>'}</div>`;
    } catch (e) {
        el.innerHTML = `<div style="padding:14px;color:var(--accent4);font-size:.7rem">AI error: ${PM.esc(e.message)}</div>`;
    }
}

function saveKey() {
    const k = document.getElementById('quickKey').value.trim();
    if (k) {
        geminiKey = k;
        localStorage.setItem('gemini_key', k);
        document.getElementById('aiResponse').innerHTML = `<div style="padding:24px;text-align:center;color:var(--accent3);font-size:.7rem">Key saved.</div>`;
    }
}
