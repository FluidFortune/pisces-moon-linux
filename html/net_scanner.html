<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            this.ws.onopen = () => resolve();
            this.ws.onerror = () => reject(new Error(`WebSocket failed at ${this.wsUrl}`));

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed");
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
// ═══════════════════════════════════════════════════════════════════
// NET SCANNER — D3 topology map, threat detection, port analysis
// ═══════════════════════════════════════════════════════════════════

const devices   = new Map();  // ip → device object
const threats   = [];
let selectedIP  = null;
let viewMode    = 'topo';
let latencySpark, vendorChart;
let animFrame   = null;
let gateway     = null;
let subnet      = null;

// Known port names
const PORT_NAMES = {
    21:'FTP', 22:'SSH', 23:'TELNET', 25:'SMTP', 53:'DNS',
    80:'HTTP', 110:'POP3', 143:'IMAP', 443:'HTTPS', 445:'SMB',
    3389:'RDP', 8080:'HTTP-ALT', 8443:'HTTPS-ALT',
    1883:'MQTT', 5900:'VNC', 554:'RTSP',
};

// OUI vendor prefix lookup (abbreviated)
const OUI = {
    '00:50:56':'VMware', 'ac:de:48':'Apple', 'b8:27:eb':'Raspberry Pi',
    'dc:a6:32':'Raspberry Pi', '00:0c:29':'VMware', 'fc:fb:fb':'Tenda',
    '50:c7:bf':'TP-Link', 'c8:3a:35':'Tenda', '00:e0:4c':'Realtek',
    '00:1a:2b':'Generic', '18:31:bf':'Amazon Echo',
};

function vendorFromMAC(mac) {
    if (!mac) return 'Unknown';
    const prefix = mac.substring(0, 8).toUpperCase();
    return OUI[prefix] || 'Unknown';
}

// ── Topology canvas ───────────────────────────────────────────────
const topoCanvas = document.getElementById('ns-topology');
const topoCtx    = topoCanvas.getContext('2d');
const nodes      = new Map(); // ip → {x, y, vx, vy}

function resizeTopo() {
    const parent = topoCanvas.parentElement;
    // Account for stats bar and controls
    topoCanvas.width  = parent.offsetWidth;
    topoCanvas.height = parent.offsetHeight;
}

function getOrCreateNode(ip) {
    if (!nodes.has(ip)) {
        nodes.set(ip, {
            x:  topoCanvas.width  / 2 + (Math.random() - 0.5) * 200,
            y:  topoCanvas.height / 2 + (Math.random() - 0.5) * 200,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
        });
    }
    return nodes.get(ip);
}

function drawTopology() {
    const w   = topoCanvas.width;
    const h   = topoCanvas.height;
    const ctx = topoCtx;
    const C   = PMViz.C;

    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, w, h);

    if (devices.size === 0) {
        ctx.fillStyle  = C.textDim;
        ctx.font       = '13px monospace';
        ctx.textAlign  = 'center';
        ctx.fillText('No hosts discovered', w/2, h/2);
        ctx.fillText('Start a scan to populate the topology', w/2, h/2 + 20);
        return;
    }

    const devArr = Array.from(devices.values());
    const gwNode = gateway ? getOrCreateNode(gateway) : null;

    // Center gateway
    if (gwNode) {
        gwNode.x = w / 2;
        gwNode.y = h / 2;
    }

    // Update node positions (simple force-like simulation)
    devArr.forEach(d => {
        const n = getOrCreateNode(d.ip);

        // Attract to center gently
        n.vx += (w/2 - n.x) * 0.0002;
        n.vy += (h/2 - n.y) * 0.0002;

        // Repel from other nodes
        devArr.forEach(d2 => {
            if (d2.ip === d.ip) return;
            const n2  = getOrCreateNode(d2.ip);
            const dx  = n.x - n2.x;
            const dy  = n.y - n2.y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            if (dist < 100) {
                n.vx += (dx / dist) * 0.8;
                n.vy += (dy / dist) * 0.8;
            }
        });

        // Apply velocity with damping
        n.vx *= 0.9;
        n.vy *= 0.9;

        if (d.ip !== gateway) {
            n.x += n.vx;
            n.y += n.vy;
        }

        // Clamp to canvas
        n.x = Math.max(40, Math.min(w - 40, n.x));
        n.y = Math.max(40, Math.min(h - 40, n.y));
    });

    // Draw edges (gateway → all)
    if (gwNode) {
        devArr.forEach(d => {
            if (d.ip === gateway) return;
            const n = getOrCreateNode(d.ip);
            ctx.beginPath();
            ctx.moveTo(gwNode.x, gwNode.y);
            ctx.lineTo(n.x, n.y);
            const isThreat = threats.some(t => t.ip === d.ip);
            ctx.strokeStyle = isThreat ? C.accent4 + '44' : C.border;
            ctx.lineWidth   = 1;
            ctx.stroke();
        });
    }

    // Draw nodes
    devArr.forEach(d => {
        const n         = getOrCreateNode(d.ip);
        const isGW      = d.ip === gateway;
        const isThreat  = threats.some(t => t.ip === d.ip);
        const isSelected= d.ip === selectedIP;
        const openPorts = (d.ports || []).filter(p => p.state === 'open').length;

        const r      = isGW ? 18 : Math.max(8, Math.min(16, 8 + openPorts * 1.5));
        const color  = isGW      ? C.gold :
                       isThreat  ? C.accent4 :
                       isSelected? C.accent :
                       openPorts > 3 ? C.accent2 : C.accent3;

        // Glow for selected/threats
        if (isSelected || isThreat || isGW) {
            ctx.beginPath();
            ctx.arc(n.x, n.y, r + 8, 0, Math.PI * 2);
            ctx.fillStyle = color + '22';
            ctx.fill();
        }

        // Node circle
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fillStyle   = color + '33';
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth   = isSelected ? 2.5 : 1.5;
        ctx.stroke();

        // Icon
        ctx.fillStyle  = color;
        ctx.font       = `${r}px sans-serif`;
        ctx.textAlign  = 'center';
        ctx.fillText(
            isGW ? '⬡' : isThreat ? '⚠' : '●',
            n.x, n.y + r * 0.35
        );

        // IP label
        ctx.fillStyle  = isSelected ? C.textBright : C.textDim;
        ctx.font       = '9px monospace';
        ctx.textAlign  = 'center';
        ctx.fillText(d.ip, n.x, n.y + r + 12);
        if (d.hostname) {
            ctx.fillStyle = C.textDim;
            ctx.fillText(d.hostname.substring(0, 14), n.x, n.y + r + 22);
        }
    });

    animFrame = requestAnimationFrame(drawTopology);
}

// ── Threat detection ──────────────────────────────────────────────
function analyzeThreats(device) {
    const flags = [];
    const age   = Date.now() - device.firstSeen;

    // Appeared and disappeared quickly
    if (age < 30000 && device.scanCount < 2) {
        flags.push({type: 'PROBE/SCANNER', detail: 'Appeared briefly, possible scanner'});
    }
    // Unknown vendor
    if (!device.vendor || device.vendor === 'Unknown') {
        flags.push({type: 'UNKNOWN VENDOR', detail: 'MAC vendor not in OUI database — possible spoofing'});
    }
    // High open port count
    const openPorts = (device.ports||[]).filter(p=>p.state==='open');
    if (openPorts.length > 5) {
        flags.push({type: 'HIGH EXPOSURE', detail: `${openPorts.length} open ports detected`});
    }
    // Dangerous ports
    const dangerous = [23, 21, 3389, 5900]; // Telnet, FTP, RDP, VNC
    openPorts.forEach(p => {
        if (dangerous.includes(p.port)) {
            flags.push({type: 'INSECURE SERVICE', detail: `${PORT_NAMES[p.port]||p.port} is open`});
        }
    });

    return flags;
}

function updateThreats() {
    threats.length = 0;
    devices.forEach((d, ip) => {
        const flags = analyzeThreats(d);
        if (flags.length > 0) {
            threats.push({ip, flags});
        }
    });

    document.getElementById('statThreats').textContent = threats.length;
    document.getElementById('threatCount').textContent =
        threats.length > 0 ? `${threats.length} detected` : 'clean';

    document.getElementById('threatPanel').innerHTML = threats.length === 0
        ? '<div style="padding:14px;text-align:center;color:var(--accent3);font-size:.7rem">✓ No threats detected</div>'
        : threats.map(t => `
            <div class="ns-threat-item">
                <div style="color:var(--text-bright);font-size:.7rem;margin-bottom:4px">${t.ip}</div>
                ${t.flags.map(f => `
                    <div style="margin:3px 0">
                        <span class="ns-threat-badge">${f.type}</span>
                        <span style="color:var(--text-dim);font-size:.6rem;margin-left:6px">${f.detail}</span>
                    </div>`).join('')}
            </div>`).join('');
}

// ── Device list ───────────────────────────────────────────────────
function renderList() {
    const devArr = Array.from(devices.values())
        .sort((a, b) => {
            const aNum = a.ip.split('.').reduce((acc,n,i) => acc + parseInt(n) * Math.pow(256, 3-i), 0);
            const bNum = b.ip.split('.').reduce((acc,n,i) => acc + parseInt(n) * Math.pow(256, 3-i), 0);
            return aNum - bNum;
        });

    const isThreat = (ip) => threats.some(t => t.ip === ip);

    document.getElementById('deviceList').innerHTML = devArr.map(d => {
        const open = (d.ports||[]).filter(p=>p.state==='open').length;
        return `
        <div class="ns-device ${selectedIP===d.ip?'selected':''} ${isThreat(d.ip)?'threat':''}"
             onclick="selectDevice('${d.ip}')">
            <div class="ns-device-ip">${d.ip}</div>
            <div class="ns-device-meta">
                <span>${d.vendor||'Unknown'}</span>
                ${d.hostname ? `<span>${PM.esc(d.hostname)}</span>` : ''}
                ${open > 0 ? `<span style="color:var(--accent3)">${open} open</span>` : ''}
                ${isThreat(d.ip) ? '<span class="ns-threat-badge">THREAT</span>' : '<span class="ns-ok-badge">OK</span>'}
            </div>
        </div>`;
    }).join('');

    document.getElementById('statHosts').textContent = devArr.length;
    document.getElementById('statPorts').textContent =
        devArr.reduce((s,d) => s + (d.ports||[]).filter(p=>p.state==='open').length, 0);
}

function selectDevice(ip) {
    selectedIP = ip;
    const d    = devices.get(ip);
    if (!d) return;

    renderList();

    const ports = d.ports || [];
    document.getElementById('deviceDetail').innerHTML = `
        <div class="ns-detail-ip">${d.ip}</div>
        ${d.hostname ? `<div class="ns-detail-row"><span class="label">Hostname</span><span class="value">${PM.esc(d.hostname)}</span></div>` : ''}
        <div class="ns-detail-row"><span class="label">MAC</span><span class="value">${d.mac||'—'}</span></div>
        <div class="ns-detail-row"><span class="label">Vendor</span><span class="value">${d.vendor||'—'}</span></div>
        <div class="ns-detail-row"><span class="label">OS Guess</span><span class="value">${d.os||'—'}</span></div>
        <div class="ns-detail-row"><span class="label">First Seen</span><span class="value">${new Date(d.firstSeen).toLocaleTimeString()}</span></div>
        <div class="ns-detail-row"><span class="label">Scans</span><span class="value">${d.scanCount||1}</span></div>
        <div class="ns-ports">
            ${ports.map(p => `
                <span class="ns-port ${p.state}">
                    ${p.port}${PORT_NAMES[p.port]?'/'+PORT_NAMES[p.port]:''}
                </span>`).join('')}
        </div>
    `;
}

// ── Transport ─────────────────────────────────────────────────────
const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s) => {
        document.getElementById('liveBadge').style.opacity =
            s.state === 'connected' ? '1' : '0.3';
        document.getElementById('lastUpdate').textContent = s.message;
    }
});

function handleData(msg) {
    if (msg.type === 'NET_SCAN_HOST' || msg.type === 'arp') {
        addDevice(msg);
    } else if (msg.type === 'NET_SCAN_DONE') {
        document.getElementById('lastUpdate').textContent =
            `Scan complete — ${msg.count} hosts`;
        updateThreats();
        updateVendorChart();
        PMViz.Storage.autoSave('netscan',
            () => Array.from(devices.values()), 60);
    }
}

function addDevice(d) {
    const ip = d.ip;
    if (devices.has(ip)) {
        const existing = devices.get(ip);
        existing.scanCount = (existing.scanCount || 1) + 1;
        if (d.ports) existing.ports = d.ports;
    } else {
        devices.set(ip, {
            ip,
            mac:       d.mac || '',
            hostname:  d.hostname || '',
            vendor:    d.vendor || vendorFromMAC(d.mac),
            os:        d.os || '',
            ports:     d.ports || [],
            firstSeen: Date.now(),
            scanCount: 1,
        });
        if (!gateway && d.gateway) {
            gateway = d.ip;
            document.getElementById('statGW').textContent = gateway;
        }
        if (!subnet && d.subnet) {
            subnet = d.subnet;
            document.getElementById('statSubnet').textContent = subnet;
        }
    }
    renderList();
}

function updateVendorChart() {
    const counts = {};
    devices.forEach(d => {
        const v = d.vendor || 'Unknown';
        counts[v] = (counts[v] || 0) + 1;
    });
    if (!vendorChart) {
        vendorChart = new PMViz.DonutChart('ns-vendors');
    }
    vendorChart.update(Object.entries(counts).map(([label,value])=>({label,value})));
}

function startScan() {
    // Trigger bridge LAN scan (sends arp events back)
    if (beam.connected) beam.send({cmd: 'scan_devices'});
    if (beam.connected) {
        beam.send({type:'CMD_NET_SCAN', src:'app', cmd_id:'ns1'});
    }
}

function setView(v) {
    viewMode = v;
    document.getElementById('btnTopo').className  = 'ns-btn' + (v==='topo' ?' active':'');
    document.getElementById('btnPorts').className = 'ns-btn' + (v==='ports'?' active':'');
}

function saveNow() {
    PMViz.Storage.save('netscan', Array.from(devices.values()), 'json');
}

window.addEventListener('load', async () => {
    resizeTopo();
    window.addEventListener('resize', () => {
        resizeTopo();
        cancelAnimationFrame(animFrame);
        drawTopology();
    });

    latencySpark = new PMViz.Sparkline('ns-latency', {color: PMViz.C.accent, maxPts: 60});

    try { await beam.connect(); }
    catch(e) { console.log('No hardware — demo mode'); }

    drawTopology();
});
</script>
