<link rel="stylesheet" href="pm_shared.css">
<style>
.ns-layout {
    display: grid;
    grid-template-columns: 300px 1fr 300px;
    height: calc(100vh - 52px);
    overflow: hidden;
}
.ns-left  { border-right: 1px solid var(--panel-border); overflow-y: auto; }
.ns-right { border-left:  1px solid var(--panel-border); overflow-y: auto; }
.ns-center { position: relative; background: var(--bg); }

/* Stats bar */
.ns-stats {
    display: flex;
    border-bottom: 1px solid var(--panel-border);
    background: var(--bg2);
    padding: 0;
}
.ns-stat {
    flex: 1;
    padding: 10px 14px;
    border-right: 1px solid var(--panel-border);
    text-align: center;
}
.ns-stat:last-child { border-right: none; }
.ns-stat-label { font-family:Orbitron,monospace; font-size:.48rem; letter-spacing:2px; color:var(--text-dim); }
.ns-stat-value { font-family:Orbitron,monospace; font-size:1.2rem; color:var(--text-bright); font-weight:700; }

/* Device list */
.ns-device {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(28,46,58,.4);
    cursor: pointer;
    transition: background .15s;
}
.ns-device:hover { background: rgba(0,212,255,.04); }
.ns-device.selected { background: rgba(0,212,255,.08); border-left: 2px solid var(--accent); }
.ns-device.threat { border-left: 2px solid var(--accent4); }
.ns-device-ip { font-size:.75rem; color:var(--text-bright); font-family:Share\ Tech\ Mono,monospace; }
.ns-device-meta { font-size:.6rem; color:var(--text-dim); margin-top:3px; display:flex; gap:8px; flex-wrap:wrap; }
.ns-threat-badge {
    display:inline-block; padding:2px 6px;
    background:rgba(255,51,102,.15); color:var(--accent4);
    border:1px solid var(--accent4);
    font-family:Orbitron,monospace; font-size:.48rem; letter-spacing:1px;
}
.ns-ok-badge {
    display:inline-block; padding:2px 6px;
    background:rgba(0,255,136,.1); color:var(--accent3);
    border:1px solid var(--accent3);
    font-family:Orbitron,monospace; font-size:.48rem; letter-spacing:1px;
}

/* Topology canvas */
#ns-topology { width:100%; height:100%; }

/* Detail panel */
.ns-detail { padding:14px; }
.ns-detail-ip { font-family:Orbitron,monospace; font-size:1rem; color:var(--accent); margin-bottom:10px; }
.ns-detail-row { display:flex; justify-content:space-between; padding:5px 0;
    border-bottom:1px solid rgba(28,46,58,.4); font-size:.68rem; }
.ns-detail-row .label { color:var(--text-dim); }
.ns-detail-row .value { color:var(--text-bright); font-family:Share\ Tech\ Mono,monospace; }
.ns-ports { margin-top:10px; }
.ns-port {
    display:inline-block; margin:3px;
    padding:3px 8px;
    border:1px solid var(--panel-border);
    font-family:Share\ Tech\ Mono,monospace; font-size:.62rem;
    color:var(--text-dim);
}
.ns-port.open { border-color:var(--accent3); color:var(--accent3); }
.ns-port.filtered { border-color:var(--warn); color:var(--warn); }

/* Sparkline row */
.ns-sparkline-row { padding:8px 12px; border-bottom:1px solid var(--panel-border); }
.ns-sparkline-label { font-family:Orbitron,monospace; font-size:.5rem; letter-spacing:2px; color:var(--gold); margin-bottom:4px; }

/* Threat panel */
.ns-threat-panel { background:rgba(255,51,102,.05); border-bottom:1px solid var(--accent4); }
.ns-threat-item { padding:8px 12px; border-bottom:1px solid rgba(255,51,102,.1); font-size:.65rem; }
.ns-threat-item .threat-type { color:var(--accent4); font-family:Orbitron,monospace; font-size:.52rem; letter-spacing:1px; }

.ns-controls {
    position:absolute; top:8px; right:8px; z-index:10;
    display:flex; gap:6px;
}
.ns-btn {
    padding:6px 12px;
    background:var(--bg2); border:1px solid var(--panel-border);
    color:var(--text-dim); font-family:Share\ Tech\ Mono,monospace;
    font-size:.6rem; cursor:pointer; letter-spacing:1px;
    transition:all .15s;
}
.ns-btn:hover { border-color:var(--gold); color:var(--gold); }
.ns-btn.active { border-color:var(--accent); color:var(--accent); }
</style>
</head><body>

<header class="pm-header">
    <div class="pm-logo">🌐 <em>NET</em> SCANNER</div>
    <div class="pm-hdr-right">
        <div class="pm-live-badge" id="liveBadge" style="opacity:.3">
            <div class="pm-live-dot"></div>LIVE
        </div>
        <span class="pm-last-update" id="lastUpdate"></span>
        <button class="pm-refresh" onclick="startScan()">⟳ SCAN</button>
    </div>
</header>

<!-- Stats bar spans full width -->
<div class="ns-stats">
    <div class="ns-stat">
        <div class="ns-stat-label">HOSTS</div>
        <div class="ns-stat-value" id="statHosts">0</div>
    </div>
    <div class="ns-stat">
        <div class="ns-stat-label">OPEN PORTS</div>
        <div class="ns-stat-value" id="statPorts">0</div>
    </div>
    <div class="ns-stat">
        <div class="ns-stat-label">THREATS</div>
        <div class="ns-stat-value" style="color:var(--accent4)" id="statThreats">0</div>
    </div>
    <div class="ns-stat">
        <div class="ns-stat-label">GATEWAY</div>
        <div class="ns-stat-value" id="statGW">—</div>
    </div>
    <div class="ns-stat">
        <div class="ns-stat-label">SUBNET</div>
        <div class="ns-stat-value" id="statSubnet">—</div>
    </div>
</div>

<div class="ns-layout">
    <!-- Left: device list -->
    <div class="ns-left">
        <div class="pm-sh" style="position:sticky;top:0;z-index:10">HOSTS</div>
        <div id="deviceList"></div>
    </div>

    <!-- Center: topology visualization -->
    <div class="ns-center">
        <div class="ns-controls">
            <button class="ns-btn active" id="btnTopo" onclick="setView('topo')">TOPOLOGY</button>
            <button class="ns-btn" id="btnPorts" onclick="setView('ports')">PORT HEAT</button>
            <button class="ns-btn" onclick="saveNow()">💾</button>
        </div>
        <canvas id="ns-topology"></canvas>
    </div>

    <!-- Right: detail + threats -->
    <div class="ns-right">
        <div class="pm-sh">THREATS <span class="pm-sh-sub" id="threatCount"></span></div>
        <div id="threatPanel"></div>

        <div class="pm-sh" style="margin-top:0">DEVICE DETAIL</div>
        <div class="ns-detail" id="deviceDetail">
            <div style="text-align:center;padding:20px;color:var(--text-dim);font-size:.7rem">
                Select a host to inspect
            </div>
        </div>

        <div class="pm-sh">LATENCY</div>
        <div class="ns-sparkline-row">
            <div class="ns-sparkline-label">PING ms — SELECTED HOST</div>
            <canvas id="ns-latency" width="276" height="50"></canvas>
        </div>

        <div class="pm-sh">VENDOR DIST</div>
        <canvas id="ns-vendors" width="300" height="180" style="padding:8px"></canvas>
    </div>
</div>

<script src="pm_scraper.js"></script>
<script src="pm_viz.js"></script>
<script src="pm_transport.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// NET SCANNER — D3 topology map, threat detection, port analysis
// ═══════════════════════════════════════════════════════════════════

const devices   = new Map();  // ip → device object
const threats   = [];
let selectedIP  = null;
let viewMode    = 'topo';
let latencySpark, vendorChart;
let animFrame   = null;
let gateway     = null;
let subnet      = null;

// Known port names
const PORT_NAMES = {
    21:'FTP', 22:'SSH', 23:'TELNET', 25:'SMTP', 53:'DNS',
    80:'HTTP', 110:'POP3', 143:'IMAP', 443:'HTTPS', 445:'SMB',
    3389:'RDP', 8080:'HTTP-ALT', 8443:'HTTPS-ALT',
    1883:'MQTT', 5900:'VNC', 554:'RTSP',
};

// OUI vendor prefix lookup (abbreviated)
const OUI = {
    '00:50:56':'VMware', 'ac:de:48':'Apple', 'b8:27:eb':'Raspberry Pi',
    'dc:a6:32':'Raspberry Pi', '00:0c:29':'VMware', 'fc:fb:fb':'Tenda',
    '50:c7:bf':'TP-Link', 'c8:3a:35':'Tenda', '00:e0:4c':'Realtek',
    '00:1a:2b':'Generic', '18:31:bf':'Amazon Echo',
};

function vendorFromMAC(mac) {
    if (!mac) return 'Unknown';
    const prefix = mac.substring(0, 8).toUpperCase();
    return OUI[prefix] || 'Unknown';
}

// ── Topology canvas ───────────────────────────────────────────────
const topoCanvas = document.getElementById('ns-topology');
const topoCtx    = topoCanvas.getContext('2d');
const nodes      = new Map(); // ip → {x, y, vx, vy}

function resizeTopo() {
    const parent = topoCanvas.parentElement;
    // Account for stats bar and controls
    topoCanvas.width  = parent.offsetWidth;
    topoCanvas.height = parent.offsetHeight;
}

function getOrCreateNode(ip) {
    if (!nodes.has(ip)) {
        nodes.set(ip, {
            x:  topoCanvas.width  / 2 + (Math.random() - 0.5) * 200,
            y:  topoCanvas.height / 2 + (Math.random() - 0.5) * 200,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
        });
    }
    return nodes.get(ip);
}

function drawTopology() {
    const w   = topoCanvas.width;
    const h   = topoCanvas.height;
    const ctx = topoCtx;
    const C   = PMViz.C;

    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, w, h);

    if (devices.size === 0) {
        ctx.fillStyle  = C.textDim;
        ctx.font       = '13px monospace';
        ctx.textAlign  = 'center';
        ctx.fillText('No hosts discovered', w/2, h/2);
        ctx.fillText('Start a scan to populate the topology', w/2, h/2 + 20);
        return;
    }

    const devArr = Array.from(devices.values());
    const gwNode = gateway ? getOrCreateNode(gateway) : null;

    // Center gateway
    if (gwNode) {
        gwNode.x = w / 2;
        gwNode.y = h / 2;
    }

    // Update node positions (simple force-like simulation)
    devArr.forEach(d => {
        const n = getOrCreateNode(d.ip);

        // Attract to center gently
        n.vx += (w/2 - n.x) * 0.0002;
        n.vy += (h/2 - n.y) * 0.0002;

        // Repel from other nodes
        devArr.forEach(d2 => {
            if (d2.ip === d.ip) return;
            const n2  = getOrCreateNode(d2.ip);
            const dx  = n.x - n2.x;
            const dy  = n.y - n2.y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            if (dist < 100) {
                n.vx += (dx / dist) * 0.8;
                n.vy += (dy / dist) * 0.8;
            }
        });

        // Apply velocity with damping
        n.vx *= 0.9;
        n.vy *= 0.9;

        if (d.ip !== gateway) {
            n.x += n.vx;
            n.y += n.vy;
        }

        // Clamp to canvas
        n.x = Math.max(40, Math.min(w - 40, n.x));
        n.y = Math.max(40, Math.min(h - 40, n.y));
    });

    // Draw edges (gateway → all)
    if (gwNode) {
        devArr.forEach(d => {
            if (d.ip === gateway) return;
            const n = getOrCreateNode(d.ip);
            ctx.beginPath();
            ctx.moveTo(gwNode.x, gwNode.y);
            ctx.lineTo(n.x, n.y);
            const isThreat = threats.some(t => t.ip === d.ip);
            ctx.strokeStyle = isThreat ? C.accent4 + '44' : C.border;
            ctx.lineWidth   = 1;
            ctx.stroke();
        });
    }

    // Draw nodes
    devArr.forEach(d => {
        const n         = getOrCreateNode(d.ip);
        const isGW      = d.ip === gateway;
        const isThreat  = threats.some(t => t.ip === d.ip);
        const isSelected= d.ip === selectedIP;
        const openPorts = (d.ports || []).filter(p => p.state === 'open').length;

        const r      = isGW ? 18 : Math.max(8, Math.min(16, 8 + openPorts * 1.5));
        const color  = isGW      ? C.gold :
                       isThreat  ? C.accent4 :
                       isSelected? C.accent :
                       openPorts > 3 ? C.accent2 : C.accent3;

        // Glow for selected/threats
        if (isSelected || isThreat || isGW) {
            ctx.beginPath();
            ctx.arc(n.x, n.y, r + 8, 0, Math.PI * 2);
            ctx.fillStyle = color + '22';
            ctx.fill();
        }

        // Node circle
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fillStyle   = color + '33';
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth   = isSelected ? 2.5 : 1.5;
        ctx.stroke();

        // Icon
        ctx.fillStyle  = color;
        ctx.font       = `${r}px sans-serif`;
        ctx.textAlign  = 'center';
        ctx.fillText(
            isGW ? '⬡' : isThreat ? '⚠' : '●',
            n.x, n.y + r * 0.35
        );

        // IP label
        ctx.fillStyle  = isSelected ? C.textBright : C.textDim;
        ctx.font       = '9px monospace';
        ctx.textAlign  = 'center';
        ctx.fillText(d.ip, n.x, n.y + r + 12);
        if (d.hostname) {
            ctx.fillStyle = C.textDim;
            ctx.fillText(d.hostname.substring(0, 14), n.x, n.y + r + 22);
        }
    });

    animFrame = requestAnimationFrame(drawTopology);
}

// ── Threat detection ──────────────────────────────────────────────
function analyzeThreats(device) {
    const flags = [];
    const age   = Date.now() - device.firstSeen;

    // Appeared and disappeared quickly
    if (age < 30000 && device.scanCount < 2) {
        flags.push({type: 'PROBE/SCANNER', detail: 'Appeared briefly, possible scanner'});
    }
    // Unknown vendor
    if (!device.vendor || device.vendor === 'Unknown') {
        flags.push({type: 'UNKNOWN VENDOR', detail: 'MAC vendor not in OUI database — possible spoofing'});
    }
    // High open port count
    const openPorts = (device.ports||[]).filter(p=>p.state==='open');
    if (openPorts.length > 5) {
        flags.push({type: 'HIGH EXPOSURE', detail: `${openPorts.length} open ports detected`});
    }
    // Dangerous ports
    const dangerous = [23, 21, 3389, 5900]; // Telnet, FTP, RDP, VNC
    openPorts.forEach(p => {
        if (dangerous.includes(p.port)) {
            flags.push({type: 'INSECURE SERVICE', detail: `${PORT_NAMES[p.port]||p.port} is open`});
        }
    });

    return flags;
}

function updateThreats() {
    threats.length = 0;
    devices.forEach((d, ip) => {
        const flags = analyzeThreats(d);
        if (flags.length > 0) {
            threats.push({ip, flags});
        }
    });

    document.getElementById('statThreats').textContent = threats.length;
    document.getElementById('threatCount').textContent =
        threats.length > 0 ? `${threats.length} detected` : 'clean';

    document.getElementById('threatPanel').innerHTML = threats.length === 0
        ? '<div style="padding:14px;text-align:center;color:var(--accent3);font-size:.7rem">✓ No threats detected</div>'
        : threats.map(t => `
            <div class="ns-threat-item">
                <div style="color:var(--text-bright);font-size:.7rem;margin-bottom:4px">${t.ip}</div>
                ${t.flags.map(f => `
                    <div style="margin:3px 0">
                        <span class="ns-threat-badge">${f.type}</span>
                        <span style="color:var(--text-dim);font-size:.6rem;margin-left:6px">${f.detail}</span>
                    </div>`).join('')}
            </div>`).join('');
}

// ── Device list ───────────────────────────────────────────────────
function renderList() {
    const devArr = Array.from(devices.values())
        .sort((a, b) => {
            const aNum = a.ip.split('.').reduce((acc,n,i) => acc + parseInt(n) * Math.pow(256, 3-i), 0);
            const bNum = b.ip.split('.').reduce((acc,n,i) => acc + parseInt(n) * Math.pow(256, 3-i), 0);
            return aNum - bNum;
        });

    const isThreat = (ip) => threats.some(t => t.ip === ip);

    document.getElementById('deviceList').innerHTML = devArr.map(d => {
        const open = (d.ports||[]).filter(p=>p.state==='open').length;
        return `
        <div class="ns-device ${selectedIP===d.ip?'selected':''} ${isThreat(d.ip)?'threat':''}"
             onclick="selectDevice('${d.ip}')">
            <div class="ns-device-ip">${d.ip}</div>
            <div class="ns-device-meta">
                <span>${d.vendor||'Unknown'}</span>
                ${d.hostname ? `<span>${PM.esc(d.hostname)}</span>` : ''}
                ${open > 0 ? `<span style="color:var(--accent3)">${open} open</span>` : ''}
                ${isThreat(d.ip) ? '<span class="ns-threat-badge">THREAT</span>' : '<span class="ns-ok-badge">OK</span>'}
            </div>
        </div>`;
    }).join('');

    document.getElementById('statHosts').textContent = devArr.length;
    document.getElementById('statPorts').textContent =
        devArr.reduce((s,d) => s + (d.ports||[]).filter(p=>p.state==='open').length, 0);
}

function selectDevice(ip) {
    selectedIP = ip;
    const d    = devices.get(ip);
    if (!d) return;

    renderList();

    const ports = d.ports || [];
    document.getElementById('deviceDetail').innerHTML = `
        <div class="ns-detail-ip">${d.ip}</div>
        ${d.hostname ? `<div class="ns-detail-row"><span class="label">Hostname</span><span class="value">${PM.esc(d.hostname)}</span></div>` : ''}
        <div class="ns-detail-row"><span class="label">MAC</span><span class="value">${d.mac||'—'}</span></div>
        <div class="ns-detail-row"><span class="label">Vendor</span><span class="value">${d.vendor||'—'}</span></div>
        <div class="ns-detail-row"><span class="label">OS Guess</span><span class="value">${d.os||'—'}</span></div>
        <div class="ns-detail-row"><span class="label">First Seen</span><span class="value">${new Date(d.firstSeen).toLocaleTimeString()}</span></div>
        <div class="ns-detail-row"><span class="label">Scans</span><span class="value">${d.scanCount||1}</span></div>
        <div class="ns-ports">
            ${ports.map(p => `
                <span class="ns-port ${p.state}">
                    ${p.port}${PORT_NAMES[p.port]?'/'+PORT_NAMES[p.port]:''}
                </span>`).join('')}
        </div>
    `;
}

// ── Transport ─────────────────────────────────────────────────────
const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s) => {
        document.getElementById('liveBadge').style.opacity =
            s.state === 'connected' ? '1' : '0.3';
        document.getElementById('lastUpdate').textContent = s.message;
    }
});

function handleData(msg) {
    if (msg.type === 'NET_SCAN_HOST') {
        addDevice(msg);
    } else if (msg.type === 'NET_SCAN_DONE') {
        document.getElementById('lastUpdate').textContent =
            `Scan complete — ${msg.count} hosts`;
        updateThreats();
        updateVendorChart();
        PMViz.Storage.autoSave('netscan',
            () => Array.from(devices.values()), 60);
    }
}

function addDevice(d) {
    const ip = d.ip;
    if (devices.has(ip)) {
        const existing = devices.get(ip);
        existing.scanCount = (existing.scanCount || 1) + 1;
        if (d.ports) existing.ports = d.ports;
    } else {
        devices.set(ip, {
            ip,
            mac:       d.mac || '',
            hostname:  d.hostname || '',
            vendor:    d.vendor || vendorFromMAC(d.mac),
            os:        d.os || '',
            ports:     d.ports || [],
            firstSeen: Date.now(),
            scanCount: 1,
        });
        if (!gateway && d.gateway) {
            gateway = d.ip;
            document.getElementById('statGW').textContent = gateway;
        }
        if (!subnet && d.subnet) {
            subnet = d.subnet;
            document.getElementById('statSubnet').textContent = subnet;
        }
    }
    renderList();
}

function updateVendorChart() {
    const counts = {};
    devices.forEach(d => {
        const v = d.vendor || 'Unknown';
        counts[v] = (counts[v] || 0) + 1;
    });
    if (!vendorChart) {
        vendorChart = new PMViz.DonutChart('ns-vendors');
    }
    vendorChart.update(Object.entries(counts).map(([label,value])=>({label,value})));
}

function startScan() {
    if (beam.connected) {
        beam.send({type:'CMD_NET_SCAN', src:'app', cmd_id:'ns1'});
    }
}

function setView(v) {
    viewMode = v;
    document.getElementById('btnTopo').className  = 'ns-btn' + (v==='topo' ?' active':'');
    document.getElementById('btnPorts').className = 'ns-btn' + (v==='ports'?' active':'');
}

function saveNow() {
    PMViz.Storage.save('netscan', Array.from(devices.values()), 'json');
}

window.addEventListener('load', async () => {
    resizeTopo();
    window.addEventListener('resize', () => {
        resizeTopo();
        cancelAnimationFrame(animFrame);
        drawTopology();
    });

    latencySpark = new PMViz.Sparkline('ns-latency', {color: PMViz.C.accent, maxPts: 60});

    try { await beam.connect(); }
    catch(e) { console.log('No hardware — demo mode'); }

    drawTopology();
});
</script>
</body></html>
