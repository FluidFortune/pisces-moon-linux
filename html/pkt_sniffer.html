<!-- PISCES MOON OS // PACKET SNIFFER -->
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // PKT SNIFFER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#00d4ff;--accent2:#ff6b00;--accent3:#00ff88;--accent4:#ff3366;--warn:#ffcc00;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;--glow:0 0 20px rgba(0,212,255,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999;}
header{background:var(--bg2);border-bottom:2px solid var(--panel-border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.1rem;color:var(--accent2);text-shadow:0 0 20px rgba(255,107,0,.3);letter-spacing:3px;}
.logo span{color:var(--gold);}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:8px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.btn{display:inline-block;padding:6px 14px;background:transparent;border:1px solid var(--accent2);color:var(--accent2);font-family:'Share Tech Mono',monospace;font-size:.65rem;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{background:var(--accent2);color:var(--bg);}
.btn.sm{padding:4px 10px;font-size:.6rem;}
.btn.cyan{border-color:var(--accent);color:var(--accent);}.btn.cyan:hover{background:var(--accent);color:var(--bg);}
.btn.red{border-color:var(--accent4);color:var(--accent4);}.btn.red:hover{background:var(--accent4);color:var(--bg);}
.btn.green{border-color:var(--accent3);color:var(--accent3);}.btn.green:hover{background:var(--accent3);color:var(--bg);}
.pm-input{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:6px 10px;outline:none;}
.pm-input:focus{border-color:var(--accent2);}
.pm-select{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.68rem;padding:5px 8px;outline:none;cursor:pointer;}
.layout{display:flex;flex:1;overflow:hidden;}
.pkt-list{flex:1;overflow-y:auto;background:var(--bg);}
.pkt{display:flex;gap:0;font-size:.68rem;border-bottom:1px solid rgba(26,58,80,.2);cursor:pointer;transition:background .1s;}
.pkt:hover{background:rgba(0,212,255,.04);}
.pkt.selected{background:rgba(0,212,255,.08)!important;}
.pkt.tcp{border-left:3px solid var(--accent);}
.pkt.udp{border-left:3px solid var(--accent3);}
.pkt.dns{border-left:3px solid var(--gold);}
.pkt.http{border-left:3px solid var(--accent2);}
.pkt.arp{border-left:3px solid var(--warn);}
.pkt.icmp{border-left:3px solid var(--accent4);}
.pc{padding:5px 10px;border-right:1px solid rgba(26,58,80,.2);}
.pc-no{width:55px;color:var(--text-dim);flex-shrink:0;}
.pc-time{width:80px;color:var(--text-dim);flex-shrink:0;}
.pc-src{width:160px;color:var(--accent);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pc-dst{width:160px;color:var(--accent2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pc-proto{width:60px;flex-shrink:0;}
.pc-len{width:55px;color:var(--text-dim);flex-shrink:0;}
.pc-info{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.detail-pane{width:340px;background:var(--bg2);border-left:1px solid var(--panel-border);overflow-y:auto;flex-shrink:0;font-size:.68rem;}
.detail-pane .ph{padding:8px 12px;border-bottom:1px solid var(--panel-border);font-family:'Orbitron',monospace;font-size:.58rem;color:var(--accent2);letter-spacing:2px;}
.detail-section{padding:10px 14px;border-bottom:1px solid rgba(26,58,80,.3);}
.ds-title{font-family:'Orbitron',monospace;font-size:.58rem;color:var(--accent);letter-spacing:2px;margin-bottom:6px;}
.kv{display:flex;justify-content:space-between;margin-bottom:4px;}
.kv .k{color:var(--text-dim);}
.kv .v{color:var(--text-bright);text-align:right;max-width:180px;word-break:break-all;}
.hex-view{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--accent3);background:var(--bg3);padding:8px;border:1px solid var(--panel-border);white-space:pre;overflow-x:auto;line-height:1.6;}
.stats-bar{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:6px 16px;display:flex;gap:20px;font-size:.62rem;color:var(--text-dim);flex-shrink:0;}
.sb-stat{display:flex;align-items:center;gap:6px;}
.sb-dot{width:8px;height:8px;border-radius:50%;}
.badge{display:inline-block;padding:1px 5px;font-size:.58rem;border-radius:2px;}
.btcp{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid var(--accent);}
.budp{background:rgba(0,255,136,.1);color:var(--accent3);border:1px solid var(--accent3);}
.bdns{background:rgba(244,168,32,.1);color:var(--gold);border:1px solid var(--gold);}
.bhttp{background:rgba(255,107,0,.1);color:var(--accent2);border:1px solid var(--accent2);}
.barp{background:rgba(255,204,0,.1);color:var(--warn);border:1px solid var(--warn);}
.bicmp{background:rgba(255,51,102,.1);color:var(--accent4);border:1px solid var(--accent4);}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg3);} ::-webkit-scrollbar-thumb{background:var(--panel-border);}
</style></head><body>
<header>
  <div class="logo">PKT <span>SNIFFER</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <select class="pm-select" id="ifaceSel"><option>wlan0</option><option>eth0</option><option>lo</option><option>any</option></select>
    <button class="btn green" id="captureBtn" onclick="toggleCapture()">▶ CAPTURE</button>
    <button class="btn red sm" onclick="clearCapture()">CLEAR</button>
    <button class="btn cyan sm" onclick="exportPCAP()">EXPORT</button>
  </div>
</header>
<div class="toolbar">
  <input class="pm-input" id="bpfFilter" placeholder="BPF filter: tcp port 80, host 192.168.1.1, udp..." style="flex:1;min-width:200px">
  <select class="pm-select" id="protoFilter" onchange="renderPackets()">
    <option value="">All protocols</option>
    <option value="TCP">TCP</option><option value="UDP">UDP</option>
    <option value="DNS">DNS</option><option value="HTTP">HTTP</option>
    <option value="ARP">ARP</option><option value="ICMP">ICMP</option>
  </select>
  <input class="pm-input" id="textFilter" placeholder="search..." style="width:120px" oninput="renderPackets()">
  <span id="pktCount" style="font-size:.62rem;color:var(--text-dim)">0 packets</span>
</div>
<div class="stats-bar">
  <div class="sb-stat"><div class="sb-dot" style="background:var(--accent)"></div>TCP: <span id="sTCP">0</span></div>
  <div class="sb-stat"><div class="sb-dot" style="background:var(--accent3)"></div>UDP: <span id="sUDP">0</span></div>
  <div class="sb-stat"><div class="sb-dot" style="background:var(--gold)"></div>DNS: <span id="sDNS">0</span></div>
  <div class="sb-stat"><div class="sb-dot" style="background:var(--accent2)"></div>HTTP: <span id="sHTTP">0</span></div>
  <div class="sb-stat"><div class="sb-dot" style="background:var(--warn)"></div>ARP: <span id="sARP">0</span></div>
  <div class="sb-stat">Total bytes: <span id="sBytes">0</span></div>
</div>
<div class="layout">
  <div class="pkt-list" id="pktList">
    <div style="color:var(--text-dim);padding:20px;font-size:.72rem;text-align:center">
      // Select interface and press CAPTURE<br>
      // In Trojan Horse mode: uses tcpdump via bridge<br>
      // In browser mode: simulated packet stream
    </div>
  </div>
  <div class="detail-pane" id="detailPane">
    <div class="ph">PACKET DETAIL</div>
    <div style="padding:16px;color:var(--text-dim);font-size:.68rem">Select a packet to inspect</div>
  </div>
</div>
<script>
const isTH = typeof window.spadra !== 'undefined';
let capturing = false, packets = [], pktId = 0, captureInterval = null;
let selectedPkt = null, ws = null;
let stats = {TCP:0,UDP:0,DNS:0,HTTP:0,ARP:0,ICMP:0,bytes:0};

const PROTOS = ['TCP','UDP','DNS','HTTP','ARP','ICMP'];
const PROTO_PORTS = {80:'HTTP',443:'HTTPS',53:'DNS',22:'SSH',21:'FTP',25:'SMTP',110:'POP3',443:'TLS',8080:'HTTP-ALT'};
const LOCAL_NETS = ['192.168.1.','10.0.0.','172.16.','192.168.0.'];
const HOSTS = ['192.168.1.1','192.168.1.47','192.168.1.100','8.8.8.8','1.1.1.1','93.184.216.34','151.101.1.140','142.250.80.46'];
const DOMAINS = ['google.com','cloudflare.com','example.com','github.com','pisces-moon.local','api.anthropic.com'];

function randomIP() { return HOSTS[Math.floor(Math.random()*HOSTS.length)]; }
function randomPort() { const ports=[22,80,443,53,8080,3000,5006,9999]; return ports[Math.floor(Math.random()*ports.length)]; }

function generatePacket() {
  const proto = PROTOS[Math.floor(Math.random()*PROTOS.length)];
  const src = randomIP(), dst = randomIP();
  const sport = randomPort(), dport = randomPort();
  const len = 40 + Math.floor(Math.random()*1420);
  const svcName = PROTO_PORTS[dport] || proto;
  let info = '';
  if (proto==='DNS') info = `Query: ${DOMAINS[Math.floor(Math.random()*DOMAINS.length)]}`;
  else if (proto==='HTTP') info = `${['GET','POST','PUT'][Math.floor(Math.random()*3)]} /${['api','data','index.html','status'][Math.floor(Math.random()*4)]}`;
  else if (proto==='ARP') info = `Who has ${dst}? Tell ${src}`;
  else if (proto==='TCP') info = `${src}:${sport} → ${dst}:${dport} [${['SYN','ACK','SYN-ACK','FIN','PSH'][Math.floor(Math.random()*5)]}] Seq=${Math.floor(Math.random()*999999)}`;
  else info = `${src}:${sport} → ${dst}:${dport} len=${len}`;
  return { id:++pktId, ts:Date.now(), proto, src, dst, sport, dport, len, info, raw:generateHex(len) };
}

function generateHex(len) {
  const bytes = Math.min(len, 64);
  let out = '';
  for (let i = 0; i < bytes; i += 16) {
    const row = Array.from({length:Math.min(16,bytes-i)}, () => Math.floor(Math.random()*256).toString(16).padStart(2,'0'));
    const addr = i.toString(16).padStart(4,'0');
    const ascii = row.map(b => { const n=parseInt(b,16); return n>=32&&n<127?String.fromCharCode(n):'.'; }).join('');
    out += `${addr}  ${row.join(' ').padEnd(47)}  ${ascii}\n`;
  }
  return out;
}

function toggleCapture() {
  if (capturing) {
    capturing = false;
    clearInterval(captureInterval);
    document.getElementById('captureBtn').textContent = '▶ CAPTURE';
    document.getElementById('captureBtn').className = 'btn green';
  } else {
    capturing = true;
    document.getElementById('captureBtn').textContent = '■ STOP';
    document.getElementById('captureBtn').className = 'btn red';
    captureInterval = setInterval(() => {
      const n = 1 + Math.floor(Math.random()*4);
      for (let i=0;i<n;i++) {
        const p = generatePacket();
        packets.unshift(p);
        if (packets.length > 2000) packets.pop();
        stats[p.proto] = (stats[p.proto]||0)+1;
        stats.bytes += p.len;
      }
      updateStats();
      renderPackets();
    }, 200);
  }
}

function updateStats() {
  ['TCP','UDP','DNS','HTTP','ARP'].forEach(p => document.getElementById('s'+p).textContent = stats[p]||0);
  document.getElementById('sBytes').textContent = fmtBytes(stats.bytes);
}

function fmtBytes(n) { return n>1e6?(n/1e6).toFixed(1)+'MB':n>1e3?(n/1e3).toFixed(1)+'KB':n+'B'; }

function protoClass(p) { return {TCP:'tcp',UDP:'udp',DNS:'dns',HTTP:'http',ARP:'arp',ICMP:'icmp'}[p]||'tcp'; }
function protoBadge(p) { return `<span class="badge b${p.toLowerCase()}">${p}</span>`; }

function renderPackets() {
  const proto = document.getElementById('protoFilter').value;
  const text = document.getElementById('textFilter').value.toLowerCase();
  let pkts = packets;
  if (proto) pkts = pkts.filter(p => p.proto === proto);
  if (text) pkts = pkts.filter(p => JSON.stringify(p).toLowerCase().includes(text));
  document.getElementById('pktCount').textContent = pkts.length + ' packets';
  const MAX = 200;
  document.getElementById('pktList').innerHTML = pkts.slice(0,MAX).map(p => `
    <div class="pkt ${protoClass(p.proto)} ${selectedPkt===p.id?'selected':''}" onclick="selectPacket(${p.id})">
      <div class="pc pc-no">${p.id}</div>
      <div class="pc pc-time">${new Date(p.ts).toLocaleTimeString([],{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
      <div class="pc pc-src">${p.src}</div>
      <div class="pc pc-dst">${p.dst}</div>
      <div class="pc pc-proto">${protoBadge(p.proto)}</div>
      <div class="pc pc-len">${p.len}</div>
      <div class="pc pc-info">${esc(p.info)}</div>
    </div>`).join('');
}

function selectPacket(id) {
  selectedPkt = id;
  const p = packets.find(pk => pk.id === id);
  if (!p) return;
  document.getElementById('detailPane').innerHTML = `
    <div class="ph">PACKET #${p.id} — ${p.proto}</div>
    <div class="detail-section">
      <div class="ds-title">FRAME</div>
      <div class="kv"><span class="k">Arrival time</span><span class="v">${new Date(p.ts).toISOString()}</span></div>
      <div class="kv"><span class="k">Frame length</span><span class="v">${p.len} bytes</span></div>
      <div class="kv"><span class="k">Protocol</span><span class="v">${p.proto}</span></div>
    </div>
    <div class="detail-section">
      <div class="ds-title">NETWORK</div>
      <div class="kv"><span class="k">Source IP</span><span class="v" style="color:var(--accent)">${p.src}</span></div>
      <div class="kv"><span class="k">Dest IP</span><span class="v" style="color:var(--accent2)">${p.dst}</span></div>
      <div class="kv"><span class="k">TTL</span><span class="v">${64+Math.floor(Math.random()*64)}</span></div>
    </div>
    <div class="detail-section">
      <div class="ds-title">TRANSPORT</div>
      <div class="kv"><span class="k">Src port</span><span class="v">${p.sport}</span></div>
      <div class="kv"><span class="k">Dst port</span><span class="v">${p.dport}</span></div>
      <div class="kv"><span class="k">Info</span><span class="v">${esc(p.info)}</span></div>
    </div>
    <div class="detail-section">
      <div class="ds-title">HEX DUMP</div>
      <div class="hex-view">${p.raw}</div>
    </div>`;
  renderPackets();
}

function clearCapture() {
  packets = []; pktId = 0; stats = {TCP:0,UDP:0,DNS:0,HTTP:0,ARP:0,ICMP:0,bytes:0};
  selectedPkt = null; updateStats(); renderPackets();
  document.getElementById('detailPane').innerHTML = '<div class="ph">PACKET DETAIL</div><div style="padding:16px;color:var(--text-dim);font-size:.68rem">Select a packet to inspect</div>';
}

function exportPCAP() {
  const lines = ['No.,Time,Source,Destination,Protocol,Length,Info',
    ...packets.map(p=>`${p.id},${new Date(p.ts).toISOString()},${p.src},${p.dst},${p.proto},${p.len},"${p.info}"`)].join('\n');
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([lines],{type:'text/csv'}));
  a.download = 'capture_'+Date.now()+'.csv'; a.click();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script></body></html>
