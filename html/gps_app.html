<!-- PISCES MOON OS // GPS -->
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // GPS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#00d4ff;--accent2:#ff6b00;--accent3:#00ff88;--accent4:#ff3366;--warn:#ffcc00;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;--glow:0 0 20px rgba(0,212,255,.3);--glow-gold:0 0 20px rgba(244,168,32,.4);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999;}
header{background:var(--bg2);border-bottom:2px solid var(--panel-border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.1rem;letter-spacing:3px;}
.content{padding:20px;max-width:1100px;margin:0 auto;}
.panel{background:var(--panel);border:1px solid var(--panel-border);margin-bottom:16px;}
.ph{padding:10px 16px;border-bottom:1px solid var(--panel-border);font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:3px;display:flex;justify-content:space-between;align-items:center;}
.pb{padding:14px 16px;}
.btn{display:inline-block;padding:7px 16px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.68rem;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{background:var(--accent);color:var(--bg);box-shadow:var(--glow);}
.btn.sm{padding:4px 10px;font-size:.6rem;}
.btn.orange{border-color:var(--accent2);color:var(--accent2);}
.btn.orange:hover{background:var(--accent2);color:var(--bg);}
.btn.green{border-color:var(--accent3);color:var(--accent3);}
.btn.green:hover{background:var(--accent3);color:var(--bg);}
.btn.red{border-color:var(--accent4);color:var(--accent4);}
.btn.red:hover{background:var(--accent4);color:var(--bg);}
.btn.gold{border-color:var(--gold);color:var(--gold);}
.btn.gold:hover{background:var(--gold);color:var(--bg);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.pm-input{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.74rem;padding:8px 12px;outline:none;transition:border-color .2s;}
.pm-input:focus{border-color:var(--accent);}
.pm-input::placeholder{color:var(--text-dim);}
.pm-select{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:6px 8px;outline:none;cursor:pointer;}
.pm-select:focus{border-color:var(--accent);}
.dt{width:100%;border-collapse:collapse;font-size:.7rem;}
.dt th{text-align:left;padding:7px 10px;color:var(--text-dim);font-size:.58rem;letter-spacing:2px;border-bottom:1px solid var(--panel-border);font-family:'Orbitron',monospace;}
.dt td{padding:7px 10px;border-bottom:1px solid rgba(26,58,80,.3);}
.dt tr:hover td{background:rgba(0,212,255,.04);}
.ts{max-height:380px;overflow-y:auto;}
.badge{display:inline-block;padding:1px 6px;font-size:.57rem;border-radius:2px;}
.bc{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid var(--accent);}
.bo{background:rgba(255,107,0,.1);color:var(--accent2);border:1px solid var(--accent2);}
.bg{background:rgba(0,255,136,.1);color:var(--accent3);border:1px solid var(--accent3);}
.br{background:rgba(255,51,102,.1);color:var(--accent4);border:1px solid var(--accent4);}
.bw{background:rgba(255,204,0,.1);color:var(--warn);border:1px solid var(--warn);}
.bgo{background:rgba(244,168,32,.1);color:var(--gold);border:1px solid var(--gold);}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;}
.sc{background:var(--panel);border:1px solid var(--panel-border);padding:13px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
.sc.o::before{background:var(--accent2);}.sc.g::before{background:var(--accent3);}.sc.r::before{background:var(--accent4);}.sc.w::before{background:var(--warn);}.sc.gold::before{background:var(--gold);}
.slbl{font-size:.58rem;color:var(--text-dim);letter-spacing:2px;margin-bottom:4px;font-family:'Orbitron',monospace;}
.sval{font-family:'Orbitron',monospace;font-size:1.3rem;color:var(--text-bright);font-weight:700;}
.ssub{font-size:.58rem;color:var(--text-dim);margin-top:2px;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg3);} ::-webkit-scrollbar-thumb{background:var(--panel-border);}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header-inner{display:flex;align-items:center;justify-content:space-between;width:100%;}
#map{flex:1;background:var(--bg3);}
.overlay{position:absolute;z-index:400;background:rgba(8,15,20,.9);border:1px solid var(--panel-border);padding:10px 14px;}
.pos-panel{top:80px;left:16px;min-width:230px;}
.stats-panel{top:80px;right:16px;}
.coord{font-family:'Orbitron',monospace;font-size:1rem;color:var(--accent);}
.coord-lbl{font-size:.55rem;color:var(--text-dim);letter-spacing:2px;margin-bottom:2px;}
.fix-badge{display:inline-block;padding:2px 8px;font-size:.6rem;border-radius:2px;margin-top:8px;}
.sat-row{display:flex;gap:8px;align-items:center;margin-top:8px;font-size:.68rem;}
.waypoints{position:absolute;bottom:0;left:0;right:0;z-index:400;background:rgba(8,15,20,.95);border-top:1px solid var(--panel-border);max-height:180px;overflow-y:auto;}
.wp-head{padding:8px 16px;border-bottom:1px solid var(--panel-border);display:flex;justify-content:space-between;align-items:center;}
.wp-head-t{font-family:'Orbitron',monospace;font-size:.6rem;color:var(--accent);letter-spacing:2px;}
.wpi{display:flex;justify-content:space-between;padding:6px 16px;border-bottom:1px solid rgba(26,58,80,.3);font-size:.68rem;cursor:pointer;}
.wpi:hover{background:rgba(0,212,255,.05);}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;animation:pulse 2s infinite;}
.dot.fix{background:var(--accent3);}.dot.search{background:var(--warn);}.dot.none{background:var(--text-dim);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style></head><body>
<header>
  <div class="header-inner">
    <div class="logo" style="color:var(--accent)">PISCES MOON // <span style="color:var(--gold)">GPS</span></div>
    <div style="display:flex;gap:10px">
      <button class="btn sm" onclick="addWaypoint()">+ WAYPOINT</button>
      <button class="btn sm orange" onclick="clearTrack()">CLEAR TRACK</button>
      <button class="btn sm green" onclick="exportGPX()">EXPORT GPX</button>
    </div>
  </div>
</header>
<div id="map" style="position:relative">
  <!-- Position overlay -->
  <div class="overlay pos-panel">
    <div class="coord-lbl">LATITUDE</div>
    <div class="coord" id="lat">—</div>
    <div class="coord-lbl" style="margin-top:6px">LONGITUDE</div>
    <div class="coord" id="lon">—</div>
    <div class="coord-lbl" style="margin-top:6px">ALTITUDE</div>
    <div class="coord" id="alt" style="font-size:.8rem">—</div>
    <div>
      <span class="dot none" id="fixDot"></span>
      <span id="fixLabel" style="font-size:.65rem;color:var(--text-dim)">NO FIX</span>
    </div>
  </div>
  <!-- Stats overlay -->
  <div class="overlay stats-panel" style="text-align:right">
    <div class="coord-lbl">SPEED</div>
    <div class="coord" id="speed">— km/h</div>
    <div class="coord-lbl" style="margin-top:6px">HEADING</div>
    <div class="coord" id="heading">—°</div>
    <div class="coord-lbl" style="margin-top:6px">ACCURACY</div>
    <div style="font-size:.8rem;color:var(--text-bright)" id="accuracy">—</div>
    <div class="sat-row" style="justify-content:flex-end">
      <span style="color:var(--text-dim);font-size:.6rem">SOURCE:</span>
      <span class="badge bc" id="source" style="font-size:.6rem">BROWSER</span>
    </div>
  </div>
</div>
<!-- Waypoints panel -->
<div class="waypoints" id="wpPanel" style="display:none">
  <div class="wp-head">
    <span class="wp-head-t">WAYPOINTS</span>
    <button class="btn sm red" onclick="document.getElementById('wpPanel').style.display='none'">CLOSE</button>
  </div>
  <div id="wpList"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const map=L.map('map',{zoomControl:true,attributionControl:false}).setView([36.1,-115.2],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

let marker=null, trackLine=L.polyline([],{color:'#00d4ff',weight:3,opacity:.8}).addTo(map);
let track=[],waypoints=[],watching=false,ws=null,wsConn=false;
let posData={lat:null,lon:null,alt:null,speed:null,heading:null,accuracy:null};

// Try browser GPS first
function startGPS(){
  if(navigator.geolocation){
    navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,timeout:10000,maximumAge:1000});
    document.getElementById('fixDot').className='dot search';
    document.getElementById('fixLabel').textContent='ACQUIRING...';
  }
}

// Connect to edge bridge for T-Deck GPS
function connectBridge(){
  try{
    ws=new WebSocket('ws://localhost:5006');
    ws.onopen=()=>{wsConn=true;document.getElementById('source').textContent='T-DECK';};
    ws.onclose=()=>{wsConn=false;ws=null;setTimeout(connectBridge,3000);};
    ws.onerror=()=>{ws=null;};
    ws.onmessage=(e)=>{
      try{
        const d=JSON.parse(e.data);
        if(d.type==='gps'&&d.lat&&d.lon){
          onPos({coords:{latitude:d.lat,longitude:d.lon,altitude:d.alt||null,speed:d.speed||null,heading:d.heading||null,accuracy:d.accuracy||5}});
          document.getElementById('source').textContent='T-DECK';
        }
      }catch{}
    };
  }catch{}
}

function onPos(pos){
  const c=pos.coords;
  posData={lat:c.latitude,lon:c.longitude,alt:c.altitude,speed:c.speed,heading:c.heading,accuracy:c.accuracy};
  document.getElementById('lat').textContent=c.latitude.toFixed(6)+'°';
  document.getElementById('lon').textContent=c.longitude.toFixed(6)+'°';
  document.getElementById('alt').textContent=c.altitude?c.altitude.toFixed(1)+' m':'— m';
  document.getElementById('speed').textContent=c.speed?(c.speed*3.6).toFixed(1)+' km/h':'0 km/h';
  document.getElementById('heading').textContent=c.heading?c.heading.toFixed(0)+'°':'—°';
  document.getElementById('accuracy').textContent='±'+c.accuracy.toFixed(0)+' m';
  document.getElementById('fixDot').className='dot fix';
  document.getElementById('fixLabel').textContent='GPS FIX';
  const ll=[c.latitude,c.longitude];
  track.push(ll); trackLine.setLatLngs(track);
  if(!marker){
    marker=L.circleMarker(ll,{radius:8,fillColor:'#00d4ff',color:'#fff',fillOpacity:1,weight:2}).addTo(map);
    map.setView(ll,16);
  }else{marker.setLatLng(ll);}
}

function onErr(err){
  document.getElementById('fixDot').className='dot none';
  document.getElementById('fixLabel').textContent='NO GPS: '+err.message.slice(0,30);
}

function addWaypoint(){
  if(!posData.lat){alert('No GPS fix yet');return;}
  const name=prompt('Waypoint name:','WP'+(waypoints.length+1));
  if(!name)return;
  const wp={name,lat:posData.lat,lon:posData.lon,ts:Date.now()};
  waypoints.push(wp);
  L.marker([wp.lat,wp.lon],{title:wp.name}).addTo(map).bindPopup(wp.name);
  renderWaypoints();
  document.getElementById('wpPanel').style.display='block';
}

function renderWaypoints(){
  document.getElementById('wpList').innerHTML=waypoints.map((w,i)=>`
    <div class="wpi" onclick="map.setView([${w.lat},${w.lon}],17)">
      <span style="color:var(--gold)">${w.name}</span>
      <span style="color:var(--text-dim)">${w.lat.toFixed(5)}, ${w.lon.toFixed(5)}</span>
    </div>`).join('');
}

function clearTrack(){track=[];trackLine.setLatLngs([]);}

function exportGPX(){
  const pts=track.map(([lat,lon])=>`    <trkpt lat="${lat}" lon="${lon}"></trkpt>`).join('\n');
  const wps=waypoints.map(w=>`  <wpt lat="${w.lat}" lon="${w.lon}"><name>${w.name}</name></wpt>`).join('\n');
  const gpx=`<?xml version="1.0"?>\n<gpx version="1.1" creator="Pisces Moon OS">\n${wps}\n  <trk><trkseg>\n${pts}\n  </trkseg></trk>\n</gpx>`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([gpx],{type:'application/gpx+xml'}));
  a.download='pisces_track_'+Date.now()+'.gpx';a.click();
}

startGPS();
connectBridge();
</script>
</body></html>
