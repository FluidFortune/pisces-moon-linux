<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.gps-layout { display:grid; grid-template-columns:280px 1fr 260px; height:calc(100vh - 52px); overflow:hidden; }
.gps-left  { border-right:1px solid var(--panel-border); overflow-y:auto; }
.gps-right { border-left:1px solid var(--panel-border); overflow-y:auto; }
.gps-center { position:relative; }
#gps-map { width:100%; height:100%; }

/* Stats bar */
.gps-stats { grid-column:1/-1; display:grid; grid-template-columns:repeat(6,1fr); border-bottom:1px solid var(--panel-border); background:var(--bg2); }
.gps-stat { padding:8px 12px; border-right:1px solid var(--panel-border); text-align:center; }
.gps-stat:last-child { border-right:none; }
.gps-stat-label { font-family:Orbitron,monospace; font-size:.45rem; letter-spacing:2px; color:var(--text-dim); }
.gps-stat-value { font-family:Orbitron,monospace; font-size:1rem; color:var(--text-bright); font-weight:700; }

/* Waypoint list */
.wp-item { padding:10px 12px; border-bottom:1px solid rgba(28,46,58,.4); cursor:pointer; transition:background .15s; }
.wp-item:hover { background:rgba(255,209,102,.04); }
.wp-item.selected { background:rgba(255,209,102,.08); border-left:2px solid var(--gold); }
.wp-name { font-size:.72rem; color:var(--text-bright); margin-bottom:3px; }
.wp-coords { font-family:Share\ Tech\ Mono,monospace; font-size:.58rem; color:var(--text-dim); }
.wp-meta { font-size:.55rem; color:var(--text-dim); display:flex; gap:8px; margin-top:2px; }

/* Map controls */
.gps-controls { position:absolute; top:8px; right:8px; z-index:1000; display:flex; flex-direction:column; gap:6px; }
.gps-btn { padding:6px 12px; background:var(--bg2); border:1px solid var(--panel-border); color:var(--text-dim); font-family:Share\ Tech\ Mono,monospace; font-size:.6rem; cursor:pointer; transition:all .15s; white-space:nowrap; }
.gps-btn:hover { border-color:var(--gold); color:var(--gold); }
.gps-btn.active { border-color:var(--accent3); color:var(--accent3); background:rgba(77,255,166,.1); }
.gps-btn.record { border-color:var(--accent4); color:var(--accent4); }
.gps-btn.record.active { background:rgba(255,85,119,.1); animation:pulse 1s infinite; }

/* Coordinate formats */
.coord-row { padding:6px 12px; border-bottom:1px solid rgba(28,46,58,.3); font-size:.62rem; display:flex; justify-content:space-between; }
.coord-label { color:var(--text-dim); font-family:Orbitron,monospace; font-size:.5rem; letter-spacing:1px; }
.coord-value { color:var(--text-bright); font-family:Share\ Tech\ Mono,monospace; }

            <canvas id="hdop-gauge" width="238" height="100" style="padding:8px"></canvas>

<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            this.ws.onopen = () => resolve();
            this.ws.onerror = () => reject(new Error(`WebSocket failed at ${this.wsUrl}`));

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed");
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
// ═══════════════════════════════════════════════════════════════════
// GPS NAVIGATOR — Full field navigation with track recording and waypoints
// ═══════════════════════════════════════════════════════════════════

let lat = null, lon = null, alt = 0, speed = 0, heading = 0, sats = 0, hdop = 99;
let trackPoints  = PM.load('gps_track')     || [];
let waypoints    = PM.load('gps_waypoints') || [];
let recording    = false;
let followGPS    = true;
let selectedWP   = null;
let satTile      = false;

// Viz
let liveMap, gpsMarker, trackPolyline, altSpark, spdSpark, satChart, hdopGauge;

function initMap() {
    liveMap = new PMViz.LiveMap('gps-map', {
        center: [34.0617, -118.2380],
        zoom:   14,
        track:  false, // we handle follow ourselves
    });

    // Draw existing track
    if (trackPoints.length > 1) {
        trackPolyline = L.polyline(
            trackPoints.map(p => [p.lat, p.lon]),
            {color: '#4dffa6', weight: 2, opacity: 0.7}
        ).addTo(liveMap.map);
    }

    // Add existing waypoints
    waypoints.forEach(wp => addWaypointMarker(wp));

    // Click to add waypoint
    liveMap.map.on('click', (e) => {
        if (confirm(`Add waypoint at ${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}?`)) {
            addWaypointAt(e.latlng.lat, e.latlng.lng);
        }
    });
}

function initViz() {
    altSpark  = new PMViz.Sparkline('alt-spark',  {color: PMViz.C.gold,    maxPts: 60});
    spdSpark  = new PMViz.Sparkline('spd-spark',  {color: PMViz.C.accent2, maxPts: 60});
    satChart  = new PMViz.BarChart('sat-chart',   {horizontal: false, colorFn: () => PMViz.C.accent});
    hdopGauge = new PMViz.GaugeArc('hdop-gauge',  {min: 0, max: 10, label: 'HDOP'});
}

// ── Transport ─────────────────────────────────────────────────────
const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s) => {
        document.getElementById('liveBadge').style.opacity = s.state === 'connected' ? '1' : '0.3';
        document.getElementById('lastUpdate').textContent  = s.message;
    }
});

function handleData(msg) {
    if (msg.type === 'GPS_FIX' || msg.type === 'gps') {
        handleFix(msg);
    } else if (msg.type === 'GPS_NOFIX') {
        document.getElementById('statSats').textContent = `${msg.sats_visible||0} (NO FIX)`;
        document.getElementById('statSats').style.color = 'var(--accent4)';
    }
}

function handleFix(g) {
    lat     = parseFloat(g.lat);
    lon     = parseFloat(g.lon);
    alt     = parseFloat(g.alt_m || 0);
    speed   = parseFloat(g.speed_kmh || 0);
    heading = parseFloat(g.heading || 0);
    sats    = parseInt(g.sats || 0);
    hdop    = parseFloat(g.hdop || 1);

    // Stats bar
    document.getElementById('statLat').textContent   = lat.toFixed(5);
    document.getElementById('statLon').textContent   = lon.toFixed(5);
    document.getElementById('statAlt').textContent   = `${Math.round(alt)}m`;
    document.getElementById('statSpeed').textContent = `${speed.toFixed(1)}km/h`;
    document.getElementById('statSats').textContent  = sats;
    document.getElementById('statSats').style.color  = sats >= 6 ? 'var(--accent3)' : sats >= 4 ? 'var(--warn)' : 'var(--accent4)';
    document.getElementById('statHdop').textContent  = hdop.toFixed(1);

    // Coordinate formats
    document.getElementById('coordDecimal').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
    document.getElementById('coordDMS').textContent     = toDMS(lat, lon);
    document.getElementById('coordMGRS').textContent    = toMGRS(lat, lon);
    document.getElementById('coordHeading').textContent = heading ? `${heading.toFixed(0)}° ${headingName(heading)}` : '—';

    // Map
    liveMap.updateGPS(lat, lon);
    if (followGPS) liveMap.map.setView([lat, lon], liveMap.map.getZoom());

    // Charts
    altSpark.push(alt);
    spdSpark.push(speed);
    hdopGauge.update(hdop);
    drawCompass(heading);

    // Satellite bar chart (mock — real sat data would come from NMEA GSV)
    satChart.update(
        Array.from({length: Math.min(sats, 12)}, (_, i) => ({
            label: String(i+1),
            value: Math.floor(30 + Math.random() * 40),
        }))
    );

    // Track recording
    if (recording) {
        trackPoints.push({lat, lon, alt, speed, heading, ts: Date.now()});
        PM.save('gps_track', trackPoints);
        document.getElementById('trackCount').textContent = trackPoints.length;

        // Update polyline
        if (!trackPolyline) {
            trackPolyline = L.polyline([[lat,lon]], {color:'#4dffa6', weight:2, opacity:0.7}).addTo(liveMap.map);
        } else {
            trackPolyline.addLatLng([lat, lon]);
        }
    }

    // Distance calculations
    updateDistances();
}

// ── Compass ───────────────────────────────────────────────────────
function drawCompass(hdg) {
    const canvas = document.getElementById('compass');
    const ctx    = canvas.getContext('2d');
    const cx = 100, cy = 100, r = 85;
    const C  = PMViz.C;

    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, 200, 200);

    // Outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = C.border;
    ctx.lineWidth   = 2;
    ctx.stroke();

    // Cardinal points
    const cardinals = ['N', 'E', 'S', 'W'];
    cardinals.forEach((c, i) => {
        const a   = (i * 90 - 90) * Math.PI / 180;
        const tx  = cx + (r - 15) * Math.cos(a);
        const ty  = cy + (r - 15) * Math.sin(a);
        ctx.fillStyle  = c === 'N' ? C.accent4 : C.textDim;
        ctx.font       = c === 'N' ? 'bold 14px monospace' : '12px monospace';
        ctx.textAlign  = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(c, tx, ty);
    });

    // Tick marks
    for (let i = 0; i < 36; i++) {
        const a    = (i * 10 - 90) * Math.PI / 180;
        const len  = i % 9 === 0 ? 12 : 6;
        ctx.beginPath();
        ctx.moveTo(cx + (r - len - 20) * Math.cos(a), cy + (r - len - 20) * Math.sin(a));
        ctx.lineTo(cx + (r - 20) * Math.cos(a),       cy + (r - 20) * Math.sin(a));
        ctx.strokeStyle = C.border;
        ctx.lineWidth   = i % 9 === 0 ? 2 : 1;
        ctx.stroke();
    }

    // Heading needle
    const needleA = (hdg - 90) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx + (r-25) * Math.cos(needleA), cy + (r-25) * Math.sin(needleA));
    ctx.lineTo(cx - 10 * Math.cos(needleA),      cy - 10 * Math.sin(needleA));
    ctx.strokeStyle = C.accent4;
    ctx.lineWidth   = 3;
    ctx.lineCap     = 'round';
    ctx.stroke();

    // South needle
    ctx.beginPath();
    ctx.moveTo(cx - 15 * Math.cos(needleA), cy - 15 * Math.sin(needleA));
    ctx.lineTo(cx - (r-25) * Math.cos(needleA), cy - (r-25) * Math.sin(needleA));
    ctx.strokeStyle = C.textDim;
    ctx.lineWidth   = 2;
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.fillStyle = C.text;
    ctx.fill();

    // Heading text
    ctx.fillStyle    = C.gold;
    ctx.font         = 'bold 16px monospace';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${Math.round(hdg)}°`, cx, cy + 40);
}

// ── Waypoints ─────────────────────────────────────────────────────
function addWaypoint() {
    if (lat === null) { alert('No GPS fix yet'); return; }
    const name = prompt('Waypoint name:') || `WP${waypoints.length + 1}`;
    addWaypointAt(lat, lon, name);
}

function addWaypointAt(wLat, wLon, name) {
    name = name || `WP${waypoints.length + 1}`;
    const wp = { id: PM.uid(), name, lat: wLat, lon: wLon, ts: Date.now() };
    waypoints.push(wp);
    PM.save('gps_waypoints', waypoints);
    addWaypointMarker(wp);
    renderWaypoints();
}

function addWaypointMarker(wp) {
    L.marker([wp.lat, wp.lon], {
        icon: L.divIcon({
            html: `<div style="background:var(--gold,#ffd166);border:2px solid #fff;border-radius:50%;width:12px;height:12px;box-shadow:0 0 6px #ffd166"></div>`,
            iconSize: [12,12], className: ''
        })
    }).addTo(liveMap.map)
     .bindPopup(`<b>${wp.name}</b><br>${wp.lat.toFixed(5)}, ${wp.lon.toFixed(5)}`);
}

function renderWaypoints() {
    document.getElementById('wpCount').textContent = `${waypoints.length}`;
    document.getElementById('waypointList').innerHTML = waypoints.map(wp => {
        const dist = lat ? haversine(lat, lon, wp.lat, wp.lon) : null;
        return `
        <div class="wp-item ${selectedWP===wp.id?'selected':''}" onclick="selectWP('${wp.id}')">
            <div class="wp-name">📍 ${PM.esc(wp.name)}</div>
            <div class="wp-coords">${wp.lat.toFixed(5)}, ${wp.lon.toFixed(5)}</div>
            <div class="wp-meta">
                ${dist !== null ? `<span style="color:var(--accent3)">${formatDist(dist)}</span>` : ''}
                <span>${new Date(wp.ts).toLocaleTimeString()}</span>
                <button style="margin-left:auto;background:none;border:none;color:var(--accent4);cursor:pointer;font-size:.6rem" onclick="removeWP('${wp.id}',event)">✕</button>
            </div>
        </div>`;
    }).join('');
}

function selectWP(id) {
    selectedWP = id;
    renderWaypoints();
    const wp = waypoints.find(w => w.id === id);
    if (wp) liveMap.map.setView([wp.lat, wp.lon], 16);
    updateDistances();
}

function removeWP(id, e) {
    e.stopPropagation();
    waypoints = waypoints.filter(w => w.id !== id);
    PM.save('gps_waypoints', waypoints);
    renderWaypoints();
}

function clearWaypoints() {
    if (!confirm('Clear all waypoints?')) return;
    waypoints = [];
    PM.save('gps_waypoints', []);
    renderWaypoints();
}

function updateDistances() {
    if (lat === null) return;
    const trackDist = trackPoints.reduce((total, pt, i) => {
        if (i === 0) return 0;
        return total + haversine(trackPoints[i-1].lat, trackPoints[i-1].lon, pt.lat, pt.lon);
    }, 0);
    document.getElementById('distTrack').textContent = formatDist(trackDist);

    if (selectedWP) {
        const wp = waypoints.find(w => w.id === selectedWP);
        if (wp) {
            const d = haversine(lat, lon, wp.lat, wp.lon);
            document.getElementById('distWP').textContent =
                `${formatDist(d)} — ${Math.round(bearing(lat, lon, wp.lat, wp.lon))}° ${headingName(bearing(lat, lon, wp.lat, wp.lon))}`;
        }
    }
}

// ── Track controls ────────────────────────────────────────────────
function toggleRecord() {
    recording = !recording;
    const btn = document.getElementById('btnRecord');
    btn.textContent = recording ? '◼ STOP RECORDING' : '⬤ START RECORDING';
    btn.className   = 'pm-refresh' + (recording ? ' active' : '');
    btn.style.color = recording ? 'var(--accent4)' : '';
    btn.style.borderColor = recording ? 'var(--accent4)' : '';
}

function clearTrack() {
    if (!confirm('Clear track?')) return;
    trackPoints = [];
    PM.save('gps_track', []);
    if (trackPolyline) { trackPolyline.remove(); trackPolyline = null; }
    document.getElementById('trackCount').textContent = '0';
}

function exportGPX() {
    if (trackPoints.length === 0) { alert('No track to export'); return; }
    const trkpts = trackPoints.map(p =>
        `    <trkpt lat="${p.lat}" lon="${p.lon}">
      <ele>${p.alt||0}</ele>
      <time>${new Date(p.ts).toISOString()}</time>
      <speed>${(p.speed||0)/3.6}</speed>
    </trkpt>`).join('\n');

    const gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="Pisces Moon OS">
  <metadata><name>Pisces Moon Track</name><time>${new Date().toISOString()}</time></metadata>
  <trk>
    <name>Track ${new Date().toLocaleDateString()}</name>
    <trkseg>
${trkpts}
    </trkseg>
  </trk>
</gpx>`;
    PMViz.Storage.save('gps_track', gpx, 'gpx');
}

// ── Map controls ──────────────────────────────────────────────────
function toggleFollow() {
    followGPS = !followGPS;
    document.getElementById('btnFollow').className = 'gps-btn' + (followGPS ? ' active' : '');
}

function centerMap() {
    if (lat) liveMap.map.setView([lat, lon], 16);
}

}

// ── Coordinate format helpers ─────────────────────────────────────
function toDMS(lat, lon) {
    const fmt = (v, pos, neg) => {
        const d   = Math.floor(Math.abs(v));
        const mf  = (Math.abs(v) - d) * 60;
        const m   = Math.floor(mf);
        const s   = ((mf - m) * 60).toFixed(1);
        return `${d}°${m}'${s}"${v >= 0 ? pos : neg}`;
    };
    return `${fmt(lat,'N','S')} ${fmt(lon,'E','W')}`;
}

function toMGRS(lat, lon) {
    // Simplified MGRS — full implementation requires a library
    // This gives the approximate grid zone designation
    const band = 'CDEFGHJKLMNPQRSTUVWX'[Math.floor((lat + 80) / 8)] || '?';
    const zone = Math.floor((lon + 180) / 6) + 1;
    return `${zone}${band} (approx)`;
}

function headingName(h) {
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(h / 22.5) % 16];
}

function haversine(lat1, lon1, lat2, lon2) {
    const R  = 6371000; // meters
    const φ1 = lat1 * Math.PI / 180;
    const φ2 = lat2 * Math.PI / 180;
    const Δφ = (lat2 - lat1) * Math.PI / 180;
    const Δλ = (lon2 - lon1) * Math.PI / 180;
    const a  = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearing(lat1, lon1, lat2, lon2) {
    const φ1 = lat1 * Math.PI / 180;
    const φ2 = lat2 * Math.PI / 180;
    const Δλ = (lon2 - lon1) * Math.PI / 180;
    const y  = Math.sin(Δλ) * Math.cos(φ2);
    const x  = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
    return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

function formatDist(m) {
    if (m < 1000) return `${Math.round(m)}m`;
    return `${(m/1000).toFixed(2)}km`;
}

window.addEventListener('load', async () => {
    initMap();
    initViz();
    drawCompass(0);
    renderWaypoints();
    document.getElementById('trackCount').textContent = trackPoints.length;

    try { await beam.connect(); }
    catch(e) {
        // Fall back to browser Geolocation API
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                handleFix({
                    lat:      pos.coords.latitude,
                    lon:      pos.coords.longitude,
                    alt_m:    pos.coords.altitude || 0,
                    speed_kmh: (pos.coords.speed || 0) * 3.6,
                    heading:  pos.coords.heading || 0,
                    sats:     0,
                    hdop:     pos.coords.accuracy / 10,
                });
            }, null, {enableHighAccuracy: true, maximumAge: 1000});
        }
    }
});
