<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css"><link rel="stylesheet" href="pm_theme.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>PISCES MOON // BODY METRICS</title>
<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel-border:#1a3a50;--accent:#4dd9ff;--accent3:#4dffa6;--accent4:#ff5577;--gold:#ffd166;--text:#c8e6f5;--text-bright:#c8e8f5;--text-dim:#2a5870;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:.9rem;color:var(--accent3);letter-spacing:3px;}
.tabs{display:flex;gap:0;}
.tab{padding:6px 16px;font-size:.55rem;font-family:Orbitron,monospace;letter-spacing:1px;cursor:pointer;border:1px solid var(--panel-border);background:transparent;color:var(--text-dim);margin-left:-1px;}
.tab:hover,.tab.active{background:var(--bg3);color:var(--accent3);border-color:var(--accent3);}
.content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--bg3);border:1px solid var(--panel-border);padding:14px;}
.card-title{font-family:Orbitron,monospace;font-size:.58rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:12px;}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.field{display:flex;flex-direction:column;gap:4px;}
.f-label{font-size:.52rem;color:var(--text-dim);letter-spacing:1px;}
.f-input{background:var(--bg);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.72rem;padding:7px 10px;outline:none;}
.f-input:focus{border-color:var(--accent3);}
select.f-input{cursor:pointer;}
.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.result-card{background:var(--bg);border:1px solid var(--panel-border);padding:12px;text-align:center;}
.result-val{font-family:Orbitron,monospace;font-size:1.3rem;margin-bottom:4px;}
.result-label{font-size:.52rem;color:var(--text-dim);letter-spacing:1px;}
.result-sub{font-size:.6rem;color:var(--text-dim);margin-top:4px;}
.bmi-bar{height:10px;background:var(--bg);border:1px solid var(--panel-border);position:relative;overflow:hidden;margin:4px 0;}
.bmi-fill{position:absolute;top:0;bottom:0;left:0;transition:width .4s,background .4s;}
.pm-btn{padding:8px 20px;background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);font-family:Orbitron,monospace;font-size:.55rem;cursor:pointer;letter-spacing:1px;}
.pm-btn.primary{border-color:var(--accent3);color:var(--accent3);}
.pm-btn.primary:hover{background:rgba(77,255,166,.1);}
.water-tracker{display:flex;flex-direction:column;gap:10px;}
.water-cups{display:flex;gap:6px;flex-wrap:wrap;}
.cup{width:38px;height:38px;border:2px solid var(--panel-border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all .2s;}
.cup.filled{border-color:var(--accent);background:rgba(77,217,255,.15);}
.log-list{display:flex;flex-direction:column;gap:4px;}
.log-item{padding:7px 10px;border-bottom:1px solid rgba(28,46,58,.3);display:flex;justify-content:space-between;font-size:.62rem;}
.range-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.range-row input[type=range]{flex:1;accent-color:var(--accent3);}
.range-val{font-family:Orbitron,monospace;font-size:.65rem;color:var(--accent3);min-width:36px;text-align:right;}
</style>
</head><body>
<header>
  <div class="logo">💪 BODY METRICS</div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('metrics',this)">METRICS</button>
    <button class="tab" onclick="showTab('water',this)">HYDRATION</button>
    <button class="tab" onclick="showTab('field',this)">FIELD</button>
    <button class="tab" onclick="showTab('log',this)">LOG</button>
  </div>
</header>
<div class="content" id="content"></div>

<script>
const STORE = 'pm_body_metrics';
let profile = { weight:175, weightUnit:'lbs', height:70, heightUnit:'in', age:35, sex:'male', actLevel:'moderate', goalCalories:0 };
let waterToday = 0;
let logs = [];
let activeTab = 'metrics';

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORE)||'{}');
    if (d.profile) profile = {...profile,...d.profile};
    // Load today's water count
    const today = new Date().toDateString();
    if (d.waterDate === today) waterToday = d.waterToday || 0;
    logs = d.logs || [];
  } catch {}
}

function save() {
  const today = new Date().toDateString();
  localStorage.setItem(STORE, JSON.stringify({ profile, waterToday, waterDate: today, logs }));
}

// ── Unit helpers ──────────────────────────────────────────────────
function weightKg() { return profile.weightUnit === 'lbs' ? profile.weight * 0.453592 : profile.weight; }
function heightCm() { return profile.heightUnit === 'in' ? profile.height * 2.54 : profile.height; }
function weightLbs() { return profile.weightUnit === 'lbs' ? profile.weight : profile.weight * 2.20462; }

// ── Calculations ──────────────────────────────────────────────────
function calcBMI() {
  const kg = weightKg(), cm = heightCm();
  if (!kg || !cm) return null;
  return kg / ((cm/100)**2);
}

function bmiCategory(bmi) {
  if (bmi < 18.5) return { label:'UNDERWEIGHT', color:'#4dd9ff',  pct:20 };
  if (bmi < 25)   return { label:'HEALTHY',     color:'#4dffa6',  pct:50 };
  if (bmi < 30)   return { label:'OVERWEIGHT',  color:'#ffd166',  pct:72 };
  return              { label:'OBESE',       color:'#ff5577',  pct:90 };
}

function calcBMR() {
  // Mifflin-St Jeor
  const kg = weightKg(), cm = heightCm(), age = profile.age;
  if (!kg || !cm || !age) return null;
  if (profile.sex === 'male')   return 10*kg + 6.25*cm - 5*age + 5;
  return 10*kg + 6.25*cm - 5*age - 161;
}

const ACTIVITY = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, veryactive:1.9 };
function calcTDEE() {
  const bmr = calcBMR();
  return bmr ? bmr * (ACTIVITY[profile.actLevel] || 1.55) : null;
}

function calcWater() {
  // 0.033L per kg body weight, adjusted for activity
  const base = weightKg() * 0.033;
  const adj = profile.actLevel === 'active' || profile.actLevel === 'veryactive' ? base * 1.3 : base;
  return adj; // liters
}

function calcIdealWeight() {
  // Devine formula
  const cm = heightCm(), inchesOver60 = Math.max(0, (cm/2.54) - 60);
  const male = 50 + 2.3 * inchesOver60;
  const female = 45.5 + 2.3 * inchesOver60;
  return { male: male * 2.20462, female: female * 2.20462 }; // lbs
}

function calcBodyFatEstimate() {
  // BMI-based estimate (Navy method requires measurements; BMI method is approximate)
  const bmi = calcBMI(), age = profile.age || 30;
  if (!bmi) return null;
  if (profile.sex === 'male')   return (1.20*bmi + 0.23*age - 16.2).toFixed(1);
  return (1.20*bmi + 0.23*age - 5.4).toFixed(1);
}

// ── Tabs ──────────────────────────────────────────────────────────
function showTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTab();
}

function renderTab() {
  const c = document.getElementById('content');
  if (activeTab === 'metrics')    c.innerHTML = renderMetrics();
  else if (activeTab === 'water') c.innerHTML = renderWater();
  else if (activeTab === 'field') c.innerHTML = renderField();
  else if (activeTab === 'log')   c.innerHTML = renderLog();
}

function renderMetrics() {
  const bmi = calcBMI();
  const tdee = calcTDEE();
  const bmr = calcBMR();
  const water = calcWater();
  const ideal = calcIdealWeight();
  const bf = calcBodyFatEstimate();
  const bmiCat = bmi ? bmiCategory(bmi) : null;

  return `
  <div class="card">
    <div class="card-title">YOUR PROFILE</div>
    <div class="field-grid">
      <div class="field"><div class="f-label">WEIGHT</div>
        <div style="display:flex;gap:4px">
          <input class="f-input" id="pw" type="number" value="${profile.weight}" onchange="update('weight',this.value)" style="flex:1">
          <select class="f-input" id="pwu" onchange="update('weightUnit',this.value)" style="flex:.6">
            <option value="lbs"${profile.weightUnit==='lbs'?' selected':''}>lbs</option>
            <option value="kg"${profile.weightUnit==='kg'?' selected':''}>kg</option>
          </select>
        </div>
      </div>
      <div class="field"><div class="f-label">HEIGHT</div>
        <div style="display:flex;gap:4px">
          <input class="f-input" id="ph" type="number" value="${profile.height}" onchange="update('height',this.value)" style="flex:1">
          <select class="f-input" onchange="update('heightUnit',this.value)" style="flex:.6">
            <option value="in"${profile.heightUnit==='in'?' selected':''}>in</option>
            <option value="cm"${profile.heightUnit==='cm'?' selected':''}>cm</option>
          </select>
        </div>
      </div>
      <div class="field"><div class="f-label">AGE</div>
        <input class="f-input" type="number" value="${profile.age}" onchange="update('age',this.value)">
      </div>
      <div class="field"><div class="f-label">SEX</div>
        <select class="f-input" onchange="update('sex',this.value)">
          <option value="male"${profile.sex==='male'?' selected':''}>Male</option>
          <option value="female"${profile.sex==='female'?' selected':''}>Female</option>
        </select>
      </div>
      <div class="field" style="grid-column:1/-1"><div class="f-label">ACTIVITY LEVEL</div>
        <select class="f-input" onchange="update('actLevel',this.value)">
          <option value="sedentary"${profile.actLevel==='sedentary'?' selected':''}>Sedentary (desk job)</option>
          <option value="light"${profile.actLevel==='light'?' selected':''}>Light (1-3 days/wk)</option>
          <option value="moderate"${profile.actLevel==='moderate'?' selected':''}>Moderate (3-5 days/wk)</option>
          <option value="active"${profile.actLevel==='active'?' selected':''}>Active (6-7 days/wk)</option>
          <option value="veryactive"${profile.actLevel==='veryactive'?' selected':''}>Very Active (physical job)</option>
        </select>
      </div>
    </div>
    <div style="margin-top:12px">
      <button class="pm-btn primary" onclick="saveAndRefresh()">SAVE & CALCULATE</button>
    </div>
  </div>

  <div class="result-grid">
    <div class="result-card">
      <div class="result-val" style="color:${bmiCat?bmiCat.color:'var(--text-dim)'}">${bmi?bmi.toFixed(1):'--'}</div>
      <div class="result-label">BMI</div>
      ${bmiCat?`<div class="bmi-bar"><div class="bmi-fill" style="width:${bmiCat.pct}%;background:${bmiCat.color}"></div></div>
      <div class="result-sub" style="color:${bmiCat.color}">${bmiCat.label}</div>`:''}
    </div>
    <div class="result-card">
      <div class="result-val" style="color:var(--gold)">${bmr?Math.round(bmr):'--'}</div>
      <div class="result-label">BMR (cal/day)</div>
      <div class="result-sub">At complete rest</div>
    </div>
    <div class="result-card">
      <div class="result-val" style="color:var(--accent3)">${tdee?Math.round(tdee):'--'}</div>
      <div class="result-label">TDEE (cal/day)</div>
      <div class="result-sub">Maintenance calories</div>
    </div>
    <div class="result-card">
      <div class="result-val" style="color:var(--accent)">${water?water.toFixed(1):'--'} L</div>
      <div class="result-label">WATER / DAY</div>
      <div class="result-sub">${water?(water/0.236588).toFixed(0)+' cups':''}</div>
    </div>
    <div class="result-card">
      <div class="result-val" style="color:var(--text-bright)">${bf?bf+'%':'--'}</div>
      <div class="result-label">BODY FAT EST.</div>
      <div class="result-sub">BMI-based estimate</div>
    </div>
    <div class="result-card">
      <div class="result-val" style="font-size:.9rem;color:var(--text-bright)">${ideal?Math.round(ideal[profile.sex||'male']):'--'} lbs</div>
      <div class="result-label">IDEAL WEIGHT</div>
      <div class="result-sub">Devine formula</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">CALORIE TARGETS</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${tdee?['Lose 2 lbs/wk','Lose 1 lb/wk','Maintain','Gain 1 lb/wk','Gain 2 lbs/wk'].map((label,i)=>{
        const adj = [-1000,-500,0,500,1000][i];
        const cal = Math.max(1200, Math.round(tdee+adj));
        const color = adj<0?'var(--accent4)':adj>0?'var(--accent3)':'var(--accent)';
        return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(28,46,58,.3);font-size:.65rem">
          <span style="color:var(--text-dim)">${label}</span>
          <span style="color:${color};font-family:Orbitron,monospace">${cal} cal/day</span>
        </div>`;
      }).join(''):'<div style="color:var(--text-dim);font-size:.62rem">Enter profile data above</div>'}
    </div>
  </div>`;
}

function renderWater() {
  const goal = Math.round(calcWater() / 0.236588); // cups
  const cups = Math.max(8, Math.min(16, goal));
  const pct = Math.min(100, Math.round((waterToday / cups) * 100));

  return `
  <div class="card">
    <div class="card-title">HYDRATION TRACKER</div>
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:12px">
      <div style="font-family:Orbitron,monospace;font-size:2rem;color:var(--accent)">${waterToday}</div>
      <div style="color:var(--text-dim)">/ ${cups} cups (${(cups*0.236588).toFixed(1)}L goal)</div>
    </div>
    <div style="height:10px;background:var(--bg);border:1px solid var(--panel-border);margin-bottom:12px">
      <div style="height:100%;width:${pct}%;background:${pct>=100?'var(--accent3)':'var(--accent)'};transition:width .3s"></div>
    </div>
    <div class="water-cups" id="waterCups">
      ${Array.from({length:cups},(_,i)=>
        `<div class="cup${i<waterToday?' filled':''}" onclick="toggleCup(${i})">💧</div>`
      ).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="pm-btn primary" onclick="addCup()">+ ADD CUP</button>
      <button class="pm-btn" onclick="removeCup()">− REMOVE</button>
      <button class="pm-btn" style="border-color:var(--accent4);color:var(--accent4)" onclick="resetWater()">RESET</button>
    </div>
  </div>
  <div class="card" style="background:rgba(77,217,255,.05);border-color:rgba(77,217,255,.2)">
    <div class="card-title" style="color:var(--accent)">HYDRATION NOTES</div>
    <div style="font-size:.63rem;line-height:1.9;color:var(--text)">
      • Dark yellow urine = dehydrated — drink immediately<br>
      • Pale yellow = well hydrated<br>
      • Add 1 cup per 30min of exercise<br>
      • Add 1-2 cups per hour in heat (100°F+)<br>
      • At altitude: increase by 25% — altitude blunts thirst<br>
      • Electrolytes needed if sweating heavily for 1h+<br>
      • Signs of dehydration: headache, fatigue, dizziness, confusion
    </div>
  </div>`;
}

function renderField() {
  const tdee = calcTDEE();
  const water = calcWater();
  return `
  <div class="card">
    <div class="card-title">FIELD CALORIE NEEDS</div>
    <div style="font-size:.62rem;color:var(--text-dim);margin-bottom:10px">Estimated calorie expenditure by activity:</div>
    ${fieldRow('Light hiking (2mph)',     Math.round(weightLbs()*0.060), '/hour')}
    ${fieldRow('Moderate hiking (3mph)',  Math.round(weightLbs()*0.100), '/hour')}
    ${fieldRow('Heavy pack hiking',       Math.round(weightLbs()*0.150), '/hour')}
    ${fieldRow('Trail running (6mph)',    Math.round(weightLbs()*0.190), '/hour')}
    ${fieldRow('Swimming',               Math.round(weightLbs()*0.120), '/hour')}
    ${fieldRow('Climbing/scrambling',    Math.round(weightLbs()*0.160), '/hour')}
    ${fieldRow('Sleep',                  Math.round(weightLbs()*0.031), '/hour')}
    ${fieldRow('Full 8h hiking day',     Math.round(weightLbs()*0.100*8 + (tdee||2000)*0.4), 'est. total')}
  </div>
  <div class="card">
    <div class="card-title">FIELD WATER NEEDS</div>
    ${fieldRow('Baseline',              water.toFixed(1) + 'L', '/day')}
    ${fieldRow('Light activity',        (water*1.2).toFixed(1) + 'L', '/day')}
    ${fieldRow('Moderate activity',     (water*1.5).toFixed(1) + 'L', '/day')}
    ${fieldRow('Heavy activity / heat', (water*2.0).toFixed(1) + 'L', '/day')}
    ${fieldRow('High altitude (10k ft)',(water*1.5).toFixed(1) + 'L', '/day')}
  </div>
  <div class="card">
    <div class="card-title">PACK FOOD TARGETS (3-DAY)</div>
    ${fieldRow('Target calories/day',   tdee ? Math.round(tdee*1.3) : '--', 'cal')}
    ${fieldRow('Protein',               tdee ? Math.round(weightKg()*1.6) + 'g' : '--', '/day')}
    ${fieldRow('Food weight target',    '1.5-2.0 lbs', '/day')}
    ${fieldRow('3-day pack food',       '4.5-6.0 lbs', 'estimate')}
  </div>`;
}

function renderLog() {
  return `
  <div class="card">
    <div class="card-title">LOG ENTRY</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;gap:8px">
        <select class="f-input" id="logType" style="flex:1">
          <option>Weight check-in</option>
          <option>Workout</option>
          <option>Water intake</option>
          <option>Calories</option>
          <option>Note</option>
        </select>
        <input class="f-input" id="logVal" type="text" placeholder="Value / note" style="flex:2">
      </div>
      <button class="pm-btn primary" onclick="addLog()">ADD ENTRY</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">LOG <span style="float:right;cursor:pointer;color:var(--accent4);font-size:.52rem" onclick="clearLog()">CLEAR ALL</span></div>
    ${logs.length ? logs.slice().reverse().map(l=>
      `<div class="log-item">
        <span style="color:var(--text-dim)">${new Date(l.ts).toLocaleDateString()} ${new Date(l.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
        <span style="color:var(--text-dim)">${l.type}</span>
        <span style="color:var(--text-bright)">${l.value}</span>
      </div>`
    ).join('') : '<div style="padding:12px;color:var(--text-dim);font-size:.62rem">No entries yet</div>'}
  </div>`;
}

function fieldRow(label, val, unit) {
  return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(28,46,58,.3);font-size:.65rem">
    <span style="color:var(--text-dim)">${label}</span>
    <span><span style="color:var(--text-bright);font-family:Orbitron,monospace">${val}</span> <span style="color:var(--text-dim)">${unit}</span></span>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────
function update(key, val) {
  profile[key] = isNaN(+val) ? val : +val;
}

function saveAndRefresh() {
  save(); renderTab();
}

function addCup() { waterToday++; save(); renderTab(); }
function removeCup() { if (waterToday>0) waterToday--; save(); renderTab(); }
function resetWater() { waterToday=0; save(); renderTab(); }
function toggleCup(i) {
  waterToday = i < waterToday ? i : i + 1;
  save(); renderTab();
}

function addLog() {
  const type = document.getElementById('logType').value;
  const value = document.getElementById('logVal').value.trim();
  if (!value) return;
  logs.push({ type, value, ts: Date.now() });
  if (logs.length > 200) logs = logs.slice(-200);
  save(); renderTab();
}
function clearLog() {
  if (!confirm('Clear all log entries?')) return;
  logs=[]; save(); renderTab();
}

load();
renderTab();
</script>
</body></html>
