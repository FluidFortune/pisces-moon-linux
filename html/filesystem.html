<!-- PISCES MOON OS // FILESYSTEM -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // FILESYSTEM</title>
<style>
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#00d4ff;--accent2:#ff6b00;--accent3:#00ff88;--accent4:#ff3366;--warn:#ffcc00;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;--glow:0 0 20px rgba(0,212,255,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999;}
header{background:var(--bg2);border-bottom:2px solid var(--panel-border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1rem;color:var(--accent);text-shadow:var(--glow);letter-spacing:3px;}
.logo span{color:var(--gold);}
.pathbar{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.path-input{flex:1;background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.74rem;padding:6px 10px;outline:none;}
.path-input:focus{border-color:var(--accent);}
.btn{display:inline-block;padding:6px 14px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.65rem;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{background:var(--accent);color:var(--bg);}
.btn.sm{padding:4px 8px;font-size:.6rem;}
.btn.gold{border-color:var(--gold);color:var(--gold);}.btn.gold:hover{background:var(--gold);color:var(--bg);}
.btn.red{border-color:var(--accent4);color:var(--accent4);}.btn.red:hover{background:var(--accent4);color:var(--bg);}
.btn.green{border-color:var(--accent3);color:var(--accent3);}.btn.green:hover{background:var(--accent3);color:var(--bg);}
.layout{display:flex;flex:1;overflow:hidden;}
.tree{width:220px;background:var(--bg2);border-right:1px solid var(--panel-border);overflow-y:auto;flex-shrink:0;}
.tree-item{padding:6px 12px;cursor:pointer;font-size:.7rem;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(26,58,80,.2);}
.tree-item:hover{background:rgba(0,212,255,.05);}
.tree-item.active{background:rgba(0,212,255,.1);border-left:2px solid var(--accent);color:var(--text-bright);}
.ti-icon{font-size:.85rem;flex-shrink:0;}
.file-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:6px 12px;display:flex;gap:6px;flex-shrink:0;}
.file-list{flex:1;overflow-y:auto;padding:0;}
.file-item{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(26,58,80,.2);cursor:pointer;font-size:.72rem;gap:10px;}
.file-item:hover{background:rgba(0,212,255,.04);}
.file-item.selected{background:rgba(0,212,255,.08);}
.fi-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0;}
.fi-name{flex:1;color:var(--text-bright);}
.fi-size{width:70px;text-align:right;color:var(--text-dim);}
.fi-date{width:120px;text-align:right;color:var(--text-dim);font-size:.62rem;}
.fi-perms{width:80px;text-align:right;color:var(--accent3);font-size:.62rem;}
.statusbar{background:var(--bg2);border-top:1px solid var(--panel-border);padding:4px 16px;font-size:.6rem;color:var(--text-dim);flex-shrink:0;display:flex;justify-content:space-between;}
.preview-pane{width:300px;background:var(--bg2);border-left:1px solid var(--panel-border);overflow-y:auto;flex-shrink:0;}
.pp-head{padding:8px 12px;border-bottom:1px solid var(--panel-border);font-family:'Orbitron',monospace;font-size:.58rem;color:var(--accent);letter-spacing:2px;}
.pp-content{padding:12px;font-size:.7rem;line-height:1.6;}
.pp-kv{display:flex;justify-content:space-between;margin-bottom:6px;}
.pp-kv .k{color:var(--text-dim);}
.pp-kv .v{color:var(--text-bright);text-align:right;max-width:160px;word-break:break-all;}
.pp-text{background:var(--bg3);border:1px solid var(--panel-border);padding:8px;font-size:.62rem;max-height:200px;overflow-y:auto;white-space:pre-wrap;color:var(--accent3);}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg3);} ::-webkit-scrollbar-thumb{background:var(--panel-border);}
</style></head><body>
<header>
  <div class="logo">PISCES MOON // <span>FILESYSTEM</span></div>
  <div style="font-size:.65rem;color:var(--text-dim)">TH: native FS &nbsp;|&nbsp; Browser: virtual FS</div>
</header>
<div class="pathbar">
  <button class="btn sm" onclick="navUp()">↑ UP</button>
  <button class="btn sm" onclick="history.length&&navTo(navHistory[navHistory.length-2])">← BACK</button>
  <input class="path-input" id="pathInput" value="/home/pisces" onkeydown="if(event.key==='Enter')navTo(this.value)">
  <button class="btn sm" onclick="navTo(document.getElementById('pathInput').value)">GO</button>
  <button class="btn sm green" onclick="newFile()">+ FILE</button>
  <button class="btn sm green" onclick="newFolder()">+ FOLDER</button>
  <button class="btn sm gold" onclick="refresh()">↻</button>
</div>
<div class="layout">
  <div class="tree" id="tree"></div>
  <div class="file-pane">
    <div class="toolbar">
      <span id="sortLabel" style="font-size:.6rem;color:var(--text-dim)">Sort:</span>
      <button class="btn sm" onclick="setSort('name')">NAME</button>
      <button class="btn sm" onclick="setSort('size')">SIZE</button>
      <button class="btn sm" onclick="setSort('date')">DATE</button>
      <button class="btn sm" onclick="setSort('type')">TYPE</button>
      <input style="background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.65rem;padding:4px 8px;outline:none;margin-left:8px" placeholder="filter..." id="filterInput" oninput="render()">
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="statusbar">
      <span id="sbLeft">0 items</span>
      <span id="sbRight"></span>
    </div>
  </div>
  <div class="preview-pane">
    <div class="pp-head">FILE INFO</div>
    <div class="pp-content" id="previewPane">Select a file to preview.</div>
  </div>
</div>
<script>
const isTH = typeof window.spadra !== 'undefined';
let cwd = '/home/pisces', files = [], selected = null, sortCol='name', sortDir='asc';
let navHistory = ['/home/pisces'];

const ICONS = {
  dir:'📁',txt:'📄',html:'🌐',js:'📜',py:'🐍',json:'📋',csv:'📊',
  img:'🖼',mp3:'🎵',mp4:'🎬',pdf:'📕',zip:'📦',sh:'⚙',default:'📄'
};

// Virtual FS for browser mode
const VIRTUAL = {
  '/':['home','opt','tmp','etc'],
  '/home':['pisces'],
  '/home/pisces':['.pisces-moon','Desktop','Documents','Downloads'],
  '/home/pisces/.pisces-moon':['gemini.key','sessions.json','config.json','wardrive.csv'],
  '/home/pisces/Desktop':['README.txt'],
  '/home/pisces/Documents':['notes.txt','survival_checklist.txt'],
  '/home/pisces/Downloads':[],
  '/opt':['pisces-moon'],
  '/opt/pisces-moon':['apps','data','install.sh','README.md'],
  '/tmp':['cache.tmp'],
  '/etc':['hostname','hosts'],
};

function getIcon(name, isDir) {
  if (isDir) return ICONS.dir;
  const ext = name.split('.').pop().toLowerCase();
  return ICONS[ext]||ICONS[(/\.(jpg|jpeg|png|gif|svg)$/.test(name))?'img':'default'];
}

function fmtSize(n) { return n>1e6?(n/1e6).toFixed(1)+'MB':n>1e3?(n/1e3).toFixed(1)+'KB':n+'B'; }

async function navTo(path) {
  cwd = path;
  document.getElementById('pathInput').value = cwd;
  if (navHistory[navHistory.length-1]!==cwd) navHistory.push(cwd);
  await loadDir();
}

function navUp() {
  const parts = cwd.split('/').filter(Boolean);
  parts.pop();
  navTo('/'+parts.join('/') || '/');
}

async function loadDir() {
  if (isTH) {
    try {
      const result = await window.spadra.fs.list(cwd);
      files = result.map(f => ({name:f.name||f, isDir:f.isDir||false, size:f.size||0, modified:f.modified||new Date().toISOString(), perms:f.perms||'-rw-r--r--'}));
    } catch(e) { files = [{name:'Error: '+e.message,isDir:false,size:0,modified:'',perms:''}]; }
  } else {
    const children = VIRTUAL[cwd] || [];
    files = children.map(name => {
      const isDir = !!(VIRTUAL[cwd+'/'+name] || VIRTUAL[(cwd==='/'?'':cwd)+'/'+name]);
      return {name, isDir, size:isDir?0:Math.floor(Math.random()*50000), modified:new Date(Date.now()-Math.random()*1e10).toISOString(), perms:isDir?'drwxr-xr-x':'-rw-r--r--'};
    });
  }
  render();
  renderTree();
}

function render() {
  const filter = document.getElementById('filterInput').value.toLowerCase();
  let f = filter ? files.filter(f=>f.name.toLowerCase().includes(filter)) : [...files];
  f.sort((a,b)=>{
    if(a.isDir!==b.isDir) return a.isDir?-1:1;
    if(sortCol==='name') return sortDir==='asc'?a.name.localeCompare(b.name):b.name.localeCompare(a.name);
    if(sortCol==='size') return sortDir==='asc'?a.size-b.size:b.size-a.size;
    return 0;
  });
  document.getElementById('fileList').innerHTML = f.map((file,i) => `
    <div class="file-item ${selected===file.name?'selected':''}" onclick="selectFile('${esc(file.name)}','${file.isDir}')" ondblclick="dblclick('${esc(file.name)}','${file.isDir}')">
      <div class="fi-icon">${getIcon(file.name,file.isDir)}</div>
      <div class="fi-name">${esc(file.name)}</div>
      <div class="fi-size">${file.isDir?'—':fmtSize(file.size)}</div>
      <div class="fi-date">${file.modified?new Date(file.modified).toLocaleDateString():''}</div>
      <div class="fi-perms">${file.perms||''}</div>
    </div>`).join('');
  document.getElementById('sbLeft').textContent = `${f.length} items (${f.filter(f=>f.isDir).length} dirs, ${f.filter(f=>!f.isDir).length} files)`;
}

function renderTree() {
  const quickPaths = [
    {path:'/home/pisces',label:'Home',icon:'🏠'},
    {path:'/home/pisces/.pisces-moon',label:'.pisces-moon',icon:'🌙'},
    {path:'/home/pisces/Desktop',label:'Desktop',icon:'🖥'},
    {path:'/home/pisces/Documents',label:'Documents',icon:'📁'},
    {path:'/home/pisces/Downloads',label:'Downloads',icon:'⬇'},
    {path:'/opt/pisces-moon',label:'PM Apps',icon:'🔧'},
    {path:'/tmp',label:'Temp',icon:'💨'},
  ];
  document.getElementById('tree').innerHTML = quickPaths.map(p=>`
    <div class="tree-item ${cwd===p.path?'active':''}" onclick="navTo('${p.path}')">
      <span class="ti-icon">${p.icon}</span>${p.label}
    </div>`).join('');
}

function selectFile(name, isDir) {
  selected = name;
  render();
  const file = files.find(f=>f.name===name);
  if (!file) return;
  const path = cwd+'/'+name;
  let preview = `<div class="pp-kv"><span class="k">Name</span><span class="v">${esc(name)}</span></div>
    <div class="pp-kv"><span class="k">Type</span><span class="v">${isDir==='true'?'Directory':name.split('.').pop().toUpperCase()||'File'}</span></div>
    <div class="pp-kv"><span class="k">Size</span><span class="v">${isDir==='true'?'—':fmtSize(file.size)}</span></div>
    <div class="pp-kv"><span class="k">Modified</span><span class="v">${file.modified?new Date(file.modified).toLocaleString():''}</span></div>
    <div class="pp-kv"><span class="k">Permissions</span><span class="v">${file.perms||''}</span></div>
    <div class="pp-kv"><span class="k">Path</span><span class="v">${esc(path)}</span></div>`;
  if (isTH && isDir==='false' && file.size<100000) {
    try { window.spadra.fs.read(path).then(content=>{
      document.getElementById('previewPane').innerHTML+=`<div style="margin-top:10px;font-family:'Orbitron',monospace;font-size:.58px;color:var(--accent);letter-spacing:2px;margin-bottom:6px">PREVIEW</div><div class="pp-text">${esc(content.slice(0,500))}${content.length>500?'...':''}</div>`;
    }); } catch{}
  }
  document.getElementById('previewPane').innerHTML = preview;
}

function dblclick(name, isDir) {
  if (isDir==='true') navTo(cwd+'/'+name);
}

function setSort(col) { if(sortCol===col)sortDir=sortDir==='asc'?'desc':'asc'; else {sortCol=col;sortDir='asc';} render(); }
function refresh() { loadDir(); }
function newFile() { const n=prompt('File name:'); if(n){ if(!isTH){VIRTUAL[cwd]=VIRTUAL[cwd]||[];VIRTUAL[cwd].push(n);files.push({name:n,isDir:false,size:0,modified:new Date().toISOString(),perms:'-rw-r--r--'});render();} } }
function newFolder() { const n=prompt('Folder name:'); if(n){ if(!isTH){VIRTUAL[cwd]=VIRTUAL[cwd]||[];VIRTUAL[cwd].push(n);VIRTUAL[cwd+'/'+n]=[];files.push({name:n,isDir:true,size:0,modified:new Date().toISOString(),perms:'drwxr-xr-x'});render();} } }
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
loadDir();
</script></body></html>
