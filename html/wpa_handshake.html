<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // WPA HANDSHAKE</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
.wpa-layout{display:grid;grid-template-columns:320px 1fr 280px;height:calc(100vh - 52px);overflow:hidden}
.wpa-left{border-right:1px solid var(--panel-border);overflow-y:auto}
.wpa-right{border-left:1px solid var(--panel-border);overflow-y:auto}
.wpa-center{display:flex;flex-direction:column;overflow:hidden}
.net-item{padding:12px;border-bottom:1px solid rgba(28,46,58,.4);cursor:pointer;transition:background .15s}
.net-item:hover{background:rgba(244,168,32,.04)}
.net-item.selected{background:rgba(244,168,32,.08);border-left:3px solid var(--gold)}
.net-item.captured{border-left:3px solid var(--accent3)}
.net-ssid{font-size:.78rem;color:var(--text-bright);margin-bottom:4px}
.net-meta{font-size:.6rem;color:var(--text-dim);display:flex;gap:10px}
.cap-badge{display:inline-block;padding:2px 6px;font-family:Orbitron,monospace;font-size:.48rem;letter-spacing:1px}
.cap-badge.full{background:rgba(0,255,136,.1);color:var(--accent3);border:1px solid var(--accent3)}
.cap-badge.partial{background:rgba(255,214,10,.1);color:var(--warn);border:1px solid var(--warn)}
.cap-badge.pmkid{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid var(--accent)}
.cap-badge.none{background:rgba(28,46,58,.5);color:var(--text-dim);border:1px solid var(--panel-border)}
.eapol-frames{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:14px}
.eapol-frame{padding:10px;text-align:center;border:1px solid var(--panel-border)}
.eapol-frame.captured{border-color:var(--accent3);background:rgba(0,255,136,.06)}
.eapol-frame.missing{border-color:var(--panel-border);opacity:.4}
.frame-num{font-family:Orbitron,monospace;font-size:1.2rem;font-weight:900;color:var(--text-dim)}
.frame-num.captured{color:var(--accent3)}
.frame-label{font-size:.58rem;color:var(--text-dim);margin-top:4px}
.rssi-timeline{padding:8px}
.controls{padding:10px 12px;border-bottom:1px solid var(--panel-border);background:var(--bg2);display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:6px 14px;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:Share\ Tech\ Mono,monospace;font-size:.62rem;cursor:pointer;letter-spacing:2px;transition:all .15s}
.btn:hover{background:var(--gold);color:var(--bg)}
.btn.active{background:var(--gold);color:var(--bg)}
.btn.export{border-color:var(--accent);color:var(--accent)}
.btn.export:hover{background:var(--accent);color:var(--bg)}
.hash-output{font-family:Share\ Tech\ Mono,monospace;font-size:.62rem;word-break:break-all;padding:10px 12px;background:var(--bg3);border:1px solid var(--panel-border);color:var(--accent3);line-height:1.8}
</style>
</head><body>
<header class="pm-header">
    <div class="pm-logo">🔐 <em>WPA</em> HANDSHAKE</div>
    <div class="pm-hdr-right">
        <div class="pm-live-badge" id="liveBadge" style="opacity:.3"><div class="pm-live-dot"></div>LIVE</div>
        <span class="pm-last-update" id="lastUpdate"></span>
        <button class="pm-refresh" onclick="startCapture()">⟳ CAPTURE</button>
    </div>
</header>
<div class="wpa-layout">
    <div class="wpa-left">
        <div class="pm-sh" style="position:sticky;top:0;z-index:10">TARGET NETWORKS <span class="pm-sh-sub" id="netCount"></span></div>
        <div id="netList"></div>
    </div>
    <div class="wpa-center">
        <div class="controls">
            <button class="btn active" id="btnCap" onclick="toggleCapture()">⬤ CAPTURE</button>
            <button class="btn" onclick="deauthSelected()">DEAUTH</button>
            <button class="btn export" onclick="exportHashcat()">EXPORT HASHCAT</button>
            <button class="btn export" onclick="exportHccapx()">EXPORT HCCAPX</button>
            <button class="btn" onclick="saveNow()">💾 SAVE</button>
        </div>
        <div style="padding:14px;border-bottom:1px solid var(--panel-border)">
            <div style="font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:3px;color:var(--gold);margin-bottom:8px">4-WAY HANDSHAKE FRAMES</div>
            <div class="eapol-frames" id="eapolFrames">
                <div class="eapol-frame missing"><div class="frame-num">1</div><div class="frame-label">ANonce</div></div>
                <div class="eapol-frame missing"><div class="frame-num">2</div><div class="frame-label">SNonce+MIC</div></div>
                <div class="eapol-frame missing"><div class="frame-num">3</div><div class="frame-label">GTK Enc</div></div>
                <div class="eapol-frame missing"><div class="frame-num">4</div><div class="frame-label">ACK</div></div>
            </div>
            <div id="pmkidStatus" style="padding:8px 12px;font-size:.65rem;color:var(--text-dim)">
                PMKID: <span id="pmkidValue">not captured</span>
            </div>
        </div>
        <div style="flex:1;overflow-y:auto">
            <div style="padding:14px">
                <div style="font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:2px;color:var(--gold);margin-bottom:8px">SIGNAL DURING CAPTURE</div>
                <canvas id="rssi-spark" width="580" height="80"></canvas>
            </div>
            <div style="padding:14px;border-top:1px solid var(--panel-border)">
                <div style="font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:2px;color:var(--gold);margin-bottom:8px">HASHCAT FORMAT (WPA*02)</div>
                <div class="hash-output" id="hashOutput">No capture yet — select a network and start capture</div>
            </div>
        </div>
    </div>
    <div class="wpa-right">
        <div class="pm-sh">CAPTURE LOG</div>
        <div id="captureLog" style="padding:8px;font-family:Share\ Tech\ Mono,monospace;font-size:.6rem;line-height:2"></div>
        <div class="pm-sh">CHANNEL MAP</div>
        <canvas id="chan-chart" width="264" height="180" style="padding:8px"></canvas>
        <div class="pm-sh">STATS</div>
        <div id="statsPanel" style="padding:12px;font-size:.65rem"></div>
    </div>
</div>
<script src="pm_scraper.js"></script>
<script src="pm_viz.js"></script>
<script src="pm_transport.js"></script>
<script>
const networks = new Map();
let selected = null, capturing = false;
let rssiSpark, chanChart;
let captureLog = [];

function initViz(){
    rssiSpark = new PMViz.Sparkline("rssi-spark",{color:PMViz.C.gold,maxPts:80});
    rssiSpark.canvas.width = document.getElementById("rssi-spark").parentElement.offsetWidth - 28;
    chanChart = new PMViz.BarChart("chan-chart",{horizontal:false,colorFn:()=>PMViz.C.accent});
}

const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s)=>{
        document.getElementById("liveBadge").style.opacity=s.state==="connected"?"1":"0.3";
        document.getElementById("lastUpdate").textContent=s.message;
    }
});

function handleData(msg){
    if(msg.type==="WIFI_SCAN_RESULT") addNetwork(msg);
    else if(msg.type==="WPA_HANDSHAKE") updateHandshake(msg);
    else if(msg.type==="PMKID_CAPTURED") updatePMKID(msg);
    else if(msg.type==="EAPOL_FRAME") updateEAPOL(msg);
    else if(msg.type==="GPS_FIX") {}
}

function addNetwork(n){
    const existing = networks.get(n.bssid)||{bssid:n.bssid,ssid:n.ssid||"<hidden>",rssi:n.rssi,channel:n.channel||0,security:n.sec||"WPA2",frames:[false,false,false,false],pmkid:null,hashcat:null,firstSeen:Date.now()};
    existing.rssi=n.rssi; existing.lastSeen=Date.now();
    networks.set(n.bssid,existing);
    if(n.bssid===selected) rssiSpark.push(n.rssi);
    renderNetList(); updateChannelChart();
}

function updateHandshake(msg){
    const n=networks.get(msg.bssid); if(!n) return;
    if(msg.frame>=1&&msg.frame<=4) n.frames[msg.frame-1]=true;
    if(msg.hashcat) n.hashcat=msg.hashcat;
    networks.set(msg.bssid,n);
    addLog(`EAPOL frame ${msg.frame} captured from ${n.ssid}`,"accent3");
    if(msg.bssid===selected){renderEAPOL(n); if(n.hashcat) document.getElementById("hashOutput").textContent=n.hashcat;}
    renderNetList();
}

function updatePMKID(msg){
    const n=networks.get(msg.bssid); if(!n) return;
    n.pmkid=msg.pmkid; networks.set(msg.bssid,n);
    document.getElementById("pmkidValue").textContent=msg.pmkid||"captured";
    document.getElementById("pmkidValue").style.color="var(--accent3)";
    addLog(`PMKID captured: ${(msg.pmkid||"").substring(0,16)}...`,"accent");
    renderNetList();
}

function updateEAPOL(msg){
    const n=networks.get(msg.bssid); if(!n) return;
    if(msg.frame_num>=1&&msg.frame_num<=4) n.frames[msg.frame_num-1]=true;
    networks.set(msg.bssid,n);
    if(msg.bssid===selected) renderEAPOL(n);
    renderNetList();
}

function renderNetList(){
    const arr=Array.from(networks.values()).sort((a,b)=>b.rssi-a.rssi);
    document.getElementById("netCount").textContent=`${arr.length} nets`;
    const getCap=(n)=>{
        const fc=n.frames.filter(Boolean).length;
        if(n.pmkid) return ["PMKID","pmkid"];
        if(fc===4)  return ["FULL","full"];
        if(fc>0)    return [`${fc}/4`,"partial"];
        return ["NONE","none"];
    };
    document.getElementById("netList").innerHTML=arr.map(n=>{
        const [capText,capClass]=getCap(n);
        const color=PMViz.rssiColor(n.rssi);
        return `<div class="net-item ${selected===n.bssid?"selected":""} ${capClass==="full"||capClass==="pmkid"?"captured":""}"
                     onclick="selectNetwork('${PM.esc(n.bssid)}')">
            <div class="net-ssid">${PM.esc(n.ssid)}</div>
            <div class="net-meta">
                <span style="color:${color}">${n.rssi}dBm</span>
                <span>ch${n.channel}</span>
                <span>${PM.esc(n.security)}</span>
                <span class="cap-badge ${capClass}">${capText}</span>
            </div>
        </div>`;
    }).join("");
}

function selectNetwork(bssid){
    selected=bssid; renderNetList();
    const n=networks.get(bssid); if(!n) return;
    renderEAPOL(n);
    if(n.hashcat) document.getElementById("hashOutput").textContent=n.hashcat;
    else document.getElementById("hashOutput").textContent="No capture yet for "+n.ssid;
    document.getElementById("pmkidValue").textContent=n.pmkid||"not captured";
    document.getElementById("pmkidValue").style.color=n.pmkid?"var(--accent3)":"var(--text-dim)";
}

function renderEAPOL(n){
    const labels=["ANonce","SNonce+MIC","GTK Enc","ACK"];
    document.getElementById("eapolFrames").innerHTML=n.frames.map((captured,i)=>`
        <div class="eapol-frame ${captured?"captured":"missing"}">
            <div class="frame-num ${captured?"captured":""}">${i+1}</div>
            <div class="frame-label">${labels[i]}</div>
            ${captured?'<div style="color:var(--accent3);font-size:.55rem;margin-top:4px">✓ CAPTURED</div>':''}
        </div>`).join("");
}

function updateChannelChart(){
    const counts={};
    networks.forEach(n=>{ counts[n.channel]=(counts[n.channel]||0)+1; });
    chanChart.update(Array.from({length:13},(_,i)=>({label:String(i+1),value:counts[i+1]||0})));
}

function addLog(msg,color="text-dim"){
    captureLog.unshift(`<span style="color:var(--${color})">${new Date().toLocaleTimeString()} ${PM.esc(msg)}</span>`);
    if(captureLog.length>30) captureLog.pop();
    document.getElementById("captureLog").innerHTML=captureLog.join("<br>");
}

function toggleCapture(){
    capturing=!capturing;
    document.getElementById("btnCap").className="btn"+(capturing?" active":"");
    document.getElementById("btnCap").textContent=capturing?"⬤ CAPTURE":"◯ PAUSED";
    if(beam.connected) beam.send({type:capturing?"CMD_WPA_CAPTURE":"CMD_STOP_ALL",src:"app",cmd_id:"wpa1",bssid:selected||""});
}

function deauthSelected(){
    if(!selected){alert("Select a network first");return;}
    const n=networks.get(selected);
    if(beam.connected) beam.send({type:"CMD_DEAUTH",src:"app",cmd_id:"wpa2",bssid:selected,ssid:n.ssid});
    addLog(`Deauth sent to ${n.ssid}`,"accent4");
}

function exportHashcat(){
    const lines=Array.from(networks.values()).filter(n=>n.hashcat).map(n=>n.hashcat);
    if(lines.length===0){alert("No complete captures yet");return;}
    PMViz.Storage.save("wpa_handshakes",lines.join("\n"),"txt");
}

function exportHccapx(){
    const data=Array.from(networks.values()).filter(n=>n.frames.filter(Boolean).length>=2);
    PMViz.Storage.save("wpa_captures",data,"json");
}

function saveNow(){ PMViz.Storage.save("wpa_sessions",Array.from(networks.values()),"json"); }

function startCapture(){
    if(beam.connected) beam.send({type:"CMD_WIFI_SCAN",src:"app",cmd_id:"wpa0",duration_sec:30});
}

window.addEventListener("load",async()=>{
    initViz();
    try{await beam.connect();}catch(e){console.log("No hardware");}
    if(beam.connected) startCapture();
});
</script>
</body></html>
