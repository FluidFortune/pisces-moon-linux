<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.wpa-layout{display:grid;grid-template-columns:320px 1fr 280px;height:calc(100vh - 52px);overflow:hidden}
.wpa-left{border-right:1px solid var(--panel-border);overflow-y:auto}

.net-item.selected{background:rgba(255,209,102,.08);border-left:3px solid var(--gold)}
.net-item.captured{border-left:3px solid var(--accent3)}

.btn:hover{background:var(--gold);color:var(--bg)}

<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            this.ws.onopen = () => resolve();
            this.ws.onerror = () => reject(new Error(`WebSocket failed at ${this.wsUrl}`));

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed");
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
const networks = new Map();
let selected = null, capturing = false;
let rssiSpark, chanChart;
let captureLog = [];

function initViz(){
    rssiSpark = new PMViz.Sparkline("rssi-spark",{color:PMViz.C.gold,maxPts:80});
    rssiSpark.canvas.width = document.getElementById("rssi-spark").parentElement.offsetWidth - 28;
    chanChart = new PMViz.BarChart("chan-chart",{horizontal:false,colorFn:()=>PMViz.C.accent});
}

const beam = new PMTransport({
    onMessage: handleData,
    onStatus: (s)=>{
        document.getElementById("liveBadge").style.opacity=s.state==="connected"?"1":"0.3";
        document.getElementById("lastUpdate").textContent=s.message;
    }
});

function handleData(msg){
    if(msg.type==="WIFI_SCAN_RESULT") addNetwork(msg);
    else if(msg.type==="WPA_HANDSHAKE") updateHandshake(msg);
    else if(msg.type==="PMKID_CAPTURED") updatePMKID(msg);
    else if(msg.type==="EAPOL_FRAME") updateEAPOL(msg);
    else if(msg.type==="GPS_FIX"||msg.type==="gps") {}
}

function addNetwork(n){
    const existing = networks.get(n.bssid)||{bssid:n.bssid,ssid:n.ssid||"<hidden>",rssi:n.rssi,channel:n.channel||0,security:n.sec||"WPA2",frames:[false,false,false,false],pmkid:null,hashcat:null,firstSeen:Date.now()};
    existing.rssi=n.rssi; existing.lastSeen=Date.now();
    networks.set(n.bssid,existing);
    if(n.bssid===selected) rssiSpark.push(n.rssi);
    renderNetList(); updateChannelChart();
}

function updateHandshake(msg){
    const n=networks.get(msg.bssid); if(!n) return;
    if(msg.frame>=1&&msg.frame<=4) n.frames[msg.frame-1]=true;
    if(msg.hashcat) n.hashcat=msg.hashcat;
    networks.set(msg.bssid,n);
    addLog(`EAPOL frame ${msg.frame} captured from ${n.ssid}`,"accent3");
    if(msg.bssid===selected){renderEAPOL(n); if(n.hashcat) document.getElementById("hashOutput").textContent=n.hashcat;}
    renderNetList();
}

function updatePMKID(msg){
    const n=networks.get(msg.bssid); if(!n) return;
    n.pmkid=msg.pmkid; networks.set(msg.bssid,n);
    document.getElementById("pmkidValue").textContent=msg.pmkid||"captured";
    document.getElementById("pmkidValue").style.color="var(--accent3)";
    addLog(`PMKID captured: ${(msg.pmkid||"").substring(0,16)}...`,"accent");
    renderNetList();
}

function updateEAPOL(msg){
    const n=networks.get(msg.bssid); if(!n) return;
    if(msg.frame_num>=1&&msg.frame_num<=4) n.frames[msg.frame_num-1]=true;
    networks.set(msg.bssid,n);
    if(msg.bssid===selected) renderEAPOL(n);
    renderNetList();
}

function renderNetList(){
    const arr=Array.from(networks.values()).sort((a,b)=>b.rssi-a.rssi);
    document.getElementById("netCount").textContent=`${arr.length} nets`;
    const getCap=(n)=>{
        const fc=n.frames.filter(Boolean).length;
        if(n.pmkid) return ["PMKID","pmkid"];
        if(fc===4)  return ["FULL","full"];
        if(fc>0)    return [`${fc}/4`,"partial"];
        return ["NONE","none"];
    };
    document.getElementById("netList").innerHTML=arr.map(n=>{
        const [capText,capClass]=getCap(n);
        const color=PMViz.rssiColor(n.rssi);
        return `<div class="net-item ${selected===n.bssid?"selected":""} ${capClass==="full"||capClass==="pmkid"?"captured":""}"
                     onclick="selectNetwork('${PM.esc(n.bssid)}')">
            <div class="net-ssid">${PM.esc(n.ssid)}</div>
            <div class="net-meta">
                <span style="color:${color}">${n.rssi}dBm</span>
                <span>ch${n.channel}</span>
                <span>${PM.esc(n.security)}</span>
                <span class="cap-badge ${capClass}">${capText}</span>
            </div>
        </div>`;
    }).join("");
}

function selectNetwork(bssid){
    selected=bssid; renderNetList();
    const n=networks.get(bssid); if(!n) return;
    renderEAPOL(n);
    if(n.hashcat) document.getElementById("hashOutput").textContent=n.hashcat;
    else document.getElementById("hashOutput").textContent="No capture yet for "+n.ssid;
    document.getElementById("pmkidValue").textContent=n.pmkid||"not captured";
    document.getElementById("pmkidValue").style.color=n.pmkid?"var(--accent3)":"var(--text-dim)";
}

function renderEAPOL(n){
    const labels=["ANonce","SNonce+MIC","GTK Enc","ACK"];
    document.getElementById("eapolFrames").innerHTML=n.frames.map((captured,i)=>`
        <div class="eapol-frame ${captured?"captured":"missing"}">
            <div class="frame-num ${captured?"captured":""}">${i+1}</div>
            <div class="frame-label">${labels[i]}</div>
            ${captured?'<div style="color:var(--accent3);font-size:.55rem;margin-top:4px">✓ CAPTURED</div>':''}
        </div>`).join("");
}

function updateChannelChart(){
    const counts={};
    networks.forEach(n=>{ counts[n.channel]=(counts[n.channel]||0)+1; });
    chanChart.update(Array.from({length:13},(_,i)=>({label:String(i+1),value:counts[i+1]||0})));
}

function addLog(msg,color="text-dim"){
    captureLog.unshift(`<span style="color:var(--${color})">${new Date().toLocaleTimeString()} ${PM.esc(msg)}</span>`);
    if(captureLog.length>30) captureLog.pop();
    document.getElementById("captureLog").innerHTML=captureLog.join("<br>");
}

function toggleCapture(){
    capturing=!capturing;
    document.getElementById("btnCap").className="btn"+(capturing?" active":"");
    document.getElementById("btnCap").textContent=capturing?"⬤ CAPTURE":"◯ PAUSED";
    if(beam.connected) beam.send({type:capturing?"CMD_WPA_CAPTURE":"CMD_STOP_ALL",src:"app",cmd_id:"wpa1",bssid:selected||""});
}

function deauthSelected(){
    if(!selected){alert("Select a network first");return;}
    const n=networks.get(selected);
    if(beam.connected) beam.send({type:"CMD_DEAUTH",src:"app",cmd_id:"wpa2",bssid:selected,ssid:n.ssid});
    addLog(`Deauth sent to ${n.ssid}`,"accent4");
}

function exportHashcat(){
    const lines=Array.from(networks.values()).filter(n=>n.hashcat).map(n=>n.hashcat);
    if(lines.length===0){alert("No complete captures yet");return;}
    PMViz.Storage.save("wpa_handshakes",lines.join("\n"),"txt");
}

function exportHccapx(){
    const data=Array.from(networks.values()).filter(n=>n.frames.filter(Boolean).length>=2);
    PMViz.Storage.save("wpa_captures",data,"json");
}

function saveNow(){ PMViz.Storage.save("wpa_sessions",Array.from(networks.values()),"json"); }

function startCapture(){
    if(beam.connected) beam.send({type:"CMD_WIFI_SCAN",src:"app",cmd_id:"wpa0",duration_sec:30});
}

window.addEventListener("load",async()=>{
    initViz();
    try{await beam.connect();}catch(e){console.log("No hardware");}
    if(beam.connected) startCapture();
});
</script>
</body></html>
