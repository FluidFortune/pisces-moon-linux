<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // AUDIO</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
.ap-layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 52px);overflow:hidden;}
.ap-library{border-right:1px solid var(--panel-border);overflow-y:auto;display:flex;flex-direction:column;}
.ap-main{display:flex;flex-direction:column;overflow:hidden;}
.track-item{padding:10px 12px;border-bottom:1px solid rgba(28,46,58,.3);cursor:pointer;transition:background .15s;display:flex;gap:8px;align-items:center;}
.track-item:hover{background:rgba(0,212,255,.04);}
.track-item.playing{background:rgba(0,212,255,.1);border-left:3px solid var(--accent);}
.track-icon{font-size:1.1rem;flex-shrink:0;}
.track-info{flex:1;min-width:0;}
.track-name{font-size:.72rem;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-meta{font-size:.55rem;color:var(--text-dim);margin-top:2px;}
.now-playing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px;}
.album-art{width:200px;height:200px;background:var(--bg2);border:1px solid var(--panel-border);display:flex;align-items:center;justify-content:center;font-size:5rem;}
.track-title{font-family:Orbitron,monospace;font-size:.9rem;color:var(--text-bright);text-align:center;letter-spacing:2px;}
.waveform-wrap{width:100%;max-width:500px;height:60px;position:relative;cursor:pointer;}
canvas#waveform{width:100%;height:60px;border:1px solid var(--panel-border);background:var(--bg2);}
.progress-wrap{width:100%;max-width:500px;display:flex;align-items:center;gap:10px;font-size:.62rem;color:var(--text-dim);font-family:Share\ Tech\ Mono,monospace;}
input[type=range].seek{flex:1;accent-color:var(--accent);}
.controls{display:flex;gap:16px;align-items:center;}
.ctrl-btn{background:transparent;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer;transition:all .15s;padding:4px;}
.ctrl-btn:hover{color:var(--text-bright);}
.ctrl-btn.active{color:var(--accent);}
.play-btn{background:transparent;border:2px solid var(--accent);color:var(--accent);font-size:1.8rem;width:56px;height:56px;border-radius:50%;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.play-btn:hover{background:var(--accent);color:var(--bg);}
.volume-row{display:flex;align-items:center;gap:10px;font-size:.9rem;}
input[type=range].vol{width:120px;accent-color:var(--accent3);}
</style>
</head><body>
<header class="pm-header">
  <div class="pm-logo">🎵 <em>AUDIO</em> PLAYER</div>
  <div class="pm-hdr-right">
    <input type="file" id="fileInput" accept="audio/*" multiple style="display:none" onchange="loadFiles(this.files)">
    <input type="file" id="folderInput" accept="audio/*" multiple webkitdirectory style="display:none" onchange="loadFiles(this.files)">
    <button class="pm-refresh" onclick="document.getElementById('fileInput').click()">+ FILES</button>
    <button class="pm-refresh" onclick="document.getElementById('folderInput').click()" style="margin-left:4px">+ FOLDER</button>
    <button class="pm-refresh" id="btnRecordings" onclick="loadRecordingsFolder()" style="margin-left:4px;border-color:var(--accent3);color:var(--accent3)" title="Load recordings from audio_recorder">🎙 RECORDINGS</button>
  </div>
</header>
<div class="ap-layout">
  <div class="ap-library">
    <div class="pm-sh">LIBRARY <span class="pm-sh-sub" id="trackCount"></span></div>
    <div id="trackList" style="flex:1;overflow-y:auto"></div>
    <div style="padding:10px;border-top:1px solid var(--panel-border)">
      <div style="font-size:.55rem;color:var(--text-dim);margin-bottom:6px;font-family:Orbitron,monospace;letter-spacing:2px">PLAYBACK</div>
      <div style="display:flex;gap:6px">
        <button class="pm-refresh" style="flex:1" id="btnShuffle" onclick="toggleShuffle()">SHUFFLE</button>
        <button class="pm-refresh" style="flex:1" id="btnRepeat" onclick="toggleRepeat()">REPEAT</button>
      </div>
    </div>
  </div>
  <div class="ap-main">
    <div class="now-playing">
      <div class="album-art" id="albumArt">🎵</div>
      <div class="track-title" id="trackTitle">NO TRACK LOADED</div>
      <div style="font-size:.6rem;color:var(--text-dim)" id="trackArtist">Load audio files to begin</div>
      <div class="waveform-wrap" onclick="seekClick(event)">
        <canvas id="waveform" width="500" height="60"></canvas>
      </div>
      <div class="progress-wrap">
        <span id="curTime">0:00</span>
        <input type="range" class="seek" id="seekBar" min="0" max="100" value="0" oninput="seek(this.value)">
        <span id="durTime">0:00</span>
      </div>
      <div class="controls">
        <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
        <button class="ctrl-btn" onclick="skipBack()">⏪</button>
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="skipFwd()">⏩</button>
        <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
      </div>
      <div class="volume-row">
        <span>🔈</span>
        <input type="range" class="vol" id="volBar" min="0" max="100" value="80" oninput="setVol(this.value)">
        <span>🔊</span>
        <span style="font-size:.6rem;color:var(--text-dim)" id="volPct">80%</span>
        <span style="margin-left:16px;font-size:.7rem;color:var(--text-dim)">SPEED:</span>
        <select id="speedSel" style="background:var(--bg3);border:1px solid var(--panel-border);color:var(--text);font-size:.6rem;padding:3px 6px;font-family:Share\ Tech\ Mono,monospace" onchange="setSpeed(this.value)">
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>
      </div>
    </div>
  </div>
</div>
<script>
const audio = new Audio();
let tracks = [], currentIdx = -1, shuffle = false, repeat = false;
let wfCtx, analyser, animFrame, wfData;

// Waveform setup
function initAnalyser(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const src = ctx.createMediaElementSource(audio);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    analyser.connect(ctx.destination);
    wfData = new Uint8Array(analyser.frequencyBinCount);
  }catch{}
}

function loadFiles(files){
  const audio_exts = /\.(mp3|ogg|wav|flac|m4a|aac|opus|webm|weba)$/i;
  Array.from(files).filter(f=>audio_exts.test(f.name)).forEach(f=>{
    const url = URL.createObjectURL(f);
    const source = f.webkitRelativePath ? f.webkitRelativePath.split('/')[0] : '';
    tracks.push({name:f.name.replace(/\.[^.]+$/,''), url, size:f.size, folder:source});
  });
  renderLibrary();
  if(currentIdx < 0 && tracks.length > 0) playTrack(0);
}

// Load recordings saved by audio_recorder.html (from pm_recordings localStorage key)
function loadRecordingsFolder(){
  try {
    const stored = JSON.parse(localStorage.getItem('pm_recordings') || '[]');
    if(!stored.length){ alert('No recordings found.\nRecordings are saved by the Audio Recorder app.'); return; }
    let added = 0;
    stored.forEach(r=>{
      if(!r.dataUrl || tracks.find(t=>t.name===r.name)) return;
      tracks.push({name:r.name||('Recording '+r.ts), url:r.dataUrl, size:r.size||0, folder:'recordings'});
      added++;
    });
    if(added){ renderLibrary(); if(currentIdx<0) playTrack(0); }
    else alert('All recordings already loaded.');
  } catch(e){ alert('Could not load recordings: '+e.message); }
}

function renderLibrary(){
  document.getElementById('trackCount').textContent = tracks.length;
  document.getElementById('trackList').innerHTML = tracks.map((t,i)=>`
    <div class="track-item ${i===currentIdx?'playing':''}" onclick="playTrack(${i})">
      <span class="track-icon">${i===currentIdx?'▶':(t.folder==='recordings'?'🎙':'🎵')}</span>
      <div class="track-info">
        <div class="track-name">${t.name}</div>
        <div class="track-meta">${(t.size/1024).toFixed(0)}KB${t.folder?' · '+t.folder:''}</div>
      </div>
    </div>`).join('');
}

function playTrack(i){
  if(i<0||i>=tracks.length) return;
  currentIdx = i;
  audio.src = tracks[i].url;
  audio.play();
  document.getElementById('trackTitle').textContent = tracks[i].name;
  document.getElementById('playBtn').textContent = '⏸';
  if(!analyser) initAnalyser();
  renderLibrary(); drawWaveform();
}

function togglePlay(){
  if(!tracks.length) return;
  if(currentIdx < 0){playTrack(0);return;}
  if(audio.paused){audio.play();document.getElementById('playBtn').textContent='⏸';}
  else{audio.pause();document.getElementById('playBtn').textContent='▶';}
}

function nextTrack(){
  if(!tracks.length) return;
  if(shuffle) playTrack(Math.floor(Math.random()*tracks.length));
  else playTrack((currentIdx+1)%tracks.length);
}

function prevTrack(){
  if(!tracks.length) return;
  playTrack((currentIdx-1+tracks.length)%tracks.length);
}

function skipFwd(){audio.currentTime=Math.min(audio.duration,audio.currentTime+10);}
function skipBack(){audio.currentTime=Math.max(0,audio.currentTime-10);}

function seek(v){audio.currentTime=(v/100)*audio.duration;}
function seekClick(e){
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  if(audio.duration) audio.currentTime=pct*audio.duration;
}
function setVol(v){audio.volume=v/100;document.getElementById('volPct').textContent=v+'%';}
function setSpeed(v){audio.playbackRate=parseFloat(v);}
function toggleShuffle(){shuffle=!shuffle;document.getElementById('btnShuffle').style.borderColor=shuffle?'var(--accent)':'';document.getElementById('btnShuffle').style.color=shuffle?'var(--accent)':'';}
function toggleRepeat(){repeat=!repeat;audio.loop=repeat;document.getElementById('btnRepeat').style.borderColor=repeat?'var(--accent3)':'';document.getElementById('btnRepeat').style.color=repeat?'var(--accent3)':'';}

function fmtTime(s){const m=Math.floor(s/60);return m+':'+String(Math.floor(s%60)).padStart(2,'0');}

audio.addEventListener('timeupdate',()=>{
  if(!audio.duration) return;
  const pct=(audio.currentTime/audio.duration)*100;
  document.getElementById('seekBar').value=pct;
  document.getElementById('curTime').textContent=fmtTime(audio.currentTime);
  document.getElementById('durTime').textContent=fmtTime(audio.duration);
});
audio.addEventListener('ended',()=>{
  if(!repeat) nextTrack();
});
audio.volume=0.8;

// Waveform visualizer
const wfCanvas=document.getElementById('waveform');
wfCtx=wfCanvas.getContext('2d');

function drawWaveform(){
  cancelAnimationFrame(animFrame);
  function frame(){
    const w=wfCanvas.width,h=wfCanvas.height;
    wfCtx.fillStyle='#080f14';
    wfCtx.fillRect(0,0,w,h);
    if(analyser&&!audio.paused){
      analyser.getByteFrequencyData(wfData);
      const bw=w/wfData.length;
      wfData.forEach((v,i)=>{
        const bh=(v/255)*h;
        const hue=200+v*0.5;
        wfCtx.fillStyle=`hsl(${hue},100%,${40+v*0.2}%)`;
        wfCtx.fillRect(i*bw,h-bh,bw-1,bh);
      });
    } else {
      // Static waveform placeholder
      wfCtx.strokeStyle='#1a3a50';wfCtx.lineWidth=1;
      wfCtx.beginPath();wfCtx.moveTo(0,h/2);wfCtx.lineTo(w,h/2);wfCtx.stroke();
    }
    // Progress overlay
    if(audio.duration){
      const px=(audio.currentTime/audio.duration)*w;
      wfCtx.fillStyle='rgba(0,212,255,0.2)';
      wfCtx.fillRect(0,0,px,h);
      wfCtx.fillStyle='var(--accent,#00d4ff)';
      wfCtx.fillRect(px,0,2,h);
    }
    animFrame=requestAnimationFrame(frame);
  }
  frame();
}
drawWaveform();
</script>
</body></html>
