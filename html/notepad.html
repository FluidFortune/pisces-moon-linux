<!-- PISCES MOON OS // NOTEPAD -->
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // NOTEPAD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#00d4ff;--accent2:#ff6b00;--accent3:#00ff88;--accent4:#ff3366;--warn:#ffcc00;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;--glow:0 0 20px rgba(0,212,255,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);pointer-events:none;z-index:999;}
header{background:var(--bg2);border-bottom:2px solid var(--panel-border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1rem;color:var(--accent3);text-shadow:0 0 20px rgba(0,255,136,.3);letter-spacing:3px;}
.logo span{color:var(--gold);}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--panel-border);padding:6px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.btn{display:inline-block;padding:5px 12px;background:transparent;border:1px solid var(--panel-border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.62rem;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{border-color:var(--accent3);color:var(--accent3);}
.btn.active{border-color:var(--accent3);color:var(--accent3);background:rgba(0,255,136,.08);}
.sep{width:1px;height:20px;background:var(--panel-border);}
.file-name{background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:5px 10px;width:200px;outline:none;}
.file-name:focus{border-color:var(--accent3);}
.editor-wrap{display:flex;flex:1;overflow:hidden;}
.line-nums{background:var(--bg2);border-right:1px solid var(--panel-border);padding:12px 8px;color:var(--text-dim);font-size:.72rem;line-height:1.6;text-align:right;min-width:40px;overflow:hidden;user-select:none;flex-shrink:0;}
.editor{flex:1;background:var(--bg);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.78rem;padding:12px 16px;border:none;outline:none;resize:none;line-height:1.6;tab-size:2;}
.statusbar{background:var(--bg2);border-top:1px solid var(--panel-border);padding:4px 16px;display:flex;justify-content:space-between;font-size:.6rem;color:var(--text-dim);flex-shrink:0;}
.files-sidebar{width:180px;background:var(--bg2);border-right:1px solid var(--panel-border);display:flex;flex-direction:column;flex-shrink:0;}
.fshead{padding:8px 12px;border-bottom:1px solid var(--panel-border);font-family:'Orbitron',monospace;font-size:.56rem;color:var(--accent3);letter-spacing:2px;}
.flist{flex:1;overflow-y:auto;}
.fi{padding:7px 12px;cursor:pointer;font-size:.67rem;border-bottom:1px solid rgba(26,58,80,.3);color:var(--text);transition:background .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi:hover{background:rgba(0,255,136,.05);}
.fi.active{background:rgba(0,255,136,.08);border-left:2px solid var(--accent3);color:var(--text-bright);}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--warn);margin-left:4px;display:none;}
.dot.show{display:inline-block;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg3);} ::-webkit-scrollbar-thumb{background:var(--panel-border);}
</style></head><body>
<header>
  <div class="logo">PISCES MOON // <span>NOTEPAD</span> <span class="dot" id="dirty">●</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <input class="file-name" id="fileName" placeholder="filename.txt" value="untitled.txt">
  </div>
</header>
<div class="toolbar">
  <button class="btn" onclick="newFile()">NEW</button>
  <button class="btn" onclick="openFile()">OPEN</button>
  <button class="btn active" onclick="saveFile()">SAVE</button>
  <button class="btn" onclick="saveAs()">SAVE AS</button>
  <div class="sep"></div>
  <button class="btn" onclick="wrapToggle()" id="wrapBtn">WRAP: ON</button>
  <button class="btn" onclick="document.getElementById('editor').style.fontSize='.9rem'">A+</button>
  <button class="btn" onclick="document.getElementById('editor').style.fontSize='.7rem'">A-</button>
  <div class="sep"></div>
  <button class="btn" onclick="findReplace()">FIND</button>
  <button class="btn" onclick="copyAll()">COPY ALL</button>
  <div class="sep"></div>
  <span id="wordCount" style="font-size:.6rem;color:var(--text-dim)">0 words</span>
</div>
<div class="editor-wrap">
  <div class="files-sidebar">
    <div class="fshead">FILES</div>
    <div class="flist" id="flist"></div>
  </div>
  <div class="line-nums" id="lineNums">1</div>
  <textarea class="editor" id="editor" spellcheck="false"
    placeholder="Start typing... CTRL+S to save"
    oninput="onEdit()" onkeydown="onKey(event)" onscroll="syncScroll()"></textarea>
</div>
<div class="statusbar">
  <span id="sb-cursor">Ln 1, Col 1</span>
  <span id="sb-stats">0 lines · 0 chars</span>
  <span id="sb-enc">UTF-8</span>
</div>
<input type="file" id="fileInput" style="display:none" onchange="loadFile(event)">
<script>
const SK='pm_notepad_files', FK='pm_notepad_active';
let files={}, activeFile='untitled.txt', dirty=false, wrap=true;

function init(){
  try{files=JSON.parse(localStorage.getItem(SK)||'{}');}catch{files={};}
  activeFile=localStorage.getItem(FK)||'untitled.txt';
  if(!files[activeFile]) files[activeFile]='';
  loadIntoEditor(activeFile);
  renderFileList();
  updateNums();
}

function save(){localStorage.setItem(SK,JSON.stringify(files));localStorage.setItem(FK,activeFile);}

function newFile(){
  const name=prompt('File name:','untitled.txt');
  if(!name)return;
  files[name]=''; activeFile=name; dirty=false;
  document.getElementById('fileName').value=name;
  document.getElementById('editor').value='';
  save(); renderFileList(); updateAll();
}

function openFile(){document.getElementById('fileInput').click();}

function loadFile(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    files[file.name]=ev.target.result; activeFile=file.name;
    document.getElementById('fileName').value=file.name;
    loadIntoEditor(file.name); save(); renderFileList();
  };
  r.readAsText(file);
}

function saveFile(){
  activeFile=document.getElementById('fileName').value||'untitled.txt';
  files[activeFile]=document.getElementById('editor').value;
  dirty=false; document.getElementById('dirty').className='dot';
  save(); renderFileList();
  // Trojan Horse write
  if(typeof window.spadra!=='undefined') window.spadra.fs.write('~/.pisces-moon/notes/'+activeFile, files[activeFile]);
}

function saveAs(){
  const name=prompt('Save as:',activeFile); if(!name)return;
  activeFile=name;
  document.getElementById('fileName').value=name;
  saveFile();
}

function loadIntoEditor(name){
  document.getElementById('editor').value=files[name]||'';
  document.getElementById('fileName').value=name;
  dirty=false; document.getElementById('dirty').className='dot';
  updateAll();
}

function renderFileList(){
  document.getElementById('flist').innerHTML=Object.keys(files).map(f=>`
    <div class="fi ${f===activeFile?'active':''}" onclick="switchFile('${f.replace(/'/g,"\\'")}')">
      ${f}
    </div>`).join('');
}

function switchFile(name){
  if(dirty&&!confirm('Unsaved changes. Switch anyway?'))return;
  activeFile=name; loadIntoEditor(name);
}

function wrapToggle(){
  wrap=!wrap;
  document.getElementById('editor').style.whiteSpace=wrap?'pre-wrap':'pre';
  document.getElementById('wrapBtn').textContent='WRAP: '+(wrap?'ON':'OFF');
}

function copyAll(){navigator.clipboard.writeText(document.getElementById('editor').value);}

function findReplace(){
  const q=prompt('Find:'); if(!q)return;
  const r=prompt('Replace with (blank to just find):','');
  const ed=document.getElementById('editor');
  if(r!==null) ed.value=ed.value.replaceAll(q,r);
  else{const i=ed.value.indexOf(q); if(i>=0){ed.focus();ed.setSelectionRange(i,i+q.length);}}
  updateAll();
}

function onEdit(){
  dirty=true; document.getElementById('dirty').className='dot show';
  const name=document.getElementById('fileName').value||'untitled.txt';
  if(name!==activeFile){activeFile=name;}
  files[activeFile]=document.getElementById('editor').value;
  updateAll();
}

function onKey(e){
  if(e.ctrlKey&&e.key==='s'){e.preventDefault();saveFile();}
  if(e.key==='Tab'){e.preventDefault();const ed=e.target;const s=ed.selectionStart;ed.value=ed.value.slice(0,s)+'  '+ed.value.slice(ed.selectionEnd);ed.selectionStart=ed.selectionEnd=s+2;}
  setTimeout(updateCursor,0);
}

function updateNums(){
  const lines=document.getElementById('editor').value.split('\n').length;
  document.getElementById('lineNums').textContent=Array.from({length:lines},(_,i)=>i+1).join('\n');
}

function syncScroll(){
  document.getElementById('lineNums').scrollTop=document.getElementById('editor').scrollTop;
}

function updateCursor(){
  const ed=document.getElementById('editor');
  const text=ed.value.substring(0,ed.selectionStart);
  const ln=text.split('\n').length;
  const col=text.split('\n').pop().length+1;
  document.getElementById('sb-cursor').textContent=`Ln ${ln}, Col ${col}`;
}

function updateStats(){
  const v=document.getElementById('editor').value;
  const words=v.trim()?v.trim().split(/\s+/).length:0;
  const lines=v.split('\n').length;
  document.getElementById('sb-stats').textContent=`${lines} lines · ${v.length} chars`;
  document.getElementById('wordCount').textContent=words+' words';
}

function updateAll(){updateNums();syncScroll();updateCursor();updateStats();}

init();
</script>
</body></html>
