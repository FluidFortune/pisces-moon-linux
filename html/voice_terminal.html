<html lang="en"><head><meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // VOICE</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.vt-layout{display:grid;grid-template-columns:260px 1fr 260px;height:calc(100vh - 52px);overflow:hidden}
.vt-left{border-right:1px solid var(--panel-border);overflow-y:auto}
.vt-right{border-left:1px solid var(--panel-border);overflow-y:auto}
.vt-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;overflow-y:auto}
.ptt-btn{width:160px;height:160px;border-radius:50%;border:3px solid var(--accent4);background:rgba(255,85,119,.08);color:var(--accent4);font-family:Orbitron,monospace;font-size:.8rem;letter-spacing:3px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;user-select:none}
.ptt-btn:active,.ptt-btn.transmitting{background:rgba(255,85,119,.25);border-color:var(--accent4);box-shadow:0 0 30px rgba(255,85,119,.4);transform:scale(1.05)}
.ptt-btn .ptt-icon{font-size:2.5rem}
.ptt-btn .ptt-label{font-size:.6rem;letter-spacing:3px}
.vt-meter{width:100%;max-width:300px;height:12px;background:var(--bg3);border:1px solid var(--panel-border);overflow:hidden;border-radius:6px}
.vt-meter-fill{height:100%;width:0%;background:linear-gradient(to right,var(--accent3),var(--gold),var(--accent4));border-radius:6px;transition:width .05s}
.channel-btn{padding:8px 14px;background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);font-family:Orbitron,monospace;font-size:.52rem;cursor:pointer;letter-spacing:1px;transition:all .15s}
.channel-btn:hover{border-color:var(--accent);color:var(--accent)}
.channel-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(77,217,255,.1)}
.tx-item{padding:10px 12px;border-bottom:1px solid rgba(28,46,58,.4)}
.tx-from{font-size:.7rem;color:var(--text-bright);margin-bottom:3px}
.tx-meta{font-size:.58rem;color:var(--text-dim);display:flex;gap:8px}
.codec-badge{display:inline-block;padding:1px 6px;font-family:Orbitron,monospace;font-size:.45rem;border:1px solid var(--accent);color:var(--accent)}
</style>
</head><body>
<header class="pm-header">
    <div class="pm-logo">🎙 <em>VOICE</em> TERMINAL</div>
    <div class="pm-hdr-right">
        <div class="pm-live-badge" id="liveBadge" style="opacity:.3"><div class="pm-live-dot" style="background:var(--accent4)"></div>PTT READY</div>
        <span class="pm-last-update" id="lastUpdate"></span>
    </div>
</header>
<div class="vt-layout">
    <div class="vt-left">
        <div class="pm-sh">ACTIVE NODES</div>
        <div id="nodeList"><div style="padding:14px;text-align:center;color:var(--text-dim);font-size:.65rem">Waiting for mesh nodes...</div></div>
        <div class="pm-sh">CHANNEL</div>
        <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px" id="channelList"></div>
        <div class="pm-sh">CODEC</div>
        <div style="padding:12px;font-size:.65rem">
            <select id="codecSelect" style="width:100%;background:var(--bg3);border:1px solid var(--panel-border);color:var(--text);font-family:Share\ Tech\ Mono,monospace;font-size:.62rem;padding:6px;margin-bottom:8px">
                <option value="codec2_2400">Codec2 2400bps (LoRa optimized)</option>
                <option value="codec2_3200">Codec2 3200bps</option>
                <option value="opus_8k">Opus 8kbps</option>
                <option value="gsm">GSM 13kbps</option>
            </select>
            <div style="color:var(--text-dim)">Codec2 recommended for LoRa mesh.<br>Low bitrate = more range.</div>
        </div>
    </div>
    <div class="vt-center">
        <div style="font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:3px;color:var(--text-dim)" id="vtStatus">STANDBY</div>
        <canvas id="vt-waveform" width="300" height="80"></canvas>
        <button class="ptt-btn" id="pttBtn"
            onmousedown="startPTT()" onmouseup="stopPTT()"
            ontouchstart="startPTT(event)" ontouchend="stopPTT(event)">
            <span class="ptt-icon">🎙</span>
            <span class="ptt-label">HOLD TO TALK</span>
        </button>
        <div class="vt-meter"><div class="vt-meter-fill" id="meterFill"></div></div>
        <div style="display:flex;gap:16px;font-size:.6rem;color:var(--text-dim)">
            <span>TX: <span style="color:var(--accent4)" id="txCount">0</span></span>
            <span>RX: <span style="color:var(--accent3)" id="rxCount">0</span></span>
            <span>Channel: <span style="color:var(--accent)" id="activeChannel">1</span></span>
        </div>
        <canvas id="vt-rssi" width="300" height="50"></canvas>
    </div>
    <div class="vt-right">
        <div class="pm-sh">TRANSMISSION LOG</div>
        <div id="txLog"><div style="padding:14px;text-align:center;color:var(--text-dim);font-size:.65rem">No transmissions yet</div></div>
        <div class="pm-sh">SIGNAL QUALITY</div>
        <canvas id="vt-quality" width="238" height="100" style="padding:8px"></canvas>
        <div class="pm-sh">SQUELCH</div>
        <div style="padding:12px">
            <div style="font-size:.6rem;color:var(--text-dim);margin-bottom:6px">Squelch level: <span id="squelchVal">-80dBm</span></div>
            <input type="range" id="squelchSlider" min="-120" max="-40" value="-80"
                style="width:100%;accent-color:var(--accent)"
                oninput="updateSquelch(this.value)">
        </div>
    </div>
</div>
<script src="pm_lib.js"></script>

<script>
// pm_transport.js inlined
// ═══════════════════════════════════════════════════════════════════════
// PISCES MOON OS - TRANSPORT ABSTRACTION LAYER
// Copyright (C) 2026 Eric Becker / Fluid Fortune
// SPDX-License-Identifier: AGPL-3.0-or-later
// fluidfortune.com
//
// PURPOSE:
//   Lets one HTML app talk to a T-Beam via EITHER:
//     - WebSocket (Linux desktop with edge_bridge.py running)
//     - Web Bluetooth (Android with BLE GATT firmware on T-Beam)
//   Without the app knowing or caring which transport is in use.
//
// USAGE:
//   const beam = new PMTransport({
//       onMessage: msg => handleData(msg),
//       onStatus: s => updateUI(s),
//   });
//   await beam.connect();      // auto-detects best transport
//   beam.send({cmd: "scan"});  // works the same on both transports
//
// AUTO-DETECTION ORDER:
//   1. If running in Trojan Horse APK (window.PiscesAndroid exists)
//      → prefer Web Bluetooth (no Termux required)
//   2. If WebSocket is available at ws://127.0.0.1:8080
//      → use WebSocket (Linux + edge_bridge.py)
//   3. If neither, prompt user to pick one or fail gracefully
//
// MANUAL OVERRIDE:
//   const beam = new PMTransport({mode: "bluetooth"});  // force BLE
//   const beam = new PMTransport({mode: "websocket"});  // force WS
// ═══════════════════════════════════════════════════════════════════════

const PM_BLE_SERVICE_UUID         = "8b5e0001-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_DATA_CHAR_UUID       = "8b5e0002-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_COMMAND_CHAR_UUID    = "8b5e0003-7c34-4a91-bd5c-1a2e9d6f8c4a";
const PM_BLE_STATUS_CHAR_UUID     = "8b5e0004-7c34-4a91-bd5c-1a2e9d6f8c4a";

const PM_WS_DEFAULT_URL = (() => {
    const host = window.location.hostname;
    const bridgeHost = (!host || host === 'localhost' || host === '127.0.0.1')
        ? '127.0.0.1' : host;
    return `ws://${bridgeHost}:8080`;
})();

class PMTransport {
    /**
     * @param {Object} opts
     * @param {Function} opts.onMessage - Called for every data packet from T-Beam
     * @param {Function} opts.onStatus - Called when connection state changes
     * @param {string} [opts.mode] - "auto" | "websocket" | "bluetooth"
     * @param {string} [opts.wsUrl] - Override WebSocket URL
     */
    constructor(opts = {}) {
        this.onMessage = opts.onMessage || (() => {});
        this.onStatus  = opts.onStatus  || (() => {});
        this.mode      = opts.mode      || "auto";
        this.wsUrl     = opts.wsUrl     || PM_WS_DEFAULT_URL;

        // State
        this.transport = null;
        this.connected = false;
        this.activeMode = null;
        this.ws = null;
        this.bleDevice = null;
        this.bleServer = null;
        this.bleService = null;
        this.bleDataChar = null;
        this.bleCommandChar = null;
    }

    /**
     * Connect to the T-Beam. Auto-detects transport unless mode was set.
     * Returns a promise that resolves to {mode: "websocket"|"bluetooth"} on success.
     */
    async connect() {
        let chosenMode = this.mode;

        if (chosenMode === "auto") {
            chosenMode = await this._autoDetectBestTransport();
        }

        this._status("connecting", `Trying ${chosenMode}...`);

        try {
            if (chosenMode === "bluetooth") {
                await this._connectBluetooth();
            } else if (chosenMode === "websocket") {
                try {
                    await this._connectWebSocket();
                } catch (wsErr) {
                    if (navigator.bluetooth) {
                        chosenMode = "bluetooth";
                        await this._connectBluetooth();
                    } else {
                        throw wsErr;
                    }
                }
            } else {
                throw new Error(`Unknown transport mode: ${chosenMode}`);
            }

            this.activeMode = chosenMode;
            this.connected = true;
            this._status("connected", `Connected via ${chosenMode}`);
            return {mode: chosenMode};
        } catch (e) {
            this._status("error", e.message);
            throw e;
        }
    }

    /**
     * Send a command/message to the T-Beam.
     * @param {Object|string} data - JSON-serializable object or string
     */
    async send(data) {
        if (!this.connected) {
            throw new Error("Not connected. Call connect() first.");
        }

        const payload = typeof data === "string" ? data : JSON.stringify(data);

        if (this.activeMode === "websocket") {
            this.ws.send(payload);
        } else if (this.activeMode === "bluetooth") {
            // BLE characteristic writes have a max packet size (~512 bytes)
            // For larger payloads we'd chunk, but commands should be small.
            const encoder = new TextEncoder();
            const bytes = encoder.encode(payload);
            if (bytes.length > 512) {
                throw new Error("BLE command too large (max 512 bytes)");
            }
            await this.bleCommandChar.writeValue(bytes);
        }
    }

    /**
     * Cleanly disconnect.
     */
    async disconnect() {
        this.connected = false;
        if (this.ws) {
            try { this.ws.close(); } catch {}
            this.ws = null;
        }
        if (this.bleDevice && this.bleDevice.gatt.connected) {
            try { this.bleDevice.gatt.disconnect(); } catch {}
        }
        this.bleDevice = null;
        this.activeMode = null;
        this._status("disconnected", "Disconnected");
    }

    /**
     * Returns capabilities of the current connection.
     * Apps can check what's possible before trying.
     */
    capabilities() {
        return {
            connected: this.connected,
            mode: this.activeMode,
            bandwidth: this.activeMode === "websocket" ? "high" : "low",
            // BLE realistically handles ~10-50 KB/s; WebSocket much higher
            maxPacketSize: this.activeMode === "bluetooth" ? 512 : 65536,
            bidirectional: true,
        };
    }

    // ── PRIVATE ───────────────────────────────────────────────────────

    async _autoDetectBestTransport() {
        // Heuristic: if we're in the Pisces Moon Android APK, prefer BLE.
        // Otherwise, prefer WebSocket (Linux desktop with edge bridge).
        const isAndroidAPK = typeof window !== "undefined" &&
                             window.PiscesAndroid &&
                             typeof window.PiscesAndroid.bridgeAvailable === "function";

        if (isAndroidAPK) {
            // Check if Web Bluetooth is available
            if (navigator.bluetooth) return "bluetooth";
            // Fall back to WebSocket (Termux bridge running)
            return "websocket";
        }

        // Non-APK contexts (Linux desktop / macOS Chrome):
        // Skip the probe-then-connect dance - it caused a race condition
        // where the close from the probe interfered with the next open.
        // Just try to connect directly. If it fails, fall back to BLE.
        return "websocket";
    }

    async _probeWebSocket() {
        return new Promise(resolve => {
            try {
                const probe = new WebSocket(this.wsUrl);
                const timer = setTimeout(() => {
                    try { probe.close(); } catch {}
                    resolve(false);
                }, 1500);
                probe.onopen = () => {
                    clearTimeout(timer);
                    try { probe.close(); } catch {}
                    resolve(true);
                };
                probe.onerror = () => {
                    clearTimeout(timer);
                    resolve(false);
                };
            } catch {
                resolve(false);
            }
        });
    }

    async _connectWebSocket() {
        return new Promise((resolve, reject) => {
            this.ws = new WebSocket(this.wsUrl);

            this.ws.onopen = () => resolve();
            this.ws.onerror = () => reject(new Error(`WebSocket failed at ${this.wsUrl}`));

            this.ws.onmessage = ev => {
                let data;
                try {
                    data = JSON.parse(ev.data);
                } catch {
                    data = {type: "raw", data: ev.data};
                }
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                if (this.connected) {
                    this.connected = false;
                    this._status("disconnected", "WebSocket closed");
                }
            };
        });
    }

    async _connectBluetooth() {
        if (!navigator.bluetooth) {
            throw new Error("Web Bluetooth not supported in this browser");
        }

        // Show the system pairing dialog. User picks T-Beam from list.
        this.bleDevice = await navigator.bluetooth.requestDevice({
            filters: [
                {services: [PM_BLE_SERVICE_UUID]},
                {namePrefix: "PiscesMoon"},
                {namePrefix: "T-Beam"},
            ],
            optionalServices: [PM_BLE_SERVICE_UUID],
        });

        // Listen for unexpected disconnections
        this.bleDevice.addEventListener("gattserverdisconnected", () => {
            if (this.connected) {
                this.connected = false;
                this._status("disconnected", "T-Beam disconnected");
            }
        });

        // Connect to the GATT server on the T-Beam
        this.bleServer = await this.bleDevice.gatt.connect();
        this.bleService = await this.bleServer.getPrimaryService(PM_BLE_SERVICE_UUID);

        // Get the data characteristic (T-Beam → tablet)
        this.bleDataChar = await this.bleService.getCharacteristic(PM_BLE_DATA_CHAR_UUID);
        await this.bleDataChar.startNotifications();
        this.bleDataChar.addEventListener("characteristicvaluechanged", ev => {
            const decoder = new TextDecoder();
            const text = decoder.decode(ev.target.value);
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                data = {type: "raw", data: text};
            }
            this.onMessage(data);
        });

        // Get the command characteristic (tablet → T-Beam)
        this.bleCommandChar = await this.bleService.getCharacteristic(PM_BLE_COMMAND_CHAR_UUID);

        // Optional: status characteristic
        try {
            const statusChar = await this.bleService.getCharacteristic(PM_BLE_STATUS_CHAR_UUID);
            await statusChar.startNotifications();
            statusChar.addEventListener("characteristicvaluechanged", ev => {
                const decoder = new TextDecoder();
                const text = decoder.decode(ev.target.value);
                this._status("device_status", text);
            });
        } catch {
            // Status char is optional
        }
    }

    _status(state, message) {
        this.onStatus({state, message, mode: this.activeMode, timestamp: Date.now()});
    }
}

// ── Convenience global ─────────────────────────────────────────────────
if (typeof window !== "undefined") {
    window.PMTransport = PMTransport;
    window.PM_BLE_SERVICE_UUID = PM_BLE_SERVICE_UUID;
}

</script>
<script>
const CHANNELS=["1","2","3","4","5","SEC-A","SEC-B"];
let activeChannel="1", transmitting=false;
let txCount=0, rxCount=0;
let audioCtx=null, analyser=null, micStream=null;
let rssiSpark, qualityGauge;
let wfCanvas, wfCtx, wfFrame;
let txLog=[];
let nodes=new Map();

function initViz(){
    rssiSpark=new PMViz.Sparkline("vt-rssi",{color:PMViz.C.accent3,maxPts:60});
    document.getElementById("vt-rssi").width=300;
    qualityGauge=new PMViz.GaugeArc("vt-quality",{min:-120,max:0,label:"RSSI"});
    wfCanvas=document.getElementById("vt-waveform");
    wfCtx=wfCanvas.getContext("2d");
    drawWaveform([]);
    renderChannels();
}

function renderChannels(){
    document.getElementById("channelList").innerHTML=CHANNELS.map(ch=>`
        <button class="channel-btn ${activeChannel===ch?"active":""}" onclick="setChannel('${ch}')">CH ${ch}</button>`).join("");
}

function setChannel(ch){
    activeChannel=ch;
    document.getElementById("activeChannel").textContent=ch;
    renderChannels();
    if(beam.connected) beam.send({type:"CMD_VOICE_CHANNEL",src:"app",cmd_id:"vt1",channel:ch});
}

const beam=new PMTransport({
    onMessage:handleData,
    onStatus:(s)=>{document.getElementById("liveBadge").style.opacity=s.state==="connected"?"1":"0.3";document.getElementById("lastUpdate").textContent=s.message;}
});

function handleData(msg){
    if(msg.type==="VOICE_RX") onVoiceRX(msg);
    else if(msg.type==="MESH_NODE_UPDATE") updateNode(msg);
    else if(msg.type==="VOICE_TX_ACK") onTXAck(msg);
}

function onVoiceRX(msg){
    rxCount++; document.getElementById("rxCount").textContent=rxCount;
    if(msg.rssi) {rssiSpark.push(msg.rssi); qualityGauge.update(msg.rssi);}
    txLog.unshift({type:"rx",from:msg.from||"unknown",channel:msg.channel||activeChannel,duration:msg.duration_ms||0,rssi:msg.rssi,codec:msg.codec||"codec2",ts:Date.now()});
    if(txLog.length>30) txLog.pop();
    renderTXLog();
    document.getElementById("vtStatus").textContent=`RX: ${msg.from||"unknown"}`;
    document.getElementById("vtStatus").style.color="var(--accent3)";
    setTimeout(()=>{document.getElementById("vtStatus").textContent="STANDBY";document.getElementById("vtStatus").style.color="var(--text-dim)";},2000);
}

function onTXAck(msg){
    txLog.unshift({type:"tx",from:"YOU",channel:activeChannel,duration:msg.duration_ms||0,rssi:null,codec:document.getElementById("codecSelect").value,ts:Date.now()});
    if(txLog.length>30) txLog.pop();
    renderTXLog();
}

function updateNode(msg){
    nodes.set(msg.node_id,{...msg,lastSeen:Date.now()});
    document.getElementById("nodeList").innerHTML=Array.from(nodes.values()).map(n=>`
        <div style="padding:10px 12px;border-bottom:1px solid rgba(28,46,58,.4)">
            <div style="font-size:.72rem;color:var(--text-bright)">${PM.esc(n.name||n.node_id)}</div>
            <div style="font-size:.58rem;color:var(--text-dim);display:flex;gap:8px;margin-top:3px">
                ${n.rssi?`<span style="color:${PMViz.rssiColor(n.rssi)}">${n.rssi}dBm</span>`:""}
                <span>${n.hops||0}hops</span>
            </div>
        </div>`).join("")||'<div style="padding:14px;text-align:center;color:var(--text-dim);font-size:.65rem">No nodes</div>';
}

function renderTXLog(){
    document.getElementById("txLog").innerHTML=txLog.map(t=>`
        <div class="tx-item">
            <div class="tx-from" style="color:${t.type==="tx"?"var(--accent4)":"var(--accent3)"}">${t.type==="tx"?"▶ YOU":"◀ "+PM.esc(t.from)}</div>
            <div class="tx-meta">
                <span>CH ${t.channel}</span>
                ${t.duration?`<span>${(t.duration/1000).toFixed(1)}s</span>`:""}
                ${t.rssi?`<span style="color:${PMViz.rssiColor(t.rssi)}">${t.rssi}dBm</span>`:""}
                <span class="codec-badge">${t.codec||"codec2"}</span>
                <span style="margin-left:auto">${new Date(t.ts).toLocaleTimeString()}</span>
            </div>
        </div>`).join("")||'<div style="padding:14px;text-align:center;color:var(--text-dim);font-size:.65rem">No transmissions yet</div>';
}

async function startPTT(e){
    if(e) e.preventDefault();
    if(transmitting) return;
    transmitting=true;
    txCount++; document.getElementById("txCount").textContent=txCount;
    document.getElementById("pttBtn").classList.add("transmitting");
    document.getElementById("vtStatus").textContent="TRANSMITTING";
    document.getElementById("vtStatus").style.color="var(--accent4)";
    if(beam.connected) beam.send({type:"CMD_VOICE_TX_START",src:"app",cmd_id:"vt2",channel:activeChannel,codec:document.getElementById("codecSelect").value});
    startAudioCapture();
}

function stopPTT(e){
    if(e) e.preventDefault();
    if(!transmitting) return;
    transmitting=false;
    document.getElementById("pttBtn").classList.remove("transmitting");
    document.getElementById("vtStatus").textContent="STANDBY";
    document.getElementById("vtStatus").style.color="var(--text-dim)";
    if(beam.connected) beam.send({type:"CMD_VOICE_TX_STOP",src:"app",cmd_id:"vt3"});
    stopAudioCapture();
}

async function startAudioCapture(){
    try{
        audioCtx=new AudioContext();
        micStream=await navigator.mediaDevices.getUserMedia({audio:true});
        const src=audioCtx.createMediaStreamSource(micStream);
        analyser=audioCtx.createAnalyser();
        analyser.fftSize=256;
        src.connect(analyser);
        drawLiveWaveform();
    }catch(e){console.log("Mic unavailable:",e);}
}

function stopAudioCapture(){
    if(micStream) micStream.getTracks().forEach(t=>t.stop());
    if(audioCtx) audioCtx.close();
    micStream=null; audioCtx=null; analyser=null;
    cancelAnimationFrame(wfFrame);
    drawWaveform([]);
    document.getElementById("meterFill").style.width="0%";
}

function drawLiveWaveform(){
    if(!analyser||!transmitting){cancelAnimationFrame(wfFrame);return;}
    const data=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(data);
    const volume=analyser.getByteFrequencyData.bind(analyser);
    const fd=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(fd);
    const avg=fd.reduce((s,v)=>s+v,0)/fd.length;
    document.getElementById("meterFill").style.width=`${Math.min(100,(avg/128)*100)}%`;
    drawWaveform(Array.from(data));
    wfFrame=requestAnimationFrame(drawLiveWaveform);
}

function drawWaveform(data){
    const ctx=wfCtx, w=wfCanvas.width, h=wfCanvas.height, C=PMViz.C;
    ctx.fillStyle=C.bg; ctx.fillRect(0,0,w,h);
    if(data.length===0){ctx.fillStyle=C.textDim;ctx.font="11px monospace";ctx.textAlign="center";ctx.fillText("Hold PTT to transmit",w/2,h/2);return;}
    ctx.beginPath();
    const sliceW=w/data.length;
    data.forEach((v,i)=>{
        const y=((v/128)-1)*(h/2-4)+(h/2);
        if(i===0) ctx.moveTo(0,y); else ctx.lineTo(i*sliceW,y);
    });
    ctx.strokeStyle=transmitting?C.accent4:C.accent3;
    ctx.lineWidth=1.5; ctx.stroke();
}

function updateSquelch(v){document.getElementById("squelchVal").textContent=v+"dBm";}

window.addEventListener("load",async()=>{
    initViz();
    try{await beam.connect();}catch(e){console.log("No hardware — demo mode");}
});
</script></body></html>
