<!-- PISCES MOON OS // VOICE TERMINAL -->
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // VOICE TERMINAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#050a0e;--bg2:#080f14;--bg3:#0c1620;--panel:#0a1520;--panel-border:#1a3a50;--accent:#00d4ff;--accent2:#ff6b00;--accent3:#00ff88;--accent4:#ff3366;--warn:#ffcc00;--gold:#f4a820;--text:#7ab8d4;--text-bright:#c8e8f5;--text-dim:#2a5870;--glow:0 0 20px rgba(0,212,255,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999;}
header{background:var(--bg2);border-bottom:2px solid var(--panel-border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1rem;color:var(--accent);text-shadow:var(--glow);letter-spacing:3px;}
.logo span{color:var(--gold);}
.layout{display:flex;flex:1;overflow:hidden;}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.msg{max-width:82%;}
.msg.user{align-self:flex-end;}
.msg.assistant{align-self:flex-start;}
.mr{font-size:.57rem;color:var(--text-dim);letter-spacing:2px;margin-bottom:3px;font-family:'Orbitron',monospace;}
.msg.user .mr{color:var(--gold);}
.msg.assistant .mr{color:var(--accent);}
.mb{padding:10px 14px;font-size:.74rem;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
.msg.user .mb{background:rgba(244,168,32,.08);border:1px solid rgba(244,168,32,.2);color:var(--text-bright);}
.msg.assistant .mb{background:var(--panel);border:1px solid var(--panel-border);color:var(--text-bright);}
.voice-controls{background:var(--bg2);border-top:1px solid var(--panel-border);padding:16px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;flex-shrink:0;}
.mic-btn{width:80px;height:80px;border-radius:50%;background:transparent;border:3px solid var(--accent);color:var(--accent);font-size:2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;}
.mic-btn:hover{border-color:var(--accent3);color:var(--accent3);}
.mic-btn.listening{border-color:var(--accent4);color:var(--accent4);animation:ripple 1s infinite;box-shadow:0 0 0 0 rgba(255,51,102,.4);}
.mic-btn.processing{border-color:var(--warn);color:var(--warn);animation:spin 1s linear infinite;}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(255,51,102,.4)}70%{box-shadow:0 0 0 20px rgba(255,51,102,0)}100%{box-shadow:0 0 0 0 rgba(255,51,102,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.waveform{height:40px;display:flex;align-items:center;gap:3px;overflow:hidden;}
.wave-bar{width:4px;background:var(--accent);border-radius:2px;transition:height .1s;min-height:4px;}
.mic-status{font-family:'Orbitron',monospace;font-size:.65rem;color:var(--text-dim);letter-spacing:2px;}
.input-row{display:flex;gap:8px;width:100%;max-width:600px;}
.pm-input{flex:1;background:var(--bg3);border:1px solid var(--panel-border);color:var(--text-bright);font-family:'Share Tech Mono',monospace;font-size:.74rem;padding:8px 12px;outline:none;}
.pm-input:focus{border-color:var(--accent);}
.pm-input::placeholder{color:var(--text-dim);}
.send-btn{background:var(--accent);border:none;color:var(--bg);font-family:'Orbitron',monospace;font-size:.62rem;padding:0 16px;cursor:pointer;height:38px;transition:all .2s;}
.send-btn:hover{background:var(--text-bright);}
.thinking{display:flex;gap:4px;padding:12px 14px;}
.thinking span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:th 1.2s infinite;}
.thinking span:nth-child(2){animation-delay:.2s;}.thinking span:nth-child(3){animation-delay:.4s;}
@keyframes th{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
.vol-row{display:flex;align-items:center;gap:10px;font-size:.62rem;color:var(--text-dim);}
input[type=range]{-webkit-appearance:none;height:3px;background:var(--panel-border);width:100px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);cursor:pointer;border-radius:50%;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg3);} ::-webkit-scrollbar-thumb{background:var(--panel-border);}
</style></head><body>
<header>
  <div class="logo">PISCES MOON // <span>VOICE</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <select style="background:var(--bg3);border:1px solid var(--panel-border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.65rem;padding:5px 8px;outline:none" id="voiceSel"></select>
    <span id="srStatus" style="font-size:.62rem;color:var(--text-dim)">Speech recognition ready</span>
  </div>
</header>
<div class="layout">
  <div class="msgs" id="msgs">
    <div style="text-align:center;padding:40px;color:var(--text-dim)">
      <div style="font-family:'Orbitron',monospace;font-size:1.2rem;color:var(--accent);margin-bottom:12px;text-shadow:var(--glow)">☽ VOICE TERMINAL</div>
      <div style="font-size:.72rem;line-height:2">Press the microphone to speak.<br>Or type in the box below.<br>Powered by Web Speech API + Gemini.</div>
    </div>
  </div>
</div>
<div class="voice-controls">
  <div class="waveform" id="waveform"></div>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <div class="mic-status" id="micStatus">TAP TO SPEAK</div>
  <div class="input-row">
    <input class="pm-input" id="textInput" placeholder="Or type here..." onkeydown="if(event.key==='Enter')sendText()">
    <button class="send-btn" onclick="sendText()">SEND ↵</button>
  </div>
  <div class="vol-row">
    <span>VOICE SPEED</span>
    <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1">
    <span>PITCH</span>
    <input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1">
  </div>
</div>
<script>
let recognition = null, synth = window.speechSynthesis;
let listening = false, thinking = false;
let waveInterval = null, waveEls = [];

// Init waveform
for (let i=0;i<20;i++) {
  const el = document.createElement('div');
  el.className = 'wave-bar';
  el.style.height = '4px';
  document.getElementById('waveform').appendChild(el);
  waveEls.push(el);
}

// Load voices
function loadVoices() {
  const voices = synth.getVoices();
  const sel = document.getElementById('voiceSel');
  sel.innerHTML = voices.map((v,i)=>`<option value="${i}">${v.name} (${v.lang})</option>`).join('');
}
synth.onvoiceschanged = loadVoices;
loadVoices();

function startWave() {
  waveInterval = setInterval(()=>{
    waveEls.forEach(el=>{
      el.style.height = (4+Math.random()*32)+'px';
      el.style.background = listening?'var(--accent4)':'var(--accent)';
    });
  }, 100);
}

function stopWave() {
  clearInterval(waveInterval);
  waveEls.forEach(el=>{el.style.height='4px';el.style.background='var(--accent)';});
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    addMsg('assistant', '⚠ Speech recognition not available in this browser. Use Chrome or Edge. You can still type below.');
    return;
  }
  if (listening) { recognition?.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.onstart = ()=>{
    listening=true;
    document.getElementById('micBtn').className='mic-btn listening';
    document.getElementById('micStatus').textContent='LISTENING...';
    startWave();
  };
  recognition.onresult = e=>{
    const transcript = Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('textInput').value = transcript;
    if (e.results[e.results.length-1].isFinal) {
      recognition.stop();
      sendText();
    }
  };
  recognition.onend = ()=>{
    listening=false;
    document.getElementById('micBtn').className='mic-btn';
    document.getElementById('micStatus').textContent='TAP TO SPEAK';
    stopWave();
  };
  recognition.onerror = e=>{
    document.getElementById('srStatus').textContent='Error: '+e.error;
    listening=false;
    document.getElementById('micBtn').className='mic-btn';
    stopWave();
  };
  recognition.start();
}

async function sendText() {
  const text = document.getElementById('textInput').value.trim(); if(!text||thinking)return;
  document.getElementById('textInput').value='';
  addMsg('user', text);
  thinking=true;
  document.getElementById('micBtn').className='mic-btn processing';
  document.getElementById('micStatus').textContent='PROCESSING...';
  const tb=addMsg('assistant','<div class="thinking"><span></span><span></span><span></span></div>',true);
  const key=localStorage.getItem('pm_gemini_key')||'';
  let reply='';
  if(!key){reply='No API key set. Please add your Gemini API key in the Gemini Terminal app.';}
  else{
    try{
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key='+key,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{role:'user',parts:[{text:'You are a helpful voice assistant. Be concise and conversational. Question: '+text}]}],generationConfig:{maxOutputTokens:400}})
      });
      const data=await r.json();
      reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'Sorry, no response.';
    }catch(e){reply='Error: '+e.message;}
  }
  tb.querySelector('.mb').innerHTML=esc(reply);
  tb.querySelector('.mb').style.fontStyle='normal';
  thinking=false;
  document.getElementById('micBtn').className='mic-btn';
  document.getElementById('micStatus').textContent='TAP TO SPEAK';
  speak(reply);
}

function speak(text) {
  if (!synth || !text) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text.replace(/<[^>]+>/g,'').slice(0,500));
  const voices = synth.getVoices();
  const selIdx = parseInt(document.getElementById('voiceSel').value)||0;
  if (voices[selIdx]) utt.voice = voices[selIdx];
  utt.rate = parseFloat(document.getElementById('rateSlider').value);
  utt.pitch = parseFloat(document.getElementById('pitchSlider').value);
  synth.speak(utt);
}

function addMsg(role, content, raw=false) {
  const el = document.createElement('div');
  el.className = 'msg '+role;
  el.innerHTML = `<div class="mr">${role==='user'?'// YOU':'// VOICE AI'}</div><div class="mb">${raw?content:esc(content)}</div>`;
  document.getElementById('msgs').appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
  return el;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script></body></html>
