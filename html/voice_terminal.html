<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // VOICE</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
.vt-layout{display:grid;grid-template-columns:260px 1fr 260px;height:calc(100vh - 52px);overflow:hidden}
.vt-left{border-right:1px solid var(--panel-border);overflow-y:auto}
.vt-right{border-left:1px solid var(--panel-border);overflow-y:auto}
.vt-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;overflow-y:auto}
.ptt-btn{width:160px;height:160px;border-radius:50%;border:3px solid var(--accent4);background:rgba(255,51,102,.08);color:var(--accent4);font-family:Orbitron,monospace;font-size:.8rem;letter-spacing:3px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;user-select:none}
.ptt-btn:active,.ptt-btn.transmitting{background:rgba(255,51,102,.25);border-color:var(--accent4);box-shadow:0 0 30px rgba(255,51,102,.4);transform:scale(1.05)}
.ptt-btn .ptt-icon{font-size:2.5rem}
.ptt-btn .ptt-label{font-size:.6rem;letter-spacing:3px}
.vt-meter{width:100%;max-width:300px;height:12px;background:var(--bg3);border:1px solid var(--panel-border);overflow:hidden;border-radius:6px}
.vt-meter-fill{height:100%;width:0%;background:linear-gradient(to right,var(--accent3),var(--gold),var(--accent4));border-radius:6px;transition:width .05s}
.channel-btn{padding:8px 14px;background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);font-family:Orbitron,monospace;font-size:.52rem;cursor:pointer;letter-spacing:1px;transition:all .15s}
.channel-btn:hover{border-color:var(--accent);color:var(--accent)}
.channel-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.1)}
.tx-item{padding:10px 12px;border-bottom:1px solid rgba(28,46,58,.4)}
.tx-from{font-size:.7rem;color:var(--text-bright);margin-bottom:3px}
.tx-meta{font-size:.58rem;color:var(--text-dim);display:flex;gap:8px}
.codec-badge{display:inline-block;padding:1px 6px;font-family:Orbitron,monospace;font-size:.45rem;border:1px solid var(--accent);color:var(--accent)}
</style>
</head><body>
<header class="pm-header">
    <div class="pm-logo">🎙 <em>VOICE</em> TERMINAL</div>
    <div class="pm-hdr-right">
        <div class="pm-live-badge" id="liveBadge" style="opacity:.3"><div class="pm-live-dot" style="background:var(--accent4)"></div>PTT READY</div>
        <span class="pm-last-update" id="lastUpdate"></span>
    </div>
</header>
<div class="vt-layout">
    <div class="vt-left">
        <div class="pm-sh">ACTIVE NODES</div>
        <div id="nodeList"><div style="padding:14px;text-align:center;color:var(--text-dim);font-size:.65rem">Waiting for mesh nodes...</div></div>
        <div class="pm-sh">CHANNEL</div>
        <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px" id="channelList"></div>
        <div class="pm-sh">CODEC</div>
        <div style="padding:12px;font-size:.65rem">
            <select id="codecSelect" style="width:100%;background:var(--bg3);border:1px solid var(--panel-border);color:var(--text);font-family:Share\ Tech\ Mono,monospace;font-size:.62rem;padding:6px;margin-bottom:8px">
                <option value="codec2_2400">Codec2 2400bps (LoRa optimized)</option>
                <option value="codec2_3200">Codec2 3200bps</option>
                <option value="opus_8k">Opus 8kbps</option>
                <option value="gsm">GSM 13kbps</option>
            </select>
            <div style="color:var(--text-dim)">Codec2 recommended for LoRa mesh.<br>Low bitrate = more range.</div>
        </div>
    </div>
    <div class="vt-center">
        <div style="font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:3px;color:var(--text-dim)" id="vtStatus">STANDBY</div>
        <canvas id="vt-waveform" width="300" height="80"></canvas>
        <button class="ptt-btn" id="pttBtn"
            onmousedown="startPTT()" onmouseup="stopPTT()"
            ontouchstart="startPTT(event)" ontouchend="stopPTT(event)">
            <span class="ptt-icon">🎙</span>
            <span class="ptt-label">HOLD TO TALK</span>
        </button>
        <div class="vt-meter"><div class="vt-meter-fill" id="meterFill"></div></div>
        <div style="display:flex;gap:16px;font-size:.6rem;color:var(--text-dim)">
            <span>TX: <span style="color:var(--accent4)" id="txCount">0</span></span>
            <span>RX: <span style="color:var(--accent3)" id="rxCount">0</span></span>
            <span>Channel: <span style="color:var(--accent)" id="activeChannel">1</span></span>
        </div>
        <canvas id="vt-rssi" width="300" height="50"></canvas>
    </div>
    <div class="vt-right">
        <div class="pm-sh">TRANSMISSION LOG</div>
        <div id="txLog"><div style="padding:14px;text-align:center;color:var(--text-dim);font-size:.65rem">No transmissions yet</div></div>
        <div class="pm-sh">SIGNAL QUALITY</div>
        <canvas id="vt-quality" width="238" height="100" style="padding:8px"></canvas>
        <div class="pm-sh">SQUELCH</div>
        <div style="padding:12px">
            <div style="font-size:.6rem;color:var(--text-dim);margin-bottom:6px">Squelch level: <span id="squelchVal">-80dBm</span></div>
            <input type="range" id="squelchSlider" min="-120" max="-40" value="-80"
                style="width:100%;accent-color:var(--accent)"
                oninput="updateSquelch(this.value)">
        </div>
    </div>
</div>
<script src="pm_scraper.js"></script>
<script src="pm_viz.js"></script>
<script src="pm_utils.js"></script>
<script src="pm_transport.js"></script>
<script>
const CHANNELS=["1","2","3","4","5","SEC-A","SEC-B"];
let activeChannel="1", transmitting=false;
let txCount=0, rxCount=0;
let audioCtx=null, analyser=null, micStream=null;
let rssiSpark, qualityGauge;
let wfCanvas, wfCtx, wfFrame;
let txLog=[];
let nodes=new Map();

function initViz(){
    rssiSpark=new PMViz.Sparkline("vt-rssi",{color:PMViz.C.accent3,maxPts:60});
    document.getElementById("vt-rssi").width=300;
    qualityGauge=new PMViz.GaugeArc("vt-quality",{min:-120,max:0,label:"RSSI"});
    wfCanvas=document.getElementById("vt-waveform");
    wfCtx=wfCanvas.getContext("2d");
    drawWaveform([]);
    renderChannels();
}

function renderChannels(){
    document.getElementById("channelList").innerHTML=CHANNELS.map(ch=>`
        <button class="channel-btn ${activeChannel===ch?"active":""}" onclick="setChannel('${ch}')">CH ${ch}</button>`).join("");
}

function setChannel(ch){
    activeChannel=ch;
    document.getElementById("activeChannel").textContent=ch;
    renderChannels();
    if(beam.connected) beam.send({type:"CMD_VOICE_CHANNEL",src:"app",cmd_id:"vt1",channel:ch});
}

const beam=new PMTransport({
    onMessage:handleData,
    onStatus:(s)=>{document.getElementById("liveBadge").style.opacity=s.state==="connected"?"1":"0.3";document.getElementById("lastUpdate").textContent=s.message;}
});

function handleData(msg){
    if(msg.type==="VOICE_RX") onVoiceRX(msg);
    else if(msg.type==="MESH_NODE_UPDATE") updateNode(msg);
    else if(msg.type==="VOICE_TX_ACK") onTXAck(msg);
}

function onVoiceRX(msg){
    rxCount++; document.getElementById("rxCount").textContent=rxCount;
    if(msg.rssi) {rssiSpark.push(msg.rssi); qualityGauge.update(msg.rssi);}
    txLog.unshift({type:"rx",from:msg.from||"unknown",channel:msg.channel||activeChannel,duration:msg.duration_ms||0,rssi:msg.rssi,codec:msg.codec||"codec2",ts:Date.now()});
    if(txLog.length>30) txLog.pop();
    renderTXLog();
    document.getElementById("vtStatus").textContent=`RX: ${msg.from||"unknown"}`;
    document.getElementById("vtStatus").style.color="var(--accent3)";
    setTimeout(()=>{document.getElementById("vtStatus").textContent="STANDBY";document.getElementById("vtStatus").style.color="var(--text-dim)";},2000);
}

function onTXAck(msg){
    txLog.unshift({type:"tx",from:"YOU",channel:activeChannel,duration:msg.duration_ms||0,rssi:null,codec:document.getElementById("codecSelect").value,ts:Date.now()});
    if(txLog.length>30) txLog.pop();
    renderTXLog();
}

function updateNode(msg){
    nodes.set(msg.node_id,{...msg,lastSeen:Date.now()});
    document.getElementById("nodeList").innerHTML=Array.from(nodes.values()).map(n=>`
        <div style="padding:10px 12px;border-bottom:1px solid rgba(28,46,58,.4)">
            <div style="font-size:.72rem;color:var(--text-bright)">${PM.esc(n.name||n.node_id)}</div>
            <div style="font-size:.58rem;color:var(--text-dim);display:flex;gap:8px;margin-top:3px">
                ${n.rssi?`<span style="color:${PMViz.rssiColor(n.rssi)}">${n.rssi}dBm</span>`:""}
                <span>${n.hops||0}hops</span>
            </div>
        </div>`).join("")||'<div style="padding:14px;text-align:center;color:var(--text-dim);font-size:.65rem">No nodes</div>';
}

function renderTXLog(){
    document.getElementById("txLog").innerHTML=txLog.map(t=>`
        <div class="tx-item">
            <div class="tx-from" style="color:${t.type==="tx"?"var(--accent4)":"var(--accent3)"}">${t.type==="tx"?"▶ YOU":"◀ "+PM.esc(t.from)}</div>
            <div class="tx-meta">
                <span>CH ${t.channel}</span>
                ${t.duration?`<span>${(t.duration/1000).toFixed(1)}s</span>`:""}
                ${t.rssi?`<span style="color:${PMViz.rssiColor(t.rssi)}">${t.rssi}dBm</span>`:""}
                <span class="codec-badge">${t.codec||"codec2"}</span>
                <span style="margin-left:auto">${new Date(t.ts).toLocaleTimeString()}</span>
            </div>
        </div>`).join("")||'<div style="padding:14px;text-align:center;color:var(--text-dim);font-size:.65rem">No transmissions yet</div>';
}

async function startPTT(e){
    if(e) e.preventDefault();
    if(transmitting) return;
    transmitting=true;
    txCount++; document.getElementById("txCount").textContent=txCount;
    document.getElementById("pttBtn").classList.add("transmitting");
    document.getElementById("vtStatus").textContent="TRANSMITTING";
    document.getElementById("vtStatus").style.color="var(--accent4)";
    if(beam.connected) beam.send({type:"CMD_VOICE_TX_START",src:"app",cmd_id:"vt2",channel:activeChannel,codec:document.getElementById("codecSelect").value});
    startAudioCapture();
}

function stopPTT(e){
    if(e) e.preventDefault();
    if(!transmitting) return;
    transmitting=false;
    document.getElementById("pttBtn").classList.remove("transmitting");
    document.getElementById("vtStatus").textContent="STANDBY";
    document.getElementById("vtStatus").style.color="var(--text-dim)";
    if(beam.connected) beam.send({type:"CMD_VOICE_TX_STOP",src:"app",cmd_id:"vt3"});
    stopAudioCapture();
}

async function startAudioCapture(){
    try{
        audioCtx=new AudioContext();
        micStream=await navigator.mediaDevices.getUserMedia({audio:true});
        const src=audioCtx.createMediaStreamSource(micStream);
        analyser=audioCtx.createAnalyser();
        analyser.fftSize=256;
        src.connect(analyser);
        drawLiveWaveform();
    }catch(e){console.log("Mic unavailable:",e);}
}

function stopAudioCapture(){
    if(micStream) micStream.getTracks().forEach(t=>t.stop());
    if(audioCtx) audioCtx.close();
    micStream=null; audioCtx=null; analyser=null;
    cancelAnimationFrame(wfFrame);
    drawWaveform([]);
    document.getElementById("meterFill").style.width="0%";
}

function drawLiveWaveform(){
    if(!analyser||!transmitting){cancelAnimationFrame(wfFrame);return;}
    const data=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(data);
    const volume=analyser.getByteFrequencyData.bind(analyser);
    const fd=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(fd);
    const avg=fd.reduce((s,v)=>s+v,0)/fd.length;
    document.getElementById("meterFill").style.width=`${Math.min(100,(avg/128)*100)}%`;
    drawWaveform(Array.from(data));
    wfFrame=requestAnimationFrame(drawLiveWaveform);
}

function drawWaveform(data){
    const ctx=wfCtx, w=wfCanvas.width, h=wfCanvas.height, C=PMViz.C;
    ctx.fillStyle=C.bg; ctx.fillRect(0,0,w,h);
    if(data.length===0){ctx.fillStyle=C.textDim;ctx.font="11px monospace";ctx.textAlign="center";ctx.fillText("Hold PTT to transmit",w/2,h/2);return;}
    ctx.beginPath();
    const sliceW=w/data.length;
    data.forEach((v,i)=>{
        const y=((v/128)-1)*(h/2-4)+(h/2);
        if(i===0) ctx.moveTo(0,y); else ctx.lineTo(i*sliceW,y);
    });
    ctx.strokeStyle=transmitting?C.accent4:C.accent3;
    ctx.lineWidth=1.5; ctx.stroke();
}

function updateSquelch(v){document.getElementById("squelchVal").textContent=v+"dBm";}

window.addEventListener("load",async()=>{
    initViz();
    try{await beam.connect();}catch(e){console.log("No hardware — demo mode");}
});
</script></body></html>
