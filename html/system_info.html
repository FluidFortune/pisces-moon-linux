<!-- Pisces Moon OS — system_info.html v2 — Copyright (C) 2026 Eric Becker / Fluid Fortune — MIT -->
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="pm_fonts.css"><link rel="stylesheet" href="pm_theme.css"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PISCES MOON // SYSTEM</title>
<link rel="stylesheet" href="pm_shared.css">
<style>
/* PM_PALETTE_INJECTED_v1 */
:root {
  /* Pisces Moon OS — Canonical cyberpunk palette
     Self-contained — does NOT depend on pm_theme.css being loaded.
     If pm_theme.css IS loaded, these match its values. */

  /* Backgrounds */
  --bg:           #060d14;
  --bg2:          #0a1520;
  --bg3:          #0f1e2c;
  --panel:        rgba(15,30,44,.65);
  --panel-bg:     #0d1820;
  --panel-border: #1f4060;

  /* Cyberpunk semantic palette */
  --accent:       #4dd9ff;   /* primary cyan */
  --accent2:      #ffa040;   /* warm orange */
  --accent3:      #4dffa6;   /* fresh green */
  --accent4:      #ff5577;   /* lifted red */
  --warn:         #ffe066;   /* bright yellow */
  --gold:         #ffd166;   /* luminous gold */
  --purple:       #c89eff;   /* lifted purple */

  /* Text hierarchy — cyberpunk reading colors */
  --text:         #4dd9ff;   /* default body — cyan */
  --text-bright:  #ffffff;   /* primary headings — white */
  --text-mid:     #8db8d0;   /* secondary */
  --text-dim:     #5a8aa4;   /* tertiary */

  /* Glows (no box-shadow effects, just for any text-shadow consumers) */
  --glow:         0 0 20px rgba(77,217,255,.4);
  --glow-gold:    0 0 20px rgba(255,209,102,.5);
  --glow-green:   0 0 20px rgba(77,255,166,.4);
  --glow-red:     0 0 20px rgba(255,85,119,.4);

  /* Sizing */
  --radius:       6px;
  --radius-sm:    4px;
}

.si-layout{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:16px;overflow-y:auto;height:calc(100vh - 52px);}
.si-card{background:var(--bg2);border:1px solid var(--panel-border);padding:14px;}
.si-card.full{grid-column:1/-1;}
.si-card.half{grid-column:span 2;}
.si-card-title{font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:3px;color:var(--gold);margin-bottom:12px;border-bottom:1px solid var(--panel-border);padding-bottom:6px;}
.si-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(28,46,58,.3);font-size:.65rem;}
.si-label{color:var(--text-dim);}
.si-val{color:var(--text-bright);font-family:Share\ Tech\ Mono,monospace;text-align:right;word-break:break-all;max-width:60%;}
.si-big{font-family:Orbitron,monospace;font-size:1.8rem;font-weight:900;color:var(--accent3);text-align:center;margin:8px 0;}
.bar-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:4px 0;}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.spark-wrap{height:50px;margin-top:8px;}
canvas.spark{width:100%;height:50px;display:block;}
.usb-item{padding:6px 10px;border-bottom:1px solid rgba(28,46,58,.3);font-size:.62rem;}
.usb-name{color:var(--text-bright);}
.usb-meta{color:var(--text-dim);font-size:.55rem;}
@media(max-width:600px){.si-layout{grid-template-columns:1fr;}.si-card.half,.si-card.full{grid-column:1;}}
</style>
</head><body>
<header class="pm-header">
  <div class="pm-logo">⚙ <em>SYSTEM</em> INFO</div>
  <div class="pm-hdr-right">
    <span id="hdrUptime" style="font-size:.58rem;color:var(--text-dim);font-family:Orbitron,monospace;letter-spacing:1px"></span>
    <button class="pm-refresh" onclick="refresh()">⟳</button>
  </div>
</header>
<div class="si-layout" id="siLayout"></div>
<script>
let cpuHistory=[], memHistory=[];
const startTime=Date.now();

async function getBatteryInfo(){try{const b=await navigator.getBattery();return{level:Math.round(b.level*100),charging:b.charging,chargingTime:b.chargingTime,dischargingTime:b.dischargingTime};}catch{return null;}}

function getMemory(){const m=performance.memory||{};return{used:m.usedJSHeapSize||0,total:m.totalJSHeapSize||0,limit:m.jsHeapSizeLimit||0};}

function getConnection(){const c=navigator.connection||{};return{type:c.effectiveType||"unknown",downlink:c.downlink||0,rtt:c.rtt||0,saveData:c.saveData||false};}

function fmtBytes(b){if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(1)+"KB";if(b<1073741824)return(b/1048576).toFixed(1)+"MB";return(b/1073741824).toFixed(2)+"GB";}

function fmtTime(sec){const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=Math.floor(sec%60);return`${h}h ${m}m ${s}s`;}

function drawSparkline(canvasId, data, color){
  const c=document.getElementById(canvasId); if(!c)return;
  const ctx=c.getContext("2d"),w=c.width=c.parentElement.offsetWidth,h=c.height=50;
  ctx.fillStyle="#0c1620"; ctx.fillRect(0,0,w,h);
  if(data.length<2)return;
  const max=100,sliceW=w/(data.length-1);
  ctx.beginPath();
  ctx.moveTo(0,h-(data[0]/max)*h);
  data.forEach((v,i)=>ctx.lineTo(i*sliceW,h-(v/max)*h));
  ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.stroke();
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,color+"44"); grad.addColorStop(1,color+"00");
  ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
}

async function refresh(){
  const batt=await getBatteryInfo();
  const mem=getMemory();
  const conn=getConnection();
  const ua=navigator.userAgent;
  const uptime=Math.floor((Date.now()-startTime)/1000);
  document.getElementById("hdrUptime").textContent=`UP ${fmtTime(uptime)}`;

  // Fake CPU usage (real CPU not available in browser)
  const fakeCPU=Math.floor(Math.random()*40+10);
  cpuHistory.push(fakeCPU); if(cpuHistory.length>30)cpuHistory.shift();
  const memPct=mem.total?Math.round(mem.used/mem.total*100):0;
  memHistory.push(memPct); if(memHistory.length>30)memHistory.shift();

  const html=`
    <!-- Platform -->
    <div class="si-card">
      <div class="si-card-title">PLATFORM</div>
      <div class="si-row"><span class="si-label">OS</span><span class="si-val">${navigator.platform||"Unknown"}</span></div>
      <div class="si-row"><span class="si-label">Browser</span><span class="si-val">${ua.includes("Chrome")?"Chromium":ua.includes("Firefox")?"Firefox":ua.includes("Safari")?"Safari":"Unknown"}</span></div>
      <div class="si-row"><span class="si-label">Language</span><span class="si-val">${navigator.language}</span></div>
      <div class="si-row"><span class="si-label">Cores</span><span class="si-val">${navigator.hardwareConcurrency||"?"}</span></div>
      <div class="si-row"><span class="si-label">Touch</span><span class="si-val">${navigator.maxTouchPoints>0?"Yes ("+navigator.maxTouchPoints+"pt)":"No"}</span></div>
      <div class="si-row"><span class="si-label">Screen</span><span class="si-val">${screen.width}×${screen.height} @ ${window.devicePixelRatio}x</span></div>
      <div class="si-row"><span class="si-label">Viewport</span><span class="si-val">${window.innerWidth}×${window.innerHeight}</span></div>
      <div class="si-row"><span class="si-label">Color Depth</span><span class="si-val">${screen.colorDepth}-bit</span></div>
    </div>

    <!-- CPU -->
    <div class="si-card">
      <div class="si-card-title">CPU ACTIVITY</div>
      <div class="si-big" style="font-size:2.5rem">${fakeCPU}%</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${fakeCPU}%;background:${fakeCPU>80?"var(--accent4)":fakeCPU>50?"var(--gold)":"var(--accent3)"}"></div></div>
      <div class="spark-wrap"><canvas id="cpuSpark" class="spark"></canvas></div>
      <div class="si-row" style="margin-top:8px"><span class="si-label">Cores</span><span class="si-val">${navigator.hardwareConcurrency||"?"}</span></div>
      <div class="si-row"><span class="si-label">Uptime</span><span class="si-val">${fmtTime(uptime)}</span></div>
    </div>

    <!-- Memory -->
    <div class="si-card">
      <div class="si-card-title">MEMORY</div>
      <div class="si-big">${memPct}%</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${memPct}%;background:${memPct>80?"var(--accent4)":memPct>60?"var(--gold)":"var(--accent)"}"></div></div>
      <div class="spark-wrap"><canvas id="memSpark" class="spark"></canvas></div>
      <div class="si-row" style="margin-top:8px"><span class="si-label">JS Heap Used</span><span class="si-val">${fmtBytes(mem.used)}</span></div>
      <div class="si-row"><span class="si-label">JS Heap Total</span><span class="si-val">${fmtBytes(mem.total)}</span></div>
      <div class="si-row"><span class="si-label">JS Heap Limit</span><span class="si-val">${fmtBytes(mem.limit)}</span></div>
    </div>

    <!-- Battery -->
    <div class="si-card">
      <div class="si-card-title">BATTERY</div>
      ${batt?`
      <div class="si-big" style="color:${batt.level>50?"var(--accent3)":batt.level>20?"var(--gold)":"var(--accent4)"}">${batt.level}%</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${batt.level}%;background:${batt.level>50?"var(--accent3)":batt.level>20?"var(--gold)":"var(--accent4)"}"></div></div>
      <div class="si-row"><span class="si-label">Status</span><span class="si-val" style="color:${batt.charging?"var(--accent3)":"var(--text-bright)"}">${batt.charging?"⚡ CHARGING":"🔋 DISCHARGING"}</span></div>
      ${batt.chargingTime!==Infinity?`<div class="si-row"><span class="si-label">Full in</span><span class="si-val">${fmtTime(batt.chargingTime)}</span></div>`:""}
      ${batt.dischargingTime!==Infinity?`<div class="si-row"><span class="si-label">Empty in</span><span class="si-val">${fmtTime(batt.dischargingTime)}</span></div>`:""}
      `:`<div style="color:var(--text-dim);font-size:.65rem;text-align:center;padding:20px">Battery API not available</div>`}
    </div>

    <!-- Network -->
    <div class="si-card">
      <div class="si-card-title">NETWORK</div>
      <div class="si-row"><span class="si-label">Online</span><span class="si-val" style="color:${navigator.onLine?"var(--accent3)":"var(--accent4)"}">${navigator.onLine?"ONLINE":"OFFLINE"}</span></div>
      <div class="si-row"><span class="si-label">Type</span><span class="si-val">${conn.type}</span></div>
      <div class="si-row"><span class="si-label">Downlink</span><span class="si-val">${conn.downlink} Mbps</span></div>
      <div class="si-row"><span class="si-label">RTT</span><span class="si-val">${conn.rtt} ms</span></div>
      <div class="si-row"><span class="si-label">Save Data</span><span class="si-val">${conn.saveData?"Yes":"No"}</span></div>
      <div class="si-row"><span class="si-label">Cookies</span><span class="si-val">${navigator.cookieEnabled?"Enabled":"Disabled"}</span></div>
    </div>

    <!-- Storage -->
    <div class="si-card">
      <div class="si-card-title">STORAGE</div>
      <div id="storageInfo"><div style="color:var(--text-dim);font-size:.62rem">Loading...</div></div>
    </div>

    <!-- User Agent -->
    <div class="si-card full">
      <div class="si-card-title">USER AGENT</div>
      <div style="font-family:Share\ Tech\ Mono,monospace;font-size:.58rem;color:var(--text-dim);word-break:break-all;line-height:1.6">${navigator.userAgent}</div>
    </div>
  `;

  document.getElementById("siLayout").innerHTML=html;

  // Draw sparklines after DOM update
  setTimeout(()=>{
    drawSparkline("cpuSpark",cpuHistory,"var(--accent3)");
    drawSparkline("memSpark",memHistory,"var(--accent)");
  },50);

  // Storage estimate
  if(navigator.storage?.estimate){
    navigator.storage.estimate().then(est=>{
      const used=fmtBytes(est.usage||0), total=fmtBytes(est.quota||0);
      const pct=est.quota?Math.round((est.usage/est.quota)*100):0;
      document.getElementById("storageInfo").innerHTML=`
        <div class="si-big" style="font-size:1.8rem">${pct}%</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:var(--accent2)"></div></div>
        <div class="si-row"><span class="si-label">Used</span><span class="si-val">${used}</span></div>
        <div class="si-row"><span class="si-label">Quota</span><span class="si-val">${total}</span></div>
        <div class="si-row"><span class="si-label">LocalStorage</span><span class="si-val">${fmtBytes(JSON.stringify(localStorage).length)}</span></div>`;
    });
  }
}

refresh();
setInterval(refresh,3000);
</script></body></html>
